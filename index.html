<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Pilot Dashboard Pro</title>
    <style>
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --border: #30363d; --night: #050505; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; overflow: hidden; height: 100vh; }
        
        /* 布局 */
        #top-info { height: 25%; border-bottom: 1px solid var(--border); display: none; padding: 20px; grid-template-columns: 1.2fr 1fr 1fr; gap: 20px; background: rgba(22, 27, 34, 0.5); }
        #bottom-main { height: 75%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #bottom-main.full { height: 100%; }

        /* 时钟与天气 */
        #clock-big { font-size: 20vw; font-weight: bold; line-height: 1; }
        .weather-panel { position: absolute; top: 20px; right: 20px; text-align: right; }
        
        /* 进度条 */
        .prog-wrap { grid-column: span 3; background: #30363d; height: 12px; border-radius: 6px; position: relative; overflow: hidden; margin-top: 10px; }
        #prog-bar { background: var(--accent); height: 100%; width: 0%; transition: width 5s linear; }
        #plane-icon { position: absolute; top: -5px; right: 0; font-size: 20px; transition: left 5s linear; }

        /* Layover 双屏 */
        #layover-view { display: none; width: 100%; height: 100%; grid-template-columns: 1fr 1fr; }
        .city-pane { display: flex; flex-direction: column; justify-content: center; align-items: center; transition: background 2s; }
        .night-pane { background: var(--night); }
    </style>
</head>
<body>

<div id="top-info">
    <div>
        <div id="f-meta" style="color: #8b949e; font-size: 1.2vw;">FLIGHT DYNAMIC</div>
        <div id="f-route" style="font-size: 3vw; font-weight: bold; color: var(--accent);">---</div>
        <div id="f-status-text" style="font-size: 1.5vw; color: #afff93;">PRE-FLIGHT</div>
    </div>
    <div style="text-align: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border);">
        <div id="dest-t" style="font-size: 3vw;">--°C</div>
        <div id="dest-w" style="font-size: 1vw;">--</div>
        <div id="dest-cloth" style="font-size: 1vw; color: var(--accent);">--</div>
    </div>
    <div style="font-size: 0.8vw; overflow: hidden;">
        <div style="color: #8b949e;">DEST NOTAM / ADVISORY:</div>
        <div id="notam-content" style="background: #161b22; padding: 5px; height: 80px; margin-top: 5px;">Fetching terminal info...</div>
    </div>
    <div class="prog-wrap">
        <div id="prog-bar"></div>
        <div id="plane-icon">✈️</div>
    </div>
</div>

<div id="bottom-main">
    <div class="weather-panel">
        <div id="dxb-t" style="font-size: 4vw; color: var(--accent);">--°C</div>
        <div id="dxb-w" style="font-size: 1.2vw;">---</div>
    </div>

    <div id="default-clock">
        <div id="clock-big">00:00</div>
        <div id="date-line" style="font-size: 2vw; text-align: center; color: #8b949e;">----</div>
    </div>

    <div id="layover-view">
        <div class="city-pane" id="pane-home">
            <div style="font-size: 2vw;">DUBAI</div>
            <div id="time-home" style="font-size: 10vw; font-weight: bold;">00:00</div>
        </div>
        <div class="city-pane" id="pane-dest">
            <div id="dest-name" style="font-size: 2vw;">DESTINATION</div>
            <div id="time-dest" style="font-size: 10vw; font-weight: bold;">00:00</div>
            <div id="dest-w-small" style="font-size: 2vw; color: var(--accent);">--°C</div>
        </div>
    </div>
</div>

<script>
    // 凭证配置
    const AUTH = {
        opensky: btoa('chunhua1799@gmail.com-api-client:wiwHeRsyyP9r9zsCnyWMsE7OHb8FQImY'),
        weather: '9fcc9afb0a80a6aaa44c926e4f7827a7',
        gist: '6b51ae2b894903de0227eaec5e0ce842'
    };

    let state = { flight: null, dxbWeather: null, destWeather: null };

    // --- 实时追踪逻辑 (OpenSky) ---
    async function trackFlight(callsign) {
        if (!callsign) return;
        try {
            const res = await fetch(`https://opensky-network.org/api/states/all?icao24=${callsign}`, {
                headers: { 'Authorization': `Basic ${AUTH.opensky}` }
            });
            const data = await res.json();
            if (data.states && data.states.length > 0) {
                const s = data.states[0];
                const velocity = Math.round(s[9] * 3.6); // 速度 km/h
                const altitude = Math.round(s[7]); // 高度 m
                document.getElementById('f-status-text').innerText = `IN-FLIGHT: ${altitude}m | ${velocity}km/h`;
            }
        } catch (e) { console.log("OpenSky Offline"); }
    }

    // --- 数据同步 (Gist) ---
    async function syncGist() {
        try {
            const res = await fetch(`https://api.github.com/gists/${AUTH.gist}`);
            const data = await res.json();
            state.flight = JSON.parse(data.files["flight_data.json"].content);
            updateUI();
        } catch (e) { console.log("Gist Error"); }
    }

    // --- 时钟与布局切换 ---
    function updateClock() {
        const now = new Date();
        const dxbStr = new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Dubai' }).format(now);
        document.getElementById('clock-big').innerText = dxbStr;
        document.getElementById('time-home').innerText = dxbStr;
        document.getElementById('date-line').innerText = now.toLocaleDateString('zh-CN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

        if (state.flight) {
            const std = new Date(state.flight.std);
            const hoursDiff = (std - now) / 3600000;

            // 1. 顶部 1/4 逻辑
            if (hoursDiff <= 36 && hoursDiff > -12) {
                document.getElementById('top-info').style.display = 'grid';
                document.getElementById('bottom-main').classList.remove('full');
            } else {
                document.getElementById('top-info').style.display = 'none';
                document.getElementById('bottom-main').classList.add('full');
            }

            // 2. Layover 逻辑
            if (state.flight.isLayover) {
                document.getElementById('default-clock').style.display = 'none';
                document.getElementById('layover-view').style.display = 'grid';
                // 自动切换昼夜背景
                const hr = now.getHours();
                document.getElementById('pane-home').className = (hr > 18 || hr < 6) ? 'city-pane night-pane' : 'city-pane';
            } else {
                document.getElementById('default-clock').style.display = 'block';
                document.getElementById('layover-view').style.display = 'none';
            }

            // 3. 进度条模拟 (若OpenSky未抓到实时数据，则按时间计算)
            if (now > std) {
                const sta = new Date(state.flight.sta);
                const p = Math.min(((now - std) / (sta - std)) * 100, 100);
                document.getElementById('prog-bar').style.width = p + '%';
            }
        }
    }

    // --- 天气更新 ---
    async function updateWeather() {
        const fetchW = async (city) => {
            const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${AUTH.weather}`);
            return await r.json();
        };

        const dxb = await fetchW('Dubai');
        document.getElementById('dxb-t').innerText = Math.round(dxb.main.temp) + "°C";
        document.getElementById('dxb-w').innerText = dxb.weather[0].main.toUpperCase();

        if (state.flight && state.flight.arr) {
            const dest = await fetchW(state.flight.arr);
            document.getElementById('dest-t').innerText = Math.round(dest.main.temp) + "°C";
            document.getElementById('dest-w').innerText = dest.weather[0].description;
            document.getElementById('dest-cloth').innerText = dest.main.temp > 22 ? "LGT CLOTHING" : "WINTER GEAR";
        }
    }

    function updateUI() {
        if (!state.flight) return;
        document.getElementById('f-route').innerText = `${state.flight.dep} ➔ ${state.flight.arr}`;
        document.getElementById('dest-name').innerText = state.flight.layoverCity || state.flight.arr;
        if (state.flight.status === 'airborne') trackFlight(state.flight.icao24);
    }

    // 初始化
    setInterval(updateClock, 1000);
    setInterval(syncGist, 300000); 
    setInterval(updateWeather, 1800000);
    syncGist();
    updateWeather();
</script>
</body>
</html>
