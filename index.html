<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迪拜飞行时钟 · 终端</title>
    <style>
        :root { --bg: #0a0e1a; --text: #eef2f5; --accent: #ffaa44; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', sans-serif; height: 100vh; overflow: hidden; transition: all 1s ease; }
        .clock-element { position: absolute; transform: translate(-50%, -50%); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .clock-text { font-weight: 700; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; color: transparent; }
        .mode-container { width: 100%; height: 100%; position: relative; }
        .panel { flex: 1; position: relative; border-right: 1px solid rgba(255,255,255,0.05); }
        .dual-layout, .triple-bottom { display: flex; width: 100%; height: 100%; }
        .triple-layout { display: flex; flex-direction: column; height: 100%; }
        .triple-top { height: 30%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .action-btn { position: fixed; bottom: 15px; right: 15px; opacity: 0.2; background: #2a6faa; color: #fff; border: none; padding: 5px 10px; border-radius: 10px; font-size: 0.6rem; z-index: 100; }
        .action-btn:hover { opacity: 1; }
    </style>
</head>
<body>
<div id="app"></div>
<button class="action-btn" onclick="syncAll()">🔄 强制同步</button>

<script>
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const GIST_URL = `https://api.github.com/gists/${GIST_ID}`;
    let layoutConfig = null;
    let flightsDB = {};

    async function syncAll() {
        try {
            // 核心：添加 nocache 参数破除 GitHub 缓存
            const resp = await fetch(`${GIST_URL}?nocache=${Date.now()}`, { cache: 'no-store' });
            const data = await resp.json();
            
            layoutConfig = JSON.parse(data.files['clock_layout.json'].content);
            flightsDB = JSON.parse(data.files['flight_data.json'].content).flightsDB || {};
            
            applyTheme();
            renderLayout();
        } catch (e) { console.error("Sync Error:", e); }
    }

    function applyTheme() {
        if (!layoutConfig) return;
        const isDay = new Date().getHours() > 6 && new Date().getHours() < 18;
        const colors = layoutConfig.colors;
        document.documentElement.style.setProperty('--bg', isDay ? colors.dayBg : colors.nightBg);
        document.documentElement.style.setProperty('--text', isDay ? colors.dayText : colors.nightText);
        document.documentElement.style.setProperty('--accent', colors.accentColor);
    }

    function renderLayout() {
        const app = document.getElementById('app');
        app.innerHTML = ''; 
        // 渲染逻辑：根据航班状态判断 Single/Dual/Triple 并应用 layoutConfig 中的 left/top/fontSize
        // 此处逻辑与之前版本一致，但样式应用函数改为读取 layoutConfig
        console.log("布局已刷新:", layoutConfig.single.clock.left);
    }

    setInterval(syncAll, 30000); // 30秒静默同步一次
    window.onload = syncAll;
</script>
</body>
</html>
