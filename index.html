<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pilot Smart Clock</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family: Arial, sans-serif;
}

/* 主布局 */
#app {
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* 上1/4 */
#top {
  height:25%;
  display:flex;
  border-bottom:1px solid #333;
}

/* 下3/4 */
#bottom {
  height:75%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 分区 */
.panel {
  flex:1;
  padding:10px;
}

/* 时钟 */
#clock {
  font-size:120px;
  font-weight:bold;
}

/* 天气 */
#weather {
  font-size:30px;
}

/* 隐藏按钮 */
.trigger {
  position:absolute;
  width:60px;
  height:60px;
  opacity:0;
}

#topTrigger { top:0; right:0; }
#bottomTrigger { bottom:0; right:0; }

/* 弹窗 */
.modal {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#111;
  padding:20px;
  border:1px solid #444;
  display:none;
  z-index:10;
}

input, select {
  width:100%;
  margin:5px 0;
}

button {
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app">

  <!-- 上方航班区 -->
  <div id="top">
    <div class="panel" id="flightInfo">No Flight</div>
    <div class="panel" id="destWeather">--</div>
    <div class="panel" id="notam">--</div>
  </div>

  <!-- 下方主区 -->
  <div id="bottom">
    <div id="clock"></div>
    <div id="weather">Dubai Weather: 30°C</div>
  </div>

</div>

<!-- 隐藏触发 -->
<div id="topTrigger" class="trigger"></div>
<div id="bottomTrigger" class="trigger"></div>

<!-- 设置面板 -->
<div id="settingsModal" class="modal">
  <h3>Screen Mode</h3>
  <select id="modeSelect">
    <option value="1">Single</option>
    <option value="2">Double</option>
    <option value="3">Triple</option>
  </select>

  <h3>Font Size</h3>
  <input type="range" id="fontSize" min="50" max="200">

  <h3>Color</h3>
  <input type="color" id="colorPicker">

  <button onclick="saveSettings()">Save</button>
</div>

<!-- 航班面板 -->
<div id="flightModal" class="modal">
  <h3>Add Flight</h3>

  Flight No:
  <input id="flightNo" placeholder="EK202">

  Date:
  <input type="date" id="flightDate">

  From:
  <input id="from">

  To:
  <input id="to">

  Departure Time:
  <input type="time" id="depTime">

  Arrival Time:
  <input type="time" id="arrTime">

  <button onclick="saveFlight()">Save</button>
</div>

<script>

// ===== 时钟 =====
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("en-GB",{hour12:false});
}
setInterval(updateClock,1000);

// ===== 长按触发 =====
let pressTimer;

document.getElementById("topTrigger").addEventListener("mousedown", ()=>{
  pressTimer = setTimeout(()=>{
    document.getElementById("settingsModal").style.display="block";
  },1500);
});

document.getElementById("bottomTrigger").addEventListener("mousedown", ()=>{
  pressTimer = setTimeout(()=>{
    document.getElementById("flightModal").style.display="block";
  },1500);
});

document.addEventListener("mouseup", ()=>clearTimeout(pressTimer));

// ===== 保存设置 =====
function saveSettings(){
  const mode = document.getElementById("modeSelect").value;
  const size = document.getElementById("fontSize").value;
  const color = document.getElementById("colorPicker").value;

  localStorage.setItem("mode",mode);
  localStorage.setItem("size",size);
  localStorage.setItem("color",color);

  applySettings();
  document.getElementById("settingsModal").style.display="none";
}

// ===== 应用设置 =====
function applySettings(){
  const size = localStorage.getItem("size") || 120;
  const color = localStorage.getItem("color") || "#ffffff";

  document.getElementById("clock").style.fontSize = size+"px";
  document.body.style.color = color;
}

// ===== 保存航班 =====
function saveFlight(){
  let f = {
    no: document.getElementById("flightNo").value || "EK---",
    from: document.getElementById("from").value,
    to: document.getElementById("to").value,
    dep: document.getElementById("depTime").value,
    arr: document.getElementById("arrTime").value
  };

  localStorage.setItem("flight",JSON.stringify(f));
  loadFlight();

  document.getElementById("flightModal").style.display="none";
}

// ===== 加载航班 =====
function loadFlight(){
  let f = JSON.parse(localStorage.getItem("flight"));

  if(!f) return;

  document.getElementById("flightInfo").innerText =
    `${f.no} ${f.from} → ${f.to}\nDEP ${f.dep} ARR ${f.arr}`;
}

// ===== 初始化 =====
applySettings();
loadFlight();

</script>

</body>
</html>
