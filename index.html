<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迪拜飞行时钟 · 智能航线屏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        /* 无航班全屏模式 */
        .fullscreen-mode {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a2a, #1a2a4a);
            transition: all 0.3s;
        }
        .big-time {
            font-size: 22vw;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #fff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .big-date {
            position: absolute;
            bottom: 5vh;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1.2vw;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }
        .weather-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 10px 18px;
            text-align: center;
        }
        /* 有航班模式 */
        .flight-mode {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 16px;
            gap: 12px;
            background: #000;
        }
        .top-panel {
            height: 28%;
            background: rgba(20,25,45,0.95);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 14px;
            display: flex;
            gap: 12px;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .info-left { flex: 1; background: rgba(0,0,0,0.3); border-radius: 24px; padding: 10px; overflow-y: auto; }
        .info-center { flex: 1; background: rgba(0,0,0,0.3); border-radius: 24px; padding: 10px; overflow-y: auto; }
        .info-right { flex: 1; background: rgba(0,0,0,0.3); border-radius: 24px; padding: 10px; overflow-y: auto; }
        .flight-number { font-size: 1.6rem; font-weight: 800; color: #ffd966; }
        .layover-badge { display: inline-block; background: #ff8844; color: #0a0e1a; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-left: 10px; }
        .city-name-en { font-size: 0.8rem; color: #88aacc; }
        .time-dual { font-size: 0.75rem; margin-top: 6px; color: #aabbdd; }
        .dubai-time-mark { color: #66ffaa; }
        .progress-bar { height: 6px; background: #2a3344; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00c6ff, #0072ff); transition: width 0.5s; }
        .notam-item { font-size: 0.65rem; color: #ffaa66; border-left: 2px solid #ffaa66; padding-left: 6px; margin-bottom: 6px; }
        .bottom-split { flex: 1; display: flex; gap: 12px; min-height: 0; }
        .city-card { flex: 1; background: rgba(10,14,26,0.7); backdrop-filter: blur(8px); border-radius: 32px; padding: 16px; display: flex; flex-direction: column; position: relative; }
        .city-name { font-size: 1.6rem; font-weight: 700; color: #88aaff; }
        .city-sub { font-size: 0.7rem; color: #aabbdd; margin-bottom: 8px; }
        .big-local-clock { font-size: 3.5rem; font-weight: 600; font-family: monospace; margin: 8px 0; }
        .weather-icon-big { font-size: 2rem; text-align: center; }
        .temp-big { font-size: 1.4rem; font-weight: 600; text-align: center; }
        .forecast-row { display: flex; justify-content: space-between; margin-top: 12px; font-size: 0.65rem; flex-wrap: wrap; }
        .day-night-dot { position: absolute; top: 12px; right: 12px; width: 10px; height: 10px; border-radius: 10px; background: #ffaa44; box-shadow: 0 0 6px gold; }
        .date-footer { margin-top: auto; text-align: center; font-size: 0.7rem; color: #88aacc; }
        .hidden { display: none !important; }
        .weather-source-badge { font-size: 0.55rem; color: #6699cc; text-align: center; margin-top: 4px; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ============================================================
    // 所有接口凭证（您提供的）
    // ============================================================
    const WEATHER_KEY = "9fcc9afb0a80a6aaa44c926e4f7827a7";  // OpenWeatherMap 备用
    const AVIATION_KEY = "b4bd321bbba1723162801cce3c455d7c";
    const OPENSKY_CLIENT = "chunhua1799@gmail.com-api-client";
    const OPENSKY_SECRET = "wiwHeRsyyP9r9zsCnyWMsE7OHb8FQImY";
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const DUBAI_TZ = "Asia/Dubai";
    
    // ============================================================
    // 全球机场数据库（含中英文城市名、国家）
    // ============================================================
    const airportDB = {
        "DXB": { name: "迪拜国际机场", city: "迪拜", cityEn: "Dubai", country: "阿联酋", countryEn: "UAE", tz: "Asia/Dubai", lat: 25.2532, lon: 55.3657 },
        "AUH": { name: "阿布扎比机场", city: "阿布扎比", cityEn: "Abu Dhabi", country: "阿联酋", countryEn: "UAE", tz: "Asia/Dubai", lat: 24.433, lon: 54.651 },
        "PVG": { name: "浦东国际机场", city: "上海", cityEn: "Shanghai", country: "中国", countryEn: "China", tz: "Asia/Shanghai", lat: 31.1443, lon: 121.8083 },
        "PEK": { name: "首都国际机场", city: "北京", cityEn: "Beijing", country: "中国", countryEn: "China", tz: "Asia/Shanghai", lat: 40.0799, lon: 116.6031 },
        "CAN": { name: "白云机场", city: "广州", cityEn: "Guangzhou", country: "中国", countryEn: "China", tz: "Asia/Shanghai", lat: 23.3924, lon: 113.2988 },
        "SZX": { name: "宝安机场", city: "深圳", cityEn: "Shenzhen", country: "中国", countryEn: "China", tz: "Asia/Shanghai", lat: 22.6393, lon: 113.8108 },
        "HKG": { name: "国际机场", city: "香港", cityEn: "Hong Kong", country: "中国香港", countryEn: "Hong Kong", tz: "Asia/Hong_Kong", lat: 22.3089, lon: 113.9146 },
        // 非洲
        "DSS": { name: "布莱兹·迪亚涅国际机场", city: "达喀尔", cityEn: "Dakar", country: "塞内加尔", countryEn: "Senegal", tz: "Africa/Dakar", lat: 14.6700, lon: -17.0730 },
        "JNB": { name: "奥利弗·坦博机场", city: "约翰内斯堡", cityEn: "Johannesburg", country: "南非", countryEn: "South Africa", tz: "Africa/Johannesburg", lat: -26.1392, lon: 28.2460 },
        "CAI": { name: "开罗机场", city: "开罗", cityEn: "Cairo", country: "埃及", countryEn: "Egypt", tz: "Africa/Cairo", lat: 30.1219, lon: 31.4056 },
        // 欧洲
        "LHR": { name: "希思罗机场", city: "伦敦", cityEn: "London", country: "英国", countryEn: "UK", tz: "Europe/London", lat: 51.47, lon: -0.4543 },
        "CDG": { name: "戴高乐机场", city: "巴黎", cityEn: "Paris", country: "法国", countryEn: "France", tz: "Europe/Paris", lat: 49.0097, lon: 2.5479 },
        "AMS": { name: "史基浦机场", city: "阿姆斯特丹", cityEn: "Amsterdam", country: "荷兰", countryEn: "Netherlands", tz: "Europe/Amsterdam", lat: 52.3086, lon: 4.7639 },
        "FRA": { name: "法兰克福机场", city: "法兰克福", cityEn: "Frankfurt", country: "德国", countryEn: "Germany", tz: "Europe/Berlin", lat: 50.0379, lon: 8.5622 },
        // 美洲
        "JFK": { name: "肯尼迪机场", city: "纽约", cityEn: "New York", country: "美国", countryEn: "USA", tz: "America/New_York", lat: 40.6413, lon: -73.7781 },
        "LAX": { name: "洛杉矶机场", city: "洛杉矶", cityEn: "Los Angeles", country: "美国", countryEn: "USA", tz: "America/Los_Angeles", lat: 33.9416, lon: -118.4085 }
    };
    
    function getAirport(code) {
        return airportDB[code] || { 
            name: code, city: code, cityEn: code, country: "未知", countryEn: "Unknown", 
            tz: "UTC", lat: 0, lon: 0 
        };
    }
    
    // 全局数据
    let flightsDB = {};
    let currentFlight = null;
    let nextFlight = null;
    let weatherCache = {};
    
    // ========== 辅助函数 ==========
    function formatTimeInTz(date, tz) {
        return new Date(date).toLocaleTimeString('en-GB', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
    }
    function formatDateTimeInTz(date, tz) {
        return new Date(date).toLocaleString('en-GB', { timeZone: tz, hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short', hour12: false });
    }
    function formatDubaiAndLocal(date, localTz) {
        let local = formatTimeInTz(date, localTz);
        let dubai = formatTimeInTz(date, DUBAI_TZ);
        return { local, dubai };
    }
    
    // ============================================================
    // 天气接口：优先 Open-Meteo（免费、无需Key），备选 OpenWeatherMap
    // ============================================================
    // 天气代码映射（WMO标准）
    function getWeatherIconFromCode(code, isDay = 1) {
        const weatherCodes = {
            0: { day: "☀️", night: "🌙", desc: "晴天" },
            1: { day: "🌤️", night: "🌤️", desc: "主要晴天" },
            2: { day: "⛅", night: "⛅", desc: "部分多云" },
            3: { day: "☁️", night: "☁️", desc: "阴天" },
            45: { day: "🌫️", night: "🌫️", desc: "雾" },
            51: { day: "🌧️", night: "🌧️", desc: "毛毛雨" },
            61: { day: "🌧️", night: "🌧️", desc: "雨" },
            71: { day: "❄️", night: "❄️", desc: "雪" },
            80: { day: "🌦️", night: "🌦️", desc: "阵雨" },
            95: { day: "⛈️", night: "⛈️", desc: "雷暴" }
        };
        let w = weatherCodes[code] || { day: "🌍", night: "🌍", desc: "未知" };
        return { icon: isDay === 1 ? w.day : w.night, desc: w.desc };
    }
    
    // Open-Meteo 天气获取（首选，无需API Key）
    async function fetchWeatherOpenMeteo(lat, lon, cityName) {
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data && data.current_weather) {
                const current = data.current_weather;
                const daily = data.daily;
                
                let dress = "舒适";
                const temp = current.temperature;
                if (temp < 5) dress = "羽绒服";
                else if (temp < 15) dress = "风衣";
                else if (temp < 25) dress = "薄外套";
                else if (temp >= 30) dress = "短袖+防晒";
                
                const weatherInfo = getWeatherIconFromCode(current.weathercode, 1);
                
                // 构建三日预报
                let forecast = [];
                if (daily && daily.time) {
                    for (let i = 0; i < Math.min(3, daily.time.length); i++) {
                        forecast.push({
                            date: daily.time[i].slice(5),
                            tempMax: Math.round(daily.temperature_2m_max[i]),
                            tempMin: Math.round(daily.temperature_2m_min[i]),
                            weatherCode: daily.weathercode[i]
                        });
                    }
                }
                
                return {
                    success: true,
                    source: "Open-Meteo",
                    temp: Math.round(current.temperature),
                    desc: weatherInfo.desc,
                    icon: weatherInfo.icon,
                    dress: dress,
                    feelsLike: Math.round(current.temperature),
                    humidity: null,
                    forecast: forecast,
                    windSpeed: current.windspeed
                };
            }
        } catch (e) {
            console.warn("Open-Meteo 获取失败:", e);
        }
        return null;
    }
    
    // OpenWeatherMap 备用
    async function fetchWeatherOpenWeather(lat, lon, code) {
        try {
            let url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${WEATHER_KEY}&lang=zh_cn`;
            let resp = await fetch(url);
            let data = await resp.json();
            if (data.cod === 200) {
                let dress = "舒适";
                let t = data.main.temp;
                if (t < 5) dress = "羽绒服";
                else if (t < 15) dress = "风衣";
                else if (t < 25) dress = "薄外套";
                else if (t >= 30) dress = "短袖+防晒";
                let icons = { "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Snow": "❄️" };
                return {
                    success: true,
                    source: "OpenWeatherMap",
                    temp: Math.round(t),
                    desc: data.weather[0].description,
                    icon: icons[data.weather[0].main] || "🌍",
                    dress: dress,
                    feelsLike: Math.round(data.main.feels_like),
                    humidity: data.main.humidity,
                    forecast: []
                };
            }
        } catch (e) { }
        return null;
    }
    
    // 综合天气获取（自动切换主备）
    async function fetchWeatherWithFallback(lat, lon, airportCode) {
        let cacheKey = `${airportCode}_${Math.floor(Date.now() / 1800000)}`; // 30分钟缓存
        if (weatherCache[cacheKey]) return weatherCache[cacheKey];
        
        // 优先使用 Open-Meteo
        let result = await fetchWeatherOpenMeteo(lat, lon, airportCode);
        let sourceUsed = "Open-Meteo";
        
        // 如果失败，使用 OpenWeatherMap 备用
        if (!result || !result.success) {
            result = await fetchWeatherOpenWeather(lat, lon, airportCode);
            sourceUsed = "OpenWeatherMap (备用)";
        }
        
        // 如果都失败，返回模拟数据
        if (!result || !result.success) {
            result = {
                success: true,
                source: "本地数据",
                temp: 22,
                desc: "晴",
                icon: "☀️",
                dress: "舒适",
                feelsLike: 22,
                humidity: 55,
                forecast: []
            };
        }
        
        result.sourceUsed = sourceUsed;
        weatherCache[cacheKey] = result;
        return result;
    }
    
    // 三日预报（使用 Open-Meteo）
    async function fetchForecast(lat, lon) {
        try {
            let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`;
            let resp = await fetch(url);
            let data = await resp.json();
            if (data && data.daily) {
                let daily = [];
                for (let i = 0; i < Math.min(3, data.daily.time.length); i++) {
                    daily.push({
                        date: data.daily.time[i].slice(5),
                        tempMax: Math.round(data.daily.temperature_2m_max[i]),
                        tempMin: Math.round(data.daily.temperature_2m_min[i])
                    });
                }
                return daily;
            }
        } catch (e) { }
        return [];
    }
    
    // NOTAM模拟
    async function fetchNotam(code) {
        let mock = { 
            "DXB": ["北跑道夜间维护 01:00-04:00"], 
            "PVG": ["雷雨预警 19-22时"], 
            "DSS": ["机场施工 跑道缩短", "建议提前3小时到达"],
            "LHR": ["安检升级"] 
        };
        return mock[code] || ["无重要通告"];
    }
    
    // 从云端加载航班数据库
    async function loadDB() {
        try {
            let resp = await fetch(`https://api.github.com/gists/${GIST_ID}`);
            let data = await resp.json();
            if (data.files && data.files['flight_data.json']) {
                let content = JSON.parse(data.files['flight_data.json'].content);
                flightsDB = content.flightsDB || {};
                localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDB));
                return;
            }
        } catch (e) { }
        let local = localStorage.getItem('flight_calendar_db');
        if (local) flightsDB = JSON.parse(local);
    }
    
    // 获取未来72h内最近航班并查找下一段
    function getNearestAndNextFlight() {
        let now = new Date();
        let allFlights = [];
        for (let date in flightsDB) {
            for (let f of flightsDB[date]) {
                let dep = new Date(f.departureTime);
                if (dep > now && dep < new Date(now.getTime() + 72 * 3600000)) {
                    allFlights.push({ ...f, date: date, depTime: dep });
                }
            }
        }
        allFlights.sort((a, b) => a.depTime - b.depTime);
        if (allFlights.length === 0) return { current: null, next: null };
        
        let current = allFlights[0];
        let next = allFlights.length > 1 ? allFlights[1] : null;
        
        let nowTime = new Date();
        let currentArrival = current.arrivalTime ? new Date(current.arrivalTime) : null;
        let isCurrentArrived = currentArrival && nowTime > currentArrival;
        let isLayover = false;
        if (isCurrentArrived && next) {
            let gapHours = (new Date(next.departureTime) - currentArrival) / (1000 * 3600);
            isLayover = gapHours >= 6;
        }
        
        return { current, next, isLayover, isCurrentArrived };
    }
    
    // ========== 渲染主界面 ==========
    async function render() {
        await loadDB();
        let { current, next, isLayover, isCurrentArrived } = getNearestAndNextFlight();
        
        if (!current) {
            renderFullscreen();
            return;
        }
        
        currentFlight = current;
        nextFlight = next;
        
        let depTime = new Date(current.departureTime);
        let arrTime = current.arrivalTime ? new Date(current.arrivalTime) : null;
        let pickupTime = new Date(depTime.getTime() - 135 * 60000);
        let now = new Date();
        let isDeparted = now > depTime;
        let isFlying = isDeparted && !isCurrentArrived;
        
        let originInfo = getAirport(current.origin);
        let destInfo = getAirport(current.destination);
        let displayDestInfo = (isLayover && isCurrentArrived) ? destInfo : destInfo;
        
        // 使用新的天气接口
        let originWeather = await fetchWeatherWithFallback(originInfo.lat, originInfo.lon, current.origin);
        let destWeather = await fetchWeatherWithFallback(displayDestInfo.lat, displayDestInfo.lon, displayDestInfo.cityEn || current.destination);
        let destForecast = await fetchForecast(displayDestInfo.lat, displayDestInfo.lon);
        let notams = await fetchNotam(current.destination);
        let dubaiWeather = await fetchWeatherWithFallback(25.2532, 55.3657, "DXB");
        let dubaiForecast = await fetchForecast(25.2532, 55.3657);
        
        // 时间转换
        let depTimes = formatDubaiAndLocal(depTime, originInfo.tz);
        let pickupTimes = formatDubaiAndLocal(pickupTime, originInfo.tz);
        let arrTimes = arrTime ? formatDubaiAndLocal(arrTime, destInfo.tz) : null;
        
        // 飞行进度
        let progressPercent = 0, elapsedMins = 0, remainingMins = 0;
        if (isFlying && arrTime) {
            let total = arrTime - depTime;
            let elapsed = now - depTime;
            progressPercent = Math.min(0.99, Math.max(0, elapsed / total)) * 100;
            elapsedMins = Math.floor(elapsed / 60000);
            remainingMins = Math.floor((arrTime - now) / 60000);
        }
        
        // 上部HTML
        let leftHtml = `
            <div class="info-left">
                ${isLayover && isCurrentArrived ? 
                    `<div><span class="flight-number">🛏️ LAYOVER</span> <span class="layover-badge">中转停留</span></div>
                     <div class="city-name-en">${destInfo.city} ${destInfo.cityEn} · ${destInfo.country} ${destInfo.countryEn}</div>
                     <div class="time-dual">🛬 落地时间: ${arrTimes.local} (当地) / <span class="dubai-time-mark">${arrTimes.dubai} (迪拜)</span></div>
                     ${next ? `<div class="time-dual">✈️ 下一航班: ${next.flightNumber} ${next.origin} → ${next.destination}</div>` : ''}
                     <div class="time-dual">⏱️ 停留中，等待下一程</div>` 
                    :
                    `<div class="flight-number">✈️ ${current.flightNumber}</div>
                     <div>${current.origin} (${originInfo.city}) → ${current.destination} (${destInfo.city})</div>
                     <div class="time-dual">🛫 起飞: ${depTimes.local} (${originInfo.city}时间) / <span class="dubai-time-mark">${depTimes.dubai} (迪拜时间)</span></div>
                     <div class="time-dual">🚗 Pickup: ${pickupTimes.local} / <span class="dubai-time-mark">${pickupTimes.dubai}</span></div>
                     ${arrTimes ? `<div class="time-dual">🛬 落地: ${arrTimes.local} (${destInfo.city}时间) / <span class="dubai-time-mark">${arrTimes.dubai} (迪拜时间)</span></div>` : ''}`
                }
            </div>
        `;
        
        let centerHtml = `
            <div class="info-center">
                <div>🌤️ ${destInfo.city} ${destInfo.cityEn} 天气</div>
                <div class="weather-icon-big">${destWeather.icon}</div>
                <div class="temp-big">${destWeather.temp}°C</div>
                <div>${destWeather.desc} | 体感 ${destWeather.feelsLike}°</div>
                <div class="forecast-row">未来三天: ${destForecast.map(f => `${f.date} ${f.tempMax}°`).join(' | ')}</div>
                <div>👕 ${destWeather.dress}</div>
                <div class="weather-source-badge">📡 ${destWeather.sourceUsed || 'Open-Meteo'}</div>
            </div>
        `;
        
        if (isFlying) {
            centerHtml = `
                <div class="info-center">
                    <div>✈️ 飞行中 ${current.origin} → ${current.destination}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progressPercent}%"></div></div>
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem;">
                        <span>已飞 ${Math.floor(elapsedMins/60)}h${elapsedMins%60}m</span>
                        <span>剩余 ${Math.floor(remainingMins/60)}h${remainingMins%60}m</span>
                        <span>距离约 ${Math.round((1-progressPercent/100)*8000)}km</span>
                    </div>
                </div>
            `;
        }
        
        let rightHtml = `
            <div class="info-right">
                <div>📡 航行通告 (NOTAM)</div>
                ${notams.map(n => `<div class="notam-item">⚠️ ${n}</div>`).join('')}
            </div>
        `;
        
        // 下方分屏
        let leftCard = `
            <div class="city-card">
                <div class="day-night-dot" style="background:${new Date().getHours() > 18 ? '#4466ff' : '#ffaa44'}"></div>
                <div class="city-name">迪拜 DXB</div>
                <div class="city-sub">Dubai · UAE</div>
                <div class="big-local-clock" id="dubaiClock">--:--:--</div>
                <div class="weather-icon-big">${dubaiWeather.icon}</div>
                <div class="temp-big">${dubaiWeather.temp}°C</div>
                <div>${dubaiWeather.desc} | 👕 ${dubaiWeather.dress}</div>
                <div class="forecast-row" id="dubaiForecast"></div>
                <div class="date-footer" id="dubaiDate"></div>
                <div class="weather-source-badge">📡 ${dubaiWeather.sourceUsed || 'Open-Meteo'}</div>
            </div>
        `;
        
        let rightCard = `
            <div class="city-card">
                <div class="city-name">${displayDestInfo.city} ${displayDestInfo.cityEn}</div>
                <div class="city-sub">${displayDestInfo.country} ${displayDestInfo.countryEn} · ${current.destination}</div>
                <div class="big-local-clock" id="destClock">--:--:--</div>
                <div class="weather-icon-big">${destWeather.icon}</div>
                <div class="temp-big">${destWeather.temp}°C</div>
                <div>${destWeather.desc} | 👕 ${destWeather.dress}</div>
                <div class="forecast-row" id="destForecast"></div>
                <div class="date-footer" id="destDate"></div>
                <div class="weather-source-badge">📡 ${destWeather.sourceUsed || 'Open-Meteo'}</div>
            </div>
        `;
        
        let fullHtml = `
            <div class="flight-mode">
                <div class="top-panel">
                    ${leftHtml}
                    ${centerHtml}
                    ${rightHtml}
                </div>
                <div class="bottom-split">
                    ${leftCard}
                    ${rightCard}
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = fullHtml;
        
        // 实时时钟更新
        let destTz = displayDestInfo.tz;
        setInterval(() => {
            let n = new Date();
            let dubaiTime = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            let dubaiDate = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, month: 'short', day: 'numeric' });
            let destTime = n.toLocaleTimeString('en-GB', { timeZone: destTz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            let destDate = n.toLocaleDateString('en-US', { timeZone: destTz, month: 'short', day: 'numeric' });
            if (document.getElementById('dubaiClock')) document.getElementById('dubaiClock').innerText = dubaiTime;
            if (document.getElementById('dubaiDate')) document.getElementById('dubaiDate').innerText = dubaiDate;
            if (document.getElementById('destClock')) document.getElementById('destClock').innerText = destTime;
            if (document.getElementById('destDate')) document.getElementById('destDate').innerText = destDate;
        }, 1000);
        
        if (document.getElementById('dubaiForecast')) {
            document.getElementById('dubaiForecast').innerHTML = dubaiForecast.map(f => `${f.date} ${f.tempMax}°`).join(' | ');
        }
        if (document.getElementById('destForecast')) {
            document.getElementById('destForecast').innerHTML = destForecast.map(f => `${f.date} ${f.tempMax}°`).join(' | ');
        }
    }
    
    async function renderFullscreen() {
        let dubaiWeather = await fetchWeatherWithFallback(25.2532, 55.3657, "DXB");
        let dubaiForecast = await fetchForecast(25.2532, 55.3657);
        let now = new Date();
        let timeStr = now.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour: '2-digit', minute: '2-digit', hour12: false });
        let dateStr = now.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        let html = `
            <div class="fullscreen-mode">
                <div class="big-time">${timeStr}</div>
                <div class="weather-corner">
                    <div class="weather-icon-big">${dubaiWeather.icon}</div>
                    <div class="temp-big">${dubaiWeather.temp}°C</div>
                    <div>${dubaiWeather.desc}</div>
                    <div class="forecast-row">${dubaiForecast.map(f => `${f.date} ${f.tempMax}°`).join(' | ')}</div>
                    <div class="weather-source-badge">📡 ${dubaiWeather.sourceUsed || 'Open-Meteo'}</div>
                </div>
                <div class="big-date">${dateStr}</div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
        setInterval(() => {
            let n = new Date();
            let t = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour: '2-digit', minute: '2-digit', hour12: false });
            let d = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            let bigTime = document.querySelector('.big-time');
            let bigDate = document.querySelector('.big-date');
            if (bigTime) bigTime.innerText = t;
            if (bigDate) bigDate.innerText = d;
        }, 60000);
    }
    
    render();
    setInterval(() => { render(); }, 60000);
</script>
</body>
</html>
