<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot HUD Dashboard Pro</title>
    <style>
        :root {
            --bg: #050505; --text: #e0e0e0; --accent: #58a6ff; --warning: #ffa657; --danger: #ff7b72; --glass: rgba(255,255,255,0.05);
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: "SF Pro Display", -apple-system, sans-serif;
            overflow: hidden; height: 100vh; 
        }

        /* 顶部 1/4 动态看板 */
        #top-info {
            height: 25%; width: 100%; border-bottom: 2px solid #30363d;
            display: none; grid-template-columns: 1fr 1fr 1fr; padding: 15px; gap: 10px;
        }

        /* 底部 3/4 主显示区 */
        #main-area { height: 75%; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; }
        #main-area.full { height: 100%; }

        /* 大时钟样式 */
        .clock-container { text-align: center; position: relative; }
        .big-time { font-size: 24vw; font-weight: 800; line-height: 0.9; letter-spacing: -8px; }
        .date-bar { font-size: 2.5vw; color: #8b949e; letter-spacing: 4px; margin-top: 20px; text-transform: uppercase; border-top: 1px solid #333; padding-top: 10px; }
        
        /* 天气符号（右上角） */
        .weather-corner { position: absolute; top: 20px; right: 30px; text-align: right; }
        .w-icon { font-size: 5vw; }
        .w-temp { font-size: 3vw; color: var(--accent); font-weight: 300; }

        /* 进度条样式 */
        .progress-box { grid-column: span 3; background: #222; height: 12px; border-radius: 6px; margin-top: 5px; position: relative; overflow: hidden; }
        #bar-inner { height: 100%; background: linear-gradient(90deg, #58a6ff, #afff93); width: 0%; transition: width 2s; }

        /* 分屏模式 (Layover) */
        .split-view { display: none; width: 100%; height: 100%; grid-template-columns: 1fr 1fr; }
        .pane { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pane-home { border-right: 1px solid #333; }

        /* 状态标签 */
        .tag { font-size: 0.8vw; padding: 2px 6px; border-radius: 4px; background: var(--accent); color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div id="top-info">
    <div id="top-left">
        <div id="f-no-tag" class="tag">FLIGHT</div>
        <div id="f-route-zh" style="font-size: 2.5vw; font-weight: bold;">-- ➔ --</div>
        <div id="f-route-en" style="font-size: 1.2vw; color: #8b949e;">-- TO --</div>
    </div>
    <div id="top-mid" style="text-align: center; border-left: 1px solid #333; border-right: 1px solid #333;">
        <div id="dest-wx-icon" style="font-size: 3vw;">☀️</div>
        <div id="dest-wx-temp" style="font-size: 1.5vw;">--°C</div>
        <div id="dest-cloth" style="font-size: 1vw; color: var(--warning);">穿衣指数: 加载中</div>
    </div>
    <div id="top-right">
        <div style="font-size: 0.8vw; color: var(--danger);">⚠️ NOTAM / RISK ADVISORY</div>
        <div id="notam-text" style="font-size: 0.9vw; line-height: 1.2; height: 70px; overflow: hidden; background: #111; padding: 5px;">
            Scanning for airfield restrictions...
        </div>
    </div>
    <div class="progress-box" id="f-progress-wrap" style="display:none;">
        <div id="bar-inner"></div>
    </div>
</div>

<div id="main-area" class="full">
    <div class="weather-corner">
        <div class="w-icon">☀️</div>
        <div class="w-temp" id="dxb-temp-main">--°C</div>
    </div>

    <div id="view-normal" class="clock-container">
        <div class="big-time" id="clock-dxb">00:00</div>
        <div class="date-bar" id="date-dxb">APRIL 24 FRIDAY / 2026年4月24日</div>
    </div>

    <div id="view-layover" class="split-view">
        <div class="pane pane-home">
            <div style="font-size: 1.5vw; color: #8b949e;">DUBAI 迪拜</div>
            <div class="big-time" id="split-dxb-time" style="font-size: 12vw;">00:00</div>
            <div style="font-size: 2vw;" id="split-dxb-wx">☀️ 32°C</div>
        </div>
        <div class="pane">
            <div id="layover-city-title" style="font-size: 1.5vw; color: var(--accent);">-- --</div>
            <div class="big-time" id="split-loc-time" style="font-size: 12vw;">00:00</div>
            <div style="font-size: 2vw;" id="split-loc-wx">🌙 --°C</div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        gist: "6b51ae2b894903de0227eaec5e0ce842",
        wKey: "9fcc9afb0a80a6aaa44c926e4f7827a7"
    };

    let fData = null;

    async function fetchData() {
        try {
            const res = await fetch(`https://api.github.com/gists/${CONFIG.gist}`);
            const gist = await res.json();
            fData = JSON.parse(gist.files["flight_data.json"].content);
            updateUI();
        } catch (e) { console.error("Sync error"); }
    }

    function updateUI() {
        const now = new Date();
        const std = new Date(fData.std_local);
        const hoursToFlight = (std - now) / 3600000;
        
        const top = document.getElementById('top-info');
        const main = document.getElementById('main-area');
        const vNormal = document.getElementById('view-normal');
        const vLayover = document.getElementById('view-layover');

        // --- 场景逻辑引擎 ---

        // 1. 24小时内无航班 -> 全屏迪拜
        if (!fData.active || hoursToFlight > 72 || hoursToFlight < -24) {
            top.style.display = 'none';
            main.classList.add('full');
            vNormal.style.display = 'block';
            vLayover.style.display = 'none';
            return;
        }

        // 2. 场景：Layover (落地超过一小时，起飞前14小时以上)
        if (fData.isLayover && hoursToFlight > 14) {
            top.style.display = 'grid'; // 顶部显示 Layover 国家城市
            main.classList.remove('full');
            vNormal.style.display = 'none';
            vLayover.style.display = 'grid';
            document.getElementById('layover-city-title').innerText = `${fData.arr} | ${fData.arr_cn || ''}`;
            document.getElementById('f-no-tag').innerText = "LAYOVER";
            updateWeather(fData.arr);
        } 
        // 3. 场景：飞行中 / 推出
        else if (fData.status === 'airborne' || fData.status === 'pushback') {
            top.style.display = 'grid';
            main.classList.remove('full');
            vNormal.style.display = 'block';
            document.getElementById('f-progress-wrap').style.display = 'block';
            updateFlightProgress(now, std, new Date(fData.sta));
        }
        // 4. 场景：预飞 (未来72小时有航班)
        else {
            top.style.display = 'grid';
            main.classList.remove('full');
            vNormal.style.display = 'block';
            vLayover.style.display = 'none';
            document.getElementById('f-route-zh').innerText = `${fData.dep} ➔ ${fData.arr}`;
            updateWeather(fData.arr);
        }
    }

    function updateFlightProgress(now, std, sta) {
        const total = sta - std;
        const current = now - std;
        const pct = Math.min(Math.max((current / total) * 100, 0), 100);
        document.getElementById('bar-inner').style.width = pct + "%";
        // 如果有连程航班逻辑，可在此处动态修改 fData.next_leg
    }

    async function updateWeather(city) {
        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${CONFIG.wKey}`);
        const d = await res.json();
        const temp = Math.round(d.main.temp);
        document.getElementById('dest-wx-temp').innerText = temp + "°C";
        document.getElementById('dest-cloth').innerText = temp > 20 ? "穿衣指数: 轻便" : "穿衣指数: 防寒";
        // 同时也更新分屏右侧
        if(document.getElementById('split-loc-wx')) {
            document.getElementById('split-loc-wx').innerText = `${temp}°C ${d.weather[0].main}`;
        }
    }

    function tick() {
        const now = new Date();
        const dxbTime = new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'Asia/Dubai' }).format(now);
        
        document.getElementById('clock-dxb').innerText = dxbTime;
        document.getElementById('split-dxb-time').innerText = dxbTime;
        
        // 更新日期
        const dateOpt = { month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('date-dxb').innerText = now.toLocaleDateString('zh-CN', dateOpt).toUpperCase();
        
        // 模拟目的地时间计算 (需根据时区，此处暂用系统时间)
        document.getElementById('split-loc-time').innerText = dxbTime; 
    }

    setInterval(tick, 1000);
    setInterval(fetchData, 300000);
    tick(); fetchData();
</script>
</body>
</html>
