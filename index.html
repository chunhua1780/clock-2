<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迪拜飞行时钟 · 家人版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 无航班模式 - 全屏时尚时钟 */
        .fullscreen-clock {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            transition: all 0.3s ease;
        }

        .big-time {
            font-size: 22vw;
            font-weight: 600;
            font-family: 'SF Pro Display', monospace;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #d4d4ff 50%, #88aaff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .big-date {
            font-size: 1.8vw;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            margin-top: 24px;
            text-transform: uppercase;
        }

        /* 右上角天气卡片 */
        .weather-card {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 12px 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        .weather-card .weather-icon { font-size: 2rem; margin-bottom: 4px; }
        .weather-card .weather-temp { font-size: 1.4rem; font-weight: 600; }
        .weather-card .weather-desc { font-size: 0.7rem; color: rgba(255, 255, 255, 0.6); }
        .weather-card .dress-tip { font-size: 0.65rem; background: rgba(255, 255, 255, 0.1); padding: 4px 12px; border-radius: 20px; margin-top: 8px; color: #ffd966; }

        /* 左下角状态 */
        .status-card {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 8px 16px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .status-card:hover { background: rgba(255, 255, 255, 0.12); }
        .status-card.connected { color: #66ffaa; }

        /* 有航班模式 */
        .flight-mode {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 16px;
            gap: 12px;
            background: #000000;
        }

        .status-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 8px 20px;
        }
        .flight-badge { background: rgba(255, 255, 255, 0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-right: 12px; }
        .auth-status { font-size: 0.7rem; color: #66ffaa; }

        /* 上方航班区域 - 重点显示区域 */
        .flight-area {
            height: 32%;
            background: linear-gradient(135deg, rgba(20, 25, 45, 0.95) 0%, rgba(15, 18, 35, 0.95) 100%);
            border-radius: 32px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .next-flight-title {
            font-size: 0.7rem;
            color: #ffaa66;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .flight-number-large {
            font-size: 2rem;
            font-weight: 700;
            color: #ffd966;
            margin-bottom: 8px;
        }

        .flight-route {
            font-size: 0.9rem;
            color: #88aacc;
            margin-bottom: 12px;
        }

        /* 双时间显示卡片 */
        .time-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 12px 16px;
            margin: 8px 0;
        }

        .time-local {
            font-size: 1.1rem;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .time-dubai {
            font-size: 1rem;
            color: #66ffaa;
        }

        .time-label {
            font-size: 0.65rem;
            color: #88aacc;
            margin-right: 8px;
        }

        .countdown {
            background: #1a2a3a;
            border-radius: 40px;
            padding: 10px 16px;
            margin-top: 12px;
            text-align: center;
            font-size: 0.9rem;
            color: #ffaa66;
            font-weight: 600;
        }

        .layover-badge {
            display: inline-block;
            background: #ff8844;
            color: #0a0e1a;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 12px;
        }

        /* 下方分屏 - 天气和NOTAM */
        .bottom-area {
            flex: 1;
            display: flex;
            gap: 12px;
            min-height: 0;
        }

        .city-panel {
            flex: 1;
            background: rgba(10, 14, 26, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        .city-name {
            font-size: 1.5rem;
            font-weight: 600;
            color: #88aaff;
            margin-bottom: 8px;
        }

        .weather-icon { font-size: 2rem; text-align: center; margin: 8px 0; }
        .weather-temp { font-size: 1.5rem; font-weight: 600; text-align: center; }
        .weather-desc { text-align: center; color: rgba(255, 255, 255, 0.6); font-size: 0.7rem; }
        .dress-tip { text-align: center; background: rgba(255, 255, 255, 0.08); padding: 6px; border-radius: 20px; font-size: 0.65rem; margin-top: 8px; }

        .city-clock { text-align: center; margin-top: auto; padding-top: 12px; }
        .clock-time { font-size: 1.3rem; font-family: monospace; font-weight: 500; }
        .clock-date { font-size: 0.6rem; color: rgba(255, 255, 255, 0.5); }

        .label-sm { font-size: 0.55rem; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 1px; }
        .notam-list { max-height: 80px; overflow-y: auto; font-size: 0.6rem; margin-top: 8px; }
        .notam-item { padding: 3px 0; color: #ffaa66; }

        .hidden { display: none !important; }
    </style>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
    <!-- 无航班模式 -->
    <div id="fullscreenMode" class="fullscreen-clock">
        <div class="big-time" id="fullscreenTime">--:--</div>
        <div class="big-date" id="fullscreenDate"></div>
        <div class="weather-card">
            <div class="weather-icon" id="fullscreenWeatherIcon">☀️</div>
            <div class="weather-temp" id="fullscreenWeatherTemp">--°C</div>
            <div class="weather-desc" id="fullscreenWeatherDesc">--</div>
            <div class="dress-tip" id="fullscreenDress">👕 --</div>
        </div>
        <div class="status-card" id="fullscreenStatus" onclick="openControlPanel()">⚙️ 设置</div>
    </div>

    <!-- 有航班模式 -->
    <div id="flightMode" class="flight-mode hidden">
        <div class="status-bar">
            <div class="flight-badge" id="flightBadge">✈️ 加载中</div>
            <div class="auth-status" id="authStatus">✅ 已同步</div>
        </div>

        <!-- 上方航班信息 - 重点显示起飞时间和倒计时 -->
        <div id="flightPanel" class="flight-area">
            <div class="next-flight-title">✈️ 下次航班信息</div>
            <div id="flightContent">加载中...</div>
        </div>

        <!-- 下方天气和NOTAM -->
        <div class="bottom-area">
            <div class="city-panel">
                <div class="label-sm">🛫 出发地天气</div>
                <div class="city-name" id="originCode">DXB</div>
                <div id="originWeather">
                    <div class="weather-icon">🌍</div>
                    <div class="weather-temp">--°C</div>
                    <div class="weather-desc">加载中</div>
                    <div class="dress-tip">👕 --</div>
                </div>
                <div class="label-sm" style="margin-top: 8px;">📡 NOTAM</div>
                <div id="originNotam" class="notam-list">加载中</div>
            </div>

            <div class="city-panel">
                <div class="label-sm">🛬 目的地天气</div>
                <div class="city-name" id="destCode">---</div>
                <div id="destWeather">
                    <div class="weather-icon">🌍</div>
                    <div class="weather-temp">--°C</div>
                    <div class="weather-desc">等待航班</div>
                    <div class="dress-tip">👕 --</div>
                </div>
                <div class="label-sm" style="margin-top: 8px;">📡 NOTAM</div>
                <div id="destNotam" class="notam-list">等待航班</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const GOOGLE_CLIENT_ID = "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com";
        const WEATHER_KEY = "9fcc9afb0a80a6aaa44c926e4f7827a7";
        const DUBAI_TZ = "Asia/Dubai";
        
        // 机场时区数据库
        const airportTimezone = {
            "DXB": "Asia/Dubai",
            "PVG": "Asia/Shanghai",
            "PEK": "Asia/Shanghai",
            "CAN": "Asia/Shanghai",
            "SZX": "Asia/Shanghai",
            "HKG": "Asia/Hong_Kong",
            "LHR": "Europe/London",
            "JFK": "America/New_York",
            "CDG": "Europe/Paris",
            "FRA": "Europe/Berlin"
        };
        
        function getAirportTz(code) {
            return airportTimezone[code] || "Asia/Dubai";
        }
        
        // ============================================================
        // 辅助函数
        // ============================================================
        function formatTimeInTz(date, tz) {
            return new Date(date).toLocaleTimeString('zh-CN', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
        }
        
        function formatDateTimeInTz(date, tz) {
            return new Date(date).toLocaleString('zh-CN', { timeZone: tz, hour: '2-digit', minute: '2-digit', month: '2-digit', day: '2-digit', hour12: false });
        }
        
        function getCountdown(targetTime) {
            const now = new Date();
            const target = new Date(targetTime);
            if (target <= now) return "✈️ 已起飞";
            const diffMs = target - now;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            if (diffHours >= 24) {
                const diffDays = Math.floor(diffHours / 24);
                return `⏱️ ${diffDays}天${diffHours % 24}小时${diffMins}分钟`;
            }
            return `⏱️ ${diffHours}小时${diffMins}分钟`;
        }
        
        function showToast(msg) {
            console.log(msg);
        }
        
        // ============================================================
        // 天气获取
        // ============================================================
        async function getWeather(lat, lon) {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${WEATHER_KEY}&lang=zh_cn`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.cod === 200) {
                    let dress = "舒适";
                    const t = data.main.temp;
                    if (t < 5) dress = "羽绒服";
                    else if (t < 15) dress = "风衣";
                    else if (t < 25) dress = "薄外套";
                    else if (t >= 30) dress = "短袖+防晒";
                    const icons = { "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Snow": "❄️" };
                    return {
                        temp: Math.round(t),
                        desc: data.weather[0].description,
                        icon: icons[data.weather[0].main] || "🌍",
                        dress: dress
                    };
                }
            } catch(e) {}
            return { temp: 22, desc: "晴", icon: "☀️", dress: "舒适" };
        }
        
        // 机场坐标
        const airportCoords = {
            "DXB": { lat: 25.2532, lon: 55.3657 },
            "PVG": { lat: 31.1443, lon: 121.8083 },
            "PEK": { lat: 40.0799, lon: 116.6031 },
            "LHR": { lat: 51.4700, lon: -0.4543 }
        };
        
        // ============================================================
        // 显示航班信息（核心）
        // ============================================================
        let currentFlightData = null;
        let refreshTimer = null;
        
        function loadFlightFromStorage() {
            try {
                const saved = localStorage.getItem('last_flight');
                if (saved) {
                    currentFlightData = JSON.parse(saved);
                    displayFlightInfo(currentFlightData);
                    document.getElementById('flightMode').classList.remove('hidden');
                    document.getElementById('fullscreenMode').classList.add('hidden');
                } else {
                    document.getElementById('flightMode').classList.add('hidden');
                    document.getElementById('fullscreenMode').classList.remove('hidden');
                    updateFullscreenClock();
                }
            } catch(e) {
                document.getElementById('flightMode').classList.add('hidden');
                document.getElementById('fullscreenMode').classList.remove('hidden');
                updateFullscreenClock();
            }
        }
        
        function displayFlightInfo(flight) {
            if (!flight) return;
            
            const originTz = getAirportTz(flight.origin);
            const destTz = getAirportTz(flight.destination);
            
            // 计算取车时间（起飞前2小时15分）
            const depTime = new Date(flight.departureTime);
            const pickupTime = new Date(depTime.getTime() - 135 * 60000);
            
            // 起飞时间双显示
            const depLocal = formatTimeInTz(depTime, destTz);
            const depDubai = formatTimeInTz(depTime, DUBAI_TZ);
            const depDate = depTime.toLocaleDateString('zh-CN', { timeZone: destTz, month: 'numeric', day: 'numeric' });
            
            // 取车时间双显示
            const pickupLocal = formatTimeInTz(pickupTime, destTz);
            const pickupDubai = formatTimeInTz(pickupTime, DUBAI_TZ);
            
            // 倒计时
            const countdown = getCountdown(depTime);
            
            // 是否Layover
            const isLayover = flight.isLayover || false;
            
            // 构建HTML
            let html = `
                <div class="flight-number-large">
                    ✈️ ${flight.flightNumber}
                    ${isLayover ? '<span class="layover-badge">🛏️ Layover中转停留</span>' : ''}
                </div>
                <div class="flight-route">🛫 ${flight.origin} → 🛬 ${flight.destination}</div>
                
                <div class="time-card">
                    <div class="time-local">
                        <span class="time-label">🛫 起飞时间</span>
                        <span style="font-size:1.2rem; font-weight:600;">${depLocal}</span>
                        <span style="font-size:0.8rem; color:#88aacc;"> (${flight.destination}当地时间)</span>
                    </div>
                    <div class="time-dubai">
                        <span class="time-label">🕐 对应迪拜时间</span>
                        ${depDubai} (${depDate})
                    </div>
                </div>
                
                <div class="time-card">
                    <div class="time-local">
                        <span class="time-label">🚗 取车时间</span>
                        <span style="font-weight:600;">${pickupLocal}</span>
                        <span style="font-size:0.8rem; color:#88aacc;"> (起飞前2小时15分)</span>
                    </div>
                    <div class="time-dubai">
                        <span class="time-label">🕐 对应迪拜时间</span>
                        ${pickupDubai}
                    </div>
                </div>
                
                <div class="countdown">
                    ${countdown}
                </div>
            `;
            
            // 如果有下一段航班
            if (flight.nextFlight) {
                const nextDep = new Date(flight.nextFlight.departureTime);
                const nextLocal = formatTimeInTz(nextDep, getAirportTz(flight.nextFlight.origin));
                const nextDubai = formatTimeInTz(nextDep, DUBAI_TZ);
                const layoverGap = (nextDep - depTime) / (1000 * 60 * 60);
                
                html += `
                    <div class="time-card" style="margin-top:12px; border-left-color:#ff8844;">
                        <div class="time-local" style="color:#ffaa66;">
                            🔄 下一段航班: ${flight.nextFlight.flightNumber}
                            <span style="font-size:0.7rem;"> (${layoverGap.toFixed(1)}小时后)</span>
                        </div>
                        <div class="flight-route" style="margin-bottom:8px;">🛫 ${flight.nextFlight.origin} → 🛬 ${flight.nextFlight.destination}</div>
                        <div class="time-local">
                            <span class="time-label">🛫 起飞时间</span>
                            ${nextLocal} (当地时间)
                        </div>
                        <div class="time-dubai">
                            <span class="time-label">🕐 对应迪拜时间</span>
                            ${nextDubai}
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('flightContent').innerHTML = html;
            document.getElementById('flightBadge').innerHTML = `✈️ ${flight.flightNumber}`;
            
            // 天气信息
            updateWeatherForAirport(flight.origin, 'originWeather', 'originNotam');
            updateWeatherForAirport(flight.destination, 'destWeather', 'destNotam');
            
            // 更新城市代码显示
            document.getElementById('originCode').innerText = flight.origin;
            document.getElementById('destCode').innerText = flight.destination;
        }
        
        async function updateWeatherForAirport(code, weatherDivId, notamDivId) {
            const coords = airportCoords[code] || { lat: 25.2532, lon: 55.3657 };
            const weather = await getWeather(coords.lat, coords.lon);
            document.getElementById(weatherDivId).innerHTML = `
                <div class="weather-icon">${weather.icon}</div>
                <div class="weather-temp">${weather.temp}°C</div>
                <div class="weather-desc">${weather.desc}</div>
                <div class="dress-tip">👕 ${weather.dress}</div>
            `;
            document.getElementById(notamDivId).innerHTML = '<div class="notam-item">暂无重要通告</div>';
        }
        
        // ============================================================
        // 全屏时钟（无航班时）
        // ============================================================
        let fullscreenTimer = null;
        
        function updateFullscreenClock() {
            function tick() {
                const now = new Date();
                const dubaiTime = now.toLocaleTimeString('zh-CN', { timeZone: DUBAI_TZ, hour12: false }).slice(0,5);
                const dubaiDate = now.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                document.getElementById('fullscreenTime').innerText = dubaiTime;
                document.getElementById('fullscreenDate').innerHTML = dubaiDate;
            }
            tick();
            if (fullscreenTimer) clearInterval(fullscreenTimer);
            fullscreenTimer = setInterval(tick, 60000);
            
            getWeather(25.2532, 55.3657).then(w => {
                document.getElementById('fullscreenWeatherIcon').innerText = w.icon;
                document.getElementById('fullscreenWeatherTemp').innerText = `${w.temp}°C`;
                document.getElementById('fullscreenWeatherDesc').innerText = w.desc;
                document.getElementById('fullscreenDress').innerHTML = `👕 ${w.dress}`;
            });
        }
        
        // ============================================================
        // 控制面板
        // ============================================================
        function openControlPanel() {
            window.open('control.html', '_blank', 'width=450,height=700');
        }
        
        // ============================================================
        // 定时刷新
        // ============================================================
        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => {
                loadFlightFromStorage();
                // 如果有航班，刷新倒计时显示
                if (currentFlightData) {
                    displayFlightInfo(currentFlightData);
                }
            }, 60000); // 每分钟刷新一次
        }
        
        // ============================================================
        // 初始化
        // ============================================================
        window.onload = () => {
            loadFlightFromStorage();
            startAutoRefresh();
            
            // 监听localStorage变化（控制面板修改时自动更新）
            window.addEventListener('storage', (e) => {
                if (e.key === 'last_flight') {
                    loadFlightFromStorage();
                }
            });
        };
    </script>
</body>
</html>
