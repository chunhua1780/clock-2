<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dubai Flight Clock</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        .fullscreen-clock {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        .big-time {
            font-size: 22vw;
            font-weight: 600;
            font-family: 'SF Pro Display', monospace;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #d4d4ff 50%, #88aaff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }
        .big-date {
            position: absolute;
            bottom: 40px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1.2vw;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
        }
        .weather-card {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 12px 20px;
            text-align: center;
        }
        .weather-card .weather-icon { font-size: 2rem; }
        .weather-card .weather-temp { font-size: 1.3rem; font-weight: 600; }
        .weather-card .weather-desc { font-size: 0.65rem; color: rgba(255,255,255,0.6); }
        .weather-card .dress-tip { font-size: 0.6rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; margin-top: 6px; color: #ffd966; }
        .status-card {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 8px 16px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
        }
        .flight-mode {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 12px;
            background: #000;
        }
