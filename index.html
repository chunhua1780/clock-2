<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pilot Ops · Professional Clock</title>
    <style>
        :root {
            --ios-blue: #0A84FF;
            --ios-gold: #FFD60A;
            --ios-green: #32D74B;
            --ios-orange: #FF9F0A;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-deep: rgba(0, 0, 0, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #000; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh; overflow: hidden;
        }
        .sync-btn {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 20px; border-radius: 40px; font-weight: 600; cursor: pointer;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .container { height: 100vh; display: flex; flex-direction: column; padding: 16px; gap: 16px; }
        .hidden { display: none !important; }

        /* 顶部航班总览 */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); padding: 24px;
        }
        .duty-tag { font-size: 0.7rem; padding: 4px 12px; border-radius: 12px; background: var(--ios-blue); font-weight: 800; display: inline-block; margin-bottom: 10px; }
        .f-number { font-size: 2.6rem; font-weight: 800; color: var(--ios-gold); }
        .ops-banner { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; color: var(--ios-orange); font-weight: 600; }

        /* 机场双面板 */
        .panels { display: flex; gap: 14px; flex: 1; }
        .panel { flex: 1; display: flex; flex-direction: column; justify-content: space-between; background: var(--glass-deep); border-radius: 30px; padding: 22px; border: 1px solid rgba(255,255,255,0.05); }
        .label-group { font-size: 0.6rem; color: rgba(255,255,255,0.4); font-weight: 700; letter-spacing: 1px; }
        .airport-code { font-size: 2.6rem; font-weight: 700; color: var(--ios-blue); }
        .tz-offset { font-size: 0.8rem; color: var(--ios-green); margin-left: 5px; font-family: monospace; }
        .temp-display { font-size: 3rem; font-weight: 200; margin: 10px 0; }
        .local-t { font-size: 2.4rem; font-weight: 700; font-variant-numeric: tabular-nums; }
        .ref-t { font-size: 0.85rem; color: var(--ios-gold); opacity: 0.8; margin-top: 4px; }

        .utc-footer { height: 60px; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: 600; color: var(--ios-gold); font-family: "SF Mono", monospace; }
    </style>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

    <button class="sync-btn" id="syncBtn">🔄 同步日历航班</button>

    <div id="fullMode" class="container" style="justify-content:center; align-items:center;">
        <div id="bt" style="font-size:24vw; font-weight:700;">00:00</div>
        <div id="bd" style="font-size:2vw; color:rgba(255,255,255,0.4);">未检测到 48H 内航段</div>
    </div>

    <div id="flightMode" class="container hidden">
        <div class="glass-card">
            <div id="dutyTag" class="duty-tag">---</div>
            <div style="display:flex; justify-content:space-between; align-items: baseline;">
                <div class="f-number" id="fnDisp">EK ---</div>
                <div id="crewInfo" style="font-size:0.7rem; color:rgba(255,255,255,0.5); text-align:right;"></div>
            </div>
            <div id="routeDisp" style="font-size:1.8rem; font-weight:600; margin: 8px 0;">--- ➔ ---</div>
            <div class="ops-banner" id="opsBanner">解析中...</div>
        </div>

        <div class="panels">
            <div class="panel">
                <div>
                    <div class="label-group">ORIGIN</div>
                    <div style="display:flex; align-items:baseline;">
                        <div class="airport-code" id="oCode">---</div>
                        <div class="tz-offset" id="oOff">Z+0</div>
                    </div>
                </div>
                <div class="temp-display" id="oW">--°</div>
                <div>
                    <div class="local-t" id="oT">00:00</div>
                    <div class="ref-t" id="oRef">DXB: --:--</div>
                </div>
            </div>
            <div class="panel">
                <div>
                    <div class="label-group">DESTINATION</div>
                    <div style="display:flex; align-items:baseline;">
                        <div class="airport-code" id="dCode">---</div>
                        <div class="tz-offset" id="dOff">Z+0</div>
                    </div>
                </div>
                <div class="temp-display" id="dW">--°</div>
                <div>
                    <div class="local-t" id="dT">00:00</div>
                    <div class="ref-t" id="dRef">DXB: --:--</div>
                </div>
            </div>
        </div>
        <div class="utc-footer">Z <span id="utc">00:00:00</span></div>
    </div>

<script>
    const CONFIG = {
        CLIENT_ID: "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com",
        WEATHER_KEY: "9fcc9afb0a80a6aaa44c926e4f7827a7",
        HUB: ["DXB", "DWC"]
    };

    const airportDB = {
        "DXB": { tz: "Asia/Dubai", lat: 25.25, lon: 55.36 },
        "CKY": { tz: "Africa/Conakry", lat: 9.57, lon: -13.61 },
        "DSS": { tz: "Africa/Dakar", lat: 14.67, lon: -17.06 }
    };

    let tokenClient, accessToken, currentOps = null;

    function initAuth() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CONFIG.CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/calendar.readonly',
            callback: (resp) => { if (resp.access_token) { accessToken = resp.access_token; syncSchedules(); } },
        });
        document.getElementById('syncBtn').onclick = () => tokenClient.requestAccessToken();
    }

    async function syncSchedules() {
        const now = new Date();
        const start = new Date(now.getTime() - 24 * 3600000).toISOString();
        const end = new Date(now.getTime() + 72 * 3600000).toISOString();
        
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await res.json();
            if (data.items) processCrewPulse(data.items);
        } catch (e) { alert("同步失败: " + e); }
    }

    // 针对 CrewPulse 格式的增强解析逻辑
    function processCrewPulse(items) {
        const now = new Date();
        let allSectors = [];

        items.forEach(ev => {
            const content = (ev.summary + "\n" + (ev.description || "")).toUpperCase();
            
            // 1. 提取机场代码序列 (如 DXB, CKY, DSS)
            const codes = content.match(/\b([A-Z]{3})\b/g);
            if (!codes || codes.length < 2) return;

            // 2. 提取时间序列 (适配 23 APR 2026 07:50 格式)
            const timeRegex = /(\d{1,2})\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\s+(\d{4})\s+(\d{2}:\d{2})/g;
            const times = content.match(timeRegex);

            // 3. 提取航班号 (适配 8797 或 797)
            const fnMatches = content.match(/\b(\d{3,4})\b/g) || [];
            
            if (times && times.length >= 2) {
                for(let i=0; i < times.length - 1; i++) {
                    const depT = new Date(times[i]);
                    const arrT = new Date(times[i+1]);
                    // 过滤掉时间间隔太长的（比如超过15小时，可能不是同一段飞行）
                    if ((arrT - depT) / 3600000 < 18) {
                        allSectors.push({
                            fn: fnMatches[i] || fnMatches[0] || "---",
                            org: codes[i],
                            dst: codes[i+1],
                            dep: depT,
                            arr: arrT
                        });
                    }
                }
            }
        });

        // 定位当前或下一段航段
        const active = allSectors.find(s => s.arr > now) || allSectors[allSectors.length-1];
        if (!active) return;

        // 判定任务类型
        let type = "LAYOVER / STAY";
        if (CONFIG.HUB.includes(active.org)) {
            const next = allSectors.find(s => s.dep > active.arr);
            type = (next && CONFIG.HUB.includes(next.dst)) ? "TURNAROUND (TR)" : "FLY OUT / DEPARTURE";
        } else if (CONFIG.HUB.includes(active.dst)) {
            type = "RETURN / ARRIVAL";
        }

        currentOps = { active, type, banner: `PICKUP: ${formatTime(new Date(active.dep.getTime() - 135*60000))} | DEPART: ${formatTime(active.dep)}` };
        renderUI();
    }

    function renderUI() {
        document.getElementById('fullMode').classList.add('hidden');
        document.getElementById('flightMode').classList.remove('hidden');
        const { active, type, banner } = currentOps;

        document.getElementById('dutyTag').innerText = type;
        document.getElementById('fnDisp').innerText = "EK " + active.fn.slice(-3); // 统一显示3位
        document.getElementById('routeDisp').innerText = `${active.org} ➔ ${active.dst}`;
        document.getElementById('opsBanner').innerText = banner;
        document.getElementById('oCode').innerText = active.org;
        document.getElementById('dCode').innerText = active.dst;
        document.getElementById('oOff').innerText = getTZOffset(active.org);
        document.getElementById('dOff').innerText = getTZOffset(active.dst);

        updateWeather(active.org, 'oW');
        updateWeather(active.dst, 'dW');
    }

    function getTZOffset(code) {
        const info = airportDB[code];
        if (!info) return "Z+0";
        const parts = new Intl.DateTimeFormat('en-GB', { timeZone: info.tz, timeZoneName: 'shortOffset' }).formatToParts(new Date());
        return parts.find(p => p.type === 'timeZoneName').value;
    }

    async function updateWeather(code, elId) {
        const info = airportDB[code] || { lat: 25, lon: 55 };
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${info.lat}&lon=${info.lon}&units=metric&appid=${CONFIG.WEATHER_KEY}`);
            const d = await res.json();
            document.getElementById(elId).innerText = Math.round(d.main.temp) + "°";
        } catch (e) {}
    }

    function formatTime(d) { return d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0'); }

    setInterval(() => {
        const now = new Date();
        const dxbT = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Dubai', hour12: false, hour:'2-digit', minute:'2-digit' });
        document.getElementById('bt').innerText = dxbT;
        document.getElementById('utc').innerText = now.toISOString().slice(11, 19);

        if (currentOps) {
            const { active } = currentOps;
            document.getElementById('oT').innerText = now.toLocaleTimeString('en-GB', { timeZone: airportDB[active.org]?.tz || 'UTC', hour12: false, hour:'2-digit', minute:'2-digit' });
            document.getElementById('dT').innerText = now.toLocaleTimeString('en-GB', { timeZone: airportDB[active.dst]?.tz || 'UTC', hour12: false, hour:'2-digit', minute:'2-digit' });
            document.getElementById('oRef').innerText = `DXB: ${dxbT}`;
            document.getElementById('dRef').innerText = `DXB: ${dxbT}`;
        }
    }, 1000);

    window.onload = initAuth;
</script>
</body>
</html>
