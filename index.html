<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迪拜飞行时钟 · 智能版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; height: 100vh; width: 100vw; overflow: hidden; transition: background-color 0.5s, color 0.3s; }
        .mode-container { position: relative; width: 100%; height: 100%; }
        .dual-layout, .triple-layout { display: flex; width: 100%; height: 100%; }
        .dual-panel { flex: 1; position: relative; border-right: 1px solid rgba(255,255,255,0.1); }
        .dual-panel:last-child { border-right: none; }
        .triple-layout { flex-direction: column; }
        .triple-top { height: 30%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; z-index: 5; }
        .triple-bottom { flex: 1; display: flex; }
        .flight-bar { position: absolute; top: 12px; left: 12px; right: 12px; background: rgba(0,0,0,0.55); backdrop-filter: blur(12px); border-radius: 28px; padding: 8px 16px; font-size: 0.7rem; text-align: center; pointer-events: none; z-index: 20; }
        .clock-element { position: absolute; transform: translate(-50%, -50%); text-align: center; white-space: nowrap; }
        .clock-text { font-weight: 700; background: linear-gradient(135deg, #fff, #88aaff); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .date-text, .city-text, .weather-text { opacity: 0.85; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const GIST_API = `https://api.github.com/gists/${GIST_ID}`;
    const DUBAI_TZ = "Asia/Dubai";
    let flightsDB = {};
    let layoutConfig = null;
    let currentMode = "single";
    let currentFlight = null;
    let nextFlight = null;
    let weatherCache = {};

    const airportInfo = { "DXB": { city: "Dubai", country: "UAE", tz: "Asia/Dubai", lat: 25.2532, lon: 55.3657 }, "PVG": { city: "Shanghai", country: "China", tz: "Asia/Shanghai", lat: 31.1443, lon: 121.8083 }, "PEK": { city: "Beijing", country: "China", tz: "Asia/Shanghai", lat: 40.0799, lon: 116.6031 }, "LHR": { city: "London", country: "UK", tz: "Europe/London", lat: 51.47, lon: -0.4543 } };
    function getAirport(code) { return airportInfo[code] || { city: code, country: "", tz: "UTC", lat: 25.2532, lon: 55.3657 }; }

    async function fetchWeather(lat, lon) {
        let key = `${lat}_${lon}_${Math.floor(Date.now()/3600000)}`;
        if (weatherCache[key]) return weatherCache[key];
        try {
            let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            let resp = await fetch(url);
            let data = await resp.json();
            if (data && data.current_weather) {
                let map = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌧️",61:"🌧️",71:"❄️",80:"🌦️",95:"⛈️"};
                let icon = map[data.current_weather.weathercode] || "🌍";
                let result = { temp: Math.round(data.current_weather.temperature), icon: icon };
                weatherCache[key] = result;
                return result;
            }
        } catch(e) {}
        return { temp: 22, icon: "☀️" };
    }

    async function loadData() {
        try {
            let resp = await fetch(GIST_API);
            let data = await resp.json();
            if (data.files && data.files['flight_data.json']) { let content = JSON.parse(data.files['flight_data.json'].content); flightsDB = content.flightsDB || {}; }
            if (data.files && data.files['clock_layout.json']) { layoutConfig = JSON.parse(data.files['clock_layout.json'].content); }
        } catch(e) { console.warn(e); }
        if (!layoutConfig) { layoutConfig = { single: { clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2" }, date: { left:"50%", top:"75%", fontSize:"16px", letterSpacing:"0px", lineHeight:"1.2" }, city: { left:"50%", top:"85%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:true }, weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2" } }, dual: { left: { clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2" }, date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2" }, city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }, weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2" } }, right: { clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2" }, date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2" }, city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }, weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2" } } }, triple: { left: { clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2" }, date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2" }, city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }, weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2" } }, right: { clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2" }, date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2" }, city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }, weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2" } } }, colors: { dayBg: "#e8f0f5", dayText: "#1a2a3a", nightBg: "#0a0e1a", nightText: "#eef2f5", accentColor: "#ffaa44" } }; }
    }

    function getFlightChain() {
        let now = new Date(), all = [];
        for (let date in flightsDB) { for (let f of flightsDB[date]) { let dep = new Date(f.departureTime); if (dep > now && dep < new Date(now.getTime() + 72*3600000)) { all.push({ ...f, depTime: dep }); } } }
        all.sort((a,b) => a.depTime - b.depTime);
        return { current: all[0] || null, next: all[1] || null };
    }
    function getFlightState(flight) { if (!flight) return "no-flight"; let now = new Date(), dep = new Date(flight.departureTime), arr = flight.arrivalTime ? new Date(flight.arrivalTime) : null; if (now < dep) return "scheduled"; if (now > dep && (!arr || now < arr)) return "flying"; return "arrived"; }
    function applyColorTheme() {
        if (!layoutConfig.colors) return;
        let hour = new Date().toLocaleTimeString('en-US', { timeZone: DUBAI_TZ, hour:'2-digit', hour12:false });
        let isDay = (hour >= 6 && hour < 18);
        let bg = isDay ? layoutConfig.colors.dayBg : layoutConfig.colors.nightBg;
        let text = isDay ? layoutConfig.colors.dayText : layoutConfig.colors.nightText;
        document.body.style.backgroundColor = bg; document.body.style.color = text;
        document.querySelectorAll('.clock-text').forEach(el => { el.style.background = `linear-gradient(135deg, ${layoutConfig.colors.accentColor}, ${text})`; el.style.webkitBackgroundClip = 'text'; el.style.backgroundClip = 'text'; el.style.color = 'transparent'; });
    }
    function applyElementStyle(containerId, type, className, side = null) {
        let selector = side ? `#${containerId} #${side} .draggable[data-type="${type}"]` : `#${containerId} .draggable[data-type="${type}"]`;
        let el = document.querySelector(selector);
        if (!el) return;
        let cfg; if (currentMode === 'single') cfg = layoutConfig.single[type]; else if (currentMode === 'dual') cfg = layoutConfig.dual[side][type]; else cfg = layoutConfig.triple[side][type];
        if (!cfg) return;
        if (cfg.left) el.style.left = cfg.left; if (cfg.top) el.style.top = cfg.top;
        let textEl = el.querySelector(`.${className}`);
        if (textEl && cfg.fontSize) textEl.style.fontSize = cfg.fontSize;
        if (textEl && cfg.letterSpacing) textEl.style.letterSpacing = cfg.letterSpacing;
        if (textEl && cfg.lineHeight) textEl.style.lineHeight = cfg.lineHeight;
        if (cfg.hidden) el.style.display = 'none'; else el.style.display = 'block';
    }
    async function buildSingleMode() {
        let container = document.createElement('div'); container.className = 'mode-container'; container.id = 'singleMode';
        container.innerHTML = `<div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div><div class="draggable" data-type="date"><div class="date-text"></div></div><div class="draggable" data-type="city"><div class="city-text"></div></div><div class="draggable" data-type="weather"><div class="weather-text"></div></div>`;
        document.getElementById('app').appendChild(container);
        applyElementStyle('singleMode', 'clock', 'clock-text'); applyElementStyle('singleMode', 'date', 'date-text'); applyElementStyle('singleMode', 'city', 'city-text'); applyElementStyle('singleMode', 'weather', 'weather-text');
        let update = () => { let now = new Date(); document.querySelector('#singleMode .clock-text').innerText = now.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit', hour12:false }); document.querySelector('#singleMode .date-text').innerText = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }); document.querySelector('#singleMode .city-text').innerHTML = `Dubai, United Arab Emirates`; };
        update(); setInterval(update, 1000);
        let w = await fetchWeather(25.2532, 55.3657); document.querySelector('#singleMode .weather-text').innerHTML = `${w.icon} ${w.temp}°C`;
        setInterval(async () => { let w2 = await fetchWeather(25.2532, 55.3657); document.querySelector('#singleMode .weather-text').innerHTML = `${w2.icon} ${w2.temp}°C`; }, 1800000);
    }
    async function buildDualMode(flight) {
        let container = document.createElement('div'); container.className = 'mode-container'; container.id = 'dualMode';
        container.innerHTML = `<div class="flight-bar" id="dualFlightBar"></div><div class="dual-layout"><div class="dual-panel" id="dualLeft"><div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div><div class="draggable" data-type="date"><div class="date-text"></div></div><div class="draggable" data-type="city"><div class="city-text"></div></div><div class="draggable" data-type="weather"><div class="weather-text"></div></div></div><div class="dual-panel" id="dualRight"><div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div><div class="draggable" data-type="date"><div class="date-text"></div></div><div class="draggable" data-type="city"><div class="city-text"></div></div><div class="draggable" data-type="weather"><div class="weather-text"></div></div></div></div>`;
        document.getElementById('app').appendChild(container);
        applyElementStyle('dualMode', 'clock', 'clock-text', 'dualLeft'); applyElementStyle('dualMode', 'date', 'date-text', 'dualLeft'); applyElementStyle('dualMode', 'city', 'city-text', 'dualLeft'); applyElementStyle('dualMode', 'weather', 'weather-text', 'dualLeft');
        applyElementStyle('dualMode', 'clock', 'clock-text', 'dualRight'); applyElementStyle('dualMode', 'date', 'date-text', 'dualRight'); applyElementStyle('dualMode', 'city', 'city-text', 'dualRight'); applyElementStyle('dualMode', 'weather', 'weather-text', 'dualRight');
        let destInfo = getAirport(flight.destination);
        let depTime = new Date(flight.departureTime);
        let localTime = depTime.toLocaleTimeString('en-GB', { timeZone: destInfo.tz, hour:'2-digit', minute:'2-digit', hour12:false });
        let dubaiTime = depTime.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit', hour12:false });
        document.getElementById('dualFlightBar').innerHTML = `✈️ ${flight.flightNumber} · ${flight.origin} → ${flight.destination} · 起飞 ${localTime} (当地) / ${dubaiTime} (迪拜)`;
        setInterval(() => { let n = new Date(); let leftTime = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit' }); let rightTime = n.toLocaleTimeString('en-GB', { timeZone: destInfo.tz, hour:'2-digit', minute:'2-digit' }); document.querySelector('#dualLeft .clock-text').innerText = leftTime; document.querySelector('#dualRight .clock-text').innerText = rightTime; document.querySelector('#dualLeft .date-text').innerText = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday:'short', month:'short', day:'numeric' }); document.querySelector('#dualRight .date-text').innerText = n.toLocaleDateString('en-US', { timeZone: destInfo.tz, weekday:'short', month:'short', day:'numeric' }); document.querySelector('#dualLeft .city-text').innerHTML = `Dubai, United Arab Emirates`; document.querySelector('#dualRight .city-text').innerHTML = `${destInfo.city}, ${destInfo.country}`; }, 1000);
        let w1 = await fetchWeather(25.2532, 55.3657); let w2 = await fetchWeather(destInfo.lat, destInfo.lon); document.querySelector('#dualLeft .weather-text').innerHTML = `${w1.icon} ${w1.temp}°C`; document.querySelector('#dualRight .weather-text').innerHTML = `${w2.icon} ${w2.temp}°C`;
    }
    async function buildTripleMode(flight) {
        let container = document.createElement('div'); container.className = 'mode-container'; container.id = 'tripleMode';
        container.innerHTML = `<div class="triple-layout"><div class="triple-top" id="tripleTopBar"></div><div class="triple-bottom"><div class="dual-panel" id="tripleLeft"><div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div><div class="draggable" data-type="date"><div class="date-text"></div></div><div class="draggable" data-type="city"><div class="city-text"></div></div><div class="draggable" data-type="weather"><div class="weather-text"></div></div></div><div class="dual-panel" id="tripleRight"><div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div><div class="draggable" data-type="date"><div class="date-text"></div></div><div class="draggable" data-type="city"><div class="city-text"></div></div><div class="draggable" data-type="weather"><div class="weather-text"></div></div></div></div></div>`;
        document.getElementById('app').appendChild(container);
        applyElementStyle('tripleMode', 'clock', 'clock-text', 'tripleLeft'); applyElementStyle('tripleMode', 'date', 'date-text', 'tripleLeft'); applyElementStyle('tripleMode', 'city', 'city-text', 'tripleLeft'); applyElementStyle('tripleMode', 'weather', 'weather-text', 'tripleLeft');
        applyElementStyle('tripleMode', 'clock', 'clock-text', 'tripleRight'); applyElementStyle('tripleMode', 'date', 'date-text', 'tripleRight'); applyElementStyle('tripleMode', 'city', 'city-text', 'tripleRight'); applyElementStyle('tripleMode', 'weather', 'weather-text', 'tripleRight');
        let destInfo = getAirport(flight.destination);
        let dep = new Date(flight.departureTime); let arr = flight.arrivalTime ? new Date(flight.arrivalTime) : new Date(dep.getTime() + 8*3600000); let total = arr - dep; let elapsed = Math.min(total, Math.max(0, Date.now() - dep)); let percent = (elapsed / total) * 100;
        document.getElementById('tripleTopBar').innerHTML = `✈️ ${flight.flightNumber} · ${flight.origin} → ${flight.destination} · 飞行进度 ${Math.round(percent)}% · 剩余 ${Math.round((total-elapsed)/60000)}分钟`;
        setInterval(() => { let n = new Date(); let leftTime = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit' }); let rightTime = n.toLocaleTimeString('en-GB', { timeZone: destInfo.tz, hour:'2-digit', minute:'2-digit' }); document.querySelector('#tripleLeft .clock-text').innerText = leftTime; document.querySelector('#tripleRight .clock-text').innerText = rightTime; document.querySelector('#tripleLeft .date-text').innerText = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday:'short', month:'short', day:'numeric' }); document.querySelector('#tripleRight .date-text').innerText = n.toLocaleDateString('en-US', { timeZone: destInfo.tz, weekday:'short', month:'short', day:'numeric' }); document.querySelector('#tripleLeft .city-text').innerHTML = `Dubai, United Arab Emirates`; document.querySelector('#tripleRight .city-text').innerHTML = `${destInfo.city}, ${destInfo.country}`; let newElapsed = Math.min(total, Math.max(0, Date.now() - dep)); let newPercent = (newElapsed / total) * 100; document.getElementById('tripleTopBar').innerHTML = `✈️ ${flight.flightNumber} · ${flight.origin} → ${flight.destination} · 飞行进度 ${Math.round(newPercent)}% · 剩余 ${Math.round((total-newElapsed)/60000)}分钟`; }, 1000);
        let w1 = await fetchWeather(25.2532, 55.3657); let w2 = await fetchWeather(destInfo.lat, destInfo.lon); document.querySelector('#tripleLeft .weather-text').innerHTML = `${w1.icon} ${w1.temp}°C`; document.querySelector('#tripleRight .weather-text').innerHTML = `${w2.icon} ${w2.temp}°C`;
    }
    async function refreshDisplay() {
        await loadData();
        let flightObj = getFlightChain();
        let flight = flightObj.current;
        let state = getFlightState(flight);
        let newMode = "single";
        if (state === "no-flight") newMode = "single";
        else if (state === "scheduled") newMode = "dual";
        else newMode = "triple";
        if (newMode === currentMode && document.getElementById(`${currentMode}Mode`)) return;
        currentMode = newMode;
        document.getElementById('app').innerHTML = '';
        if (currentMode === "single") await buildSingleMode();
        else if (currentMode === "dual") await buildDualMode(flight);
        else await buildTripleMode(flight);
        applyColorTheme();
    }
    async function init() {
        let loading = document.createElement('div'); loading.className = 'loading-overlay'; loading.innerText = '🔄 同步配置...'; document.body.appendChild(loading);
        await loadData(); loading.remove();
        await refreshDisplay();
        setInterval(refreshDisplay, 60000);
        setInterval(applyColorTheme, 300000);
    }
    init();
</script>
</body>
</html>
