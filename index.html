<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迪拜飞行时钟 Pro</title>
    <style>
        :root {
            --accent-gold: #ffaa44;
            --glass-bg: rgba(0, 0, 0, 0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 1s ease, color 1s ease;
            background-color: #0a0e1a;
            color: #eef2f5;
        }
        .container {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        /* 动态组件样式 */
        .clock-element {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .clock-text {
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date-text { opacity: 0.6; font-weight: 300; }
        .weather-text { font-weight: 400; opacity: 0.9; }

        /* 布局框架 */
        .layout-engine {
            flex: 1;
            display: flex;
            position: relative;
        }
        .panel {
            flex: 1;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.05);
            height: 100%;
        }
        .panel:last-child { border-right: none; }

        /* 顶部航班条 */
        .status-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            margin: 15px 20px;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 100;
        }
        .dot { height: 8px; width: 8px; background: #44ff88; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px #44ff88; }

        /* 动画 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.8s ease-out; }
    </style>
</head>
<body>
<div id="app" class="container"></div>

<script>
    /**
     * 通讯接口层 (ClockAPI)
     * 实际开发中请将模拟数据替换为 fetch(url)
     */
    const ClockAPI = {
        async getSyncData() {
            // 模拟网络延迟
            await new Promise(r => setTimeout(r, 500));
            
            // 模拟逻辑：根据当前时间分钟数模拟不同状态切换
            const m = new Date().getMinutes();
            let mode = "single";
            if (m >= 1 && m < 3) mode = "dual";     // 1-3分显示双城
            if (m >= 3 && m < 6) mode = "triple";   // 3-6分显示飞行中
            
            return {
                mode: mode,
                flight: {
                    no: "EK302",
                    route: "DXB ✈︎ PVG",
                    status: "En-route",
                    progress: "2h 45m remaining"
                },
                weather: {
                    local: "☀️ 34°C",
                    dest: "🌤️ 22°C"
                }
            };
        }
    };

    const CONFIG = {
        tzDubai: "Asia/Dubai",
        tzShanghai: "Asia/Shanghai",
        refreshRate: 1000,
        apiSyncRate: 30000 // 每30秒同步一次接口
    };

    let currentMode = null;

    /**
     * 核心逻辑：渲染器
     */
    async function updateApp() {
        const data = await ClockAPI.getSyncData();
        
        // 只有当模式发生改变时，才重构 DOM 结构
        if (currentMode !== data.mode) {
            currentMode = data.mode;
            renderLayout(data);
        }
        
        // 每一秒更新一次具体数值
        refreshValues(data);
    }

    function renderLayout(data) {
        const app = document.getElementById('app');
        app.className = `container fade-in mode-${data.mode}`;
        
        let html = '';
        if (data.mode === "single") {
            html = `
                <div class="layout-engine">
                    <div class="clock-element" style="left:50%; top:45%;"><div class="clock-text" style="font-size:120px;" id="time-main">--:--</div></div>
                    <div class="clock-element" style="left:50%; top:65%;"><div class="date-text" style="font-size:20px;" id="date-main">--</div></div>
                    <div class="clock-element" style="left:50%; top:80%;"><div class="weather-text" id="weather-local">--</div></div>
                </div>`;
        } else {
            const isTriple = data.mode === "triple";
            html = `
                ${isTriple ? `<div class="status-bar"><span><span class="dot"></span>${data.flight.no} · ${data.flight.status}</span><span>${data.flight.progress}</span></div>` : ''}
                <div class="layout-engine">
                    <div class="panel">
                        <div class="clock-element" style="left:50%; top:40%;"><div class="clock-text" style="font-size:80px;" id="time-1">--:--</div></div>
                        <div class="clock-element" style="left:50%; top:55%;"><div class="date-text">DUBAI</div></div>
                        <div class="clock-element" style="left:50%; top:75%;"><div class="weather-text" id="weather-1">--</div></div>
                    </div>
                    <div class="panel">
                        <div class="clock-element" style="left:50%; top:40%;"><div class="clock-text" style="font-size:80px;" id="time-2">--:--</div></div>
                        <div class="clock-element" style="left:50%; top:55%;"><div class="date-text">SHANGHAI</div></div>
                        <div class="clock-element" style="left:50%; top:75%;"><div class="weather-text" id="weather-2">--</div></div>
                    </div>
                </div>`;
        }
        app.innerHTML = html;
    }

    function refreshValues(data) {
        const now = new Date();
        const timeOpt = { hour:'2-digit', minute:'2-digit', hour12:false };
        
        if (currentMode === "single") {
            const elTime = document.getElementById('time-main');
            if (elTime) elTime.innerText = now.toLocaleTimeString('en-GB', { ...timeOpt, timeZone: CONFIG.tzDubai });
            const elDate = document.getElementById('date-main');
            if (elDate) elDate.innerText = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
            const elWeather = document.getElementById('weather-local');
            if (elWeather) elWeather.innerText = data.weather.local;
        } else {
            const t1 = document.getElementById('time-1');
            const t2 = document.getElementById('time-2');
            if (t1) t1.innerText = now.toLocaleTimeString('en-GB', { ...timeOpt, timeZone: CONFIG.tzDubai });
            if (t2) t2.innerText = now.toLocaleTimeString('en-GB', { ...timeOpt, timeZone: CONFIG.tzShanghai });
            
            const w1 = document.getElementById('weather-1');
            const w2 = document.getElementById('weather-2');
            if (w1) w1.innerText = data.weather.local;
            if (w2) w2.innerText = data.weather.dest;
        }
        applyDynamicTheme(now);
    }

    function applyDynamicTheme(date) {
        const hour = parseInt(date.toLocaleTimeString('en-GB', { timeZone: CONFIG.tzDubai, hour: '2-digit', hour12:false }));
        const isDay = hour >= 6 && hour < 18;
        
        document.body.style.backgroundColor = isDay ? "#e8f0f5" : "#0a0e1a";
        document.body.style.color = isDay ? "#1a2a3a" : "#eef2f5";
    }

    // 启动引擎
    updateApp(); // 立即执行一次
    setInterval(() => refreshValues({ weather: { local: "☀️ 34°C", dest: "🌤️ 22°C" } }), CONFIG.refreshRate); // 每秒刷新时间
    setInterval(updateApp, CONFIG.apiSyncRate); // 每30秒同步一次 API 状态
</script>
</body>
</html>
