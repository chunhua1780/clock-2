<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迪拜飞行时钟 · 专业版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 12px;
        }
        .clock-container { display: flex; flex-direction: column; height: 100%; gap: 12px; }

        /* 状态栏 */
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(20, 25, 40, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .auth-status { font-size: 0.75rem; color: #88aacc; }
        .auth-status.connected { color: #66ffaa; }
        .auth-btn {
            background: #e6b400; color: #000; border: none;
            padding: 5px 14px; border-radius: 20px;
            font-weight: bold; font-size: 0.75rem; cursor: pointer;
        }

        /* 航班信息区 */
        .flight-area {
            height: 28%;
            background: linear-gradient(135deg, #0f1425 0%, #161b33 100%);
            border-radius: 24px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }
        .flight-no { font-size: 1.8rem; font-weight: 800; color: #ffd966; margin-bottom: 8px; }
        .schedule-box { font-size: 0.85rem; color: #ccddee; line-height: 1.6; }
        .pickup-highlight { color: #ff9f43; font-weight: bold; }

        /* 下方分屏 */
        .bottom-area { flex: 1; display: flex; gap: 10px; overflow: hidden; }
        .city-panel {
            flex: 1; background: #0a0e1a; border-radius: 24px;
            padding: 16px; display: flex; flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .city-tag { font-size: 0.6rem; color: #6699cc; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;}
        .city-code { font-size: 1.5rem; font-weight: 700; color: #88aaff; }
        
        /* 天气 */
        .weather-box { margin: 15px 0; text-align: center; }
        .temp { font-size: 2.2rem; font-weight: 300; }
        .desc { font-size: 0.8rem; color: #88aacc; }
        .dress { font-size: 0.7rem; background: #1a1f2e; padding: 4px 8px; border-radius: 10px; margin-top: 8px; display: inline-block; }

        /* 时钟 */
        .city-clock { margin-top: auto; text-align: center; border-top: 1px solid #223344; padding-top: 10px; }
        .time { font-size: 1.8rem; font-family: 'Courier New', monospace; font-weight: bold; color: #ffffff; }
        .date { font-size: 0.7rem; color: #88aacc; }

        .standby { display: flex; align-items: center; justify-content: center; height: 100%; color: #556688; font-style: italic; font-size: 0.9rem; text-align: center; }
    </style>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

<div class="clock-container">
    <div class="status-bar">
        <div class="auth-status" id="authStatus">🛰️ 离线模式</div>
        <button class="auth-btn" id="authBtn">同步日历</button>
    </div>

    <div id="flightPanel" class="flight-area">
        <div class="standby">等待同步...<br>请确保日历中有类似 "DXB-SZX" 的事件</div>
    </div>

    <div class="bottom-area">
        <div class="city-panel">
            <div class="city-tag">Departure</div>
            <div class="city-code" id="orgCode">DXB</div>
            <div class="weather-box" id="orgWeather">
                <div class="temp">--°</div>
                <div class="desc">正在获取...</div>
            </div>
            <div class="city-clock">
                <div class="time" id="orgTime">00:00:00</div>
                <div class="date" id="orgDate">----/--/--</div>
            </div>
        </div>

        <div class="city-panel">
            <div class="city-tag">Destination</div>
            <div class="city-code" id="dstCode">---</div>
            <div class="weather-box" id="dstWeather">
                <div class="temp">--°</div>
                <div class="desc">等待航班</div>
            </div>
            <div class="city-clock">
                <div class="time" id="dstTime">00:00:00</div>
                <div class="date" id="dstDate">----/--/--</div>
            </div>
        </div>
    </div>
</div>

<script>
    // 配置信息 (保持不变)
    const GOOGLE_CLIENT_ID = "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com";
    const WEATHER_KEY = "9fcc9afb0a80a6aaa44c926e4f7827a7";

    // 常用机场简易库
    const airportDB = {
        "DXB": { city: "迪拜", tz: "Asia/Dubai", lat: 25.25, lon: 55.36 },
        "SZX": { city: "深圳", tz: "Asia/Shanghai", lat: 22.63, lon: 113.81 },
        "PVG": { city: "上海", tz: "Asia/Shanghai", lat: 31.14, lon: 121.80 },
        "CAN": { city: "广州", tz: "Asia/Shanghai", lat: 23.39, lon: 113.29 },
        "PEK": { city: "北京", tz: "Asia/Shanghai", lat: 40.07, lon: 116.60 },
        "LHR": { city: "伦敦", tz: "Europe/London", lat: 51.47, lon: -0.45 },
        "JFK": { city: "纽约", tz: "America/New_York", lat: 40.64, lon: -73.77 }
    };

    let tokenClient;
    let accessToken = null;
    let clockTimer = null;

    // 1. 初始化 Google Auth
    function initAuth() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/calendar.readonly',
            callback: (resp) => {
                if (resp.access_token) {
                    accessToken = resp.access_token;
                    document.getElementById('authStatus').innerText = "✅ 日历已同步";
                    document.getElementById('authStatus').classList.add('connected');
                    fetchEvents();
                }
            },
        });
        document.getElementById('authBtn').onclick = () => tokenClient.requestAccessToken();
    }

    // 2. 获取日历事件
    async function fetchEvents() {
        const now = new Date().toISOString();
        const tomorrow = new Date(Date.now() + 86400000).toISOString();
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&timeMax=${tomorrow}&singleEvents=true&orderBy=startTime`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await res.json();
            const flightEvent = data.items?.find(ev => parseFlight(ev));
            if (flightEvent) {
                const flightData = parseFlight(flightEvent);
                saveAndDisplay(flightData);
            }
        } catch (e) { console.error("Fetch Error:", e); }
    }

    // 3. 核心解析逻辑：从日历标题或描述中提取信息
    function parseFlight(ev) {
        const text = (ev.summary + " " + (ev.description || "")).toUpperCase();
        // 匹配两个连续的机场代码，如 "DXB TO SZX" 或 "DXB-SZX"
        const codes = text.match(/\b([A-Z]{3})\b.*?\b([A-Z]{3})\b/);
        
        if (codes) {
            const org = codes[1];
            const dst = codes[2];
            const depTime = new Date(ev.start.dateTime);
            // 提取航班号 (如 EK302)
            const fnMatch = text.match(/([A-Z]{2}\d{3,4})/);
            return {
                fn: fnMatch ? fnMatch[1] : "EK" + (Math.floor(Math.random()*900)+100),
                org, dst,
                depTime: depTime.getTime(),
                pickup: depTime.getTime() - (135 * 60 * 1000)
            };
        }
        return null;
    }

    // 4. 存储并显示
    function saveAndDisplay(data) {
        localStorage.setItem('last_flight', JSON.stringify(data));
        renderFlight(data);
    }

    async function renderFlight(data) {
        const orgInfo = airportDB[data.org] || airportDB["DXB"];
        const dstInfo = airportDB[data.dst] || { city: data.dst, tz: "UTC", lat: 0, lon: 0 };

        document.getElementById('orgCode').innerText = data.org;
        document.getElementById('dstCode').innerText = data.dst;

        const dTime = new Date(data.depTime);
        const pTime = new Date(data.pickup);

        document.getElementById('flightPanel').innerHTML = `
            <div class="flight-no">✈️ ${data.fn}</div>
            <div class="schedule-box">
                <div>起飞: ${dTime.getHours().toString().padStart(2,'0')}:${dTime.getMinutes().toString().padStart(2,'0')}</div>
                <div class="pickup-highlight">🚗 接车: ${pTime.getHours().toString().padStart(2,'0')}:${pTime.getMinutes().toString().padStart(2,'0')}</div>
                <div style="font-size:0.7rem; color:#88aacc; margin-top:4px;">航段: ${orgInfo.city} ➔ ${dstInfo.city}</div>
            </div>
        `;

        updateWeather(data.org, 'orgWeather', orgInfo);
        updateWeather(data.dst, 'dstWeather', dstInfo);
        startClocks(orgInfo.tz, dstInfo.tz);
    }

    // 5. 天气抓取
    async function updateWeather(code, elementId, info) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${info.lat}&lon=${info.lon}&units=metric&appid=${WEATHER_KEY}&lang=zh_cn`);
            const d = await res.json();
            document.getElementById(elementId).innerHTML = `
                <div class="temp">${Math.round(d.main.temp)}°</div>
                <div class="desc">${d.weather[0].description}</div>
            `;
        } catch (e) { document.getElementById(elementId).innerText = "暂无天气"; }
    }

    // 6. 双时钟逻辑
    function startClocks(orgTz, dstTz) {
        if (clockTimer) clearInterval(clockTimer);
        clockTimer = setInterval(() => {
            const now = new Date();
            document.getElementById('orgTime').innerText = now.toLocaleTimeString('en-GB', { timeZone: orgTz, hour12: false });
            document.getElementById('orgDate').innerText = now.toLocaleDateString('zh-CN', { timeZone: orgTz });
            
            if (dstTz !== "UTC") {
                document.getElementById('dstTime').innerText = now.toLocaleTimeString('en-GB', { timeZone: dstTz, hour12: false });
                document.getElementById('dstDate').innerText = now.toLocaleDateString('zh-CN', { timeZone: dstTz });
            }
        }, 1000);
    }

    window.onload = () => {
        initAuth();
        const cached = localStorage.getItem('last_flight');
        if (cached) renderFlight(JSON.parse(cached));
    };
</script>

</body>
</html>
