<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>✈️ 航班助手（优化版）</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#020408;color:#fff;
width:100vw;height:100vh;overflow:hidden;
font-family:sans-serif;padding:1.5vw
}
body.day{background:#f0f4f8;color:#111}

/* 未起飞：全屏时钟 */
.full-clock{
position:fixed;inset:0;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:inherit;z-index:999;
}
.full-time{font-size:42vw;font-weight:900;line-height:1}
.full-date{font-size:10vw;font-weight:700;margin-top:2vh}
.full-flight{font-size:5vw;margin-top:3vh;line-height:1.5;text-align:center}
.full-notam{font-size:3.5vw;margin-top:2vh;color:#ff9800;line-height:1.4}
.hidden{display:none}

/* 已起飞：正常布局 */
.flight-box{height:25vh;background:rgba(255,255,255,.07);border-radius:20px;padding:2.5vw;margin-bottom:1.5vh}
body.day .flight-box{background:rgba(0,0,0,.04)}
.flight-title{font-size:2.6vw;font-weight:700;color:#42a5f5}
.flight-info{font-size:3.2vw;font-weight:700;line-height:1.4;margin:1vh 0}
.progress-bg{width:100%;height:2.4vh;background:rgba(255,255,255,.12);border-radius:999px;margin-top:1.5vh}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#2196f3,#42a5f5);transition:width 1s}

.weather-row{display:grid;grid-template-columns:1fr 1fr;gap:2vw;height:37vh;margin-bottom:1.5vh}
.weather-card{background:rgba(255,255,255,.07);border-radius:20px;padding:2.5vw}
body.day .weather-card{background:rgba(0,0,0,.04)}
.airport-title{font-size:2.8vw;font-weight:700;color:#81d4fa}
body.day .airport-title{color:#1976d2}
.weather-icon{font-size:6vw;margin:1vh 0}
.temp-huge{font-size:7vw;font-weight:900}
.weather-desc{font-size:2.4vw;line-height:1.6}

.bottom-area{display:grid;grid-template-columns:66% 31%;gap:3%;height:33vh}
.clock-area{display:flex;flex-direction:column;justify-content:center}
.time-big{font-size:22vw;font-weight:900;line-height:1}
.date-big{font-size:5.5vw;font-weight:700;margin-top:1.5vh}

.map-box{background:rgba(255,255,255,.07);border-radius:20px;padding:1.2vw}
body.day .map-box{background:rgba(0,0,0,.04)}
#flightMap{width:100%;height:84%;background:#0a1128;border-radius:14px}
body.day #flightMap{background:#e8edf3}
.map-status{text-align:center;font-size:2.2vw;font-weight:700;color:#42a5f5;margin-top:0.8vh}

.notam-box{margin-top:1vh;font-size:2.2vw;color:#ff9800;line-height:1.4}
</style>
</head>
<body>

<!-- 未起飞：全屏时钟 -->
<div class="full-clock hidden" id="fullClock">
  <div class="full-time" id="fullTime">00:00</div>
  <div class="full-date" id="fullDate"></div>
  <div class="full-flight" id="fullFlight"></div>
  <div class="full-notam" id="fullNotam"></div>
</div>

<!-- 已起飞：正常界面 -->
<div class="flight-box" id="flightBox">
  <div class="flight-title">✈️ 航班实时信息</div>
  <div id="flightText" class="flight-info">正在读取航班...</div>
  <div class="progress-bg"><div id="flightProgress" class="progress-bar"></div></div>
  <div class="notam-box" id="notamBox"></div>
</div>

<div class="weather-row" id="weatherRow">
  <div class="weather-card">
    <div class="airport-title">🛫 出发城市天气</div>
    <div id="depWeather">加载中...</div>
  </div>
  <div class="weather-card">
    <div class="airport-title">🛬 到达城市天气</div>
    <div id="arrWeather">加载中...</div>
  </div>
</div>

<div class="bottom-area" id="bottomArea">
  <div class="clock-area">
    <div class="time-big" id="showTime">00:00</div>
    <div class="date-big" id="showDate">2025-01-01 星期</div>
  </div>
  <div class="map-box">
    <canvas id="flightMap"></canvas>
    <div class="map-status" id="flyStatus">等待起飞</div>
  </div>
</div>

<script>
// ===================== 谷歌日历地址 =====================
const GOOGLE_ICAL_URL = "https://calendar.google.com/calendar/ical/chunhua1799%40gmail.com/private-6c1d0e7f274a03239756025c8465fdd2/basic.ics";
const CORS_PROXY = "https://api.allorigins.win/get?url=";

// ===================== 【真实实时航班接口】无TOKEN无密钥 =====================
async function getLiveFlight(callSign) {
  try {
    const res = await fetch(`https://api.airplanes.live/v2/callsign/${callSign}`);
    const data = await res.json();
    if (data.ac && data.ac.length > 0) {
      return data.ac[0];
    }
  } catch (e) {}
  return null;
}

// ===================== 航班号自动处理：8439 → 439 =====================
function getFlightList(airline, num) {
  const list = [];
  list.push(airline + num);
  if (num.length === 4) {
    list.push(airline + num.substring(1));
  }
  return list;
}

// ===================== 日历解析 =====================
function parseIcal(text) {
  const events = [];
  let ev = null;
  text.split(/\n/).forEach(line => {
    if (line.startsWith("BEGIN:VEVENT")) ev = {};
    if (line.startsWith("END:VEVENT")) { events.push(ev); ev = null; }
    if (!ev) return;
    if (line.startsWith("SUMMARY:")) ev.title = line.slice(8).replace(/\\,/g, ",");
    if (line.startsWith("DTSTART:")) ev.start = new Date(line.slice(8));
    if (line.startsWith("DTEND:")) ev.end = new Date(line.slice(8));
  });
  return events;
}

function getNextFlight(events) {
  const now = new Date();
  const flights = events.filter(e =>
    e.title && /[A-Z]{2}\s*\d{3,4}/.test(e.title) && e.start > now
  );
  if (flights.length === 0) return null;
  return flights.sort((a, b) => a.start - b.start)[0];
}

function parseFlightInfo(ev) {
  const match = ev.title.match(/([A-Z]{2})\s*(\d{3,4})/);
  const route = ev.title.match(/([A-Z]{3})\s*[-→]\s*([A-Z]{3})/);
  return {
    airline: match ? match[1] : "EK",
    num: match ? match[2] : "",
    dep: route ? route[1] : "DXB",
    arr: route ? route[2] : "AUH",
    start: ev.start,
    end: ev.end
  };
}

// ===================== 机场 → 城市映射（可扩展） =====================
const AIRPORT_TO_CITY = {
  DXB: { city: "Dubai", lat: 25.2048, lon: 55.2708 },
  AUH: { city: "Abu Dhabi", lat: 24.4539, lon: 54.3773 },
  // 你可以继续添加：TNK、CKY 等
  TNK: { city: "Tianjin", lat: 39.1355, lon: 117.4800 },
  CKY: { city: "Chongqing", lat: 29.5630, lon: 106.5516 }
};

// ===================== 城市天气（不再只查机场点） =====================
async function getCityWeather(cityCode) {
  const loc = AIRPORT_TO_CITY[cityCode] || { lat: 25.25, lon: 55.35 };
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}&current=temperature_2m,weathercode`);
  const d = await r.json();
  const c = d.current;
  let icon = "☀️";
  if (c.weathercode > 3) icon = "⛅";
  if (c.weathercode > 48) icon = "🌧️";
  if (c.weathercode > 77) icon = "❄️";
  return { icon, temp: c.temperature_2m, city: loc.city };
}

// ===================== NOTAM 航行情报（示例接口） =====================
async function getNOTAM(airportCode) {
  try {
    // 示例：用公共 NOTAM 接口（可替换为你常用的）
    const res = await fetch(`https://api.notams.faa.gov/v1/notams?airport=${airportCode}`);
    const data = await res.json();
    if (data.notams && data.notams.length > 0) {
      return data.notams.slice(0, 2).map(n => n.text).join(" | ");
    }
  } catch (e) {}
  return "暂无重要 NOTAM";
}

// ===================== 时钟 =====================
function updateTime() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2, "0");
  const m = String(n.getMinutes()).padStart(2, "0");
  const w = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
  const date = `${n.getFullYear()}年${n.getMonth() + 1}月${n.getDate()}日 ${w[n.getDay()]}`;
  document.getElementById("showTime").textContent = `${h}:${m}`;
  document.getElementById("showDate").textContent = date;
  document.getElementById("fullTime").textContent = `${h}:${m}`;
  document.getElementById("fullDate").textContent = date;
  document.body.classList.toggle("day", n.getHours() >= 6 && n.getHours() < 18);
}

// ===================== 飞行地图 =====================
const canvas = document.getElementById("flightMap");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
resize();
window.addEventListener("resize", resize);

function drawMap(flight, realData) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = document.body.classList.contains("day") ? "#e8edf3" : "#0a1128";
  ctx.fillRect(0, 0, w, h);
  if (!flight) return;

  const sx = w * 0.15, sy = h * 0.75, ex = w * 0.85, ey = h * 0.2;
  const now = Date.now(), st = flight.start.getTime(), ed = flight.end.getTime();
  const prog = Math.min(100, Math.max(0, ((now - st) / (ed - st)) * 100));
  const px = sx + (ex - sx) * prog / 100;
  const py = sy + (ey - sy) * prog / 100;

  ctx.strokeStyle = "#42a5f5"; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke(); ctx.setLineDash([]);

  ctx.fillStyle = "#2ecc71"; ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.arc(ex, ey, 5, 0, Math.PI * 2); ctx.fill();

  ctx.save(); ctx.translate(px, py);
  const angle = Math.atan2(ey - sy, ex - sx); ctx.rotate(angle);
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(-5, -5); ctx.lineTo(-5, 5); ctx.closePath(); ctx.fill(); ctx.restore();

  ctx.strokeStyle = "#ffd338"; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px - 15, py); ctx.lineTo(px + 15, py); ctx.moveTo(px, py - 15); ctx.lineTo(px, py + 15); ctx.stroke();

  document.getElementById("flightProgress").style.width = prog + "%";
}

// ===================== 主程序 =====================
let currentFlight = null;
let realFlightData = null;

async function main() {
  updateTime();
  try {
    const res = await fetch(CORS_PROXY + encodeURIComponent(GOOGLE_ICAL_URL));
    const data = await res.json();
    const events = parseIcal(data.contents);
    const next = getNextFlight(events);

    if (!next) {
      // 无航班：全屏时钟
      document.getElementById("fullClock").classList.remove("hidden");
      document.getElementById("flightBox").classList.add("hidden");
      document.getElementById("weatherRow").classList.add("hidden");
      document.getElementById("bottomArea").classList.add("hidden");
      document.getElementById("fullFlight").textContent = "近期无航班";
      document.getElementById("fullNotam").textContent = "";
      return;
    }

    currentFlight = parseFlightInfo(next);
    const now = new Date();
    const isDeparted = now >= currentFlight.start;

    // 未起飞：全屏时钟；已起飞：正常界面
    if (!isDeparted) {
      document.getElementById("fullClock").classList.remove("hidden");
      document.getElementById("flightBox").classList.add("hidden");
      document.getElementById("weatherRow").classList.add("hidden");
      document.getElementById("bottomArea").classList.add("hidden");
    } else {
      document.getElementById("fullClock").classList.add("hidden");
      document.getElementById("flightBox").classList.remove("hidden");
      document.getElementById("weatherRow").classList.remove("hidden");
      document.getElementById("bottomArea").classList.remove("hidden");
    }

    // 航班列表与实时数据
    const flightList = getFlightList(currentFlight.airline, currentFlight.num);
    realFlightData = null;
    for (const call of flightList) {
      realFlightData = await getLiveFlight(call);
      if (realFlightData) break;
    }

    // Pickup 时间：起飞前 2 小时 15 分
    const pickup = new Date(currentFlight.start.getTime() - 2 * 60 * 60 * 1000 - 15 * 60 * 1000);
    const pickupStr = `${pickup.getHours().toString().padStart(2, "0")}:${pickup.getMinutes().toString().padStart(2, "0")}`;

    // 状态
    const status = realFlightData ? "✅ 实时巡航中" : (isDeparted ? "🟡 已起飞" : "🟢 待起飞");

    // 航班信息文本
    const flightText = `
航班：${flightList[0]}<br>
航线：${currentFlight.dep} → ${currentFlight.arr}<br>
起飞：${currentFlight.start.toLocaleString()}<br>
接机：${pickupStr}（提前2h15m）<br>
状态：${status}<br>
匹配：${flightList.join(" → ")}
    `;

    // NOTAM
    const notamDep = await getNOTAM(currentFlight.dep);
    const notamArr = await getNOTAM(currentFlight.arr);
    const notamText = `NOTAM：${currentFlight.dep} ${notamDep} | ${currentFlight.arr} ${notamArr}`;

    // 未起飞：全屏显示
    if (!isDeparted) {
      document.getElementById("fullFlight").innerHTML = flightText.replace(/<br>/g, "\n");
      document.getElementById("fullNotam").textContent = notamText;
      return;
    }

    // 已起飞：正常界面
    document.getElementById("flightText").innerHTML = flightText;
    document.getElementById("notamBox").textContent = notamText;

    // 城市天气
    const depW = await getCityWeather(currentFlight.dep);
    const arrW = await getCityWeather(currentFlight.arr);
    document.getElementById("depWeather").innerHTML = `
<div class="weather-icon">${depW.icon}</div>
<div class="temp-huge">${depW.temp}°C</div>
<div class="weather-desc">${depW.city}</div>
    `;
    document.getElementById("arrWeather").innerHTML = `
<div class="weather-icon">${arrW.icon}</div>
<div class="temp-huge">${arrW.temp}°C</div>
<div class="weather-desc">${arrW.city}</div>
    `;

    drawMap(currentFlight, realFlightData);
    document.getElementById("flyStatus").textContent = realFlightData ? "实时巡航" : "已起飞";
  } catch (e) {
    console.error(e);
  }
}

main();
setInterval(updateTime, 1000);
setInterval(main, 60000);
setInterval(() => {
  if (currentFlight && new Date() >= currentFlight.start) {
    drawMap(currentFlight, realFlightData);
  }
}, 5000);
</script>
</body>
</html>
