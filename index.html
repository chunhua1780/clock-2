<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Pilot Dashboard V3</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

/* 主容器 */
#app{
width:100vw;
height:100vh;
position:relative;
}

/* 可拖拽模块 */
.widget{
position:absolute;
width:280px;
min-height:120px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
border-radius:12px;
padding:10px;
cursor:grab;
user-select:none;
touch-action:none;
}

.widget:active{cursor:grabbing;}

#clock{font-size:80px;font-weight:bold;}
#weather{font-size:20px;}
#flightInfo{font-size:16px;white-space:pre-line;}

/* 控制按钮 */
.control-btn{
position:absolute;
width:80px;
height:80px;
background:rgba(255,255,255,0.08);
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
opacity:0;
transition:0.3s;
}

#settingsBtn{top:20px;right:20px;}
#flightBtn{bottom:20px;right:20px;}

/* 弹窗 */
.modal{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border:1px solid #444;
display:none;
width:320px;
z-index:10;
}

input{width:100%;margin:5px 0;}
button{margin-top:10px;}
</style>
</head>

<body>

<div id="app">

<!-- 时钟 -->
<div class="widget" id="clockBox">
<div id="clock"></div>
</div>

<!-- 天气 -->
<div class="widget" id="weatherBox">
<div id="weather">Dubai 30°C</div>
</div>

<!-- 航班 -->
<div class="widget" id="flightBox">
<div id="flightInfo">No Flight</div>
</div>

</div>

<!-- 控制按钮 -->
<div id="settingsBtn" class="control-btn">⚙️</div>
<div id="flightBtn" class="control-btn">✈️</div>

<!-- 设置 -->
<div id="settingsModal" class="modal">
<h3>设置</h3>

字体大小：
<input type="range" id="fontSize" min="40" max="160">

<button onclick="saveSettings()">保存</button>
</div>

<!-- 航班 -->
<div id="flightModal" class="modal">
<h3>航班</h3>

航班号：
<input id="fNo">

出发：
<input id="fFrom">

目的：
<input id="fTo">

起飞：
<input type="time" id="fDep">

落地：
<input type="time" id="fArr">

<button onclick="saveFlight()">保存</button>
</div>

<script>

/* =========================
   时钟（无秒）
========================= */
setInterval(()=>{
let d=new Date();
clock.innerText =
d.getHours().toString().padStart(2,'0')+":"+
d.getMinutes().toString().padStart(2,'0');
},1000);

/* =========================
   隐形控制逻辑
========================= */
let timer;

document.body.addEventListener("click",()=>{
settingsBtn.style.opacity=1;
flightBtn.style.opacity=1;

clearTimeout(timer);
timer=setTimeout(()=>{
settingsBtn.style.opacity=0;
flightBtn.style.opacity=0;
},5000);
});

/* =========================
   打开面板
========================= */
settingsBtn.onclick=e=>{
e.stopPropagation();
settingsModal.style.display="block";
};

flightBtn.onclick=e=>{
e.stopPropagation();
flightModal.style.display="block";
};

/* =========================
   设置
========================= */
function saveSettings(){
localStorage.setItem("fontSize",fontSize.value);
applyUI();
settingsModal.style.display="none";
}

function applyUI(){
let f=localStorage.getItem("fontSize")||80;
document.querySelectorAll(".widget").forEach(w=>{
w.style.fontSize=f+"px";
});
}

/* =========================
   航班
========================= */
function saveFlight(){

let no=fNo.value;
if(!no.startsWith("EK")) no="EK"+no;

let f={
no,
from:fFrom.value,
to:fTo.value,
dep:fDep.value,
arr:fArr.value
};

localStorage.setItem("flight",JSON.stringify(f));
loadFlight();

flightModal.style.display="none";
}

function loadFlight(){
let f=JSON.parse(localStorage.getItem("flight"));
if(!f)return;

flightInfo.innerText=
`${f.no}
${f.from} → ${f.to}
DEP ${f.dep}
ARR ${f.arr}`;
}

/* =========================
   拖拽系统（核心）
========================= */
let drag=null,ox=0,oy=0;

function enableDrag(el){

el.addEventListener("mousedown",start);
el.addEventListener("touchstart",start);

function start(e){
drag=el;

let x=e.touches?e.touches[0].clientX:e.clientX;
let y=e.touches?e.touches[0].clientY:e.clientY;

let rect=el.getBoundingClientRect();

ox=x-rect.left;
oy=y-rect.top;

document.addEventListener("mousemove",move);
document.addEventListener("touchmove",move);
document.addEventListener("mouseup",end);
document.addEventListener("touchend",end);
}

function move(e){
if(!drag)return;

let x=e.touches?e.touches[0].clientX:e.clientX;
let y=e.touches?e.touches[0].clientY:e.clientY;

drag.style.left=(x-ox)+"px";
drag.style.top=(y-oy)+"px";
}

function end(){

localStorage.setItem(drag.id+"_x",drag.style.left);
localStorage.setItem(drag.id+"_y",drag.style.top);

drag=null;
}
}

/* =========================
   恢复布局
========================= */
function restore(){
document.querySelectorAll(".widget").forEach(w=>{
let x=localStorage.getItem(w.id+"_x");
let y=localStorage.getItem(w.id+"_y");

if(x) w.style.left=x;
if(y) w.style.top=y;

enableDrag(w);
});
}

/* =========================
   初始化
========================= */
applyUI();
loadFlight();
restore();

</script>

</body>
</html>
