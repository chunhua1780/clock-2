    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            width: 100vw;
            overflow: hidden;
            padding: 16px;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            gap: 16px;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .auth-status {
            font-size: 0.75rem;
            color: #88aacc;
        }
        .auth-status.connected {
            color: #66ffaa;
        }
        .auth-status.loading {
            color: #ffaa44;
        }
        .auth-btn {
            background: #ffaa44;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .auth-btn:active { transform: scale(0.96); }

        /* 航班号显示 */
        .flight-badge {
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 0.8rem;
        }

        /* 上方 1/4 航班动态区域 */
        .flight-area {
            height: 25%;
            background: linear-gradient(135deg, #0a0e1a 0%, #0c1020 100%);
            border-radius: 28px;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        .flight-progress {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .flight-info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .flight-number-large {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffd966;
        }

        .flight-status-badge {
            background: #00aa55;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .flight-status-badge.warning {
            background: #ff8844;
        }

        .flight-schedule {
            font-size: 0.8rem;
            background: #1a1f2a;
            padding: 10px;
            border-radius: 16px;
            margin: 8px 0;
        }

        /* 下方 3/4 左右分屏 */
        .bottom-area {
            height: 75%;
            display: flex;
            gap: 12px;
        }

        .city-panel {
            flex: 1;
            background: #0a0e1a;
            border-radius: 28px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow-y: auto;
        }

        .city-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid #223344;
            padding-bottom: 12px;
        }

        .city-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #88aaff;
        }

        .weather-icon {
            font-size: 2.5rem;
            text-align: center;
            margin: 10px 0;
        }

        .weather-temp {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
        }

        .weather-desc {
            text-align: center;
            color: #aabbdd;
            margin: 5px 0;
            font-size: 0.85rem;
        }

        .dress-tip {
            text-align: center;
            background: #1a1f2e;
            padding: 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .city-clock {
            text-align: center;
            margin-top: auto;
            padding-top: 20px;
        }

        .clock-time {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: 'Monaco', monospace;
            letter-spacing: 2px;
        }

        .clock-date {
            font-size: 0.7rem;
            color: #88aacc;
            margin-top: 5px;
        }

            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #ffaa66;
        }

            height: 100%;

        }

        hr {
            border-color: #223344;
            margin: 10px 0;
        }
        
        .clickable {
            cursor: pointer;
        }

    // ============================================================
    // 1. Google 日历授权
    // ============================================================
    let tokenClient = null;
    
    function initGoogleAuth() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/calendar.readonly',
            callback: (response) => {
                if (response.access_token) {
                    accessToken = response.access_token;
                    document.getElementById('authStatus').innerHTML = '✅ 已连接 Google 日历';
                    document.getElementById('authStatus').classList.add('connected');
                    document.getElementById('authBtn').innerText = '已连接';
                    document.getElementById('flightBadge').innerHTML = '✈️ 读取日历中...';
                    fetchCalendarEvents();
                    // 每5分钟刷新一次日历
                    if (calendarInterval) clearInterval(calendarInterval);
                    calendarInterval = setInterval(fetchCalendarEvents, 5 * 60 * 1000);
                }
            },
        });
        
        document.getElementById('authBtn').onclick = () => {
            if (accessToken) {
                // 已连接，刷新 token
                tokenClient.requestAccessToken({ prompt: '' });
            } else {
                tokenClient.requestAccessToken();
            }
        };
    }
    
    // 读取日历事件（未来24小时）
    async function fetchCalendarEvents() {
        if (!accessToken) return;
        
        try {
            const now = new Date();
            const next24h = new Date(now.getTime() + 24 * 3600000);
            const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${next24h.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=10`;
            
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await response.json();
            
            if (data.error) {
                console.error("日历 API 错误:", data.error);
                if (data.error.code === 401) {
                    accessToken = null;
                    document.getElementById('authStatus').innerHTML = '🔐 会话过期，请重新连接';
                    document.getElementById('authStatus').classList.remove('connected');
                    document.getElementById('authBtn').innerText = '重新连接';
                }
                return;
            }
            
            let foundFlight = null;
            if (data.items && data.items.length > 0) {
                for (const event of data.items) {
                    const flightInfo = parseFlightFromEvent(event);
                    if (flightInfo) {
                        foundFlight = flightInfo;
                        break;
                    }
                }
            }
            
            if (foundFlight) {
                currentFlight = foundFlight;
                document.getElementById('flightBadge').innerHTML = `✈️ ${currentFlight.flightNumber}`;
                await displayFlightInfo(currentFlight);
            } else {
                document.getElementById('flightBadge').innerHTML = '📅 未来24小时无航班';
                showNoFlight();
            }
        } catch (error) {
            console.error("读取日历失败:", error);
        }
    }
    
    // 解析日历事件中的航班信息
    function parseFlightFromEvent(event) {
        const title = event.summary || '';
        // 匹配格式：DXB-PVG 或 DXB→PVG 或 DXB to PVG 或 DXB PVG
        let match = title.match(/([A-Z]{3})[-→➡\s]+([A-Z]{3})/);
        if (!match) {
            // 尝试匹配三个大写字母组合
            const codes = title.match(/\b([A-Z]{3})\b/g);
            if (codes && codes.length >= 2) {
                match = [null, codes[0], codes[1]];
            }
        }
        
        if (match && match[1] && match[2]) {
            const origin = match[1].toUpperCase();
            const destination = match[2].toUpperCase();
            const startTime = event.start.dateTime ? new Date(event.start.dateTime) : null;
            
            if (!startTime) return null;
            
            // 尝试从标题提取航班号
            let flightNumber = "";
            const flightMatch = title.match(/([A-Z]{2,3}\d{1,4})/i);
            if (flightMatch) {
                flightNumber = flightMatch[1].toUpperCase();
            } else {
                flightNumber = `FL${origin}${destination}`;
            }
            
            return {
                flightNumber: flightNumber,
                origin: origin,
                destination: destination,
                departureTime: startTime,
                pickupTime: new Date(startTime.getTime() - 135 * 60000), // 起飞前2h15m
                rawTitle: title,
                eventId: event.id
            };
        }
        return null;
    }

    async function fetchWeather(lat, lon, airportCode) {
        try {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${WEATHER_KEY}&lang=zh_cn`;

            const data = await response.json();
            
            if (data.cod === 200) {
                let dress = "舒适";
                const temp = data.main.temp;
                if (temp < 0) dress = "羽绒服+厚围巾+手套";
                else if (temp < 5) dress = "羽绒服+围巾";
                else if (temp < 10) dress = "厚外套+毛衣";
                else if (temp < 15) dress = "风衣/夹克";
                else if (temp < 20) dress = "长袖+薄外套";
                else if (temp < 25) dress = "长袖/短袖+薄外套";
                else if (temp < 30) dress = "短袖+薄长裤";
                else dress = "短袖+防晒+帽子";
                
                const iconMap = {
                    "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Snow": "❄️",
                    "Thunderstorm": "⛈️", "Drizzle": "🌦️", "Mist": "🌫️", "Fog": "🌫️",
                    "Haze": "🌫️", "Smoke": "💨", "Dust": "🌪️"
                };
                const weatherMain = data.weather[0].main;
                
                return {
                    temp: Math.round(data.main.temp),
                    tempMin: Math.round(data.main.temp_min),
                    tempMax: Math.round(data.main.temp_max),
                    desc: data.weather[0].description,
                    icon: iconMap[weatherMain] || "🌍",
                    dress: dress,
                    humidity: data.main.humidity,
                    windSpeed: data.wind.speed,
                    feelsLike: Math.round(data.main.feels_like)
                };
            }
            return getMockWeather(airportCode);
        } catch (error) {
            console.error("天气获取失败:", error);
            return getMockWeather(airportCode);
        }
    }
    
    function getMockWeather(airportCode) {
        const mock = {
            "DXB": { temp: 32, desc: "晴", icon: "☀️", dress: "短袖+防晒", humidity: 45, feelsLike: 34 },
            "PVG": { temp: 18, desc: "多云", icon: "☁️", dress: "薄外套", humidity: 65, feelsLike: 17 },
            "PEK": { temp: 22, desc: "晴", icon: "☀️", dress: "长袖", humidity: 40, feelsLike: 21 },
            "LHR": { temp: 14, desc: "小雨", icon: "🌧️", dress: "风衣+雨具", humidity: 80, feelsLike: 12 },
            "JFK": { temp: 12, desc: "阴", icon: "☁️", dress: "夹克", humidity: 70, feelsLike: 10 }
        };
        return mock[airportCode] || { temp: 22, desc: "晴", icon: "☀️", dress: "舒适", humidity: 55, feelsLike: 21 };
    }
    
    // ============================================================
    // 3. 双时钟更新
    // ============================================================
    function startDualClocks(originTz, destTz) {
        if (clockInterval) clearInterval(clockInterval);
        
        function update() {
            try {
                const originTime = new Date().toLocaleTimeString('zh-CN', { timeZone: originTz, hour12: false });
                const originDate = new Date().toLocaleDateString('zh-CN', { timeZone: originTz, weekday: 'long', month: 'long', day: 'numeric' });
                document.getElementById('originTime').innerText = originTime;
                document.getElementById('originDate').innerText = originDate;
            } catch(e) {
                document.getElementById('originTime').innerText = new Date().toLocaleTimeString();
                document.getElementById('originDate').innerText = new Date().toLocaleDateString();
            }
            
            try {
                const destTime = new Date().toLocaleTimeString('zh-CN', { timeZone: destTz, hour12: false });
                const destDate = new Date().toLocaleDateString('zh-CN', { timeZone: destTz, weekday: 'long', month: 'long', day: 'numeric' });
                document.getElementById('destTime').innerText = destTime;
                document.getElementById('destDate').innerText = destDate;
            } catch(e) {
                document.getElementById('destTime').innerText = new Date().toLocaleTimeString();
                document.getElementById('destDate').innerText = new Date().toLocaleDateString();
            }
        }
        
        update();
        clockInterval = setInterval(update, 1000);
    }
    
    // ============================================================
    // 4. 显示航班信息
    // ============================================================
    async function displayFlightInfo(flight) {
        const originInfo = airportDB[flight.origin] || { 
            name: flight.origin, city: flight.origin, 
            lat: 25.2532, lon: 55.3657, tz: "Asia/Dubai", country: "未知" 
        };
        const destInfo = airportDB[flight.destination] || { 
            name: flight.destination, city: flight.destination, 
            lat: 51.4700, lon: -0.4543, tz: "Europe/London", country: "未知" 
        };
        
        // 更新面板标题
        document.getElementById('originCode').innerText = flight.origin;
        document.getElementById('originName').innerHTML = `${originInfo.city || originInfo.name}<span style="font-size:0.7rem;"> · ${originInfo.country}</span>`;
        document.getElementById('destCode').innerText = flight.destination;
        document.getElementById('destName').innerHTML = `${destInfo.city || destInfo.name}<span style="font-size:0.7rem;"> · ${destInfo.country}</span>`;
        
        // 计算时间
        const depTime = flight.departureTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const depDate = flight.departureTime.toLocaleDateString([], { month: 'numeric', day: 'numeric' });
        const pickupTime = flight.pickupTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        // 判断是否已起飞
        const now = new Date();
        const isDeparted = now > flight.departureTime;
        const statusText = isDeparted ? "🟢 已起飞" : "⏰ 等待起飞";
        const statusClass = isDeparted ? "flight-status-badge" : "flight-status-badge warning";
        
        // 更新上方航班面板
        document.getElementById('flightPanel').innerHTML = `
            <div class="flight-progress">
                <div class="flight-info-row">
                    <span class="flight-number-large">✈️ ${flight.flightNumber}</span>
                    <span class="${statusClass}">${statusText}</span>
                </div>
                <div class="flight-schedule">
                    <div>🛫 ${flight.origin} → ${flight.destination}</div>
                    <div>📅 起飞: ${depDate} ${depTime}</div>
                    <div>🚗 接车时间: ${pickupTime} (起飞前2h15m)</div>
                    <div>📋 日历事件: ${flight.rawTitle}</div>
                </div>
            </div>
        `;
        
        // 获取天气
        const originWeather = await fetchWeather(originInfo.lat, originInfo.lon, flight.origin);
        const destWeather = await fetchWeather(destInfo.lat, destInfo.lon, flight.destination);
        
        if (originWeather) {
            document.getElementById('originWeather').innerHTML = `
                <div class="weather-icon">${originWeather.icon}</div>
                <div class="weather-temp">${originWeather.temp}°C</div>
                <div class="weather-desc">${originWeather.desc} | 体感 ${originWeather.feelsLike}°C | 💧${originWeather.humidity}%</div>
                <div class="dress-tip">👕 ${originWeather.dress}</div>
            `;
        }
        
        if (destWeather) {
            document.getElementById('destWeather').innerHTML = `
                <div class="weather-icon">${destWeather.icon}</div>
                <div class="weather-temp">${destWeather.temp}°C</div>
                <div class="weather-desc">${destWeather.desc} | 体感 ${destWeather.feelsLike}°C | 💧${destWeather.humidity}%</div>
                <div class="dress-tip">👕 ${destWeather.dress}</div>
            `;
        }
        
        // 启动双时钟
        startDualClocks(originInfo.tz, destInfo.tz);
    }
    
    function showNoFlight() {
        // 恢复到迪拜单时钟模式
        const dubaiInfo = airportDB["DXB"];
        document.getElementById('originCode').innerText = "DXB";
        document.getElementById('originName').innerHTML = `${dubaiInfo.city} · ${dubaiInfo.country}`;
        document.getElementById('destCode').innerText = "---";
        document.getElementById('destName').innerHTML = "等待航班";
        
        document.getElementById('flightPanel').innerHTML = `
            <div class="standby-mode">
                <div>📅 未来24小时无航班</div>
                <div class="flight-meta" style="margin-top: 8px;">在日历中添加 "DXB→PVG" 格式的事件</div>
                <div class="flight-meta">🌍 当前显示迪拜天气和时间</div>
            </div>
        `;
        
        // 只更新迪拜时钟
        if (clockInterval) clearInterval(clockInterval);
        clockInterval = setInterval(() => {
            const dubaiTime = new Date().toLocaleTimeString('zh-CN', { timeZone: dubaiInfo.tz, hour12: false });
            const dubaiDate = new Date().toLocaleDateString('zh-CN', { timeZone: dubaiInfo.tz, weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('originTime').innerText = dubaiTime;
            document.getElementById('originDate').innerText = dubaiDate;
            document.getElementById('destTime').innerText = '--:--:--';
            document.getElementById('destDate').innerText = '';
        }, 1000);
    }
    
    // ============================================================
    // 5. 屏幕常亮 + 初始化
    // ============================================================
    setInterval(() => {
        document.title = "✈️ " + new Date().toLocaleTimeString();
    }, 10000);
    
    // 启动
    window.addEventListener('load', () => {
        initGoogleAuth();
        
        // 默认显示迪拜天气
        const dubaiInfo = airportDB["DXB"];
        (async () => {
            const weather = await fetchWeather(dubaiInfo.lat, dubaiInfo.lon, "DXB");
            if (weather) {
                document.getElementById('originWeather').innerHTML = `
                    <div class="weather-icon">${weather.icon}</div>
                    <div class="weather-temp">${weather.temp}°C</div>
                    <div class="weather-desc">${weather.desc} | 体感 ${weather.feelsLike}°C</div>
                    <div class="dress-tip">👕 ${weather.dress}</div>
                `;
            }
        })();
    });
</script>
