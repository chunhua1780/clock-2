<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>航班时钟 · 智能 HUD 终端</title>
    <style id="dynamic-style">
        /* 默认基础风格 */
        :root { --bg: #eef2f5; --text: #2c5f8a; --accent: #ffaa44; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, 'SF Pro Display', sans-serif; 
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden; 
            height: 100vh; 
        }
        
        /* 1/4 航空墙 HUD 区域 */
        .hud-header {
            height: 25vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: none; /* 默认隐藏，有航班时显示 */
            grid-template-columns: 1.5fr 1fr 1.5fr;
            padding: 20px;
            animation: slideDown 0.5s ease-out;
        }

        /* 3/4 主显示区 */
        .main-display {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: height 0.5s ease;
        }
        .main-display.with-hud { height: 75vh; }

        /* 超大时钟 */
        .big-clock {
            font-size: 26vw;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -10px;
        }
        .date-line {
            font-size: 2.5vw;
            letter-spacing: 10px;
            text-transform: uppercase;
            opacity: 0.8;
            margin-top: 20px;
        }

        /* 天气悬浮 */
        .weather-corner {
            position: absolute;
            top: 40px;
            right: 50px;
            text-align: right;
        }
        .temp-val { font-size: 4vw; font-weight: 300; }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div class="hud-header" id="hudHeader">
    <div style="display: flex; flex-direction: column; justify-content: center;">
        <div id="hud-fno" style="font-size: 2vw; font-weight: 800; color: var(--accent);">EK---</div>
        <div id="hud-route" style="font-size: 3.5vw; font-weight: 900;">--- ➔ ---</div>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; border-left: 1px solid rgba(0,0,0,0.1); border-right: 1px solid rgba(0,0,0,0.1);">
        <div id="hud-dest-wx" style="font-size: 4vw;">☀️</div>
        <div id="hud-dest-temp" style="font-size: 1.5vw; font-weight: 600;">--°C</div>
    </div>
    <div style="padding-left: 20px; display: flex; flex-direction: column; justify-content: center;">
        <div style="font-size: 0.8vw; opacity: 0.6;">DESTINATION INFO</div>
        <div id="hud-dest-name" style="font-size: 1.5vw; font-weight: 600;">LOADING...</div>
        <div id="hud-std" style="font-size: 1.2vw; color: var(--accent);">STD: --:--</div>
    </div>
</div>

<div class="main-display" id="mainArea">
    <div class="weather-corner">
        <div class="temp-val" id="main-temp">--°C</div>
        <div id="main-city" style="font-size: 1.2vw; opacity: 0.6;">DUBAI</div>
    </div>

    <div class="big-clock" id="clock-dxb">00:00</div>
    <div class="date-line" id="date-footer">LOADING DATE...</div>
</div>

<script>
    // ====================== 核心配置 ======================
    const GIST_ID = localStorage.getItem('gist_id') || "6b51ae2b894903de0227eaec5e0ce842";
    const W_KEY = localStorage.getItem('weather_api_key') || "9fcc9afb0a80a6aaa44c926e4f7827a7";
    const DUBAI_TZ = "Asia/Dubai";

    // 20种风格对应的视觉参数 (与控制面板索引同步)
    const themes = [
        {bg: "#eef2f5", text: "#2c5f8a", accent: "#ffaa44"}, // 经典白
        {bg: "#050a1a", text: "#88aaff", accent: "#58a6ff"}, // 深夜蓝
        {bg: "#fff7ed", text: "#7c2d12", accent: "#fbbf24"}, // 暖阳橙
        {bg: "#f0fdf4", text: "#064e3b", accent: "#10b981"}, // 森林绿
        {bg: "#fdf2f8", text: "#831843", accent: "#ec4899"}, // 樱花粉
        {bg: "#0f172a", text: "#f8fafc", accent: "#38bdf8"}, // 午夜
        {bg: "#1e1b4b", text: "#e0e7ff", accent: "#818cf8"}, // 星空紫
        {bg: "#27272a", text: "#f4f4f5", accent: "#a1a1aa"}, // 石墨灰
        {bg: "#450a0a", text: "#fef2f2", accent: "#ef4444"}, // 玫瑰红
        {bg: "#064e3b", text: "#ecfdf5", accent: "#34d399"}, // 翡翠
        {bg: "#1e3a8a", text: "#eff6ff", accent: "#60a5fa"}, // 蓝宝石
        {bg: "#4c1d95", text: "#f5f3ff", accent: "#a78bfa"}, // 紫罗兰
        {bg: "#78350f", text: "#fffbeb", accent: "#fbbf24"}, // 沙漠
        {bg: "#0c4a6e", text: "#f0f9ff", accent: "#38bdf8"}, // 冰川
        {bg: "#111827", text: "#f9fafb", accent: "#6b7280"}, // 煤黑
        {bg: "#312e81", text: "#e0e7ff", accent: "#4f46e5"}, // 靛蓝
        {bg: "#581c87", text: "#fae8ff", accent: "#d946ef"}, // 紫红色
        {bg: "#134e4a", text: "#f0fdfa", accent: "#2dd4bf"}, // 薄荷绿
        {bg: "#3f6212", text: "#f7fee7", accent: "#a3e635"}, // 青柠
        {bg: "#7c2d12", text: "#fff7ed", accent: "#fb923c"}  // 黄昏
    ];

    let currentFlight = null;

    // ====================== 数据通讯逻辑 ======================

    async function syncData() {
        try {
            // 抓取云端指令 (加上时间戳彻底解决缓存问题)
            const response = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`);
            const gist = await response.json();
            
            if (gist.files && gist.files['flight_data.json']) {
                const cloudData = JSON.parse(gist.files['flight_data.json'].content);
                currentFlight = cloudData;
                
                // 1. 更新视觉风格
                applyTheme(cloudData.style);
                
                // 2. 更新 HUD 航空墙逻辑
                renderHUD(cloudData);

                // 3. 抓取天气
                fetchWeather('Dubai', true);
                if (cloudData.arr) fetchWeather(cloudData.arr, false);
            }
        } catch (e) { console.error("Sync Failed:", e); }
    }

    function applyTheme(styleStr) {
        // 解析 style-X 字符串
        const idx = styleStr ? parseInt(styleStr.split('-')[1]) : 0;
        const theme = themes[idx] || themes[0];
        
        const root = document.documentElement;
        root.style.setProperty('--bg', theme.bg);
        root.style.setProperty('--text', theme.text);
        root.style.setProperty('--accent', theme.accent);
        
        // 记住选择
        localStorage.setItem('clock_style', idx);
    }

    function renderHUD(data) {
        const hud = document.getElementById('hudHeader');
        const main = document.getElementById('mainArea');
        
        if (!data.std) {
            hud.style.display = 'none';
            main.classList.remove('with-hud');
            return;
        }

        const now = new Date();
        const std = new Date(data.std);
        const diffHours = (std - now) / 3600000;

        // 逻辑：起飞前 72 小时到起飞后 12 小时显示 HUD
        if (diffHours < 72 && diffHours > -12) {
            hud.style.display = 'grid';
            main.classList.add('with-hud');
            
            document.getElementById('hud-fno').innerText = data.flightNo || "EK---";
            document.getElementById('hud-route').innerText = `${data.dep} ➔ ${data.arr}`;
            document.getElementById('hud-dest-name').innerText = data.arr || "---";
            document.getElementById('hud-std').innerText = `STD: ${std.getHours().toString().padStart(2,'0')}:${std.getMinutes().toString().padStart(2,'0')}`;
        } else {
            hud.style.display = 'none';
            main.classList.remove('with-hud');
        }
    }

    async function fetchWeather(city, isHome) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${W_KEY}`);
            const w = await res.json();
            if (isHome) {
                document.getElementById('main-temp').innerText = `${Math.round(w.main.temp)}°C`;
            } else {
                document.getElementById('hud-dest-temp').innerText = `${Math.round(w.main.temp)}°C`;
                // 根据 OpenWeather 的描述自动切换符号
                const iconMap = {"Clear":"☀️","Clouds":"☁️","Rain":"🌧️","Snow":"❄️","Thunderstorm":"⛈️"};
                document.getElementById('hud-dest-wx').innerText = iconMap[w.weather[0].main] || "🌤️";
            }
        } catch(e) {}
    }

    function tick() {
        const now = new Date();
        // 迪拜大时钟
        const dxbTime = new Intl.DateTimeFormat('en-GB', { 
            hour: '2-digit', minute: '2-digit', hour12: false, timeZone: DUBAI_TZ 
        }).format(now);
        document.getElementById('clock-dxb').innerText = dxbTime;

        // 扁平化日期
        const options = { month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('date-footer').innerText = now.toLocaleDateString('en-US', options).toUpperCase();
    }

    // ====================== 启动 ======================

    setInterval(tick, 1000);
    setInterval(syncData, 60000); // 每一分钟检查一次云端指令

    // 立即执行一次
    tick();
    syncData();
</script>
</body>
</html>
