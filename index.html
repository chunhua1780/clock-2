<body>
    <!-- 无航班模式 -->
    <div id="fullscreenMode" class="fullscreen-clock">
        <div class="big-time" id="fullscreenTime">--:--</div>
        <div class="big-date" id="fullscreenDate"></div>
        <div class="weather-card">
            <div class="weather-icon" id="fullscreenWeatherIcon">☀️</div>
            <div class="weather-temp" id="fullscreenWeatherTemp">--°C</div>
            <div class="weather-desc" id="fullscreenWeatherDesc">--</div>
            <div class="dress-tip" id="fullscreenDress">👕 --</div>
        </div>
        <div class="status-card" id="fullscreenStatus" onclick="openControlPanel()">⚙️ SETTINGS</div>
    </div>

    <!-- 有航班模式 -->
    <div id="flightMode" class="flight-mode hidden">
        <div class="status-bar">
            <div class="flight-badge" id="flightBadge">✈️ LOADING</div>
            <div class="auth-status" id="authStatus">⏳ CONNECTING</div>
        </div>
        <div id="flightPanel" class="flight-area">
            <div class="next-flight-title">✈️ NEXT FLIGHT</div>
            <div id="flightContent">Loading...</div>
        </div>
        <div class="bottom-area">
            <div class="city-panel">
                <div class="label-sm">🛫 DEPARTURE</div>
                <div class="city-name" id="originCode">DXB</div>
                <div id="originWeather"><div class="weather-icon">🌍</div><div class="weather-temp">--°C</div><div class="weather-desc">--</div><div class="dress-tip">👕 --</div></div>
                <div class="label-sm" style="margin-top:8px;">📡 NOTAM</div>
                <div id="originNotam" class="notam-list">--</div>
            </div>
            <div class="city-panel">
                <div class="label-sm">🛬 DESTINATION</div>
                <div class="city-name" id="destCode">---</div>
                <div id="destWeather"><div class="weather-icon">🌍</div><div class="weather-temp">--°C</div><div class="weather-desc">--</div><div class="dress-tip">👕 --</div></div>
                <div class="label-sm" style="margin-top:8px;">📡 NOTAM</div>
                <div id="destNotam" class="notam-list">--</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const GOOGLE_CLIENT_ID = "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com";
        const WEATHER_KEY = "9fcc9afb0a80a6aaa44c926e4f7827a7";
        const DUBAI_TZ = "Asia/Dubai";
        
        // 机场时区数据库
        const airportTimezone = {
            "DXB": "Asia/Dubai", "AUH": "Asia/Dubai", "SHJ": "Asia/Dubai", "DWC": "Asia/Dubai",
            "PVG": "Asia/Shanghai", "PEK": "Asia/Shanghai", "CAN": "Asia/Shanghai", "SZX": "Asia/Shanghai",
            "HKG": "Asia/Hong_Kong", "LHR": "Europe/London", "JFK": "America/New_York",
            "CDG": "Europe/Paris", "FRA": "Europe/Berlin", "AMS": "Europe/Amsterdam", "SYD": "Australia/Sydney"
        };
        
        function getAirportTz(code) { return airportTimezone[code] || "Asia/Dubai"; }
        function formatTimeInTz(date, tz) {
            return new Date(date).toLocaleTimeString('en-GB', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
        }
        
        function getCountdown(targetTime) {
            const now = new Date();
            const target = new Date(targetTime);
            if (target <= now) return "✈️ DEPARTED";
            const diffMs = target - now;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            if (diffHours >= 24) {
                const diffDays = Math.floor(diffHours / 24);
                return `⏱️ ${diffDays}D ${diffHours % 24}H ${diffMins}M`;
            }
            return `⏱️ ${diffHours}H ${diffMins}M`;
        }
        
        function getWeatherIcon(weatherMain) {
            const icons = { "Clear": "☀️", "Sunny": "☀️", "Clouds": "☁️", "Partly Clouds": "⛅", "Rain": "🌧️", "Drizzle": "🌦️", "Snow": "❄️", "Thunderstorm": "⛈️", "Mist": "🌫️", "Fog": "🌫️" };
            return icons[weatherMain] || "🌍";
        }
        
        // ============================================================
        // 天气 API
        // ============================================================
        async function getWeather(lat, lon) {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${WEATHER_KEY}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.cod === 200) {
                    let dress = "Comfortable";
                    const t = data.main.temp;
                    if (t < 5) dress = "Winter Coat";
                    else if (t < 15) dress = "Jacket";
                    else if (t < 25) dress = "Light Jacket";
                    else if (t >= 30) dress = "T-Shirt + Sunscreen";
                    return {
                        temp: Math.round(t),
                        desc: data.weather[0].description,
                        main: data.weather[0].main,
                        icon: getWeatherIcon(data.weather[0].main),
                        dress: dress
                    };
                }
            } catch(e) {}
            return { temp: 22, desc: "Clear", icon: "☀️", dress: "Comfortable" };
        }
        
        const airportCoords = {
            "DXB": { lat: 25.2532, lon: 55.3657 }, "PVG": { lat: 31.1443, lon: 121.8083 },
            "PEK": { lat: 40.0799, lon: 116.6031 }, "LHR": { lat: 51.4700, lon: -0.4543 },
            "JFK": { lat: 40.6413, lon: -73.7781 }, "CDG": { lat: 49.0097, lon: 2.5479 }
        };
        
        // ============================================================
        // Google 日历集成
        // ============================================================
        let accessToken = null;
        let tokenClient = null;
        
        async function fetchCalendarEvents() {
            if (!accessToken) return null;
            try {
                const now = new Date();
                const plus72h = new Date(now.getTime() + 72 * 3600000);
                const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${plus72h.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=10`;
                const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const data = await resp.json();
                if (data.error) return null;
                if (data.items) {
                    for (const ev of data.items) {
                        const flight = parseFlightEvent(ev);
                        if (flight) return flight;
                    }
                }
                return null;
            } catch(e) { return null; }
        }
        
        function parseFlightEvent(event) {
            const text = (event.summary || "").toUpperCase();
            const codeMatch = text.match(/\b([A-Z]{3})\b.*?\b([A-Z]{3})\b/);
            if (!codeMatch) return null;
            const startTime = event.start?.dateTime ? new Date(event.start.dateTime) : null;
            if (!startTime) return null;
            const numMatch = text.match(/\b(\d{3,4})\b/);
            let flightNum = numMatch ? `EK${numMatch[1]}` : `${codeMatch[1]}${codeMatch[2]}`;
            return {
                flightNumber: flightNum,
                origin: codeMatch[1],
                destination: codeMatch[2],
                departureTime: startTime,
                pickupTime: new Date(startTime.getTime() - 135*60000)
            };
        }
        
        // ============================================================
        // 显示逻辑
        // ============================================================
        let currentFlight = null;
        let refreshTimer = null;
        
        async function loadFlightFromAllSources() {
            // 优先级1: 手动添加的航班 (localStorage last_flight)
            let flight = null;
            try {
                const saved = localStorage.getItem('last_flight');
                if (saved) flight = JSON.parse(saved);
            } catch(e) {}
            
            // 优先级2: Google 日历
            if (!flight && accessToken) {
                const calendarFlight = await fetchCalendarEvents();
                if (calendarFlight) flight = calendarFlight;
            }
            
            // 优先级3: 控制面板数据库
            if (!flight) {
                try {
                    const db = localStorage.getItem('flight_calendar_db');
                    if (db) {
                        const flightsDB = JSON.parse(db);
                        let allFlights = [];
                        for (let date in flightsDB) {
                            for (let f of flightsDB[date]) allFlights.push(f);
                        }
                        const now = new Date();
                        const future = allFlights.filter(f => new Date(f.departureTime) > now);
                        future.sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
                        if (future.length > 0) flight = future[0];
                        else if (allFlights.length > 0) flight = allFlights[0];
                    }
                } catch(e) {}
            }
            
            if (flight) {
                currentFlight = flight;
                displayFlightInfo(flight);
                document.getElementById('flightMode').classList.remove('hidden');
                document.getElementById('fullscreenMode').classList.add('hidden');
                document.getElementById('authStatus').innerHTML = "✅ SYNCED";
                document.getElementById('authStatus').classList.add('connected');
            } else {
                document.getElementById('flightMode').classList.add('hidden');
                document.getElementById('fullscreenMode').classList.remove('hidden');
                updateFullscreenClock();
                document.getElementById('authStatus').innerHTML = accessToken ? "✅ SYNCED" : "⏳ CONNECTING";
            }
        }
        
        async function displayFlightInfo(flight) {
            const destTz = getAirportTz(flight.destination);
            const depTime = new Date(flight.departureTime);
            const pickupTime = new Date(depTime.getTime() - 135 * 60000);
            const depLocal = formatTimeInTz(depTime, destTz);
            const depDubai = formatTimeInTz(depTime, DUBAI_TZ);
            const depDate = depTime.toLocaleDateString('en-US', { timeZone: destTz, month: 'short', day: 'numeric' });
            const pickupLocal = formatTimeInTz(pickupTime, destTz);
            const pickupDubai = formatTimeInTz(pickupTime, DUBAI_TZ);
            const countdown = getCountdown(depTime);
            const isLayover = flight.isLayover || false;
            
            let html = `
                <div class="flight-number-large">✈️ ${flight.flightNumber}${isLayover ? '<span class="layover-badge">🛏️ LAYOVER</span>' : ''}</div>
                <div class="flight-route">🛫 ${flight.origin} → 🛬 ${flight.destination}</div>
                <div class="time-card">
                    <div class="time-local"><span class="time-label">🛫 DEPARTURE</span>${depLocal} (LOCAL)</div>
                    <div class="time-dubai"><span class="time-label">🕐 DUBAI TIME</span>${depDubai} (${depDate})</div>
                </div>
                <div class="time-card">
                    <div class="time-local"><span class="time-label">🚗 PICKUP</span>${pickupLocal} (2h15m before)</div>
                    <div class="time-dubai"><span class="time-label">🕐 DUBAI TIME</span>${pickupDubai}</div>
                </div>
                <div class="countdown">${countdown}</div>
            `;
            
            if (flight.nextFlight) {
                const nextDep = new Date(flight.nextFlight.departureTime);
                const nextDubai = formatTimeInTz(nextDep, DUBAI_TZ);
                html += `<div class="time-card" style="margin-top:10px; border-left-color:#ff8844;"><div class="time-local" style="color:#ffaa66;">🔄 NEXT: ${flight.nextFlight.flightNumber} (${flight.nextFlight.origin}→${flight.nextFlight.destination})</div><div class="time-dubai"><span class="time-label">🕐 DUBAI TIME</span>${nextDubai}</div></div>`;
            }
            
            document.getElementById('flightContent').innerHTML = html;
            document.getElementById('flightBadge').innerHTML = `✈️ ${flight.flightNumber}`;
            document.getElementById('originCode').innerText = flight.origin;
            document.getElementById('destCode').innerText = flight.destination;
            
            const originCoords = airportCoords[flight.origin] || { lat: 25.2532, lon: 55.3657 };
            const destCoords = airportCoords[flight.destination] || { lat: 51.4700, lon: -0.4543 };
            const w1 = await getWeather(originCoords.lat, originCoords.lon);
            const w2 = await getWeather(destCoords.lat, destCoords.lon);
            
            document.getElementById('originWeather').innerHTML = `<div class="weather-icon">${w1.icon}</div><div class="weather-temp">${w1.temp}°C</div><div class="weather-desc">${w1.desc}</div><div class="dress-tip">👕 ${w1.dress}</div>`;
            document.getElementById('destWeather').innerHTML = `<div class="weather-icon">${w2.icon}</div><div class="weather-temp">${w2.temp}°C</div><div class="weather-desc">${w2.desc}</div><div class="dress-tip">👕 ${w2.dress}</div>`;
            document.getElementById('originNotam').innerHTML = '<div class="notam-item">No active NOTAM</div>';
            document.getElementById('destNotam').innerHTML = '<div class="notam-item">No active NOTAM</div>';
        }
        
        // 全屏时钟
        let fullscreenTimer = null;
        async function updateFullscreenClock() {
            function tick() {
                const now = new Date();
                const dubaiTime = now.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour12: false }).slice(0,5);
                const dubaiDate = now.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                document.getElementById('fullscreenTime').innerText = dubaiTime;
                document.getElementById('fullscreenDate').innerHTML = dubaiDate;
            }
            tick();
            if (fullscreenTimer) clearInterval(fullscreenTimer);
            fullscreenTimer = setInterval(tick, 60000);
            const weather = await getWeather(25.2532, 55.3657);
            document.getElementById('fullscreenWeatherIcon').innerText = weather.icon;
            document.getElementById('fullscreenWeatherTemp').innerText = `${weather.temp}°C`;
            document.getElementById('fullscreenWeatherDesc').innerText = weather.desc;
            document.getElementById('fullscreenDress').innerHTML = `👕 ${weather.dress}`;
        }
        
        function openControlPanel() { window.open('control.html', '_blank', 'width=450,height=700'); }
        
        // Google 授权
        function initGoogleAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: async (resp) => {
                    if (resp.access_token) {
                        accessToken = resp.access_token;
                        document.getElementById('authStatus').innerHTML = "✅ SYNCED";
                        document.getElementById('fullscreenStatus').innerHTML = "⚙️ SETTINGS";
                        document.getElementById('fullscreenStatus').classList.add('connected');
                        await loadFlightFromAllSources();
                        setInterval(async () => { await loadFlightFromAllSources(); }, 10 * 60 * 1000);
                    }
                },
            });
            setTimeout(() => { if (!accessToken) tokenClient.requestAccessToken(); }, 500);
        }
        
        // 监听 storage 变化
        window.addEventListener('storage', (e) => {
            if (e.key === 'last_flight' || e.key === 'flight_calendar_db') loadFlightFromAllSources();
        });
        
        window.onload = () => {
            initGoogleAuth();
            loadFlightFromAllSources();
            setInterval(() => { if (currentFlight) displayFlightInfo(currentFlight); }, 60000);
        };
    </script>
</body>
</html>
