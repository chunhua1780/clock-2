<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迪拜飞行时钟 · 全能版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.5s, color 0.3s;
            position: relative;
        }
        /* 主时钟容器 */
        .clock-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* 各种布局样式 */
        .dual-layout, .triple-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .dual-panel {
            flex: 1;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .dual-panel:last-child {
            border-right: none;
        }
        .triple-layout {
            flex-direction: column;
        }
        .triple-top {
            height: 30%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 5;
        }
        .triple-bottom {
            flex: 1;
            display: flex;
        }
        .flight-bar {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 8px 16px;
            font-size: 0.7rem;
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }
        .clock-element {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
            white-space: nowrap;
            cursor: default;
        }
        .clock-text {
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date-text, .city-text, .weather-text {
            opacity: 0.85;
        }
        /* 隐藏按钮触发区 */
        .hidden-trigger {
            position: fixed;
            width: 60px;
            height: 60px;
            background: transparent;
            z-index: 200;
        }
        .top-right-trigger {
            top: 0;
            right: 0;
        }
        .bottom-right-trigger {
            bottom: 0;
            right: 0;
        }
        /* 编辑模式弹窗 / 航班管理弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: auto;
            padding: 16px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .modal-header h2 {
            color: #ffaa44;
        }
        .close-modal {
            background: #ffaa44;
            color: #0a0e1a;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
        }
        /* 编辑模式样式 (复用 config 面板) */
        .mode-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }
        .mode-bar button {
            background: #1a1f2e;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .mode-bar button.active {
            background: #ffaa44;
            color: #0a0e1a;
        }
        .editor-canvas {
            background: #1a2a4a;
            border-radius: 48px;
            aspect-ratio: 4 / 3;
            position: relative;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .editor-layout {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .editor-layout.hidden {
            display: none;
        }
        .edit-panel {
            flex: 1;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .edit-panel:last-child {
            border-right: none;
        }
        .draggable {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: grab;
            touch-action: none;
            white-space: nowrap;
            z-index: 10;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .element-tools {
            position: absolute;
            top: -28px;
            right: 0;
            display: flex;
            gap: 6px;
            background: #1a1f2e;
            border-radius: 20px;
            padding: 2px 8px;
        }
        .element-tools button {
            background: #aa4444;
            border: none;
            color: white;
            border-radius: 20px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .add-element-bar {
            background: #11161f;
            border-radius: 32px;
            padding: 12px;
            margin: 12px 0;
        }
        .add-element-bar button {
            background: #2a6faa;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            color: white;
            margin-right: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .control-panel {
            background: #11161f;
            border-radius: 32px;
            padding: 12px;
            margin-top: 12px;
        }
        .slider-group {
            margin-bottom: 12px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #2a3344;
            border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffaa44;
            cursor: pointer;
        }
        input[type="color"] {
            width: 100%;
            height: 36px;
            border-radius: 20px;
            border: none;
            background: #1a1f2e;
            cursor: pointer;
        }
        .btn-primary {
            background: #ffaa44;
            color: #0a0e1a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        /* 航班管理样式 */
        .calendar-card {
            background: #11161f;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .month-nav button {
            background: #1a1f2e;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
        }
        .current-month {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffd966;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 12px;
        }
        .weekday {
            font-size: 0.7rem;
            color: #88aacc;
            padding: 8px 0;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }
        .cal-day {
            aspect-ratio: 1;
            background: #1a1f2e;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .cal-day.today {
            border-color: #ffaa44;
        }
        .cal-day.has-flight {
            background: #2a3a2a;
        }
        .cal-day.selected {
            background: #ffaa44;
            color: #0a0e1a;
        }
        .cal-day.other-month {
            opacity: 0.4;
        }
        .flight-dot {
            width: 5px;
            height: 5px;
            background: #66ffaa;
            border-radius: 5px;
            margin-top: 3px;
        }
        .flight-item {
            background: #1a1f2e;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 4px solid #ffaa44;
        }
        .flight-num {
            font-weight: bold;
            color: #ffd966;
        }
        .flight-time {
            font-size: 0.7rem;
            color: #aabbdd;
            margin-top: 4px;
        }
        .delete-btn {
            background: #aa4444;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 6px;
        }
        .empty-tip {
            text-align: center;
            color: #88aacc;
            padding: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #ffaa44;
            color: #0a0e1a;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ==================== 全局配置 ====================
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const GIST_API = `https://api.github.com/gists/${GIST_ID}`;
    const AVIATION_KEY = "b4bd321bbba1723162801cce3c455d7c";
    const DUBAI_TZ = "Asia/Dubai";
    
    let flightsDB = {};
    let layoutConfig = null;
    let currentMode = "single";
    let currentFlight = null;
    let weatherCache = {};

    // 机场信息库
    const airportInfo = {
        "DXB": { city: "Dubai", country: "United Arab Emirates", tz: "Asia/Dubai", lat: 25.2532, lon: 55.3657 },
        "PVG": { city: "Shanghai", country: "China", tz: "Asia/Shanghai", lat: 31.1443, lon: 121.8083 },
        "PEK": { city: "Beijing", country: "China", tz: "Asia/Shanghai", lat: 40.0799, lon: 116.6031 },
        "LHR": { city: "London", country: "United Kingdom", tz: "Europe/London", lat: 51.47, lon: -0.4543 },
        "JFK": { city: "New York", country: "USA", tz: "America/New_York", lat: 40.6413, lon: -73.7781 },
        "CDG": { city: "Paris", country: "France", tz: "Europe/Paris", lat: 49.0097, lon: 2.5479 },
        "SIN": { city: "Singapore", country: "Singapore", tz: "Asia/Singapore", lat: 1.3644, lon: 103.9915 },
        "SYD": { city: "Sydney", country: "Australia", tz: "Australia/Sydney", lat: -33.9461, lon: 151.1772 }
    };
    function getAirport(code) {
        return airportInfo[code] || { city: code, country: "", tz: "UTC", lat: 25.2532, lon: 55.3657 };
    }

    // ==================== 通用工具 ====================
    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // 天气 (Open-Meteo)
    async function fetchWeather(lat, lon) {
        let key = `${lat}_${lon}_${Math.floor(Date.now()/3600000)}`;
        if (weatherCache[key]) return weatherCache[key];
        try {
            let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            let resp = await fetch(url);
            let data = await resp.json();
            if (data && data.current_weather) {
                let map = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌧️",61:"🌧️",71:"❄️",80:"🌦️",95:"⛈️"};
                let icon = map[data.current_weather.weathercode] || "🌍";
                let result = { temp: Math.round(data.current_weather.temperature), icon: icon };
                weatherCache[key] = result;
                return result;
            }
        } catch(e) {}
        return { temp: 22, icon: "☀️" };
    }

    // 航班数据处理
    async function loadData() {
        try {
            let resp = await fetch(GIST_API);
            let data = await resp.json();
            if (data.files && data.files['flight_data.json']) {
                let content = JSON.parse(data.files['flight_data.json'].content);
                flightsDB = content.flightsDB || {};
            }
            if (data.files && data.files['clock_layout.json']) {
                layoutConfig = JSON.parse(data.files['clock_layout.json'].content);
            }
        } catch(e) { console.warn(e); }
        if (!layoutConfig) {
            layoutConfig = {
                single: {
                    clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                    date: { left:"50%", top:"75%", fontSize:"16px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                    city: { left:"50%", top:"85%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:true },
                    weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                },
                dual: {
                    left: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    },
                    right: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    }
                },
                triple: {
                    left: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    },
                    right: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    }
                },
                colors: { dayBg: "#e8f0f5", dayText: "#1a2a3a", nightBg: "#0a0e1a", nightText: "#eef2f5", accentColor: "#ffaa44" }
            };
        }
    }

    function getFlightChain() {
        let now = new Date();
        let all = [];
        for (let date in flightsDB) {
            for (let f of flightsDB[date]) {
                let dep = new Date(f.departureTime);
                if (dep > now && dep < new Date(now.getTime() + 72 * 3600000)) {
                    all.push({ ...f, depTime: dep });
                }
            }
        }
        all.sort((a,b) => a.depTime - b.depTime);
        return { current: all[0] || null, next: all[1] || null };
    }

    function getFlightState(flight) {
        if (!flight) return "no-flight";
        let now = new Date();
        let dep = new Date(flight.departureTime);
        let arr = flight.arrivalTime ? new Date(flight.arrivalTime) : null;
        if (now < dep) return "scheduled";
        if (now > dep && (!arr || now < arr)) return "flying";
        return "arrived";
    }

    // 应用主题颜色
    function applyColorTheme() {
        if (!layoutConfig.colors) return;
        let hour = new Date().toLocaleTimeString('en-US', { timeZone: DUBAI_TZ, hour:'2-digit', hour12:false });
        let isDay = (Number(hour) >= 6 && Number(hour) < 18);
        let bg = isDay ? layoutConfig.colors.dayBg : layoutConfig.colors.nightBg;
        let text = isDay ? layoutConfig.colors.dayText : layoutConfig.colors.nightText;
        document.body.style.backgroundColor = bg;
        document.body.style.color = text;
        document.querySelectorAll('.clock-text').forEach(el => {
            el.style.background = `linear-gradient(135deg, ${layoutConfig.colors.accentColor}, ${text})`;
            el.style.webkitBackgroundClip = 'text';
            el.style.backgroundClip = 'text';
            el.style.color = 'transparent';
        });
    }

    function applyElementStyle(containerId, type, className, side = null) {
        let selector = side ? `#${containerId} #${side} .draggable[data-type="${type}"]` : `#${containerId} .draggable[data-type="${type}"]`;
        let el = document.querySelector(selector);
        if (!el) return;
        let cfg;
        if (currentMode === 'single') cfg = layoutConfig.single[type];
        else if (currentMode === 'dual') cfg = layoutConfig.dual[side][type];
        else cfg = layoutConfig.triple[side][type];
        if (!cfg || cfg.hidden) { el.style.display = 'none'; return; }
        el.style.display = 'block';
        if (cfg.left) el.style.left = cfg.left;
        if (cfg.top) el.style.top = cfg.top;
        let textEl = el.querySelector(`.${className}`);
        if (textEl && cfg.fontSize) textEl.style.fontSize = cfg.fontSize;
        if (textEl && cfg.letterSpacing) textEl.style.letterSpacing = cfg.letterSpacing;
        if (textEl && cfg.lineHeight) textEl.style.lineHeight = cfg.lineHeight;
    }

    // ==================== 主时钟渲染 ====================
    async function renderMainClock() {
        await loadData();
        let { current } = getFlightChain();
        let state = getFlightState(current);
        let newMode = "single";
        if (state === "no-flight") newMode = "single";
        else if (state === "scheduled") newMode = "dual";
        else newMode = "triple";

        currentMode = newMode;
        currentFlight = current;

        const appDiv = document.getElementById('app');
        appDiv.innerHTML = '';
        const container = document.createElement('div');
        container.className = 'clock-container';
        container.id = 'mainClockContainer';

        if (currentMode === 'single') {
            container.innerHTML = `
                <div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div>
                <div class="draggable" data-type="date"><div class="date-text"></div></div>
                <div class="draggable" data-type="city"><div class="city-text">Dubai, United Arab Emirates</div></div>
                <div class="draggable" data-type="weather"><div class="weather-text">☀️ --°C</div></div>
            `;
        } else if (currentMode === 'dual') {
            let destInfo = current ? getAirport(current.destination) : getAirport("DXB");
            container.innerHTML = `
                <div class="flight-bar" id="mainFlightBar"></div>
                <div class="dual-layout">
                    <div class="dual-panel" id="mainDualLeft">
                        <div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div>
                        <div class="draggable" data-type="date"><div class="date-text"></div></div>
                        <div class="draggable" data-type="city"><div class="city-text">Dubai, UAE</div></div>
                        <div class="draggable" data-type="weather"><div class="weather-text">☀️ --°C</div></div>
                    </div>
                    <div class="dual-panel" id="mainDualRight">
                        <div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div>
                        <div class="draggable" data-type="date"><div class="date-text"></div></div>
                        <div class="draggable" data-type="city"><div class="city-text">${destInfo.city}, ${destInfo.country}</div></div>
                        <div class="draggable" data-type="weather"><div class="weather-text">🌤️ --°C</div></div>
                    </div>
                </div>
            `;
        } else {
            let destInfo = current ? getAirport(current.destination) : getAirport("DXB");
            container.innerHTML = `
                <div class="triple-layout">
                    <div class="triple-top" id="mainTripleTop"></div>
                    <div class="triple-bottom">
                        <div class="dual-panel" id="mainTripleLeft">
                            <div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div>
                            <div class="draggable" data-type="date"><div class="date-text"></div></div>
                            <div class="draggable" data-type="city"><div class="city-text">Dubai, UAE</div></div>
                            <div class="draggable" data-type="weather"><div class="weather-text">☀️ --°C</div></div>
                        </div>
                        <div class="dual-panel" id="mainTripleRight">
                            <div class="draggable" data-type="clock"><div class="clock-text">--:--</div></div>
                            <div class="draggable" data-type="date"><div class="date-text"></div></div>
                            <div class="draggable" data-type="city"><div class="city-text">${destInfo.city}, ${destInfo.country}</div></div>
                            <div class="draggable" data-type="weather"><div class="weather-text">🌤️ --°C</div></div>
                        </div>
                    </div>
                </div>
            `;
        }
        appDiv.appendChild(container);

        // 应用样式
        if (currentMode === 'single') {
            applyElementStyle('mainClockContainer', 'clock', 'clock-text');
            applyElementStyle('mainClockContainer', 'date', 'date-text');
            applyElementStyle('mainClockContainer', 'city', 'city-text');
            applyElementStyle('mainClockContainer', 'weather', 'weather-text');
        } else if (currentMode === 'dual') {
            applyElementStyle('mainClockContainer', 'clock', 'clock-text', 'mainDualLeft');
            applyElementStyle('mainClockContainer', 'date', 'date-text', 'mainDualLeft');
            applyElementStyle('mainClockContainer', 'city', 'city-text', 'mainDualLeft');
            applyElementStyle('mainClockContainer', 'weather', 'weather-text', 'mainDualLeft');
            applyElementStyle('mainClockContainer', 'clock', 'clock-text', 'mainDualRight');
            applyElementStyle('mainClockContainer', 'date', 'date-text', 'mainDualRight');
            applyElementStyle('mainClockContainer', 'city', 'city-text', 'mainDualRight');
            applyElementStyle('mainClockContainer', 'weather', 'weather-text', 'mainDualRight');
            if (current) {
                let destInfo = getAirport(current.destination);
                let depTime = new Date(current.departureTime);
                let localTime = depTime.toLocaleTimeString('en-GB', { timeZone: destInfo.tz, hour:'2-digit', minute:'2-digit' });
                let dubaiTime = depTime.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit' });
                let bar = document.getElementById('mainFlightBar');
                if (bar) bar.innerHTML = `✈️ ${current.flightNumber} · ${current.origin} → ${current.destination} · 起飞 ${localTime} (当地) / ${dubaiTime} (迪拜)`;
            }
        } else {
            applyElementStyle('mainClockContainer', 'clock', 'clock-text', 'mainTripleLeft');
            applyElementStyle('mainClockContainer', 'date', 'date-text', 'mainTripleLeft');
            applyElementStyle('mainClockContainer', 'city', 'city-text', 'mainTripleLeft');
            applyElementStyle('mainClockContainer', 'weather', 'weather-text', 'mainTripleLeft');
            applyElementStyle('mainClockContainer', 'clock', 'clock-text', 'mainTripleRight');
            applyElementStyle('mainClockContainer', 'date', 'date-text', 'mainTripleRight');
            applyElementStyle('mainClockContainer', 'city', 'city-text', 'mainTripleRight');
            applyElementStyle('mainClockContainer', 'weather', 'weather-text', 'mainTripleRight');
            if (current) {
                let destInfo = getAirport(current.destination);
                let dep = new Date(current.departureTime);
                let arr = current.arrivalTime ? new Date(current.arrivalTime) : new Date(dep.getTime() + 8*3600000);
                let total = arr - dep;
                let updateProgress = () => {
                    let now = Date.now();
                    let elapsed = Math.min(total, Math.max(0, now - dep));
                    let percent = (elapsed / total) * 100;
                    let topBar = document.getElementById('mainTripleTop');
                    if (topBar) topBar.innerHTML = `✈️ ${current.flightNumber} · ${current.origin} → ${current.destination} · 进度 ${Math.round(percent)}% · 剩余 ${Math.round((total-elapsed)/60000)}分钟`;
                };
                updateProgress();
                setInterval(updateProgress, 1000);
            }
        }

        // 实时时钟更新
        let updateTime = () => {
            let n = new Date();
            let dubaiTimeStr = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });

                    if (rightDate) rightDate.innerText = rightDateStr;
                }
            } else {
                // triple 类似，省略避免过长
            }
        };
        updateTime();
        setInterval(updateTime, 1000);

        // 天气
        let dubaiWeather = await fetchWeather(25.2532, 55.3657);
        if (currentMode === 'single') {
            let weatherDiv = document.querySelector('#mainClockContainer .draggable[data-type="weather"] .weather-text');
            if (weatherDiv) weatherDiv.innerHTML = `${dubaiWeather.icon} ${dubaiWeather.temp}°C`;

        function addEditElement(parent, type, cfg) {
            let el = document.createElement('div');
            el.className = 'draggable';

            let content = '';
            if (type === 'clock') content = '<div class="clock-text">12:34</div>';
            else if (type === 'date') content = '<div class="date-text">Monday, 1 January</div>';
            else if (type === 'city') content = '<div class="city-text">Dubai, United Arab Emirates</div>';

            let textDiv = el.querySelector('.clock-text, .date-text, .city-text, .weather-text');
            if (textDiv && cfg.fontSize) textDiv.style.fontSize = cfg.fontSize;
            if (textDiv && cfg.letterSpacing) textDiv.style.letterSpacing = cfg.letterSpacing;
            if (textDiv && cfg.lineHeight) textDiv.style.lineHeight = cfg.lineHeight;

        function bindEditEvents() {
            let draggables = document.querySelectorAll('.draggable');
            draggables.forEach(el => {
                el.addEventListener('touchstart', onEditTouchStart, { passive: false });
                el.addEventListener('touchmove', onEditTouchMove, { passive: false });
                el.addEventListener('touchend', onEditTouchEnd);
            });
        }
        let editDragData = null, editPinchData = null;
        function onEditTouchStart(e) {
            e.stopPropagation();
            let touches = e.touches;
            if (touches.length === 1) {
                editSelectedElement = e.currentTarget;
                // update sliders
                let left = parseFloat(editSelectedElement.style.left);
                let top = parseFloat(editSelectedElement.style.top);
                editXSlider.value = isNaN(left) ? 50 : left;
                editYSlider.value = isNaN(top) ? 50 : top;
                let textEl = editSelectedElement.querySelector('.clock-text, .date-text, .city-text, .weather-text');
                if (textEl) {
                    let fontSize = parseInt(window.getComputedStyle(textEl).fontSize);
                    let letterSpacing = parseFloat(window.getComputedStyle(textEl).letterSpacing);
                    let lineHeight = parseFloat(window.getComputedStyle(textEl).lineHeight);
                    editFontSlider.value = isNaN(fontSize) ? 48 : fontSize;
                    editLetterSpacingSlider.value = isNaN(letterSpacing) ? 4 : letterSpacing;
                    editLineHeightSlider.value = isNaN(lineHeight) ? 1.2 : lineHeight;
                }
                let rect = editSelectedElement.getBoundingClientRect();
                let canvasRect = editCanvas.getBoundingClientRect();
                editDragData = {
                    startX: touches[0].clientX, startY: touches[0].clientY,
                    leftPct: parseFloat(editSelectedElement.style.left),
                    topPct: parseFloat(editSelectedElement.style.top),
                    canvasW: canvasRect.width, canvasH: canvasRect.height
                };
            } else if (touches.length === 2) {
                let dx = touches[0].clientX - touches[1].clientX;
                let dy = touches[0].clientY - touches[1].clientY;
                let dist = Math.hypot(dx, dy);
                let target = e.currentTarget;
                let txt = target.querySelector('.clock-text, .date-text, .city-text, .weather-text');
                let curFont = txt ? parseInt(window.getComputedStyle(txt).fontSize) : 36;
                editPinchData = { startDist: dist, startFont: curFont, target: target };
            }
        }
        function onEditTouchMove(e) {
            e.preventDefault();
            let touches = e.touches;
            if (editDragData && touches.length === 1) {
                let dx = touches[0].clientX - editDragData.startX;
                let dy = touches[0].clientY - editDragData.startY;
                let newLeft = editDragData.leftPct + (dx / editDragData.canvasW) * 100;
                let newTop = editDragData.topPct + (dy / editDragData.canvasH) * 100;
                newLeft = Math.min(95, Math.max(5, newLeft));
                newTop = Math.min(95, Math.max(5, newTop));
                editSelectedElement.style.left = newLeft + '%';
                editSelectedElement.style.top = newTop + '%';
                editXSlider.value = newLeft;
                editYSlider.value = newTop;
            } else if (editPinchData && touches.length === 2) {
                let dx = touches[0].clientX - touches[1].clientX;
                let dy = touches[0].clientY - touches[1].clientY;
                let newDist = Math.hypot(dx, dy);
                let scale = newDist / editPinchData.startDist;
                let newFont = editPinchData.startFont * scale;
                newFont = Math.min(500, Math.max(12, newFont));
                let txt = editPinchData.target.querySelector('.clock-text, .date-text, .city-text, .weather-text');
                if (txt) {
                    txt.style.fontSize = newFont + 'px';
                    editFontSlider.value = newFont;
                }
            }
        }
        function onEditTouchEnd(e) {
            editDragData = null;
            editPinchData = null;
        }

    async function showFlightManager() {
        if (flightModeActive) return;
        flightModeActive = true;
        await loadData(); // 确保最新航班数据
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';

        modal.innerHTML = `
            <div class="modal-header"><h2>✈️ 航班管理</h2><button class="close-modal" id="closeFlightBtn">关闭</button></div>
            <div class="calendar-card">
                <div class="month-nav"><button id="flightPrevMonth">◀</button><span class="current-month" id="flightMonthDisplay"></span><button id="flightNextMonth">▶</button></div>
                <div class="weekdays"><div class="weekday">SUN</div><div class="weekday">MON</div><div class="weekday">TUE</div><div class="weekday">WED</div><div class="weekday">THU</div><div class="weekday">FRI</div><div class="weekday">SAT</div></div>
                <div class="calendar-grid" id="flightCalendarGrid"></div>
            </div>
            <div class="calendar-card"><div class="section-title">📋 当天航班</div><div id="flightDayList"></div></div>
            <button id="syncFlightsBtn" class="btn-primary" style="margin-top:12px;">🔄 手动同步到云端</button>
        `;
        document.body.appendChild(modal);

        let flightYear = new Date().getFullYear();
        let flightMonth = new Date().getMonth();
        let selectedFlightDate = null;

        function renderFlightCalendar() {
            let firstDay = new Date(flightYear, flightMonth, 1);
            let lastDay = new Date(flightYear, flightMonth+1, 0);
            let startWeek = firstDay.getDay();
            let daysInMonth = lastDay.getDate();
            let prevLast = new Date(flightYear, flightMonth, 0).getDate();
            let grid = document.getElementById('flightCalendarGrid');
            grid.innerHTML = '';
            let monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
            document.getElementById('flightMonthDisplay').innerText = `${monthNames[flightMonth]} ${flightYear}`;
            let today = new Date();
            let todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            for (let i = startWeek-1; i >= 0; i--) {
                let day = prevLast - i;
                let date = new Date(flightYear, flightMonth-1, day);
                let dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                let has = flightsDB[dateStr] && flightsDB[dateStr].length > 0;
                let cell = createFlightDayCell(day, true, has, dateStr === todayStr, dateStr);
                grid.appendChild(cell);
            }
            for (let d=1; d<=daysInMonth; d++) {
                let dateStr = `${flightYear}-${String(flightMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                let has = flightsDB[dateStr] && flightsDB[dateStr].length > 0;
                let isToday = dateStr === todayStr;
                let cell = createFlightDayCell(d, false, has, isToday, dateStr);
                grid.appendChild(cell);
            }
            let total = Math.ceil((startWeek+daysInMonth)/7)*7;
            let remaining = total - (startWeek+daysInMonth);
            for (let i=1; i<=remaining; i++) {
                let date = new Date(flightYear, flightMonth+1, i);
                let dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                let has = flightsDB[dateStr] && flightsDB[dateStr].length > 0;
                let cell = createFlightDayCell(i, true, has, false, dateStr);
                grid.appendChild(cell);
            }
        }

        function createFlightDayCell(day, isOther, hasFlight, isToday, dateStr) {
            let cell = document.createElement('div');
            cell.className = 'cal-day';
            if (isOther) cell.classList.add('other-month');
            if (isToday) cell.classList.add('today');
            if (hasFlight) cell.classList.add('has-flight');
            if (selectedFlightDate === dateStr) cell.classList.add('selected');
            let num = document.createElement('div'); num.innerText = day; cell.appendChild(num);
            if (hasFlight) {
                let dot = document.createElement('div'); dot.className = 'flight-dot'; cell.appendChild(dot);
            }
            cell.onclick = () => {
                selectedFlightDate = dateStr;
                renderFlightCalendar();
                renderFlightDayList();
                showAddFlightModal(dateStr);
            };
            return cell;
        }

        function renderFlightDayList() {
            let container = document.getElementById('flightDayList');
            if (!selectedFlightDate) {
                container.innerHTML = '<div class="empty-tip">点击日期查看/添加航班</div>';
                return;
            }
            let flights = flightsDB[selectedFlightDate] || [];
            if (flights.length === 0) {
                container.innerHTML = '<div class="empty-tip">当天无航班，点击日期添加</div>';
                return;
            }
            container.innerHTML = flights.map(f => {
                let dep = new Date(f.departureTime);
                let localTime = dep.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
                let dubaiTime = dep.toLocaleTimeString('zh-CN', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit' });
                return `<div class="flight-item"><div class="flight-num">✈️ ${f.flightNumber}  ${f.origin} → ${f.destination}</div><div class="flight-time">🛫 起飞 ${localTime} (当地) / 🕐 ${dubaiTime} (迪拜)</div><button class="delete-btn" onclick="window.deleteFlightInline('${selectedFlightDate}', ${f.id})">删除</button></div>`;
            }).join('');
        }

        window.deleteFlightInline = async (date, id) => {
            if (flightsDB[date]) {
                flightsDB[date] = flightsDB[date].filter(f => f.id != id);
                if (flightsDB[date].length === 0) delete flightsDB[date];
                await syncFlightsToCloud();
                renderFlightCalendar();
                renderFlightDayList();
                showToast("🗑️ 已删除");
            }
        };

        async function syncFlightsToCloud() {
            try {
                let content = JSON.stringify({ flightsDB: flightsDB, lastUpdated: new Date().toISOString() }, null, 2);
                await fetch(GIST_API, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ files: { 'flight_data.json': { content: content } } })
                });
                showToast("☁️ 航班已同步");
            } catch(e) { showToast("同步失败"); }
        }

        function showAddFlightModal(dateStr) {
            let addModal = document.createElement('div'); addModal.className = 'modal-overlay';
            let searchDate = dateStr;
            addModal.innerHTML = `
                <div class="modal-header"><h2>✈️ 添加航班 · ${dateStr}</h2><button class="close-modal" id="closeAddBtn">取消</button></div>
                <input type="text" id="addFlightNum" placeholder="航班号 (如 303 或 EK303)" style="width:100%; padding:12px; margin:12px 0; border-radius:40px; background:#1a1f2e; color:white; border:1px solid #2a3344;">
                <div style="display:flex; gap:10px; margin:12px 0;"><input type="text" id="addOrigin" placeholder="起飞机场 (DXB)" style="flex:1; padding:12px; border-radius:40px; background:#1a1f2e; color:white;"><input type="text" id="addDest" placeholder="目的地 (PVG)" style="flex:1; padding:12px; border-radius:40px; background:#1a1f2e; color:white;"></div>
                <button id="autoSearchFlightBtn" class="btn-primary">🔍 自动搜索</button>
                <button id="manualAddTimeBtn" class="btn-secondary">✏️ 手动输入时间</button>
                <div id="manualTimeSection" style="display:none; margin-top:12px;"><input type="text" id="manualTimeInput" placeholder="起飞时间 (4位数 如 1430)" style="width:100%; padding:12px; border-radius:40px;"><button id="confirmManualAddBtn" class="btn-primary">✅ 确认添加</button></div>
                <div id="searchResultArea" style="margin-top:12px; font-size:0.8rem;"></div>
            `;
            document.body.appendChild(addModal);

            async function searchFlight(flightNumber, dateStr) {
                let fn = flightNumber.trim().toUpperCase();
                if (!/^[A-Z]{2,3}\d{2,4}$/.test(fn)) {
                    if (/^\d+$/.test(fn)) {
                        if (fn.length === 4) fn = `EK${fn}`;
                        else if (fn.length === 3) fn = `EK0${fn}`;
                        else fn = `EK${fn}`;
                    }
                }
                try {
                    let url = `https://api.aviationstack.com/v1/flights?access_key=${AVIATION_KEY}&flight_iata=${fn}&limit=5`;
                    let resp = await fetch(url);
                    let data = await resp.json();
                    if (data.data && data.data.length) {
                        for (let f of data.data) {
                            let depDate = f.departure?.scheduled?.split('T')[0];
                            if (depDate === dateStr) {
                                return { found: true, flightNumber: f.flight.iata, origin: f.departure?.iata, destination: f.arrival?.iata, departureTime: new Date(f.departure.scheduled) };
                            }
                        }
                    }
                } catch(e) {}
                return { found: false };
            }

            document.getElementById('autoSearchFlightBtn').onclick = async () => {
                let flightNum = document.getElementById('addFlightNum').value.trim();
                let origin = document.getElementById('addOrigin').value.trim().toUpperCase();
                let dest = document.getElementById('addDest').value.trim().toUpperCase();
                if (!flightNum || !origin || !dest) { document.getElementById('searchResultArea').innerHTML = "请填写完整信息"; return; }
                document.getElementById('searchResultArea').innerHTML = "🔍 搜索中...";
                let res = await searchFlight(flightNum, searchDate);
                if (res.found && res.departureTime) {
                    document.getElementById('addOrigin').value = res.origin;
                    document.getElementById('addDest').value = res.destination;
                    let localTime = res.departureTime.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
                    let dubaiTime = res.departureTime.toLocaleTimeString('zh-CN', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit' });
                    document.getElementById('searchResultArea').innerHTML = `✅ 找到 ${res.flightNumber}<br>✈️ 起飞 ${localTime} (当地) / 🕐 ${dubaiTime} (迪拜)<br><button id="quickConfirmBtn" class="btn-primary">确认添加</button>`;
                    document.getElementById('quickConfirmBtn').onclick = async () => {
                        if (!flightsDB[searchDate]) flightsDB[searchDate] = [];
                        flightsDB[searchDate].push({ id: Date.now() + Math.random(), flightNumber: res.flightNumber, origin: res.origin, destination: res.destination, departureTime: res.departureTime.toISOString() });
                        await syncFlightsToCloud();
                        addModal.remove();
                        renderFlightCalendar();
                        renderFlightDayList();
                        showToast(`✅ 已添加 ${res.flightNumber}`);
                    };
                } else {
                    document.getElementById('searchResultArea').innerHTML = "❌ 未找到航班，请使用手动输入";
                }
            };
            document.getElementById('manualAddTimeBtn').onclick = () => { document.getElementById('manualTimeSection').style.display = 'block'; };
            document.getElementById('confirmManualAddBtn').onclick = async () => {
                let flightNum = document.getElementById('addFlightNum').value.trim();
                let origin = document.getElementById('addOrigin').value.trim().toUpperCase();
                let dest = document.getElementById('addDest').value.trim().toUpperCase();
                let timeStr = document.getElementById('manualTimeInput').value.trim();
                if (!flightNum || !origin || !dest || !timeStr) { document.getElementById('searchResultArea').innerHTML = "请填写完整信息"; return; }
                let hour, minute;
                if (/^\d{3,4}$/.test(timeStr)) {
                    if (timeStr.length === 3) { hour = parseInt(timeStr[0]); minute = parseInt(timeStr.slice(1)); }
                    else { hour = parseInt(timeStr.slice(0,2)); minute = parseInt(timeStr.slice(2,4)); }
                    if (hour>=0 && hour<=23 && minute>=0 && minute<=59) {
                        let depDateTime = new Date(`${searchDate}T${hour.toString().padStart(2,'0')}:${minute.toString().padStart(2,'0')}:00`);
                        let finalFlightNum = flightNum;
                        if (!/^[A-Z]{2,3}\d{2,4}$/.test(finalFlightNum)) {
                            if (/^\d+$/.test(finalFlightNum)) {
                                if (finalFlightNum.length === 4) finalFlightNum = `EK${finalFlightNum}`;
                                else if (finalFlightNum.length === 3) finalFlightNum = `EK0${finalFlightNum}`;
                                else finalFlightNum = `EK${finalFlightNum}`;
                            }
                        }
                        if (!flightsDB[searchDate]) flightsDB[searchDate] = [];
                        flightsDB[searchDate].push({ id: Date.now() + Math.random(), flightNumber: finalFlightNum, origin: origin, destination: dest, departureTime: depDateTime.toISOString() });
                        await syncFlightsToCloud();
                        addModal.remove();
                        renderFlightCalendar();
                        renderFlightDayList();
                        showToast(`✅ 已添加 ${finalFlightNum}`);
                    } else { document.getElementById('searchResultArea').innerHTML = "时间格式错误"; }
                } else { document.getElementById('searchResultArea').innerHTML = "时间格式错误"; }
            };
            document.getElementById('closeAddBtn').onclick = () => addModal.remove();
        }

        document.getElementById('flightPrevMonth').onclick = () => { flightMonth--; if (flightMonth<0) { flightMonth=11; flightYear--; } renderFlightCalendar(); };
        document.getElementById('flightNextMonth').onclick = () => { flightMonth++; if (flightMonth>11) { flightMonth=0; flightYear++; } renderFlightCalendar(); };
        document.getElementById('syncFlightsBtn').onclick = syncFlightsToCloud;
        document.getElementById('closeFlightBtn').onclick = () => { modal.remove(); flightModeActive = false; };
        renderFlightCalendar();
    }

    // ==================== 隐藏按钮机制 ====================
    function initHiddenTriggers() {
        // 右上角触发编辑模式 (双击右上角区域)
        const topTrigger = document.createElement('div');
        topTrigger.className = 'hidden-trigger top-right-trigger';
        topTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            showEditMode();
        });
        document.body.appendChild(topTrigger);
        // 右下角触发航班管理
        const bottomTrigger = document.createElement('div');
        bottomTrigger.className = 'hidden-trigger bottom-right-trigger';
        bottomTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            showFlightManager();
        });
        document.body.appendChild(bottomTrigger);
    }

    // ==================== 启动 ====================
    window.addEventListener('load', async () => {
        await renderMainClock();
        initHiddenTriggers();
        // 每5分钟自动刷新
        setInterval(() => renderMainClock(), 300000);
    });
</script>
</body>
</html>
