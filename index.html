<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot HUD Pro</title>
    <style id="theme-engine">
        /* 默认第1种风格 (GitHub Dark) */
        :root { --bg: #050505; --text: #e0e0e0; --accent: #58a6ff; --danger: #f85149; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        #top-hud { height: 25vh; border-bottom: 2px solid #222; display: none; grid-template-columns: 1.2fr 1fr 1.2fr; padding: 20px; gap: 15px; }
        #main-hud { height: 75vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #main-hud.full { height: 100vh; }
        .clock-heavy { font-size: 28vw; font-weight: 800; line-height: 0.8; letter-spacing: -12px; }
        .date-flat { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 2.2vw; letter-spacing: 10px; color: #666; text-transform: uppercase; }
        .wx-corner { position: absolute; top: 20px; right: 40px; text-align: right; }
        .w-icon { font-size: 6vw; }
        .w-temp { font-size: 3.5vw; color: var(--accent); }
        .prog-bar { grid-column: span 3; height: 10px; background: #1a1a1a; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #bar-active { height: 100%; width: 0%; background: var(--accent); transition: width 1s linear; }
        .split-view { display: none; width: 100%; height: 100%; grid-template-columns: 1fr 1fr; }
        .pane { display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #222; }
    </style>
</head>
<body>

<div id="top-hud">
    <div>
        <div id="top-fno" style="font-size: 1.8vw; color: var(--accent); font-weight:bold;">EK---</div>
        <div id="top-route" style="font-size: 3.8vw; font-weight:900;">-- ➔ --</div>
        <div id="top-city" style="font-size: 1.2vw; color:#888;">WAITING...</div>
    </div>
    <div style="text-align: center; border-left: 1px solid #222; border-right: 1px solid #222;">
        <div id="dest-icon" style="font-size: 4vw;">☀️</div>
        <div id="dest-temp" style="font-size: 2.5vw; font-weight:bold;">--°C</div>
        <div id="dest-cloth" style="font-size: 1vw; color:#ffca28;">穿衣建议...</div>
    </div>
    <div style="background:#111; border-left: 5px solid var(--danger); padding: 10px;">
        <div style="font-size:0.8vw; color:var(--danger); font-weight:bold;">🔴 NOTAM / RISK</div>
        <div id="notam-content" style="font-size: 0.9vw; line-height:1.2;">No urgent hazards.</div>
    </div>
    <div class="prog-bar"><div id="bar-active"></div></div>
</div>

<div id="main-hud" class="full">
    <div class="wx-corner">
        <div id="main-w-icon" class="w-icon">☀️</div>
        <div id="main-w-temp" class="w-temp">--°C</div>
    </div>
    <div id="view-normal"><div id="clock-dxb" class="clock-heavy">00:00</div></div>
    <div id="view-layover" class="split-view">
        <div class="pane">
            <div style="font-size: 2vw; color:#666;">HOME / DUBAI</div>
            <div id="pane-dxb-time" style="font-size: 14vw; font-weight:800;">00:00</div>
        </div>
        <div class="pane" style="border:none">
            <div id="pane-loc-name" style="font-size: 2vw; color: var(--accent);">LOCAL</div>
            <div id="pane-loc-time" style="font-size: 14vw; font-weight:800;">00:00</div>
        </div>
    </div>
    <div id="footer-date" class="date-flat">APRIL 24 FRIDAY</div>
</div>

<script>
    const API = {
        wKey: '9fcc9afb0a80a6aaa44c926e4f7827a7',
        gist: '6b51ae2b894903de0227eaec5e0ce842'
    };

    async function sync() {
        try {
            const res = await fetch(`https://api.github.com/gists/${API.gist}?t=${Date.now()}`);
            const g = await res.json();
            const d = JSON.parse(g.files["flight_data.json"].content);
            applyLogic(d);
            fetchWeather('Dubai', true);
            if(d.arr) fetchWeather(d.arr, false);
            applyTheme(d.style);
        } catch(e) {}
    }

    async function fetchWeather(city, isHome) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API.weather || API.wKey}`);
            const w = await res.json();
            const temp = Math.round(w.main.temp);
            if(isHome) { document.getElementById('main-w-temp').innerText = temp + "°C"; }
            else { 
                document.getElementById('dest-temp').innerText = temp + "°C";
                document.getElementById('top-city').innerText = `${w.name}, ${w.sys.country}`;
                document.getElementById('dest-cloth').innerText = temp > 20 ? "适合短袖" : "需防风外套";
            }
        } catch(e) {}
    }

    function applyLogic(d) {
        const now = new Date();
        const std = new Date(d.std);
        const hours = (std - now) / 3600000;
        const isAction = (hours < 72 && hours > -12);

        document.getElementById('top-hud').style.display = isAction ? 'grid' : 'none';
        document.getElementById('main-hud').className = isAction ? '' : 'full';
        
        if(isAction) {
            document.getElementById('top-fno').innerText = d.flightNo || "EK---";
            document.getElementById('top-route').innerText = `${d.dep} ➔ ${d.arr}`;
            if(d.notam) document.getElementById('notam-content').innerText = d.notam;
        }

        if(d.isLayover) {
            document.getElementById('view-normal').style.display = 'none';
            document.getElementById('view-layover').style.display = 'flex';
            document.getElementById('pane-loc-name').innerText = d.arr + " LOCAL";
        } else {
            document.getElementById('view-normal').style.display = 'block';
            document.getElementById('view-layover').style.display = 'none';
        }
    }

    function applyTheme(s) {
        const engine = document.getElementById('theme-engine');
        // 根据s的值(style-1到style-20)动态改变CSS...此处可按需添加20种CSS
        if(s === 'style-2') {
