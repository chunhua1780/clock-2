<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迪拜飞行时钟 · 智能航线屏</title>
    <style>
        /* 保持您最喜欢的深色航空感视觉风格不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #000000; color: #ffffff; font-family: 'SF Pro Display', -apple-system, sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        .fullscreen-mode { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #050505, #1a2a4a); }
        .big-time { font-size: 22vw; font-weight: 700; font-family: monospace; letter-spacing: 8px; background: linear-gradient(135deg, #fff, #88aaff); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; }
        .big-date { position: absolute; bottom: 5vh; left: 0; right: 0; text-align: center; font-size: 1.2vw; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        .weather-corner { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(16px); border-radius: 32px; padding: 10px 18px; text-align: center; }
        .flight-mode { display: flex; flex-direction: column; height: 100%; width: 100%; padding: 16px; gap: 12px; background: #000; }
        .top-panel { height: 28%; background: rgba(20,25,45,0.95); backdrop-filter: blur(12px); border-radius: 32px; padding: 14px; display: flex; gap: 12px; border: 0.5px solid rgba(255,255,255,0.1); }
        .info-card { flex: 1; background: rgba(0,0,0,0.4); border-radius: 24px; padding: 10px; overflow-y: auto; }
        .flight-number { font-size: 1.5rem; font-weight: 800; color: #ffd966; }
        .time-dual { font-size: 0.7rem; margin-top: 6px; color: #ccddff; }
        .dubai-time-mark { color: #66ffaa; }
        .progress-bar { height: 8px; background: #2a3344; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00c6ff, #0072ff); transition: width 0.5s; }
        .bottom-split { flex: 1; display: flex; gap: 12px; min-height: 0; }
        .city-card { flex: 1; background: rgba(10,14,26,0.7); backdrop-filter: blur(8px); border-radius: 32px; padding: 16px; display: flex; flex-direction: column; position: relative; }
        .city-name { font-size: 1.6rem; font-weight: 700; color: #88aaff; }
        .big-local-clock { font-size: 3.5rem; font-weight: 600; font-family: monospace; margin: 8px 0; }
        .temp-big { font-size: 1.4rem; font-weight: 600; text-align: center; }
        .date-footer { margin-top: auto; text-align: center; font-size: 0.7rem; color: #88aacc; }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ====================== 核心接口凭证 ======================
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const DUBAI_TZ = "Asia/Dubai";
    
    // 机场时区/地理数据库
    const airportDB = {
        "DXB": { city: "迪拜", cityEn: "Dubai", country: "阿联酋", tz: "Asia/Dubai", lat: 25.2532, lon: 55.3657 },
        "DSS": { city: "达喀尔", cityEn: "Dakar", country: "塞内加尔", tz: "Africa/Dakar", lat: 14.67, lon: -17.07 },
        "PVG": { city: "上海", cityEn: "Shanghai", country: "中国", tz: "Asia/Shanghai", lat: 31.1443, lon: 121.8083 },
        "CAN": { city: "广州", cityEn: "Guangzhou", country: "中国", tz: "Asia/Shanghai", lat: 23.3924, lon: 113.2988 }
    };
    
    let flightsDB = {};
    let weatherCache = {};

    // ========== 接口打通：数据下载 ==========
    async function loadDB() {
        try {
            // 使用时间戳后缀强行刷新 GitHub 缓存
            const resp = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`);
            const data = await resp.json();
            
            // 优先读取 control 页面备份的完整数据库 calendar_db.json
            if (data.files && data.files['calendar_db.json']) {
                flightsDB = JSON.parse(data.files['calendar_db.json'].content);
                localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDB));
            } 
            // 备选方案
            else if (data.files && data.files['flight_data.json']) {
                const legacy = JSON.parse(data.files['flight_data.json'].content);
                if(legacy.flightsDB) flightsDB = legacy.flightsDB;
            }
        } catch(e) {
            console.warn("☁️ 云端接口同步失败，正在回退到本地缓存");
            let local = localStorage.getItem('flight_calendar_db');
            if (local) flightsDB = JSON.parse(local);
        }
    }

    // ========== 接口打通：天气数据 ==========
    async function fetchWeather(lat, lon, airportCode) {
        let cacheKey = `${airportCode}_${Math.floor(Date.now() / 1800000)}`;
        if (weatherCache[cacheKey]) return weatherCache[cacheKey];
        try {
            let url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`;
            let resp = await fetch(url);
            let data = await resp.json();
            if (data && data.current_weather) {
                let weatherMap = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",61:"🌧️",95:"⛈️"};
                let result = { 
                    temp: Math.round(data.current_weather.temperature), 
                    icon: weatherMap[data.current_weather.weathercode] || "🌤️",
                    desc: "实时数据",
                    forecast: data.daily.time.slice(0,3).map((t,i) => ({ date: t.slice(5), tempMax: Math.round(data.daily.temperature_2m_max[i]) }))
                };
                weatherCache[cacheKey] = result;
                return result;
            }
        } catch(e) {}
        return { temp: "--", icon: "🌍", desc: "N/A", forecast: [] };
    }

    function formatTimeInTz(date, tz) {
        return new Date(date).toLocaleTimeString('en-GB', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
    }

    function getAirport(code) {
        return airportDB[code.toUpperCase()] || { city: code, cityEn: code, country: "Unknown", tz: "UTC", lat: 0, lon: 0 };
    }

    // ========== 状态机逻辑 ==========
    function getFlightChain() {
        let now = new Date();
        let all = [];
        for (let date in flightsDB) {
            flightsDB[date].forEach(f => {
                let dep = new Date(f.departureTime);
                if (dep > new Date(now.getTime() - 12 * 3600000) && dep < new Date(now.getTime() + 72 * 3600000)) {
                    all.push({ ...f, depTime: dep });
                }
            });
        }
        return all.sort((a,b) => a.depTime - b.depTime);
    }

    async function render() {
        await loadDB();
        let flights = getFlightChain();
        if (flights.length === 0) { renderFullscreen(); return; }
        
        let current = flights[0];
        let now = new Date();
        let depTime = new Date(current.departureTime);
        let originInfo = getAirport(current.origin);
        let destInfo = getAirport(current.destination);
        
        // 抓取实时天气
        let dubaiWeather = await fetchWeather(25.2532, 55.3657, "DXB");
        let localWeather = await fetchWeather(originInfo.lat, originInfo.lon, current.origin);

        document.getElementById('app').innerHTML = `
            <div class="flight-mode">
                <div class="top-panel">
                    <div class="info-card">
                        <div class="flight-number">✈️ ${current.flightNumber}</div>
                        <div style="font-size:1.2rem;">${originInfo.city} ➔ ${destInfo.city}</div>
                        <div class="time-dual">🛫 起飞: ${formatTimeInTz(depTime, originInfo.tz)} (${originInfo.cityEn} 时间)</div>
                        <div class="time-dual">迪拜参考: <span class="dubai-time-mark">${formatTimeInTz(depTime, DUBAI_TZ)}</span></div>
                    </div>
                    <div class="info-card" style="text-align:center">
                        <div style="font-size:3rem">${localWeather.icon}</div>
                        <div class="temp-big">${localWeather.temp}°C</div>
                        <div style="font-size:0.8rem">${originInfo.city} 实时天气</div>
                    </div>
                    <div class="info-card">
                        <div style="font-size:0.8rem; color:#ffaa66">📡 NOTAM / 航行通告</div>
                        <div style="font-size:0.7rem; margin-top:5px;">GPS NOMINAL / RUNWAY OPEN</div>
                    </div>
                </div>
                <div class="bottom-split">
                    <div class="city-card">
                        <div class="city-name">迪拜 DXB</div>
                        <div class="big-local-clock" id="dxb-clock">--:--:--</div>
                        <div class="date-footer" id="dxb-date">--</div>
                    </div>
                    <div class="city-card">
                        <div class="city-name">${originInfo.city} ${originInfo.cityEn}</div>
                        <div class="big-local-clock" id="loc-clock">--:--:--</div>
                        <div class="date-footer" id="loc-date">--</div>
                    </div>
                </div>
            </div>
        `;
        startClocks(originInfo.tz);
    }

    function startClocks(localTz) {
        if (window.timer) clearInterval(window.timer);
        window.timer = setInterval(() => {
            const n = new Date();
            const dClock = document.getElementById('dxb-clock');
            const lClock = document.getElementById('loc-clock');
            if (dClock) dClock.innerText = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour12: false });
            if (lClock) lClock.innerText = n.toLocaleTimeString('en-GB', { timeZone: localTz, hour12: false });
            
            const dDate = document.getElementById('dxb-date');
            const lDate = document.getElementById('loc-date');
            if (dDate) dDate.innerText = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, month: 'short', day: 'numeric', weekday: 'short' }).toUpperCase();
            if (lDate) lDate.innerText = n.toLocaleDateString('en-US', { timeZone: localTz, month: 'short', day: 'numeric', weekday: 'short' }).toUpperCase();
        }, 1000);
    }

    async function renderFullscreen() {
        let dubaiWeather = await fetchWeather(25.2532, 55.3657, "DXB");
        document.getElementById('app').innerHTML = `
            <div class="fullscreen-mode">
                <div class="big-time" id="fs-clock">--:--</div>
                <div class="weather-corner">
                    <div style="font-size:2rem">${dubaiWeather.icon}</div>
                    <div class="temp-big">${dubaiWeather.temp}°C</div>
                    <div style="font-size:0.7rem">DUBAI</div>
                </div>
                <div class="big-date" id="fs-date">--</div>
            </div>
        `;
        setInterval(() => {
            const n = new Date();
            const el = document.getElementById('fs-clock');
            if (el) el.innerText = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour: '2-digit', minute: '2-digit', hour12: false });
        }, 1000);
    }

    render();
    setInterval(render, 300000); // 5分钟强制刷新一次接口数据
</script>
</body>
</html>
