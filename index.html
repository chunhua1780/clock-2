<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dubai Flight Clock Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #000000;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* 全屏时钟模式 (无航班时) */
        .fullscreen-clock {
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
        }
        .big-time { font-size: 20vw; font-weight: 700; font-variant-numeric: tabular-nums; }
        .big-date { font-size: 2.5vw; color: #88aacc; letter-spacing: 2px; }

        /* 航班模式 */
        .flight-mode {
            display: flex; flex-direction: column; height: 100vh; padding: 16px; gap: 12px;
            background: #000;
        }
        .top-info {
            height: 30%; background: linear-gradient(145deg, #161b33, #0f1425);
            border-radius: 24px; padding: 20px; border: 1px solid #2a2a4a;
        }
        .flight-no { font-size: 2rem; font-weight: 800; color: #ffd966; }
        .pickup-tag { color: #ff9f43; font-weight: bold; margin-top: 5px; font-size: 1.1rem; }

        .panels { flex: 1; display: flex; gap: 12px; }
        .panel {
            flex: 1; background: #0a0e1a; border-radius: 24px; padding: 15px;
            display: flex; flex-direction: column; border: 1px solid #1e253a;
        }
        .city-code { font-size: 1.8rem; font-weight: 700; color: #88aaff; }
        .weather-val { font-size: 2rem; margin: 10px 0; }
        .clock-small { margin-top: auto; text-align: center; border-top: 1px solid #222; padding-top: 10px; }
        .time-small { font-size: 1.6rem; font-family: monospace; font-weight: bold; }
        
        /* 底部状态 */
        .status-bar {
            position: absolute; bottom: 10px; left: 20px; font-size: 0.7rem; color: #445577;
        }
        .auth-btn { 
            background: #2a2a4a; color: #fff; border: none; padding: 4px 12px; 
            border-radius: 10px; cursor: pointer; margin-left: 10px;
        }
        .hidden { display: none !important; }
    </style>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

    <div id="fullClock" class="fullscreen-clock">
        <div class="big-time" id="mainTime">00:00</div>
        <div class="big-date" id="mainDate">LOADING...</div>
        <div style="margin-top: 20px;">
            <button class="auth-btn" id="syncBtn">手动同步日历</button>
        </div>
    </div>

    <div id="flightMode" class="flight-mode hidden">
        <div class="top-info">
            <div style="display:flex; justify-content:space-between;">
                <div class="flight-no" id="fNo">--</div>
                <div id="fStatus" style="color:#66ffaa; font-size:0.8rem;">SCHEDULED</div>
            </div>
            <div id="fRoute" style="font-size:1.2rem; margin-top:5px;">--- ➔ ---</div>
            <div class="pickup-tag" id="pTime">接车: --:--</div>
            <div id="fMeta" style="font-size:0.8rem; color:#88aacc; margin-top:10px;"></div>
        </div>

        <div class="panels">
            <div class="panel">
                <div style="font-size:0.6rem; color:#556688;">DEPARTURE</div>
                <div class="city-code" id="orgCode">DXB</div>
                <div class="weather-val" id="orgW">--°</div>
                <div class="clock-small">
                    <div class="time-small" id="orgT">00:00</div>
                    <div style="font-size:0.6rem; color:#556688;">LOCAL TIME</div>
                </div>
            </div>
            <div class="panel">
                <div style="font-size:0.6rem; color:#556688;">DESTINATION</div>
                <div class="city-code" id="dstCode">---</div>
                <div class="weather-val" id="dstW">--°</div>
                <div class="clock-small">
                    <div class="time-small" id="dstT">00:00</div>
                    <div style="font-size:0.6rem; color:#556688;">LOCAL TIME</div>
                </div>
            </div>
        </div>
        <div style="text-align:center; padding:5px; font-size:1.2rem; font-family:monospace; color:#ffd966;">
            Z: <span id="utcClock">00:00:00</span>
        </div>
    </div>

    <div class="status-bar" id="statusBar">🛰️ 系统就绪 | 等待日历授权</div>

<script>
    const CONFIG = {
        CLIENT_ID: "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com",
        WEATHER_KEY: "9fcc9afb0a80a6aaa44c926e4f7827a7",
        FLIGHT_KEY: "b4bd321bbba1723162801cce3c455d7c",
        HOME_TZ: "Asia/Dubai"
    };

    const airportDB = {
        "DXB": { city: "迪拜", tz: "Asia/Dubai", lat: 25.25, lon: 55.36 },
        "SZX": { city: "深圳", tz: "Asia/Shanghai", lat: 22.63, lon: 113.81 },
        "PVG": { city: "上海", tz: "Asia/Shanghai", lat: 31.14, lon: 121.80 },
        "CAN": { city: "广州", tz: "Asia/Shanghai", lat: 23.39, lon: 113.29 },
        "PEK": { city: "北京", tz: "Asia/Shanghai", lat: 40.07, lon: 116.60 }
    };

    let accessToken = null;
    let tokenClient;
    let currentFlight = null;

    // 1. 初始化授权
    function initAuth() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CONFIG.CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/calendar.readonly',
            callback: (resp) => {
                if (resp.access_token) {
                    accessToken = resp.access_token;
                    document.getElementById('statusBar').innerText = "✅ 日历已连接";
                    syncCalendar();
                }
            },
        });
        document.getElementById('syncBtn').onclick = () => tokenClient.requestAccessToken();
    }

    // 2. 同步日历
    async function syncCalendar() {
        const now = new Date().toISOString();
        const future = new Date(Date.now() + 72 * 3600000).toISOString();
        try {
            const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now}&timeMax=${future}&singleEvents=true&orderBy=startTime`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await res.json();
            const event = data.items?.find(e => parseEvent(e));
            if (event) {
                currentFlight = parseEvent(event);
                renderFlightMode(currentFlight);
                // 异步查补全信息，不阻塞主流程
                enrichFlight(currentFlight.fn);
            } else {
                showFullClock();
            }
        } catch (e) { console.error("Sync Error", e); }
    }

    // 3. 解析算法 (Pilot Logic)
    function parseEvent(ev) {
        const text = (ev.summary + " " + (ev.description || "")).toUpperCase();
        const codes = text.match(/\b([A-Z]{3})\b.*?\b([A-Z]{3})\b/);
        if (!codes) return null;

        const depTime = new Date(ev.start.dateTime || ev.start.date);
        const fnMatch = text.match(/\b([A-Z]{2}\d{3,4}|\d{3,4})\b/);
        
        return {
            fn: fnMatch ? fnMatch[1] : codes[1]+codes[2],
            org: codes[1],
            dst: codes[2],
            dep: depTime,
            pickup: new Date(depTime.getTime() - 135 * 60000)
        };
    }

    // 4. 渲染界面
    function renderFlightMode(f) {
        document.getElementById('fullClock').classList.add('hidden');
        document.getElementById('flightMode').classList.remove('hidden');

        document.getElementById('fNo').innerText = "✈️ " + f.fn;
        document.getElementById('fRoute').innerText = `${f.org} ➔ ${f.dst}`;
        document.getElementById('pTime').innerText = `接车: ${f.pickup.getHours().toString().padStart(2,'0')}:${f.pickup.getMinutes().toString().padStart(2,'0')}`;
        
        document.getElementById('orgCode').innerText = f.org;
        document.getElementById('dstCode').innerText = f.dst;

        updateWeather(f.org, 'orgW');
        updateWeather(f.dst, 'dstW');
    }

    function showFullClock() {
        document.getElementById('fullClock').classList.remove('hidden');
        document.getElementById('flightMode').classList.add('hidden');
    }

    // 5. API 异步补全
    async function enrichFlight(fn) {
        try {
            const res = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${CONFIG.FLIGHT_KEY}&flight_iata=${fn}`);
            const d = await res.json();
            if (d.data && d.data[0]) {
                const info = d.data[0];
                document.getElementById('fMeta').innerText = `终端: ${info.departure.terminal || '--'} | 登机口: ${info.departure.gate || '--'} | 状态: ${info.flight_status}`;
            }
        } catch (e) { console.log("API补全失败，保持基础显示"); }
    }

    async function updateWeather(code, elId) {
        const info = airportDB[code] || airportDB["DXB"];
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${info.lat}&lon=${info.lon}&units=metric&appid=${CONFIG.WEATHER_KEY}`);
            const d = await res.json();
            document.getElementById(elId).innerText = Math.round(d.main.temp) + "°";
        } catch (e) { document.getElementById(elId).innerText = "??°"; }
    }

    // 6. 时钟核心 (Dual Local + UTC)
    function startClocks() {
        setInterval(() => {
            const now = new Date();
            
            // 全屏模式时钟
            document.getElementById('mainTime').innerText = now.toLocaleTimeString('en-GB', { timeZone: CONFIG.HOME_TZ, hour12: false, hour: '2-digit', minute: '2-digit' });
            document.getElementById('mainDate').innerText = now.toLocaleDateString('zh-CN', { timeZone: CONFIG.HOME_TZ, weekday: 'long', month: 'long', day: 'numeric' });

            // 航班模式时钟
            if (currentFlight) {
                const orgTz = airportDB[currentFlight.org]?.tz || "Asia/Dubai";
                const dstTz = airportDB[currentFlight.dst]?.tz || "Asia/Shanghai";
                
                document.getElementById('orgT').innerText = now.toLocaleTimeString('en-GB', { timeZone: orgTz, hour12: false, hour: '2-digit', minute: '2-digit' });
                document.getElementById('dstT').innerText = now.toLocaleTimeString('en-GB', { timeZone: dstTz, hour12: false, hour: '2-digit', minute: '2-digit' });
            }

            // UTC 时钟 (飞行员必备)
            document.getElementById('utcClock').innerText = now.toISOString().slice(11, 19);
        }, 1000);
    }

    window.onload = () => {
        initAuth();
        startClocks();
        // 如果有缓存，可以这里加载 localStorage
    };
</script>
</body>
</html>
