<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迪拜飞行时钟 · 专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 无航班模式 - 全屏时尚时钟 */
        .fullscreen-clock {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            transition: all 0.3s ease;
        }

        .big-time {
            font-size: 22vw;
            font-weight: 600;
            font-family: 'SF Pro Display', -apple-system, monospace;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #ffffff 0%, #d4d4ff 50%, #88aaff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .big-date {
            font-size: 1.8vw;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            margin-top: 24px;
            text-transform: uppercase;
        }

        /* 右上角天气卡片 */
        .weather-card {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 12px 20px;
            border: 0.5px solid rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        .weather-card .weather-icon { font-size: 2rem; margin-bottom: 4px; }
        .weather-card .weather-temp { font-size: 1.4rem; font-weight: 600; }
        .weather-card .weather-desc { font-size: 0.7rem; color: rgba(255, 255, 255, 0.6); }
        .weather-card .dress-tip { font-size: 0.65rem; background: rgba(255, 255, 255, 0.1); padding: 4px 12px; border-radius: 20px; margin-top: 8px; color: #ffd966; }

        /* 左下角状态 */
        .status-card {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 8px 16px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .status-card:hover { background: rgba(255, 255, 255, 0.12); }
        .status-card.connected { color: #66ffaa; }

        /* 有航班模式 */
        .flight-mode {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            padding: 16px;
            gap: 12px;
            background: #000000;
        }

        .status-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 8px 20px;
        }
        .flight-badge { background: rgba(255, 255, 255, 0.1); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-right: 12px; }
        .auth-status { font-size: 0.7rem; color: #66ffaa; }

        .flight-area {
            height: 28%;
            background: linear-gradient(135deg, rgba(20, 25, 45, 0.8) 0%, rgba(15, 18, 35, 0.9) 100%);
            border-radius: 28px;
            padding: 16px 20px;
            backdrop-filter: blur(10px);
        }
        .flight-number-large { font-size: 1.6rem; font-weight: 700; color: #ffd966; }
        .flight-status-badge { background: rgba(0, 170, 85, 0.2); color: #66ffaa; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; }
        .flight-schedule { font-size: 0.8rem; background: rgba(255, 255, 255, 0.05); padding: 12px; border-radius: 20px; margin: 8px 0; line-height: 1.6; }
        .time-conversion { font-size: 0.7rem; color: #88aacc; margin-top: 6px; padding-top: 6px; border-top: 0.5px solid rgba(255,255,255,0.1); }
        .pickup-highlight { color: #ff9f43; }

        .bottom-area { flex: 1; display: flex; gap: 12px; min-height: 0; }
        .city-panel {
            flex: 1; background: rgba(10, 14, 26, 0.7); backdrop-filter: blur(10px);
            border-radius: 28px; padding: 16px; display: flex; flex-direction: column;
        }
        .city-name { font-size: 1.5rem; font-weight: 600; color: #88aaff; }
        .weather-icon { font-size: 1.8rem; text-align: center; margin: 6px 0; }
        .weather-temp { font-size: 1.5rem; font-weight: 600; text-align: center; }
        .weather-desc { text-align: center; color: rgba(255, 255, 255, 0.6); font-size: 0.7rem; }
        .dress-tip { text-align: center; background: rgba(255, 255, 255, 0.08); padding: 4px 8px; border-radius: 20px; font-size: 0.6rem; margin-top: 6px; }
        .city-clock { text-align: center; margin-top: auto; padding-top: 12px; }
        .clock-time { font-size: 1.5rem; font-family: monospace; font-weight: 500; }
        .clock-date { font-size: 0.6rem; color: rgba(255, 255, 255, 0.5); }
        .label-sm { font-size: 0.55rem; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 1px; }
        .notam-list { max-height: 70px; overflow-y: auto; font-size: 0.6rem; }
        .notam-item { padding: 3px 0; color: #ffaa66; }
        .hidden { display: none !important; }
    </style>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
    <!-- 无航班模式 -->
    <div id="fullscreenMode" class="fullscreen-clock">
        <div class="big-time" id="fullscreenTime">--:--</div>
        <div class="big-date" id="fullscreenDate"></div>
        <div class="weather-card">
            <div class="weather-icon" id="fullscreenWeatherIcon">☀️</div>
            <div class="weather-temp" id="fullscreenWeatherTemp">--°C</div>
            <div class="weather-desc" id="fullscreenWeatherDesc">--</div>
            <div class="dress-tip" id="fullscreenDress">👕 --</div>
        </div>
        <div class="status-card" id="fullscreenStatus" onclick="openControlPanel()">⚙️ 设置</div>
    </div>

    <!-- 有航班模式 -->
    <div id="flightMode" class="flight-mode hidden">
        <div class="status-bar">
            <div class="flight-badge" id="flightBadge">✈️ 等待航班</div>
            <div class="auth-status" id="authStatus">✅ 已连接</div>
        </div>
        <div id="flightPanel" class="flight-area">
            <div class="flight-schedule" style="text-align:center; color:#88aacc;">📡 读取日历中...</div>
        </div>
        <div class="bottom-area">
            <div class="city-panel">
                <div class="label-sm">🛫 DEPARTURE</div>
                <div class="city-name" id="originCode">DXB</div>
                <div id="originWeather"><div class="weather-icon">🌍</div><div class="weather-temp">--°C</div><div class="weather-desc">--</div><div class="dress-tip">👕 --</div></div>
                <div id="originNotam" style="font-size:0.6rem; margin-top:8px;"><div class="label-sm">📡 NOTAM</div><div>--</div></div>
                <div class="city-clock"><div class="clock-time" id="originTime">--:--:--</div><div class="clock-date" id="originDate"></div></div>
            </div>
            <div class="city-panel">
                <div class="label-sm">🛬 DESTINATION</div>
                <div class="city-name" id="destCode">---</div>
                <div id="destWeather"><div class="weather-icon">🌍</div><div class="weather-temp">--°C</div><div class="weather-desc">--</div><div class="dress-tip">👕 --</div></div>
                <div id="destNotam" style="font-size:0.6rem; margin-top:8px;"><div class="label-sm">📡 NOTAM</div><div>--</div></div>
                <div class="city-clock"><div class="clock-time" id="destTime">--:--:--</div><div class="clock-date" id="destDate"></div></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================
        const GOOGLE_CLIENT_ID = "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com";
        const WEATHER_KEY = "9fcc9afb0a80a6aaa44c926e4f7827a7";
        const HOME_CITY = { code: "DXB", name: "迪拜", lat: 25.2532, lon: 55.3657, tz: "Asia/Dubai" };
        
        // 加载用户设置
        let userSettings = {
            colorTheme: "gradient",
            showSeconds: false,
            dateFormat: "english"
        };
        try {
            const saved = localStorage.getItem('clock_settings');
            if (saved) userSettings = JSON.parse(saved);
        } catch(e) {}
        
        // 机场数据库
        const airportDatabase = {
            "DXB": { name: "迪拜国际机场", city: "迪拜", country: "阿联酋", lat: 25.2532, lon: 55.3657, tz: "Asia/Dubai" },
            "PVG": { name: "上海浦东机场", city: "上海", country: "中国", lat: 31.1443, lon: 121.8083, tz: "Asia/Shanghai" },
            "PEK": { name: "北京首都机场", city: "北京", country: "中国", lat: 40.0799, lon: 116.6031, tz: "Asia/Shanghai" },
            "CAN": { name: "广州白云机场", city: "广州", country: "中国", lat: 23.3924, lon: 113.2988, tz: "Asia/Shanghai" },
            "SZX": { name: "深圳宝安机场", city: "深圳", country: "中国", lat: 22.6393, lon: 113.8108, tz: "Asia/Shanghai" },
            "LHR": { name: "伦敦希思罗", city: "伦敦", country: "英国", lat: 51.4700, lon: -0.4543, tz: "Europe/London" },
            "JFK": { name: "纽约肯尼迪", city: "纽约", country: "美国", lat: 40.6413, lon: -73.7781, tz: "America/New_York" },
            "CDG": { name: "巴黎戴高乐", city: "巴黎", country: "法国", lat: 49.0097, lon: 2.5479, tz: "Europe/Paris" },
            "FRA": { name: "法兰克福", city: "法兰克福", country: "德国", lat: 50.0379, lon: 8.5622, tz: "Europe/Berlin" },
            "AMS": { name: "阿姆斯特丹", city: "阿姆斯特丹", country: "荷兰", lat: 52.3086, lon: 4.7639, tz: "Europe/Amsterdam" }
        };
        
        function getAirportInfo(code) {
            return airportDatabase[code] || { 
                name: code, city: code, country: "未知", 
                lat: HOME_CITY.lat, lon: HOME_CITY.lon, tz: HOME_CITY.tz 
            };
        }
        
        // ============================================================
        // 航班号智能搜索（支持87879、88798797等格式）
        // ============================================================
        async function searchFlightByNumber(rawNumber) {
            const numStr = rawNumber.toString().trim();
            const candidates = new Set();
            candidates.add(numStr);
            // 去掉第一位数字
            if (numStr.length > 1) candidates.add(numStr.substring(1));
            // 去掉前两位
            if (numStr.length > 2) candidates.add(numStr.substring(2));
            // 去掉第一位如果是8开头（常见阿联酋航空格式）
            if (numStr.startsWith('8')) candidates.add(numStr.substring(1));
            // 如果是5位以上，尝试提取后4位
            if (numStr.length >= 4) candidates.add(numStr.slice(-4));
            
            for (const fn of candidates) {
                if (fn.length >= 3 && fn.length <= 6) {
                    try {
                        const url = `https://api.aviationstack.com/v1/flights?access_key=b4bd321bbba1723162801cce3c455d7c&flight_iata=${fn}&limit=1`;
                        const resp = await fetch(url);
                        const data = await resp.json();
                        if (data.data && data.data.length > 0) {
                            return { flight: data.data[0], usedNumber: fn };
                        }
                    } catch(e) { console.log(e); }
                }
            }
            return null;
        }
        
        // ============================================================
        // 天气获取
        // ============================================================
        async function getWeather(lat, lon) {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${WEATHER_KEY}&lang=zh_cn`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.cod === 200) {
                    let dress = "舒适";
                    const t = data.main.temp;
                    if (t < 5) dress = "羽绒服";
                    else if (t < 15) dress = "风衣";
                    else if (t < 25) dress = "薄外套";
                    else if (t >= 30) dress = "短袖+防晒";
                    const icons = { "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Snow": "❄️" };
                    return {
                        temp: Math.round(t),
                        desc: data.weather[0].description,
                        icon: icons[data.weather[0].main] || "🌍",
                        dress: dress
                    };
                }
            } catch(e) {}
            return { temp: 22, desc: "晴", icon: "☀️", dress: "舒适" };
        }
        
        // ============================================================
        // 全屏时钟更新（无秒）
        // ============================================================
        let fullscreenTimer = null;
        function updateFullscreenClock() {
            function update() {
                const now = new Date();
                const dubaiTime = now.toLocaleTimeString('en-GB', { timeZone: HOME_CITY.tz, hour12: false }).slice(0,5);
                const dubaiDate = now.toLocaleDateString('en-US', { timeZone: HOME_CITY.tz, weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
                document.getElementById('fullscreenTime').innerText = dubaiTime;
                document.getElementById('fullscreenDate').innerHTML = dubaiDate;
            }
            update();
            if (fullscreenTimer) clearInterval(fullscreenTimer);
            fullscreenTimer = setInterval(update, 60000);
            
            // 天气每10分钟更新
            getWeather(HOME_CITY.lat, HOME_CITY.lon).then(w => {
                document.getElementById('fullscreenWeatherIcon').innerText = w.icon;
                document.getElementById('fullscreenWeatherTemp').innerText = `${w.temp}°C`;
                document.getElementById('fullscreenWeatherDesc').innerText = w.desc;
                document.getElementById('fullscreenDress').innerHTML = `👕 ${w.dress}`;
            });
        }
        
        // ============================================================
        // 解析日历事件（支持纯数字航班号）
        // ============================================================
        function parseFlightFromEvent(event) {
            const title = event.summary || "";
            const desc = event.description || "";
            const fullText = (title + " " + desc).toUpperCase();
            
            // 匹配三字码对
            const codeMatch = fullText.match(/\b([A-Z]{3})\b.*?\b([A-Z]{3})\b/);
            if (!codeMatch) return null;
            
            const origin = codeMatch[1];
            const destination = codeMatch[2];
            const startTime = event.start?.dateTime ? new Date(event.start.dateTime) : null;
            if (!startTime) return null;
            
            // 提取航班号（优先纯数字，然后常规格式）
            let flightNumber = null;
            const pureNumberMatch = fullText.match(/\b(\d{4,6})\b/);
            const standardMatch = fullText.match(/([A-Z]{2,3}\d{2,4})/);
            
            if (pureNumberMatch) {
                flightNumber = pureNumberMatch[1];
            } else if (standardMatch) {
                flightNumber = standardMatch[1];
            } else {
                flightNumber = `${origin}${destination}`;
            }
            
            return {
                flightNumber: flightNumber,
                origin: origin,
                destination: destination,
                departureTime: startTime,
                rawTitle: title,
                rawDescription: desc
            };
        }
        
        // 获取航班详细信息（通过API）
        async function enrichFlightWithAPI(flight) {
            const result = await searchFlightByNumber(flight.flightNumber);
            if (result && result.flight) {
                const apiFlight = result.flight;
                return {
                    ...flight,
                    airline: apiFlight.airline?.name || "未知",
                    status: apiFlight.flight_status || "scheduled",
                    departureTerminal: apiFlight.departure?.terminal,
                    departureGate: apiFlight.departure?.gate
                };
            }
            return { ...flight, airline: "未知", status: "scheduled" };
        }
        
        // ============================================================
        // Google 日历读取（72小时）
        // ============================================================
        let accessToken = null;
        let tokenClient = null;
        let currentFlight = null;
        let lastSyncTime = 0;
        
        async function fetch72hEvents() {
            if (!accessToken) return null;
            try {
                const now = new Date();
                const plus72h = new Date(now.getTime() + 72 * 3600000);
                const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${plus72h.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=20`;
                const resp = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                if (data.error) {
                    if (data.error.code === 401) {
                        accessToken = null;
                        document.getElementById('fullscreenStatus').innerHTML = "⚠️ 请重新授权";
                        document.getElementById('fullscreenStatus').classList.remove('connected');
                    }
                    return null;
                }
                if (data.items) {
                    for (const ev of data.items) {
                        const flight = parseFlightFromEvent(ev);
                        if (flight) {
                            const enriched = await enrichFlightWithAPI(flight);
                            localStorage.setItem('last_flight', JSON.stringify(enriched));
                            return enriched;
                        }
                    }
                }
                return null;
            } catch(e) {
                console.error(e);
                return null;
            }
        }
        
        // 自动同步（每10分钟）
        async function autoSync() {
            if (!accessToken) return;
            const flight = await fetch72hEvents();
            if (flight) {
                currentFlight = flight;
                showFlightMode(flight);
                document.getElementById('fullscreenStatus').innerHTML = "✈️ 有航班";
            } else {
                currentFlight = null;
                showFullscreenMode();
                document.getElementById('fullscreenStatus').innerHTML = "⏰ 无航班";
            }
            lastSyncTime = Date.now();
        }
        
        // 从缓存加载
        const cached = localStorage.getItem('last_flight');
        if (cached) {
            try {
                currentFlight = JSON.parse(cached);
            } catch(e) {}
        }
        
        // ============================================================
        // 显示模式切换
        // ============================================================
        function showFullscreenMode() {
            document.getElementById('fullscreenMode').classList.remove('hidden');
            document.getElementById('flightMode').classList.add('hidden');
            updateFullscreenClock();
        }
        
        function formatLocalAndDubaiTime(localDate, destTz) {
            const dubaiTime = new Date(localDate.getTime()).toLocaleString('en-GB', { 
                timeZone: HOME_CITY.tz, 
                hour: '2-digit', 
                minute: '2-digit',
                day: '2-digit',
                month: '2-digit',
                hour12: false 
            });
            const localTimeStr = localDate.toLocaleString('en-GB', { 
                timeZone: destTz,
                hour: '2-digit', 
                minute: '2-digit',
                day: '2-digit',
                month: '2-digit',
                hour12: false 
            });
            return { local: localTimeStr, dubai: dubaiTime };
        }
        
        async function showFlightMode(flight) {
            document.getElementById('fullscreenMode').classList.add('hidden');
            document.getElementById('flightMode').classList.remove('hidden');
            
            const orgInfo = getAirportInfo(flight.origin);
            const dstInfo = getAirportInfo(flight.destination);
            
            document.getElementById('originCode').innerText = flight.origin;
            document.getElementById('destCode').innerText = flight.destination;
            
            const depDate = new Date(flight.departureTime);
            const times = formatLocalAndDubaiTime(depDate, dstInfo.tz);
            
            document.getElementById('flightPanel').innerHTML = `
                <div>
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                        <span class="flight-number-large">✈️ ${flight.flightNumber}</span>
                        <span class="flight-status-badge">${flight.airline}</span>
                    </div>
                    <div class="flight-schedule">
                        <div>🛫 ${flight.origin} → ${flight.destination}</div>
                        <div>📍 ${orgInfo.city} → ${dstInfo.city}</div>
                        <div>📅 当地时间: ${times.local}</div>
                        <div class="time-conversion">🕐 迪拜时间: ${times.dubai}</div>
                        ${flight.departureTerminal ? `<div>🏛️ 航站楼: ${flight.departureTerminal}</div>` : ''}
                        ${flight.departureGate ? `<div>🚪 登机口: ${flight.departureGate}</div>` : ''}
                    </div>
                </div>
            `;
            
            const orgWeather = await getWeather(orgInfo.lat, orgInfo.lon);
            const dstWeather = await getWeather(dstInfo.lat, dstInfo.lon);
            
            document.getElementById('originWeather').innerHTML = `
                <div class="weather-icon">${orgWeather.icon}</div>
                <div class="weather-temp">${orgWeather.temp}°C</div>
                <div class="weather-desc">${orgWeather.desc}</div>
                <div class="dress-tip">👕 ${orgWeather.dress}</div>
            `;
            document.getElementById('destWeather').innerHTML = `
                <div class="weather-icon">${dstWeather.icon}</div>
                <div class="weather-temp">${dstWeather.temp}°C</div>
                <div class="weather-desc">${dstWeather.desc}</div>
                <div class="dress-tip">👕 ${dstWeather.dress}</div>
            `;
            
            document.getElementById('originNotam').innerHTML = `<div class="label-sm">📡 NOTAM</div><div class="notam-list"><div class="notam-item">暂无重要通告</div></div>`;
            document.getElementById('destNotam').innerHTML = `<div class="label-sm">📡 NOTAM</div><div class="notam-list"><div class="notam-item">暂无重要通告</div></div>`;
            
            startFlightClocks(orgInfo.tz, dstInfo.tz);
            document.getElementById('flightBadge').innerHTML = `✈️ ${flight.flightNumber}`;
        }
        
        let flightClockTimer = null;
        function startFlightClocks(orgTz, dstTz) {
            if (flightClockTimer) clearInterval(flightClockTimer);
            function update() {
                const now = new Date();
                try {
                    document.getElementById('originTime').innerText = now.toLocaleTimeString('en-GB', { timeZone: orgTz, hour12: false });
                    document.getElementById('originDate').innerText = now.toLocaleDateString('en-US', { timeZone: orgTz, weekday: 'short', month: 'short', day: 'numeric' });
                } catch(e) {}
                try {
                    document.getElementById('destTime').innerText = now.toLocaleTimeString('en-GB', { timeZone: dstTz, hour12: false });
                    document.getElementById('destDate').innerText = now.toLocaleDateString('en-US', { timeZone: dstTz, weekday: 'short', month: 'short', day: 'numeric' });
                } catch(e) {}
            }
            update();
            flightClockTimer = setInterval(update, 1000);
        }
        
        // ============================================================
        // 授权初始化
        // ============================================================
        function initAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: async (resp) => {
                    if (resp.access_token) {
                        accessToken = resp.access_token;
                        document.getElementById('fullscreenStatus').innerHTML = "✅ 已同步";
                        document.getElementById('fullscreenStatus').classList.add('connected');
                        await autoSync();
                        setInterval(autoSync, 10 * 60 * 1000);
                    }
                },
            });
            // 自动尝试授权
            setTimeout(() => {
                if (!accessToken) tokenClient.requestAccessToken();
            }, 500);
        }
        
        function openControlPanel() {
            window.open('control.html', '_blank', 'width=400,height=600');
        }
        
        // 启动
        window.onload = () => {
            initAuth();
            if (currentFlight) {
                showFlightMode(currentFlight);
            } else {
                showFullscreenMode();
            }
        };
    </script>
</body>
</html>
