<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HUD Dashboard Ultimate</title>
    <style id="theme-css">
        :root { --bg: #000; --text: #fff; --accent: #58a6ff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: "SF Pro Display", sans-serif; height: 100vh; overflow: hidden; }
        
        /* 顶部 1/4 动态栏 */
        #header-hud { height: 25vh; border-bottom: 2px solid #333; display: none; padding: 20px; box-sizing: border-box; grid-template-columns: 1.5fr 1fr 1.5fr; gap: 20px; }
        
        /* 底部 3/4 主时间区 */
        #main-hud { height: 75vh; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #main-hud.full { height: 100vh; }

        /* 超大时钟与天气 */
        .big-clock { font-size: 26vw; font-weight: 800; line-height: 0.9; letter-spacing: -10px; position: relative; }
        .weather-overlay { position: absolute; top: -30px; right: -60px; text-align: right; }
        .w-symbol { font-size: 6vw; }
        .w-temp { font-size: 3vw; color: var(--accent); font-weight: 300; }

        /* 扁平化日期 */
        .date-footer { position: absolute; bottom: 30px; width: 100%; text-align: center; font-size: 2.2vw; letter-spacing: 8px; color: #888; text-transform: uppercase; }

        /* 进度条 */
        .progress-bar { grid-column: span 3; background: #222; height: 10px; border-radius: 5px; margin-top: 15px; overflow: hidden; }
        #inner-bar { width: 0%; height: 100%; background: var(--accent); transition: width 1s linear; }

        /* Layover 双时区布局 */
        .split-view { display: none; width: 100%; height: 100%; grid-template-columns: 1fr 1fr; }
        .pane { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pane-border { border-right: 1px solid #333; }
    </style>
</head>
<body>

<div id="header-hud">
    <div id="flight-info">
        <div id="f-no-disp" style="color:var(--accent); font-size:1.8vw;">EK493</div>
        <div id="f-route-zh" style="font-size:3vw; font-weight:bold;">-- ➔ --</div>
        <div id="f-airport-en" style="font-size:1.2vw; color:#888;">AIRPORT INFO LOAD...</div>
    </div>
    <div id="wx-mid" style="text-align:center; border-left:1px solid #333; border-right:1px solid #333;">
        <div id="dest-icon" class="w-symbol">☀️</div>
        <div id="dest-temp" style="font-size:2vw;">--°C</div>
        <div id="dest-cloth" style="font-size:1vw; color:#ffca28;">计算穿衣...</div>
    </div>
    <div id="notam-box">
        <div style="font-size:0.8vw; color:#ff7b72;">⚠️ NOTAM/RISK</div>
        <div id="notam-txt" style="font-size:0.9vw; background:#111; padding:5px; height:80px; overflow:hidden;">Searching NOTAMs...</div>
    </div>
    <div class="progress-bar"><div id="inner-bar"></div></div>
</div>

<div id="main-hud" class="full">
    <div id="clock-normal">
        <div class="big-clock">
            <span id="time-main">00:00</span>
            <div class="weather-overlay">
                <div id="main-w-icon" class="w-symbol">☀️</div>
                <div id="main-w-temp" class="w-temp">--°C</div>
            </div>
        </div>
    </div>

    <div id="view-layover" class="split-view">
        <div class="pane pane-border">
            <div style="font-size:2vw; color:#888;">DUBAI</div>
            <div id="split-dxb-time" style="font-size:12vw; font-weight:bold;">00:00</div>
        </div>
        <div class="pane">
            <div id="layover-title" style="font-size:2vw; color:var(--accent);">DESTINATION</div>
            <div id="split-loc-time" style="font-size:12vw; font-weight:bold;">00:00</div>
        </div>
    </div>

    <div class="date-footer" id="date-footer">APRIL 24 FRIDAY</div>
</div>

<script>
    const GIST_URL = "https://api.github.com/gists/6b51ae2b894903de0227eaec5e0ce842";
    const W_KEY = "9fcc9afb0a80a6aaa44c926e4f7827a7";

    async function updateData() {
        try {
            const r = await fetch(GIST_URL + '?nocache=' + Date.now());
            const d = await r.json();
            const data = JSON.parse(d.files["flight_data.json"].content);
            renderDashboard(data);
            fetchWeather('Dubai', true);
            if(data.arr) fetchWeather(data.arr, false);
        } catch(e) { console.error("Sync Error"); }
    }

    async function fetchWeather(city, isHome) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${W_KEY}`);
            const w = await res.json();
            const temp = Math.round(w.main.temp);
            if(isHome) {
                document.getElementById('main-w-temp').innerText = temp + "°C";
            } else {
                document.getElementById('dest-temp').innerText = temp + "°C";
                document.getElementById('f-airport-en').innerText = `${w.name}, ${w.sys.country}`;
                document.getElementById('dest-cloth').innerText = temp > 20 ? "适合短袖" : "需要长袖外套";
            }
        } catch(e) {}
    }

    function renderDashboard(data) {
        const now = new Date();
        const std = new Date(data.std);
        const hours = (std - now) / 3600000;

        // 场景判断
        const isFlying = (data.status === 'airborne' || data.status === 'pushback');
        const showHeader = (hours < 72 && hours > -24) || isFlying;

        document.getElementById('header-hud').style.display = showHeader ? 'grid' : 'none';
        document.getElementById('main-hud').className = showHeader ? '' : 'full';
        
        if(showHeader) {
            document.getElementById('f-no-disp').innerText = data.flightNo || "EK---";
            document.getElementById('f-route-zh').innerText = `${data.dep} ➔ ${data.arr}`;
        }

        if(data.isLayover) {
            document.getElementById('clock-normal').style.display = 'none';
            document.getElementById('view-layover').style.display = 'grid';
            document.getElementById('layover-title').innerText = data.arr + " LOCAL";
        } else {
            document.getElementById('clock-normal').style.display = 'block';
            document.getElementById('view-layover').style.display = 'none';
        }

        // 进度条
        if(isFlying) {
            const total = 8 * 3600000; // 假设8小时，实际可由 STA 算出
            const prog = Math.min(((now - std) / total) * 100, 100);
            document.getElementById('inner-bar').style.width = Math.max(prog, 0) + "%";
        }
    }

    function tick() {
        const now = new Date();
        const dxb = new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Dubai' }).format(now);
        document.getElementById('time-main').innerText = dxb;
        document.getElementById('split-dxb-time').innerText = dxb;
        document.getElementById('split-loc-time').innerText = dxb; // 简略逻辑
        
        const opt = { month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('date-footer').innerText = now.toLocaleDateString('zh-CN', opt).toUpperCase();
    }

    setInterval(tick, 1000);
    setInterval(updateData, 300000);
    tick(); updateData();
</script>
</body>
</html>
