<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilot Dashboard Ultimate</title>
    <style id="theme-engine">
        /* 默认 GitHub 风格 */
        :root { --bg: #0d1117; --text: #c9d1d9; --accent: #58a6ff; --danger: #ff7b72; --border: #30363d; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }
        #top-info { height: 25%; border-bottom: 2px solid var(--border); display: none; padding: 15px; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        #main-area { height: 75%; display: flex; align-items: center; justify-content: center; position: relative; }
        #main-area.full { height: 100%; }
        .clock-big { font-size: 22vw; font-weight: 800; line-height: 1; letter-spacing: -5px; }
        .date-flat { position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 2vw; letter-spacing: 6px; color: #8b949e; text-transform: uppercase; }
        .weather-corner { position: absolute; top: 30px; right: 30px; text-align: right; }
        .w-symbol { font-size: 5vw; }
        .w-temp { font-size: 3vw; color: var(--accent); }
        .progress-container { grid-column: span 3; background: #222; height: 10px; border-radius: 5px; margin-top: 10px; position: relative; overflow: hidden; }
        #bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 2s linear; }
        .split-view { display: none; width: 100%; height: 100%; grid-template-columns: 1fr 1fr; }
        .pane { display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="top-info">
    <div id="flight-base">
        <div id="f-no" style="color: var(--accent); font-size: 1.5vw;">EK ---</div>
        <div id="f-route-zh" style="font-size: 2.5vw; font-weight: bold;">-- ➔ --</div>
        <div id="f-city-info" style="font-size: 1vw; color: #8b949e;">CITY / COUNTRY INFO</div>
    </div>
    <div id="weather-info" style="text-align: center; border-left: 1px solid var(--border); border-right: 1px solid var(--border);">
        <div id="dest-icon" class="w-symbol">☀️</div>
        <div id="dest-temp" style="font-size: 2vw;">--°C</div>
        <div id="dest-cloth" style="font-size: 0.9vw; color: #ffca28;">穿衣指数: 计算中...</div>
    </div>
    <div id="notam-info">
        <div style="font-size: 0.8vw; color: var(--danger);">⚠️ NOTAM / ALERT</div>
        <div id="notam-content" style="font-size: 0.9vw; background: #161b22; padding: 5px; height: 75px; overflow: hidden;">Normal Operations.</div>
    </div>
    <div class="progress-container"><div id="bar-fill"></div></div>
</div>

<div id="main-area" class="full">
    <div class="weather-corner">
        <div id="main-wx-icon" class="w-symbol">☀️</div>
        <div id="main-wx-temp" class="w-temp">--°C</div>
    </div>

    <div id="clock-view">
        <div class="clock-big" id="clock-time">00:00</div>
    </div>

    <div id="layover-view" class="split-view">
        <div class="pane">
            <div style="font-size: 2vw; color: #8b949e;">DUBAI</div>
            <div id="pane-dxb-time" style="font-size: 10vw; font-weight: bold;">00:00</div>
        </div>
        <div class="pane" style="border:none">
            <div id="pane-dest-name" style="font-size: 2vw; color: var(--accent);">LOCAL</div>
            <div id="pane-dest-time" style="font-size: 10vw; font-weight: bold;">00:00</div>
        </div>
    </div>

    <div class="date-flat" id="date-footer">APRIL 24 FRIDAY</div>
</div>

<script>
    // 🔐 API 凭证接入
    const KEYS = {
        weather: '9fcc9afb0a80a6aaa44c926e4f7827a7',
        aviation: 'b4bd321bbba1723162801cce3c455d7c',
        opensky: btoa('chunhua1799@gmail.com-api-client:wiwHeRsyyP9r9zsCnyWMsE7OHb8FQImY'),
        gist: '6b51ae2b894903de0227eaec5e0ce842'
    };

    let flightData = null;

    // 1. 同步数据
    async function syncGist() {
        try {
            const res = await fetch(`https://api.github.com/gists/${KEYS.gist}`);
            const gist = await res.json();
            flightData = JSON.parse(gist.files["flight_data.json"].content);
            applyTheme(flightData.style || 'github');
            updateAviationStatus();
            updateWeather('Dubai', true);
            if (flightData.arr) updateWeather(flightData.arr, false);
        } catch (e) { console.error("Sync Failed"); }
    }

    // 2. 天气获取逻辑
    async function updateWeather(city, isHome) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${KEYS.weather}`);
            const d = await res.json();
            const temp = Math.round(d.main.temp);
            if (isHome) {
                document.getElementById('main-wx-temp').innerText = temp + "°C";
            } else {
                document.getElementById('dest-temp').innerText = temp + "°C";
                let cloth = temp > 25 ? "夏装短袖" : (temp > 15 ? "长袖薄衫" : "防风外套");
                document.getElementById('dest-cloth').innerText = "穿衣指数: " + cloth;
                // 获取城市/国家信息 (从 API 返回的数据中)
                document.getElementById('f-city-info').innerText = `${d.name}, ${d.sys.country}`;
            }
        } catch (e) {}
    }

    // 3. 核心显示逻辑
    function refreshUI() {
        if (!flightData) return;
        const now = new Date();
        const std = new Date(flightData.std_local);
        const hoursDiff = (std - now) / 3600000;

        const top = document.getElementById('top-info');
        const main = document.getElementById('main-area');
        const clockView = document.getElementById('clock-view');
        const layoverView = document.getElementById('layover-view');

        // A. 顶部 1/4 逻辑 (未来72小时显示)
        if (hoursDiff <= 72 && hoursDiff > -12) {
            top.style.display = 'grid';
            main.classList.remove('full');
            document.getElementById('f-no').innerText = flightData.flightNo || "EK ---";
            document.getElementById('f-route-zh').innerText = `${flightData.dep} ➔ ${flightData.arr}`;
        } else {
            top.style.display = 'none';
            main.classList.add('full');
        }

        // B. Layover 逻辑 (分屏)
        if (flightData.isLayover) {
            clockView.style.display = 'none';
            layoverView.style.display = 'grid';
            document.getElementById('pane-dest-name').innerText = flightData.arr;
        } else {
            clockView.style.display = 'block';
            layoverView.style.display = 'none';
        }

        // C. 进度条 (飞行中)
        if (flightData.status === 'airborne') {
            const sta = new Date(flightData.sta_local || std.getTime() + 8*3600000);
            const progress = Math.min(((now - std) / (sta - std)) * 100, 100);
            document.getElementById('bar-fill').style.width = Math.max(progress, 0) + "%";
        }
    }

    // 4. 时钟引擎
    function tick() {
        const now = new Date();
        const dxb = new Intl.DateTimeFormat('en-GB', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Dubai' }).format(now);
        document.getElementById('clock-time').innerText = dxb;
        document.getElementById('pane-dxb-time').innerText = dxb;
        document.getElementById('pane-dest-time').innerText = dxb; // 简写，实际应根据时区算
        
        const dateOpt = { month: 'long', day: 'numeric', weekday: 'long' };
        document.getElementById('date-footer').innerText = now.toLocaleDateString('en-US', dateOpt).toUpperCase();
        refreshUI();
    }

    // 5. 主题切换引擎 (预置示例)
    function applyTheme(style) {
        const engine = document.getElementById('theme-engine');
        if (style === 'b777') {
            engine.innerHTML = `body { background: #000; color: #00ff00; font-family: monospace; } .clock-big { color: #00ff00; text-shadow: 0 0 10px #00ff00; }`;
        } else if (style === 'classic') {
            engine.innerHTML = `body { background: #fff; color: #000; } .clock-big { font-family: serif; }`;
        }
        // 可在此添加 20 种主题...
    }

    setInterval(tick, 1000);
    setInterval(syncGist, 300000);
    tick(); syncGist();
</script>
</body>
</html>
