<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pilot Ops · 迪拜飞行时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* ============================================
           全局变量 & 玻璃质感
        ============================================ */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-gold: #ffd60a;
            --accent-blue: #0a84ff;
            --accent-green: #32d74b;
            --accent-orange: #ff9f0a;
        }

        /* ============================================
           无航班模式 - 全屏大时钟
        ============================================ */
        .fullscreen-mode {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 30% 20%, #1a1a2e, #0a0a0a);
            position: relative;
        }

        .fullscreen-time {
            font-size: 26vw;
            font-weight: 700;
            font-family: "SF Pro Display", monospace;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #d4d4ff 50%, #88aaff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 60px rgba(136, 170, 255, 0.3);
        }

        .fullscreen-date {
            font-size: 1.8vw;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            margin-top: 24px;
            text-transform: uppercase;
        }

        /* 右上角天气 */
        .weather-pod {
            position: absolute;
            top: 24px;
            right: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 12px 20px;
            border: 0.5px solid var(--glass-border);
            text-align: center;
        }

        .weather-pod .icon { font-size: 1.8rem; }
        .weather-pod .temp { font-size: 1.3rem; font-weight: 600; }
        .weather-pod .desc { font-size: 0.65rem; color: rgba(255,255,255,0.5); }

        /* 左下角状态 */
        .status-pod {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
        }
        .status-pod.connected { color: #66ffaa; }

        /* ============================================
           有航班模式 - 飞行员风格界面
        ============================================ */
        .flight-mode {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 14px;
            background: #000000;
        }

        /* 顶部同步栏 */
        .ops-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 0.5px solid var(--glass-border);
        }
        .sync-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            padding: 6px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
        }
        .flight-badge {
            font-size: 0.7rem;
            color: var(--accent-green);
            font-family: monospace;
        }

        /* 主卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 18px 22px;
            border: 0.5px solid var(--glass-border);
        }

        .duty-tag {
            font-size: 0.65rem;
            padding: 4px 12px;
            border-radius: 20px;
            background: var(--accent-blue);
            display: inline-block;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .flight-number {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin: 8px 0 4px;
        }

        .route {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 4px 0;
        }

        /* 动态横幅 */
        .dynamic-banner {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .highlight { color: var(--accent-orange); font-weight: 600; }

        /* 左右面板 */
        .dual-panels {
            display: flex;
            gap: 12px;
            flex: 1;
            min-height: 0;
        }
        .info-panel {
            flex: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            border: 0.5px solid var(--glass-border);
        }
        .airport-code {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent-blue);
        }
        .weather-temp-lg {
            font-size: 2.2rem;
            font-weight: 300;
            margin: 8px 0;
        }
        .weather-icon-lg {
            font-size: 2rem;
            margin: 5px 0;
        }
        .local-time-lg {
            font-size: 1.6rem;
            font-weight: 700;
            font-family: monospace;
            margin-top: auto;
        }
        .dxb-ref {
            font-size: 0.7rem;
            color: var(--accent-gold);
            margin-top: 4px;
        }
        .label-sm {
            font-size: 0.55rem;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* NOTAM 区域 */
        .notam-section {
            margin-top: 10px;
            font-size: 0.6rem;
            color: var(--accent-orange);
            max-height: 60px;
            overflow-y: auto;
        }

        /* UTC 条 */
        .utc-bar {
            text-align: center;
            font-size: 1.2rem;
            font-family: "SF Mono", monospace;
            color: var(--accent-gold);
            padding: 8px 0;
        }

        .hidden { display: none !important; }
    </style>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>

    <!-- 无航班模式：全屏大时钟 -->
    <div id="fullscreenMode" class="fullscreen-mode">
        <div class="fullscreen-time" id="fullTime">--:--</div>
        <div class="fullscreen-date" id="fullDate"></div>
        <div class="weather-pod">
            <div class="icon" id="fsWeatherIcon">☀️</div>
            <div class="temp" id="fsWeatherTemp">--°C</div>
            <div class="desc" id="fsWeatherDesc">--</div>
        </div>
        <div class="status-pod" id="fullscreenStatus" onclick="openControlPanel()">
            ⚙️ 设置
        </div>
    </div>

    <!-- 有航班模式 -->
    <div id="flightMode" class="flight-mode hidden">
        <div class="ops-bar">
            <div class="flight-badge" id="flightBadge">✈️ STANDBY</div>
            <button class="sync-btn" id="syncBtn">🔄 SYNC</button>
        </div>

        <div class="glass-card">
            <div class="duty-tag" id="dutyTag">SCHEDULED</div>
            <div class="flight-number" id="flightNumber">---</div>
            <div class="route" id="routeDisplay">--- ➔ ---</div>
            <div class="dynamic-banner" id="dynamicBanner">
                <span><span class="highlight">🚗 PICKUP</span> <span id="pickupTime">--:--</span></span>
                <span><span class="highlight">✈️ DEPARTURE</span> <span id="depTimeLocal">--:--</span></span>
                <span><span class="highlight">🕐 DXB</span> <span id="depTimeDXB">--:--</span></span>
            </div>
        </div>

        <div class="dual-panels">
            <!-- 左边：出发地 -->
            <div class="info-panel">
                <div class="label-sm">ORIGIN</div>
                <div class="airport-code" id="originCode">---</div>
                <div class="weather-icon-lg" id="originWeatherIcon">🌍</div>
                <div class="weather-temp-lg" id="originTemp">--°C</div>
                <div class="local-time-lg" id="originTime">--:--</div>
                <div class="dxb-ref" id="originDxbRef">DXB: --:--</div>
                <div class="notam-section" id="originNotam">📡 暂无重要通告</div>
            </div>

            <!-- 右边：目的地 -->
            <div class="info-panel">
                <div class="label-sm">DESTINATION</div>
                <div class="airport-code" id="destCode">---</div>
                <div class="weather-icon-lg" id="destWeatherIcon">🌍</div>
                <div class="weather-temp-lg" id="destTemp">--°C</div>
                <div class="local-time-lg" id="destTime">--:--</div>
                <div class="dxb-ref" id="destDxbRef">DXB: --:--</div>
                <div class="notam-section" id="destNotam">📡 等待航班</div>
            </div>
        </div>

        <div class="utc-bar">
            Z <span id="utcTime">00:00:00</span>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔑 配置
        // ============================================================
        const CONFIG = {
            CLIENT_ID: "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com",
            WEATHER_KEY: "9fcc9afb0a80a6aaa44c926e4f7827a7",
            FLIGHT_KEY: "b4bd321bbba1723162801cce3c455d7c",
            HOME_TZ: "Asia/Dubai",
            HOME_CODE: "DXB"
        };

        // 机场数据库
        const airportDB = {
            "DXB": { city: "迪拜", tz: "Asia/Dubai", lat: 25.2532, lon: 55.3657, country: "UAE" },
            "CKY": { city: "科纳克里", tz: "Africa/Conakry", lat: 9.5722, lon: -13.6102, country: "Guinea" },
            "DSS": { city: "达喀尔", tz: "Africa/Dakar", lat: 14.6700, lon: -17.0600, country: "Senegal" },
            "PVG": { city: "上海", tz: "Asia/Shanghai", lat: 31.1443, lon: 121.8083, country: "China" },
            "PEK": { city: "北京", tz: "Asia/Shanghai", lat: 40.0799, lon: 116.6031, country: "China" },
            "SZX": { city: "深圳", tz: "Asia/Shanghai", lat: 22.6393, lon: 113.8108, country: "China" },
            "LHR": { city: "伦敦", tz: "Europe/London", lat: 51.4700, lon: -0.4543, country: "UK" },
            "JFK": { city: "纽约", tz: "America/New_York", lat: 40.6413, lon: -73.7781, country: "USA" },
            "CDG": { city: "巴黎", tz: "Europe/Paris", lat: 49.0097, lon: 2.5479, country: "France" },
            "FRA": { city: "法兰克福", tz: "Europe/Berlin", lat: 50.0379, lon: 8.5622, country: "Germany" },
            "AMS": { city: "阿姆斯特丹", tz: "Europe/Amsterdam", lat: 52.3086, lon: 4.7639, country: "Netherlands" },
            "SIN": { city: "新加坡", tz: "Asia/Singapore", lat: 1.3644, lon: 103.9915, country: "Singapore" }
        };

        // 获取机场信息
        function getAirportInfo(code) {
            return airportDB[code.toUpperCase()] || { 
                city: code, tz: "UTC", lat: 25.2532, lon: 55.3657, country: "Unknown" 
            };
        }

        // ============================================================
        // 天气获取
        // ============================================================
        async function fetchWeather(lat, lon, elementId, tempId, iconId) {
            try {
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${CONFIG.WEATHER_KEY}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.cod === 200) {
                    const temp = Math.round(data.main.temp);
                    const iconMap = { "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Snow": "❄️", "Thunderstorm": "⛈️" };
                    const icon = iconMap[data.weather[0].main] || "🌍";
                    if (tempId) document.getElementById(tempId).innerHTML = `${temp}°C`;
                    if (iconId) document.getElementById(iconId).innerHTML = icon;
                    return { temp, desc: data.weather[0].description, icon };
                }
            } catch(e) { console.log(e); }
            return { temp: 22, desc: "Clear", icon: "☀️" };
        }

        // ============================================================
        // 航班号智能搜索（支持纯数字）
        // ============================================================
        async function searchFlightByNumber(rawNumber) {
            const numStr = rawNumber.toString().trim();
            const candidates = new Set();
            candidates.add(numStr);
            if (numStr.length > 1) candidates.add(numStr.substring(1));
            if (numStr.length > 2) candidates.add(numStr.substring(2));
            if (numStr.startsWith('8')) candidates.add(numStr.substring(1));
            if (numStr.length >= 4) candidates.add(numStr.slice(-4));
            
            for (const fn of candidates) {
                if (fn.length >= 3 && fn.length <= 6) {
                    try {
                        const url = `https://api.aviationstack.com/v1/flights?access_key=${CONFIG.FLIGHT_KEY}&flight_iata=${fn}&limit=1`;
                        const resp = await fetch(url);
                        const data = await resp.json();
                        if (data.data && data.data.length > 0) {
                            return { flight: data.data[0], usedNumber: fn };
                        }
                    } catch(e) {}
                }
            }
            return null;
        }

        // ============================================================
        // 解析日历事件
        // ============================================================
        function parseFlightFromEvent(event) {
            const title = event.summary || "";
            const desc = event.description || "";
            const fullText = (title + " " + desc).toUpperCase();
            
            const codeMatch = fullText.match(/\b([A-Z]{3})\b.*?\b([A-Z]{3})\b/);
            if (!codeMatch) return null;
            
            const origin = codeMatch[1];
            const destination = codeMatch[2];
            const startTime = event.start?.dateTime ? new Date(event.start.dateTime) : null;
            if (!startTime) return null;
            
            let flightNumber = null;
            const pureNumberMatch = fullText.match(/\b(\d{4,6})\b/);
            const standardMatch = fullText.match(/([A-Z]{2,3}\d{2,4})/);
            
            if (pureNumberMatch) flightNumber = pureNumberMatch[1];
            else if (standardMatch) flightNumber = standardMatch[1];
            else flightNumber = `${origin}${destination}`;
            
            return {
                flightNumber: flightNumber,
                origin: origin,
                destination: destination,
                departureTime: startTime,
                pickupTime: new Date(startTime.getTime() - 135 * 60000),
                rawTitle: title
            };
        }

        // ============================================================
        // Google 日历集成
        // ============================================================
        let accessToken = null;
        let tokenClient = null;
        let currentFlight = null;
        let flightStatus = null;

        async function fetchCalendarEvents() {
            if (!accessToken) return null;
            try {
                const now = new Date();
                const plus72h = new Date(now.getTime() + 72 * 3600000);
                const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${plus72h.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=20`;
                const resp = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await resp.json();
                if (data.error) {
                    if (data.error.code === 401) {
                        accessToken = null;
                        document.getElementById('fullscreenStatus').innerHTML = "⚠️ 重新授权";
                    }
                    return null;
                }
                if (data.items) {
                    for (const ev of data.items) {
                        const flight = parseFlightFromEvent(ev);
                        if (flight) {
                            // 尝试丰富航班信息
                            const result = await searchFlightByNumber(flight.flightNumber);
                            if (result && result.flight) {
                                flight.airline = result.flight.airline?.name;
                                flight.status = result.flight.flight_status;
                            }
                            localStorage.setItem('last_flight', JSON.stringify(flight));
                            return flight;
                        }
                    }
                }
                return null;
            } catch(e) {
                console.error(e);
                return null;
            }
        }

        async function syncAndRefresh() {
            if (!accessToken) return;
            const flight = await fetchCalendarEvents();
            if (flight) {
                currentFlight = flight;
                showFlightMode(flight);
                document.getElementById('fullscreenStatus').innerHTML = "✈️ 有航班";
            } else {
                currentFlight = null;
                showFullscreenMode();
                document.getElementById('fullscreenStatus').innerHTML = "⏰ 待机模式";
            }
        }

        // 加载缓存
        const cached = localStorage.getItem('last_flight');
        if (cached) {
            try {
                currentFlight = JSON.parse(cached);
            } catch(e) {}
        }

        // ============================================================
        // 显示模式切换
        // ============================================================
        function showFullscreenMode() {
            document.getElementById('fullscreenMode').classList.remove('hidden');
            document.getElementById('flightMode').classList.add('hidden');
            updateFullscreenClock();
        }

        async function showFlightMode(flight) {
            document.getElementById('fullscreenMode').classList.add('hidden');
            document.getElementById('flightMode').classList.remove('hidden');
            
            const orgInfo = getAirportInfo(flight.origin);
            const dstInfo = getAirportInfo(flight.destination);
            
            // 基本航班信息
            document.getElementById('flightNumber').innerHTML = flight.flightNumber;
            document.getElementById('routeDisplay').innerHTML = `${flight.origin} ➔ ${flight.destination}`;
            document.getElementById('originCode').innerHTML = flight.origin;
            document.getElementById('destCode').innerHTML = flight.destination;
            document.getElementById('flightBadge').innerHTML = `✈️ ${flight.flightNumber}`;
            
            // 时间信息
            const depDate = new Date(flight.departureTime);
            const pickupDate = new Date(flight.pickupTime);
            const depLocal = depDate.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            const pickupLocal = pickupDate.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
            const depDXB = depDate.toLocaleTimeString('en-GB', { timeZone: CONFIG.HOME_TZ, hour: '2-digit', minute: '2-digit' });
            
            document.getElementById('pickupTime').innerHTML = pickupLocal;
            document.getElementById('depTimeLocal').innerHTML = depLocal;
            document.getElementById('depTimeDXB').innerHTML = depDXB;
            
            // 任务类型判断
            let dutyType = "SCHEDULED";
            if (flight.origin === CONFIG.HOME_CODE) dutyType = "DEPARTURE / FLY OUT";
            else if (flight.destination === CONFIG.HOME_CODE) dutyType = "ARRIVAL / RETURN";
            document.getElementById('dutyTag').innerHTML = dutyType;
            
            // 天气
            await fetchWeather(orgInfo.lat, orgInfo.lon, 'originTemp', 'originTemp', 'originWeatherIcon');
            await fetchWeather(dstInfo.lat, dstInfo.lon, 'destTemp', 'destTemp', 'destWeatherIcon');
            
            // 启动时钟
            startFlightClocks(orgInfo.tz, dstInfo.tz);
        }

        // ============================================================
        // 时钟系统
        // ============================================================
        let fullTimer = null;
        let flightTimer = null;

        function updateFullscreenClock() {
            function update() {
                const now = new Date();
                const dubaiTime = now.toLocaleTimeString('en-GB', { timeZone: CONFIG.HOME_TZ, hour12: false, hour: '2-digit', minute: '2-digit' });
                const dubaiDate = now.toLocaleDateString('en-US', { timeZone: CONFIG.HOME_TZ, weekday: 'long', month: 'long', day: 'numeric' });
                document.getElementById('fullTime').innerText = dubaiTime;
                document.getElementById('fullDate').innerHTML = dubaiDate;
            }
            update();
            if (fullTimer) clearInterval(fullTimer);
            fullTimer = setInterval(update, 60000);
            
            // 天气
            fetchWeather(25.2532, 55.3657, null, 'fsWeatherTemp', 'fsWeatherIcon').then(w => {
                if (w) document.getElementById('fsWeatherDesc').innerHTML = w.desc;
            });
        }

        function startFlightClocks(orgTz, dstTz) {
            if (flightTimer) clearInterval(flightTimer);
            function update() {
                const now = new Date();
                const dxbTime = now.toLocaleTimeString('en-GB', { timeZone: CONFIG.HOME_TZ, hour12: false, hour: '2-digit', minute: '2-digit' });
                try {
                    document.getElementById('originTime').innerHTML = now.toLocaleTimeString('en-GB', { timeZone: orgTz, hour12: false, hour: '2-digit', minute: '2-digit' });
                    document.getElementById('originDxbRef').innerHTML = `DXB: ${dxbTime}`;
                    document.getElementById('destTime').innerHTML = now.toLocaleTimeString('en-GB', { timeZone: dstTz, hour12: false, hour: '2-digit', minute: '2-digit' });
                    document.getElementById('destDxbRef').innerHTML = `DXB: ${dxbTime}`;
                } catch(e) {}
                document.getElementById('utcTime').innerHTML = now.toISOString().slice(11, 19);
            }
            update();
            flightTimer = setInterval(update, 1000);
        }

        // ============================================================
        // 授权初始化
        // ============================================================
        function initAuth() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CONFIG.CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/calendar.readonly',
                callback: async (resp) => {
                    if (resp.access_token) {
                        accessToken = resp.access_token;
                        document.getElementById('fullscreenStatus').classList.add('connected');
                        document.getElementById('fullscreenStatus').innerHTML = "✅ 已同步";
                        await syncAndRefresh();
                        setInterval(syncAndRefresh, 10 * 60 * 1000);
                    }
                },
            });
            document.getElementById('syncBtn').onclick = () => {
                if (accessToken) tokenClient.requestAccessToken({ prompt: '' });
                else tokenClient.requestAccessToken();
            };
            setTimeout(() => {
                if (!accessToken) tokenClient.requestAccessToken();
            }, 1000);
        }

        function openControlPanel() {
            alert("控制面板功能：\n• 主题配色\n• 时钟显示秒/隐藏秒\n• 日期格式\n\n完整版请后续扩展");
        }

        // 启动
        window.onload = () => {
            initAuth();
            if (currentFlight) {
                showFlightMode(currentFlight);
            } else {
                showFullscreenMode();
            }
        };
    </script>
</body>
</html>
