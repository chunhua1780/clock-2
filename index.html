<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>迪拜飞行时钟 · 智能版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.5s, color 0.3s;
        }
        .mode-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .dual-layout, .triple-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .dual-panel {
            flex: 1;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .dual-panel:last-child { border-right: none; }
        .triple-layout { flex-direction: column; }
        .triple-top {
            height: 30%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            z-index: 5;
        }
        .triple-bottom { flex: 1; display: flex; }
        .flight-bar {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 8px 16px;
            font-size: 0.7rem;
            text-align: center;
            pointer-events: none;
            z-index: 20;
        }
        .clock-element {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
            white-space: nowrap;
        }
        .clock-text {
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date-text, .city-text, .weather-text { opacity: 0.85; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .action-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 12px;
            z-index: 100;
        }
        .action-btn {
            background: #2a6faa;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            color: white;
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0.7;
        }
        .action-btn:active { opacity: 1; }
        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #ffaa44;
            color: #0a0e1a;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            z-index: 1100;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
    <script src="https://accounts.google.com/gsi/client"></script>
</head>
<body>
<div id="app"></div>
<div class="action-buttons">
    <button id="googleAuthBtn" class="action-btn">🔐 授权 Google 日历</button>
    <button id="manualRefreshBtn" class="action-btn">🔄 刷新配置</button>
</div>

<script>
    // ==================== 原有全局配置 ====================
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const GIST_API = `https://api.github.com/gists/${GIST_ID}`;
    const DUBAI_TZ = "Asia/Dubai";
    let flightsDB = {};
    let layoutConfig = null;
    let currentMode = "single";
    let currentFlight = null;
    let weatherCache = {};

    // Google 日历授权相关
    let tokenClient = null;
    let accessToken = null;
    const GOOGLE_CLIENT_ID = "234906426246-ora010t97cmlg7bcnloe11rijfal45q3.apps.googleusercontent.com";
    const GOOGLE_SCOPE = "https://www.googleapis.com/auth/calendar.readonly";

    // 机场信息库
    const airportInfo = {
        "DXB": { city: "Dubai", country: "United Arab Emirates", tz: "Asia/Dubai", lat: 25.2532, lon: 55.3657 },
        "PVG": { city: "Shanghai", country: "China", tz: "Asia/Shanghai", lat: 31.1443, lon: 121.8083 },
        "PEK": { city: "Beijing", country: "China", tz: "Asia/Shanghai", lat: 40.0799, lon: 116.6031 },
        "LHR": { city: "London", country: "United Kingdom", tz: "Europe/London", lat: 51.47, lon: -0.4543 },
        "JFK": { city: "New York", country: "USA", tz: "America/New_York", lat: 40.6413, lon: -73.7781 },
        "CDG": { city: "Paris", country: "France", tz: "Europe/Paris", lat: 49.0097, lon: 2.5479 },
        "SIN": { city: "Singapore", country: "Singapore", tz: "Asia/Singapore", lat: 1.3644, lon: 103.9915 },
        "SYD": { city: "Sydney", country: "Australia", tz: "Australia/Sydney", lat: -33.9461, lon: 151.1772 }
    };
    function getAirport(code) {
        return airportInfo[code] || { city: code, country: "", tz: "UTC", lat: 25.2532, lon: 55.3657 };
    }

    function showToast(msg) {
        let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    // ==================== 天气、数据加载 ====================
    async function fetchWeather(lat, lon) {
        const cacheKey = `${lat}_${lon}_${Math.floor(Date.now() / 3600000)}`;
        if (weatherCache[cacheKey]) return weatherCache[cacheKey];
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=auto`;
            const resp = await fetch(url);
            const data = await resp.json();
            if (data && data.current_weather) {
                const map = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌧️",61:"🌧️",71:"❄️",80:"🌦️",95:"⛈️"};
                const icon = map[data.current_weather.weathercode] || "🌍";
                const result = { temp: Math.round(data.current_weather.temperature), icon };
                weatherCache[cacheKey] = result;
                return result;
            }
        } catch(e) { console.warn(e); }
        return { temp: 22, icon: "☀️" };
    }

    async function loadData() {
        try {
            const resp = await fetch(GIST_API);
            const data = await resp.json();
            if (data.files && data.files['flight_data.json']) {
                const content = JSON.parse(data.files['flight_data.json'].content);
                flightsDB = content.flightsDB || {};
                console.log("✅ 航班数据加载成功");
            }
            if (data.files && data.files['clock_layout.json']) {
                layoutConfig = JSON.parse(data.files['clock_layout.json'].content);
                console.log("✅ 布局配置加载成功");
            }
        } catch(e) { console.warn(e); }
        if (!layoutConfig) {
            layoutConfig = {
                single: {
                    clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                    date: { left:"50%", top:"75%", fontSize:"16px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                    city: { left:"50%", top:"85%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:true },
                    weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                },
                dual: {
                    left: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    },
                    right: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    }
                },
                triple: {
                    left: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    },
                    right: {
                        clock: { left:"50%", top:"35%", fontSize:"48px", letterSpacing:"4px", lineHeight:"1.2", hidden:false },
                        date: { left:"50%", top:"70%", fontSize:"14px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        city: { left:"50%", top:"85%", fontSize:"12px", letterSpacing:"0px", lineHeight:"1.2", hidden:false },
                        weather: { left:"85%", top:"15%", fontSize:"20px", letterSpacing:"0px", lineHeight:"1.2", hidden:false }
                    }
                },
                colors: {
                    dayBg: "#e8f0f5", dayText: "#1a2a3a",
                    nightBg: "#0a0e1a", nightText: "#eef2f5",
                    accentColor: "#ffaa44"
                }
            };
        }
    }

    function getFlightChain() {
        let now = new Date();
        let all = [];
        for (let date in flightsDB) {
            for (let f of flightsDB[date]) {
                let dep = new Date(f.departureTime);
                if (dep > now && dep < new Date(now.getTime() + 72 * 3600000)) {
                    all.push({ ...f, depTime: dep });
                }
            }
        }
        all.sort((a,b) => a.depTime - b.depTime);
        return { current: all[0] || null, next: all[1] || null };
    }

    function getFlightState(flight) {
        if (!flight) return "no-flight";
        let now = new Date();
        let dep = new Date(flight.departureTime);
        let arr = flight.arrivalTime ? new Date(flight.arrivalTime) : null;
        if (now < dep) return "scheduled";
        if (now > dep && (!arr || now < arr)) return "flying";
        return "arrived";
    }

    function applyColorTheme() {
        if (!layoutConfig.colors) return;
        let hour = new Date().toLocaleTimeString('en-US', { timeZone: DUBAI_TZ, hour:'2-digit', hour12:false });
        let isDay = (Number(hour) >= 6 && Number(hour) < 18);
        let bg = isDay ? layoutConfig.colors.dayBg : layoutConfig.colors.nightBg;
        let text = isDay ? layoutConfig.colors.dayText : layoutConfig.colors.nightText;
        document.body.style.backgroundColor = bg;
        document.body.style.color = text;
        document.querySelectorAll('.clock-text').forEach(el => {
            el.style.background = `linear-gradient(135deg, ${layoutConfig.colors.accentColor}, ${text})`;
            el.style.webkitBackgroundClip = 'text';
            el.style.backgroundClip = 'text';
            el.style.color = 'transparent';
        });
    }

    function applyElementStyle(containerId, type, className, side = null) {
        let selector = side ? `#${containerId} #${side} .clock-element[data-type="${type}"]` : `#${containerId} .clock-element[data-type="${type}"]`;
        let el = document.querySelector(selector);
        if (!el) return;
        let cfg;
        if (currentMode === 'single') cfg = layoutConfig.single[type];
        else if (currentMode === 'dual') cfg = layoutConfig.dual[side][type];
        else cfg = layoutConfig.triple[side][type];
        if (!cfg || cfg.hidden) {
            el.style.display = 'none';
            return;
        }
        el.style.display = 'block';
        if (cfg.left) el.style.left = cfg.left;
        if (cfg.top) el.style.top = cfg.top;
        let textEl = el.querySelector(`.${className}`);
        if (textEl && cfg.fontSize) textEl.style.fontSize = cfg.fontSize;
        if (textEl && cfg.letterSpacing) textEl.style.letterSpacing = cfg.letterSpacing;
        if (textEl && cfg.lineHeight) textEl.style.lineHeight = cfg.lineHeight;
    }

    async function buildSingleMode() {
        let container = document.createElement('div');
        container.className = 'mode-container';
        container.id = 'normalContainer';
        container.innerHTML = `
            <div class="clock-element" data-type="clock"><div class="clock-text">--:--</div></div>
            <div class="clock-element" data-type="date"><div class="date-text"></div></div>
            <div class="clock-element" data-type="city"><div class="city-text">Dubai, United Arab Emirates</div></div>
            <div class="clock-element" data-type="weather"><div class="weather-text">☀️ --°C</div></div>
        `;
        document.getElementById('app').appendChild(container);
        applyElementStyle('normalContainer', 'clock', 'clock-text');
        applyElementStyle('normalContainer', 'date', 'date-text');
        applyElementStyle('normalContainer', 'city', 'city-text');
        applyElementStyle('normalContainer', 'weather', 'weather-text');
        function update() {
            let now = new Date();
            let timeStr = now.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit', hour12:false });
            let dateStr = now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
            let clockDiv = document.querySelector('#normalContainer .clock-element[data-type="clock"] .clock-text');
            let dateDiv = document.querySelector('#normalContainer .clock-element[data-type="date"] .date-text');
            if (clockDiv) clockDiv.innerText = timeStr;
            if (dateDiv) dateDiv.innerText = dateStr;
        }
        update();
        setInterval(update, 1000);
        let weather = await fetchWeather(25.2532, 55.3657);
        let weatherDiv = document.querySelector('#normalContainer .clock-element[data-type="weather"] .weather-text');
        if (weatherDiv) weatherDiv.innerHTML = `${weather.icon} ${weather.temp}°C`;
        setInterval(async () => {
            let w = await fetchWeather(25.2532, 55.3657);
            let wd = document.querySelector('#normalContainer .clock-element[data-type="weather"] .weather-text');
            if (wd) wd.innerHTML = `${w.icon} ${w.temp}°C`;
        }, 1800000);
    }

    async function buildDualMode(flight) {
        let destInfo = getAirport(flight.destination);
        let container = document.createElement('div');
        container.className = 'mode-container';
        container.id = 'normalContainer';
        container.innerHTML = `
            <div class="flight-bar" id="dualFlightBar"></div>
            <div class="dual-layout">
                <div class="dual-panel" id="dualLeft">
                    <div class="clock-element" data-type="clock"><div class="clock-text">--:--</div></div>
                    <div class="clock-element" data-type="date"><div class="date-text"></div></div>
                    <div class="clock-element" data-type="city"><div class="city-text">Dubai, UAE</div></div>
                    <div class="clock-element" data-type="weather"><div class="weather-text">☀️ --°C</div></div>
                </div>
                <div class="dual-panel" id="dualRight">
                    <div class="clock-element" data-type="clock"><div class="clock-text">--:--</div></div>
                    <div class="clock-element" data-type="date"><div class="date-text"></div></div>
                    <div class="clock-element" data-type="city"><div class="city-text">${destInfo.city}, ${destInfo.country}</div></div>
                    <div class="clock-element" data-type="weather"><div class="weather-text">🌤️ --°C</div></div>
                </div>
            </div>
        `;
        document.getElementById('app').appendChild(container);
        applyElementStyle('normalContainer', 'clock', 'clock-text', 'dualLeft');
        applyElementStyle('normalContainer', 'date', 'date-text', 'dualLeft');
        applyElementStyle('normalContainer', 'city', 'city-text', 'dualLeft');
        applyElementStyle('normalContainer', 'weather', 'weather-text', 'dualLeft');
        applyElementStyle('normalContainer', 'clock', 'clock-text', 'dualRight');
        applyElementStyle('normalContainer', 'date', 'date-text', 'dualRight');
        applyElementStyle('normalContainer', 'city', 'city-text', 'dualRight');
        applyElementStyle('normalContainer', 'weather', 'weather-text', 'dualRight');
        let depTime = new Date(flight.departureTime);
        let localTime = depTime.toLocaleTimeString('en-GB', { timeZone: destInfo.tz, hour:'2-digit', minute:'2-digit', hour12:false });
        let dubaiTime = depTime.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit', hour12:false });
        let bar = document.getElementById('dualFlightBar');
        if (bar) bar.innerHTML = `✈️ ${flight.flightNumber} · ${flight.origin} → ${flight.destination} · 起飞 ${localTime} (当地) / ${dubaiTime} (迪拜)`;
        function update() {
            let n = new Date();
            let leftTime = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit' });
            let rightTime = n.toLocaleTimeString('en-GB', { timeZone: destInfo.tz, hour:'2-digit', minute:'2-digit' });
            let leftClock = document.querySelector('#normalContainer #dualLeft .clock-element[data-type="clock"] .clock-text');
            let rightClock = document.querySelector('#normalContainer #dualRight .clock-element[data-type="clock"] .clock-text');
            let leftDate = document.querySelector('#normalContainer #dualLeft .clock-element[data-type="date"] .date-text');
            let rightDate = document.querySelector('#normalContainer #dualRight .clock-element[data-type="date"] .date-text');
            if (leftClock) leftClock.innerText = leftTime;
            if (rightClock) rightClock.innerText = rightTime;
            if (leftDate) leftDate.innerText = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday:'short', month:'short', day:'numeric' });
            if (rightDate) rightDate.innerText = n.toLocaleDateString('en-US', { timeZone: destInfo.tz, weekday:'short', month:'short', day:'numeric' });
        }
        update();
        setInterval(update, 1000);
        let dubaiWeather = await fetchWeather(25.2532, 55.3657);
        let destWeather = await fetchWeather(destInfo.lat, destInfo.lon);
        let leftWeather = document.querySelector('#normalContainer #dualLeft .clock-element[data-type="weather"] .weather-text');
        let rightWeather = document.querySelector('#normalContainer #dualRight .clock-element[data-type="weather"] .weather-text');
        if (leftWeather) leftWeather.innerHTML = `${dubaiWeather.icon} ${dubaiWeather.temp}°C`;
        if (rightWeather) rightWeather.innerHTML = `${destWeather.icon} ${destWeather.temp}°C`;
    }

    async function buildTripleMode(flight) {
        let destInfo = getAirport(flight.destination);
        let container = document.createElement('div');
        container.className = 'mode-container';
        container.id = 'normalContainer';
        container.innerHTML = `
            <div class="triple-layout">
                <div class="triple-top" id="tripleTopBar"></div>
                <div class="triple-bottom">
                    <div class="dual-panel" id="tripleLeft">
                        <div class="clock-element" data-type="clock"><div class="clock-text">--:--</div></div>
                        <div class="clock-element" data-type="date"><div class="date-text"></div></div>
                        <div class="clock-element" data-type="city"><div class="city-text">Dubai, UAE</div></div>
                        <div class="clock-element" data-type="weather"><div class="weather-text">☀️ --°C</div></div>
                    </div>
                    <div class="dual-panel" id="tripleRight">
                        <div class="clock-element" data-type="clock"><div class="clock-text">--:--</div></div>
                        <div class="clock-element" data-type="date"><div class="date-text"></div></div>
                        <div class="clock-element" data-type="city"><div class="city-text">${destInfo.city}, ${destInfo.country}</div></div>
                        <div class="clock-element" data-type="weather"><div class="weather-text">🌤️ --°C</div></div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('app').appendChild(container);
        applyElementStyle('normalContainer', 'clock', 'clock-text', 'tripleLeft');
        applyElementStyle('normalContainer', 'date', 'date-text', 'tripleLeft');
        applyElementStyle('normalContainer', 'city', 'city-text', 'tripleLeft');
        applyElementStyle('normalContainer', 'weather', 'weather-text', 'tripleLeft');
        applyElementStyle('normalContainer', 'clock', 'clock-text', 'tripleRight');
        applyElementStyle('normalContainer', 'date', 'date-text', 'tripleRight');
        applyElementStyle('normalContainer', 'city', 'city-text', 'tripleRight');
        applyElementStyle('normalContainer', 'weather', 'weather-text', 'tripleRight');
        let dep = new Date(flight.departureTime);
        let arr = flight.arrivalTime ? new Date(flight.arrivalTime) : new Date(dep.getTime() + 8*3600000);
        let total = arr - dep;
        let updateProgress = () => {
            let now = Date.now();
            let elapsed = Math.min(total, Math.max(0, now - dep));
            let percent = (elapsed / total) * 100;
            let bar = document.getElementById('tripleTopBar');
            if (bar) bar.innerHTML = `✈️ ${flight.flightNumber} · ${flight.origin} → ${flight.destination} · 进度 ${Math.round(percent)}% · 剩余 ${Math.round((total - elapsed) / 60000)}分钟`;
        };
        updateProgress();
        setInterval(updateProgress, 1000);
        function update() {
            let n = new Date();
            let leftTime = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour:'2-digit', minute:'2-digit' });
            let rightTime = n.toLocaleTimeString('en-GB', { timeZone: destInfo.tz, hour:'2-digit', minute:'2-digit' });
            let leftClock = document.querySelector('#normalContainer #tripleLeft .clock-element[data-type="clock"] .clock-text');
            let rightClock = document.querySelector('#normalContainer #tripleRight .clock-element[data-type="clock"] .clock-text');
            let leftDate = document.querySelector('#normalContainer #tripleLeft .clock-element[data-type="date"] .date-text');
            let rightDate = document.querySelector('#normalContainer #tripleRight .clock-element[data-type="date"] .date-text');
            if (leftClock) leftClock.innerText = leftTime;
            if (rightClock) rightClock.innerText = rightTime;
            if (leftDate) leftDate.innerText = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday:'short', month:'short', day:'numeric' });
            if (rightDate) rightDate.innerText = n.toLocaleDateString('en-US', { timeZone: destInfo.tz, weekday:'short', month:'short', day:'numeric' });
        }
        update();
        setInterval(update, 1000);
        let dubaiWeather = await fetchWeather(25.2532, 55.3657);
        let destWeather = await fetchWeather(destInfo.lat, destInfo.lon);
        let leftWeather = document.querySelector('#normalContainer #tripleLeft .clock-element[data-type="weather"] .weather-text');
        let rightWeather = document.querySelector('#normalContainer #tripleRight .clock-element[data-type="weather"] .weather-text');
        if (leftWeather) leftWeather.innerHTML = `${dubaiWeather.icon} ${dubaiWeather.temp}°C`;
        if (rightWeather) rightWeather.innerHTML = `${destWeather.icon} ${destWeather.temp}°C`;
    }

    async function refreshDisplay(showLoading = true) {
        let loading = null;
        if (showLoading) {
            loading = document.createElement('div');
            loading.className = 'loading-overlay';
            loading.innerHTML = `<div>🔄 同步配置中...</div><div style="margin-top:8px;">请稍候</div>`;
            document.body.appendChild(loading);
        }
        await loadData();
        if (loading) loading.remove();

        let { current } = getFlightChain();
        let state = getFlightState(current);
        let newMode = "single";
        if (state === "no-flight") newMode = "single";
        else if (state === "scheduled") newMode = "dual";
        else newMode = "triple";

        if (newMode === currentMode && document.getElementById('normalContainer')) {
            if (currentMode === 'single') {
                applyElementStyle('normalContainer', 'clock', 'clock-text');
                applyElementStyle('normalContainer', 'date', 'date-text');
                applyElementStyle('normalContainer', 'city', 'city-text');
                applyElementStyle('normalContainer', 'weather', 'weather-text');
            } else if (currentMode === 'dual') {
                applyElementStyle('normalContainer', 'clock', 'clock-text', 'dualLeft');
                applyElementStyle('normalContainer', 'date', 'date-text', 'dualLeft');
                applyElementStyle('normalContainer', 'city', 'city-text', 'dualLeft');
                applyElementStyle('normalContainer', 'weather', 'weather-text', 'dualLeft');
                applyElementStyle('normalContainer', 'clock', 'clock-text', 'dualRight');
                applyElementStyle('normalContainer', 'date', 'date-text', 'dualRight');
                applyElementStyle('normalContainer', 'city', 'city-text', 'dualRight');
                applyElementStyle('normalContainer', 'weather', 'weather-text', 'dualRight');
            } else {
                applyElementStyle('normalContainer', 'clock', 'clock-text', 'tripleLeft');
                applyElementStyle('normalContainer', 'date', 'date-text', 'tripleLeft');
                applyElementStyle('normalContainer', 'city', 'city-text', 'tripleLeft');
                applyElementStyle('normalContainer', 'weather', 'weather-text', 'tripleLeft');
                applyElementStyle('normalContainer', 'clock', 'clock-text', 'tripleRight');
                applyElementStyle('normalContainer', 'date', 'date-text', 'tripleRight');
                applyElementStyle('normalContainer', 'city', 'city-text', 'tripleRight');
                applyElementStyle('normalContainer', 'weather', 'weather-text', 'tripleRight');
            }
            applyColorTheme();
            return;
        }

        currentMode = newMode;
        currentFlight = current;
        document.getElementById('app').innerHTML = '';
        if (currentMode === "single") await buildSingleMode();
        else if (currentMode === "dual") await buildDualMode(current);
        else await buildTripleMode(current);
        applyColorTheme();
    }

    // ==================== Google 日历集成 ====================
    function initGoogleAuth() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: GOOGLE_SCOPE,
            callback: async (resp) => {
                if (resp.access_token) {
                    accessToken = resp.access_token;
                    showToast("✅ Google 日历授权成功，正在导入航班...");
                    await importFromGoogleCalendar();
                } else {
                    showToast("❌ 授权失败");
                }
            },
        });
        document.getElementById('googleAuthBtn').onclick = () => {
            if (tokenClient) tokenClient.requestAccessToken();
            else showToast("Google 客户端未初始化");
        };
    }

    async function importFromGoogleCalendar() {
        if (!accessToken) {
            showToast("请先授权 Google 日历");
            return;
        }
        const now = new Date();
        const end = new Date(now.getTime() + 72 * 3600000);
        const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`;
        try {
            const resp = await fetch(url, {
                headers: { Authorization: `Bearer ${accessToken}` }
            });
            const data = await resp.json();
            if (data.error) {
                showToast(`日历读取失败: ${data.error.message}`);
                return;
            }
            let importedCount = 0;
            for (const event of data.items || []) {
                const text = (event.summary || "") + " " + (event.description || "");
                const match = text.match(/\b([A-Z]{3})\b.*?\b([A-Z]{3})\b/);
                if (!match) continue;
                const origin = match[1].toUpperCase();
                const destination = match[2].toUpperCase();
                const startTime = event.start?.dateTime ? new Date(event.start.dateTime) : null;
                if (!startTime) continue;
                let flightNum = "CAL" + origin + destination;
                const fnMatch = text.match(/\b([A-Z]{2,3}\d{2,4})\b/);
                if (fnMatch) flightNum = fnMatch[1];
                const dateStr = startTime.toISOString().split('T')[0];
                const existing = (flightsDB[dateStr] || []).some(f => 
                    f.flightNumber === flightNum && f.origin === origin && f.destination === destination
                );
                if (!existing) {
                    if (!flightsDB[dateStr]) flightsDB[dateStr] = [];
                    flightsDB[dateStr].push({
                        id: Date.now() + Math.random() + importedCount,
                        flightNumber: flightNum,
                        origin: origin,
                        destination: destination,
                        departureTime: startTime.toISOString(),
                        arrivalTime: event.end?.dateTime ? new Date(event.end.dateTime).toISOString() : null,
                        source: "google_calendar"
                    });
                    importedCount++;
                }
            }
            if (importedCount > 0) {
                await saveFlightsToCloud();
                showToast(`✅ 成功导入 ${importedCount} 个航班`);
                await refreshDisplay(true);
            } else {
                showToast("📅 日历中未发现新的航班事件");
            }
        } catch (err) {
            console.error(err);
            showToast("读取日历失败，请检查网络或授权");
        }
    }

    async function saveFlightsToCloud() {
        try {
            let content = JSON.stringify({ flightsDB, lastUpdated: new Date().toISOString() }, null, 2);
            await fetch(GIST_API, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ files: { 'flight_data.json': { content } } })
            });
            console.log("航班数据已保存到云端");
        } catch(e) { console.warn("保存失败", e); }
    }

    // ==================== 初始化 ====================
    window.addEventListener('load', async () => {
        await refreshDisplay(true);
        setInterval(() => refreshDisplay(false), 300000);
        if (typeof google !== 'undefined' && google.accounts) {
            initGoogleAuth();
        } else {
            console.warn("Google Identity Services 未加载");
            document.getElementById('googleAuthBtn').style.display = 'none';
        }
    });
    document.getElementById('manualRefreshBtn').addEventListener('click', () => refreshDisplay(true));
</script>
</body>
