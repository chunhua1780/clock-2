<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迪拜飞行时钟 · 智能航线屏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #000; color: #fff; font-family: 'SF Pro Display', sans-serif; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* 布局风格保持您最喜欢的深色航空感 */
        .flight-mode { display: flex; flex-direction: column; height: 100%; width: 100%; padding: 16px; gap: 12px; background: #000; }
        .top-panel { height: 28%; background: rgba(20,25,45,0.95); backdrop-filter: blur(12px); border-radius: 32px; padding: 20px; display: flex; gap: 12px; border: 0.5px solid rgba(255,255,255,0.1); }
        .info-pane { flex: 1; background: rgba(0,0,0,0.3); border-radius: 24px; padding: 15px; }
        
        .big-time { font-size: 22vw; font-weight: 700; font-family: monospace; letter-spacing: 8px; background: linear-gradient(135deg, #fff, #88aaff); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1; }
        .bottom-split { flex: 1; display: flex; gap: 12px; min-height: 0; }
        .city-card { flex: 1; background: rgba(10,14,26,0.7); backdrop-filter: blur(8px); border-radius: 32px; padding: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        .city-name { font-size: 1.8rem; font-weight: 700; color: #88aaff; margin-bottom: 5px; }
        .big-local-clock { font-size: 6rem; font-weight: 800; font-family: monospace; color: #fff; }
        .weather-info { font-size: 1.5rem; margin-top: 10px; color: #66ffaa; }
        .date-footer { font-size: 1rem; color: #88aacc; margin-top: 10px; letter-spacing: 2px; }
        
        .hidden { display: none !important; }
        .fullscreen-mode { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(135deg, #050505, #1a1a1a); }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const DUBAI_TZ = "Asia/Dubai";
    const WEATHER_KEY = "9fcc9afb0a80a6aaa44c926e4f7827a7";

    // 机场时区映射数据库 (可扩展)
    const airportDB = {
        "DXB": { city: "迪拜", cityEn: "Dubai", tz: "Asia/Dubai" },
        "DSS": { city: "达喀尔", cityEn: "Dakar", tz: "Africa/Dakar" },
        "PVG": { city: "上海", cityEn: "Shanghai", tz: "Asia/Shanghai" },
        "CAN": { city: "广州", cityEn: "Guangzhou", tz: "Asia/Shanghai" }
    };

    let flightsDB = {};

    // 核心：从云端拉取全量日历数据
    async function syncFromCloud() {
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`);
            const data = await res.json();
            if (data.files['calendar_db.json']) {
                flightsDB = JSON.parse(data.files['calendar_db.json'].content);
                localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDB));
                render();
            }
        } catch (e) {
            console.warn("使用本地数据");
            const local = localStorage.getItem('flight_calendar_db');
            if (local) { flightsDB = JSON.parse(local); render(); }
        }
    }

    function getActiveFlight() {
        let now = new Date();
        let all = [];
        for (let d in flightsDB) flightsDB[d].forEach(f => all.push({ ...f, depTime: new Date(f.departureTime) }));
        all.sort((a, b) => a.depTime - b.depTime);
        // 寻找 12 小时内或未来最接近的一班
        return all.find(f => f.depTime > new Date(now.getTime() - 12 * 3600000));
    }

    async function render() {
        const active = getActiveFlight();
        const app = document.getElementById('app');

        if (!active) {
            app.innerHTML = `<div class="fullscreen-mode"><div class="big-time" id="fs-clock">--:--</div><div class="date-footer" id="fs-date">--</div></div>`;
            updateFsClock();
            return;
        }

        const origin = airportDB[active.origin.toUpperCase()] || { city: active.origin, cityEn: active.origin, tz: "UTC" };
        const dest = airportDB[active.destination.toUpperCase()] || { city: active.destination, cityEn: active.destination, tz: "UTC" };

        app.innerHTML = `
            <div class="flight-mode">
                <div class="top-panel">
                    <div class="info-pane">
                        <div style="font-size:1.8rem; font-weight:800; color:#ffd966;">✈️ ${active.flightNumber}</div>
                        <div style="font-size:1.2rem;">${origin.city} (${active.origin}) ➔ ${dest.city} (${active.destination})</div>
                    </div>
                    <div class="info-pane" style="text-align:center; border-left:1px solid #333; border-right:1px solid #333;">
                        <div style="font-size:1rem; color:#88aacc;">${origin.city} 起飞时刻 (当地)</div>
                        <div style="font-size:2.5rem; font-weight:bold; color:#66ffaa;">${active.departureTime.split('T')[1].substring(0,5)}</div>
                    </div>
                    <div class="info-pane">
                        <div style="font-size:0.8rem; color:#ffaa66;">📡 航行通告 (NOTAM)</div>
                        <div style="font-size:0.7rem; margin-top:5px;">GPS NOMINAL / WEATHER CLEAR</div>
                    </div>
                </div>
                <div class="bottom-split">
                    <div class="city-card">
                        <div class="city-name">迪拜 DUBAI</div>
                        <div class="big-local-clock" id="dxb-clock">00:00:00</div>
                        <div class="weather-info" id="dxb-wx">--°C</div>
                        <div class="date-footer" id="dxb-date">--</div>
                    </div>
                    <div class="city-card">
                        <div class="city-name">${origin.city.toUpperCase()} ${origin.cityEn.toUpperCase()}</div>
                        <div class="big-local-clock" id="loc-clock">00:00:00</div>
                        <div class="weather-info" id="loc-wx">--°C</div>
                        <div class="date-footer" id="loc-date">--</div>
                    </div>
                </div>
            </div>
        `;
        startLiveClocks(origin.tz);
        fetchWeather(active.origin, 'loc-wx');
        fetchWeather('DXB', 'dxb-wx');
    }

    async function fetchWeather(city, elementId) {
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${WEATHER_KEY}`);
            const data = await res.json();
            document.getElementById(elementId).innerText = `${Math.round(data.main.temp)}°C ${data.weather[0].main}`;
        } catch (e) {}
    }

    function startLiveClocks(localTz) {
        if (window.t) clearInterval(window.t);
        window.t = setInterval(() => {
            const n = new Date();
            if (document.getElementById('dxb-clock')) {
                document.getElementById('dxb-clock').innerText = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour12: false });
                document.getElementById('dxb-date').innerText = n.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, month: 'short', day: 'numeric', weekday: 'short' }).toUpperCase();
            }
            if (document.getElementById('loc-clock')) {
                document.getElementById('loc-clock').innerText = n.toLocaleTimeString('en-GB', { timeZone: localTz, hour12: false });
                document.getElementById('loc-date').innerText = n.toLocaleDateString('en-US', { timeZone: localTz, month: 'short', day: 'numeric', weekday: 'short' }).toUpperCase();
            }
        }, 1000);
    }

    function updateFsClock() {
        setInterval(() => {
            const n = new Date();
            const el = document.getElementById('fs-clock');
            if (el) el.innerText = n.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour: '2-digit', minute: '2-digit', hour12: false });
        }, 1000);
    }

    syncFromCloud();
    setInterval(syncFromCloud, 300000); // 5分钟强刷一次
</script>
</body>
</html>
