            padding: 16px;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            gap: 16px;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 14, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 8px 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .auth-status {
            font-size: 0.75rem;
            color: #88aacc;
        }
        .auth-status.connected {
            color: #66ffaa;
        }
        .auth-btn {
            background: #ffaa44;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* 上方 1/4 航班动态区域 */
        .flight-area {
            height: 25%;
            background: linear-gradient(135deg, #0a0e1a 0%, #0c1020 100%);
            border-radius: 28px;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-y: auto;
        }

        .flight-progress {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .flight-info-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .flight-number-large {
            font-size: 1.6rem;
            font-weight: 800;
            color: #ffd966;
        }

        .flight-status-badge {
            background: #00aa55;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .flight-schedule {
            font-size: 0.8rem;
            background: #1a1f2a;
            padding: 10px;
            border-radius: 16px;
            margin: 8px 0;
        }

        /* NOTAM 警告区域 */
        .notam-warning {
            background: rgba(255, 68, 68, 0.15);
            border-left: 3px solid #ff4444;
            padding: 8px 12px;
            border-radius: 12px;
            margin-top: 8px;
            font-size: 0.7rem;
        }
        .notam-warning.critical {
            background: rgba(255, 0, 0, 0.25);
            border-left-color: #ff0000;
        }
        .notam-warning.info {
            background: rgba(68, 136, 255, 0.15);
            border-left-color: #4488ff;
        }

        /* 下方 3/4 左右分屏 */
        .bottom-area {
            height: 75%;
            display: flex;
            gap: 12px;
        }

        .city-panel {
            flex: 1;
            background: #0a0e1a;
            border-radius: 28px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow-y: auto;
        }

        .city-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            border-bottom: 1px solid #223344;
            padding-bottom: 12px;
        }

        .city-name {
            font-size: 1.6rem;
            font-weight: 700;
            color: #88aaff;
        }

        .weather-icon {
            font-size: 2.5rem;
            text-align: center;
            margin: 10px 0;
        }

        .weather-temp {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
        }

        .weather-desc {
            text-align: center;
            color: #aabbdd;
            margin: 5px 0;
            font-size: 0.85rem;
        }

            text-align: center;
            background: #1a1f2e;
            padding: 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        .city-clock {
            text-align: center;
            margin-top: auto;
            padding-top: 20px;
        }

        .clock-time {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: 'Monaco', monospace;
            letter-spacing: 2px;
        }

        .clock-date {
            font-size: 0.7rem;
            color: #88aacc;
            margin-top: 5px;
        }

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #ffaa66;
        }

        .label-sm {
            font-size: 0.65rem;
            color: #6699cc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .flight-meta {
            font-size: 0.7rem;
            color: #88aacc;
        }

            background: #2a2a3a;
            border-radius: 12px;
            height: 6px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            width: 0%;
            height: 100%;
            transition: width 0.5s ease;
        }

        hr {
            border-color: #223344;
            margin: 10px 0;

        }

        }
        .loading {

    // 智能获取机场信息（支持 ICAO 代码查询，支持模糊匹配）
    function getAirportInfo(code) {
        code = code.toUpperCase();
        // 直接匹配 IATA
        if (airportDatabase[code]) return airportDatabase[code];
        // 尝试通过 ICAO 匹配
        for (let key in airportDatabase) {
            if (airportDatabase[key].icao === code) {
                return airportDatabase[key];
            }
        }
        // 返回默认值（使用迪拜作为默认）
        return { name: code, city: code, country: "未知", lat: 25.2532, lon: 55.3657, tz: "Asia/Dubai", icao: "XXXX" };
    }
    
    // 批量添加机场到数据库的函数（用于扩展）
    function addAirport(iata, name, city, country, lat, lon, tz, icao) {
        airportDatabase[iata.toUpperCase()] = { name, city, country, lat, lon, tz, icao };
    }
    
    // ============================================================
    // 📡 NOTAM 接口（使用 Aviationstack 获取机场通告）
    // 由于直接免费 NOTAM API 较少，这里：
    // 1. 优先使用 Aviationstack 的航班状态信息
    // 2. 提供模拟 NOTAM 数据作为展示
    // 3. 后续可接入 FAA/EASA 官方接口
    // ============================================================
    
    // NOTAM 关键词映射（用于从航班状态中提取风险信息）

        "delay": ["延迟", "延误", "晚点", "delay", "delayed", "late"],

        "technical": ["技术故障", "机械故障", "technical issue", "maintenance", "维修"]
    };
    
    // 获取 NOTAM 信息（模拟 + 航班状态分析）
    async function fetchNOTAM(airportCode, flightStatus = null) {
        const airport = getAirportInfo(airportCode);
        const notamList = [];
        
        // 方法1：从 Aviationstack 航班状态中提取信息
        if (flightStatus && flightStatus.flight && flightStatus.flight.status) {
            const status = flightStatus.flight.status;
            if (status === "delayed") {
                notamList.push({ type: "warning", text: "⚠️ 航班状态：延误", detail: "建议联系航司确认最新起飞时间" });
            } else if (status === "cancelled") {
                notamList.push({ type: "critical", text: "❌ 航班状态：已取消", detail: "请立即联系航司改签" });
            } else if (status === "diverted") {
                notamList.push({ type: "warning", text: "🔄 航班状态：备降", detail: "原定目的地已更改" });

        // 方法2：基于机场的模拟 NOTAM 数据（演示用）

    // 渲染 NOTAM 到界面
    function renderNOTAM(containerId, notamList) {
        const container = document.getElementById(containerId);
        if (!container) return;
        
        if (!notamList || notamList.length === 0) {
            container.innerHTML = `
                <div class="label-sm">📡 NOTAM 航行通告</div>
                <div class="loading">暂无通告</div>
            `;
            return;
        }
        
        let html = `<div class="label-sm">📡 NOTAM 航行通告</div><div class="notam-list">`;
        for (const notam of notamList) {
            const typeClass = notam.type === "critical" ? "critical" : (notam.type === "warning" ? "notam-warning" : "info");
            html += `<div class="notam-item">${notam.text}</div>`;
            if (notam.detail) {
                html += `<div style="font-size:0.6rem; color:#88aacc; margin-left:8px; margin-bottom:6px;">${notam.detail}</div>`;
            }
        }
        html += `</div>`;
        container.innerHTML = html;
    }

    async function fetchWeather(lat, lon, airportCode) {

            const response = await fetch(url);
            const data = await response.json();
            
            if (data.cod === 200) {
                let dress = "舒适";
                const temp = data.main.temp;
                if (temp < 0) dress = "羽绒服+厚围巾+手套";
                else if (temp < 5) dress = "羽绒服+围巾";
                else if (temp < 10) dress = "厚外套+毛衣";
                else if (temp < 15) dress = "风衣/夹克";
                else if (temp < 20) dress = "长袖+薄外套";
                else if (temp < 25) dress = "长袖/短袖+薄外套";
                else if (temp < 30) dress = "短袖+薄长裤";
                else dress = "短袖+防晒+帽子";
                
                const iconMap = {
                    "Clear": "☀️", "Clouds": "☁️", "Rain": "🌧️", "Snow": "❄️",
                    "Thunderstorm": "⛈️", "Drizzle": "🌦️", "Mist": "🌫️", "Fog": "🌫️"
                };
                
                return {
                    temp: Math.round(data.main.temp),
                    desc: data.weather[0].description,
                    icon: iconMap[data.weather[0].main] || "🌍",
                    dress: dress,
                    humidity: data.main.humidity,
                    feelsLike: Math.round(data.main.feels_like)
                };
            }
            return getMockWeather(airportCode);
        } catch (error) {
            return getMockWeather(airportCode);
        }
    }
    
    function getMockWeather(airportCode) {
        const mock = {
            "DXB": { temp: 32, desc: "晴", icon: "☀️", dress: "短袖+防晒", humidity: 45, feelsLike: 34 },
            "PVG": { temp: 18, desc: "多云", icon: "☁️", dress: "薄外套", humidity: 65, feelsLike: 17 },
            "PEK": { temp: 22, desc: "晴", icon: "☀️", dress: "长袖", humidity: 40, feelsLike: 21 },
            "LHR": { temp: 14, desc: "小雨", icon: "🌧️", dress: "风衣+雨具", humidity: 80, feelsLike: 12 },
            "JFK": { temp: 12, desc: "阴", icon: "☁️", dress: "夹克", humidity: 70, feelsLike: 10 }
        };
        return mock[airportCode] || { temp: 22, desc: "晴", icon: "☀️", dress: "舒适", humidity: 55, feelsLike: 21 };
    }
    
    // ============================================================
    // 航班信息获取（Aviationstack）
    // ============================================================
    async function fetchFlightInfo(flightNumber) {
        try {
            const url = `https://api.aviationstack.com/v1/flights?access_key=${AVIATIONSTACK_KEY}&flight_iata=${flightNumber}&limit=1`;
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.error) {
                console.error("API错误:", data.error);
                return null;
            }
            
            if (data.data && data.data.length > 0) {
                return data.data[0];
            }
            return null;
        } catch (error) {
            console.error("航班查询失败:", error);
            return null;
        }
    }
    
    // ============================================================
    // Google 日历集成
    // ============================================================
    let accessToken = null;
    let currentFlight = null;
    let clockInterval = null;
    let tokenClient = null;
    
    function initGoogleAuth() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/calendar.readonly',
            callback: async (response) => {
                if (response.access_token) {
                    accessToken = response.access_token;
                    document.getElementById('authStatus').innerHTML = '✅ 已连接 Google 日历';
                    document.getElementById('authStatus').classList.add('connected');
                    await fetchCalendarEvents();
                }
            },
        });
        
        document.getElementById('authBtn').onclick = () => {
            if (accessToken) {
                tokenClient.requestAccessToken({ prompt: '' });
            } else {
                tokenClient.requestAccessToken();
            }
        };
    }
    
    async function fetchCalendarEvents() {
        if (!accessToken) return;
        try {
            const now = new Date();
            const next24h = new Date(now.getTime() + 24 * 3600000);
            const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${now.toISOString()}&timeMax=${next24h.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=10`;
            
            const response = await fetch(url, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await response.json();
            
            if (data.error) {
                if (data.error.code === 401) {
                    accessToken = null;
                    document.getElementById('authStatus').innerHTML = '🔐 会话过期，请重新连接';
                    document.getElementById('authStatus').classList.remove('connected');
                }
                return;
            }
            
            let foundFlight = null;
            if (data.items && data.items.length > 0) {
                for (const event of data.items) {
                    const flightInfo = parseFlightFromEvent(event);
                    if (flightInfo) {
                        foundFlight = flightInfo;
                        break;
                    }
                }
            }
            
            if (foundFlight) {
                currentFlight = foundFlight;
                await displayFullFlightInfo(currentFlight);
            } else {
                showNoFlight();
            }
        } catch (error) {
            console.error("读取日历失败:", error);
        }
    }
    
    function parseFlightFromEvent(event) {
        const title = event.summary || '';
        let match = title.match(/([A-Z]{3})[-→➡\s]+([A-Z]{3})/);
        if (!match) {
            const codes = title.match(/\b([A-Z]{3})\b/g);
            if (codes && codes.length >= 2) {
                match = [null, codes[0], codes[1]];
            }
        }
        
        if (match && match[1] && match[2]) {
            const origin = match[1].toUpperCase();
            const destination = match[2].toUpperCase();
            const startTime = event.start.dateTime ? new Date(event.start.dateTime) : null;
            
            if (!startTime) return null;
            
            let flightNumber = "";
            const flightMatch = title.match(/([A-Z]{2,3}\d{1,4})/i);
            if (flightMatch) {
                flightNumber = flightMatch[1].toUpperCase();
            } else {
                flightNumber = `FL${origin}${destination}`;
            }
            
            return {
                flightNumber: flightNumber,
                origin: origin,
                destination: destination,
                departureTime: startTime,
                pickupTime: new Date(startTime.getTime() - 135 * 60000),
                rawTitle: title
            };
        }
        return null;
    }
    
    // ============================================================
    // 完整显示航班信息（含 NOTAM）
    // ============================================================
    async function displayFullFlightInfo(flight) {
        // 获取机场信息（使用内置数据库）
        const originInfo = getAirportInfo(flight.origin);
        const destInfo = getAirportInfo(flight.destination);
        
        // 更新面板标题
        document.getElementById('originCode').innerText = flight.origin;
        document.getElementById('originName').innerHTML = `${originInfo.city || originInfo.name} · ${originInfo.country}`;
        document.getElementById('destCode').innerText = flight.destination;
        document.getElementById('destName').innerHTML = `${destInfo.city || destInfo.name} · ${destInfo.country}`;
        
        // 计算时间
        const depTime = flight.departureTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const depDate = flight.departureTime.toLocaleDateString([], { month: 'numeric', day: 'numeric' });
        const pickupTime = flight.pickupTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        
        const now = new Date();
        const isDeparted = now > flight.departureTime;
        const statusText = isDeparted ? "🟢 已起飞" : "⏰ 等待起飞";
        const statusClass = isDeparted ? "flight-status-badge" : "flight-status-badge";
        
        // 获取航班状态（用于 NOTAM）
        let flightStatusData = null;
        try {
            flightStatusData = await fetchFlightInfo(flight.flightNumber);
        } catch(e) {}
        
        // 获取 NOTAM
        const originNotams = await fetchNOTAM(flight.origin, flightStatusData);
        const destNotams = await fetchNOTAM(flight.destination, flightStatusData);
        
        // 更新航班面板
        document.getElementById('flightPanel').innerHTML = `
            <div class="flight-progress">
                <div class="flight-info-row">
                    <span class="flight-number-large">✈️ ${flight.flightNumber}</span>
                    <span class="${statusClass}">${statusText}</span>
                </div>
                <div class="flight-schedule">
                    <div>🛫 ${flight.origin} → ${flight.destination}</div>
                    <div>📅 起飞: ${depDate} ${depTime}</div>
                    <div>🚗 接车时间: ${pickupTime} (起飞前2h15m)</div>
                    <div>📋 日历事件: ${flight.rawTitle}</div>
                </div>
            </div>
        `;
        
        // 获取天气
        const originWeather = await fetchWeather(originInfo.lat, originInfo.lon, flight.origin);
        const destWeather = await fetchWeather(destInfo.lat, destInfo.lon, flight.destination);
        
        if (originWeather) {
            document.getElementById('originWeather').innerHTML = `
                <div class="weather-icon">${originWeather.icon}</div>
                <div class="weather-temp">${originWeather.temp}°C</div>
                <div class="weather-desc">${originWeather.desc} | 体感 ${originWeather.feelsLike}°C | 💧${originWeather.humidity}%</div>
                <div class="dress-tip">👕 ${originWeather.dress}</div>
            `;
        }
        
        if (destWeather) {
            document.getElementById('destWeather').innerHTML = `
                <div class="weather-icon">${destWeather.icon}</div>
                <div class="weather-temp">${destWeather.temp}°C</div>
                <div class="weather-desc">${destWeather.desc} | 体感 ${destWeather.feelsLike}°C | 💧${destWeather.humidity}%</div>
                <div class="dress-tip">👕 ${destWeather.dress}</div>
            `;
        }
        
        // 渲染 NOTAM
        renderNOTAM('originNotam', originNotams);
        renderNOTAM('destNotam', destNotams);
        
        // 启动双时钟
        startDualClocks(originInfo.tz, destInfo.tz);
    }
    
    function startDualClocks(originTz, destTz) {
        if (clockInterval) clearInterval(clockInterval);
        
        function update() {
            try {
                const originTime = new Date().toLocaleTimeString('zh-CN', { timeZone: originTz, hour12: false });
                const originDate = new Date().toLocaleDateString('zh-CN', { timeZone: originTz, weekday: 'long', month: 'long', day: 'numeric' });
                document.getElementById('originTime').innerHTML = originTime;
                document.getElementById('originDate').innerHTML = originDate;
            } catch(e) {
                document.getElementById('originTime').innerHTML = new Date().toLocaleTimeString();
                document.getElementById('originDate').innerHTML = new Date().toLocaleDateString();
            }
            
            try {
                const destTime = new Date().toLocaleTimeString('zh-CN', { timeZone: destTz, hour12: false });
                const destDate = new Date().toLocaleDateString('zh-CN', { timeZone: destTz, weekday: 'long', month: 'long', day: 'numeric' });
                document.getElementById('destTime').innerHTML = destTime;
                document.getElementById('destDate').innerHTML = destDate;
            } catch(e) {
                document.getElementById('destTime').innerHTML = new Date().toLocaleTimeString();
                document.getElementById('destDate').innerHTML = new Date().toLocaleDateString();
            }
        }
        
        update();
        clockInterval = setInterval(update, 1000);
    }
    
    function showNoFlight() {
        const dubaiInfo = getAirportInfo("DXB");
        document.getElementById('originCode').innerText = "DXB";
        document.getElementById('originName').innerHTML = `${dubaiInfo.city} · ${dubaiInfo.country}`;
        document.getElementById('destCode').innerText = "---";
        document.getElementById('destName').innerHTML = "等待航班";
        
        document.getElementById('flightPanel').innerHTML = `
            <div class="standby-mode">
                <div>📅 未来24小时无航班</div>
                <div class="flight-meta">在日历中添加 "DXB→PVG" 格式的事件</div>
            </div>
        `;
        
        if (clockInterval) clearInterval(clockInterval);
        clockInterval = setInterval(() => {
            const dubaiTime = new Date().toLocaleTimeString('zh-CN', { timeZone: dubaiInfo.tz, hour12: false });
            const dubaiDate = new Date().toLocaleDateString('zh-CN', { timeZone: dubaiInfo.tz, weekday: 'long', month: 'long', day: 'numeric' });
            document.getElementById('originTime').innerHTML = dubaiTime;
            document.getElementById('originDate').innerHTML = dubaiDate;
            document.getElementById('destTime').innerHTML = '--:--:--';
            document.getElementById('destDate').innerHTML = '';
        }, 1000);
    }
    
    // ============================================================
    // 初始化
    // ============================================================
    setInterval(() => {
        document.title = "✈️ " + new Date().toLocaleTimeString();
    }, 10000);
    
    window.addEventListener('load', () => {
        initGoogleAuth();
        
        // 默认显示迪拜天气
        const dubaiInfo = getAirportInfo("DXB");
        (async () => {
            const weather = await fetchWeather(dubaiInfo.lat, dubaiInfo.lon, "DXB");
            if (weather) {
                document.getElementById('originWeather').innerHTML = `
                    <div class="weather-icon">${weather.icon}</div>
                    <div class="weather-temp">${weather.temp}°C</div>
                    <div class="weather-desc">${weather.desc} | 体感 ${weather.feelsLike}°C</div>
                    <div class="dress-tip">👕 ${weather.dress}</div>
                `;
            }
        })();
    });
</script>
