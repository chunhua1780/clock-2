<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Pilot Clock API HUB</title>

<style>
body {margin:0;background:black;color:white;font-family:Arial;}
#app {height:100vh;display:flex;flex-direction:column;}
#top {height:25%;display:flex;border-bottom:1px solid #333;}
#bottom {height:75%;display:flex;justify-content:center;align-items:center;flex-direction:column;}

.panel{flex:1;padding:10px;}
#clock{font-size:140px;font-weight:bold;}
#weather{font-size:26px;}

.control-btn{
position:absolute;width:100px;height:100px;
background:rgba(255,255,255,0.08);
border-radius:15px;
display:flex;justify-content:center;align-items:center;
font-size:30px;opacity:0;transition:.3s;
}
#settingsBtn{top:20px;right:20px;}
#flightBtn{bottom:20px;right:20px;}

.modal{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#111;padding:20px;
border:1px solid #444;
width:360px;display:none;z-index:10;
max-height:80vh;overflow:auto;
}

input{width:100%;margin:5px 0;}
button{margin-top:10px;}

.section-title{margin-top:10px;color:#aaa;font-size:12px;}
</style>
</head>

<body>

<div id="app">

<div id="top">
<div class="panel" id="flightInfo">无航班</div>
<div class="panel" id="destWeather">--</div>
<div class="panel" id="notam">--</div>
</div>

<div id="bottom">
<div id="clock"></div>
<div id="weather">Loading...</div>
</div>

</div>

<!-- 控制 -->
<div id="settingsBtn" class="control-btn">⚙️</div>
<div id="flightBtn" class="control-btn">✈️</div>

<!-- 设置 -->
<div id="settingsModal" class="modal">

<h3>⚙️ 系统 + API HUB</h3>

<div class="section-title">UI</div>

字体大小
<input type="range" id="fontSize" min="80" max="200">

颜色
<input type="color" id="color">

<hr>

<div class="section-title">🌤 Weather API</div>
OpenWeather Key
<input id="weatherKey">

<hr>

<div class="section-title">✈️ Flight API (Aviationstack)</div>
API Key
<input id="flightKey">

<hr>

<div class="section-title">🛰 OpenSky API</div>
Client ID
<input id="openSkyId">

Client Secret
<input id="openSkySecret">

<hr>

<div class="section-title">📅 Google Calendar</div>
Client ID
<input id="googleId">

Client Secret
<input id="googleSecret">

<hr>

<div class="section-title">🧩 Custom APIs（预留扩展）</div>
Custom API 1
<input id="custom1">

Custom API 2
<input id="custom2">

<button onclick="saveAll()">💾 保存全部配置</button>

</div>

<!-- 航班 -->
<div id="flightModal" class="modal">

<h3>✈️ 航班录入</h3>

航班号
<input id="fNo">

出发
<input id="fFrom">

目的地
<input id="fTo">

起飞
<input type="time" id="fDep">

落地
<input type="time" id="fArr">

<button onclick="saveFlight()">保存航班</button>

</div>

<script>

/* =========================
   核心 CONFIG HUB
========================= */

function getConfig(){
return JSON.parse(localStorage.getItem("CONFIG_HUB")||"{}");
}

function saveConfig(cfg){
localStorage.setItem("CONFIG_HUB",JSON.stringify(cfg));
}

/* =========================
   UI控制（点击唤醒）
========================= */

let timer;

document.body.onclick=()=>{
settingsBtn.style.opacity=1;
flightBtn.style.opacity=1;

clearTimeout(timer);
timer=setTimeout(()=>{
settingsBtn.style.opacity=0;
flightBtn.style.opacity=0;
},5000);
};

/* =========================
   时钟
========================= */

setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString("en-GB",{hour12:false});
},1000);

/* =========================
   设置打开
========================= */

settingsBtn.onclick=e=>{
e.stopPropagation();
loadConfigToUI();
settingsModal.style.display="block";
};

flightBtn.onclick=e=>{
e.stopPropagation();
flightModal.style.display="block";
};

/* =========================
   保存全部API
========================= */

function saveAll(){

let cfg={
ui:{
fontSize:fontSize.value,
color:color.value
},

weather:{
key:weatherKey.value
},

flight:{
key:flightKey.value
},

opensky:{
id:openSkyId.value,
secret:openSkySecret.value
},

google:{
id:googleId.value,
secret:googleSecret.value
},

custom:{
c1:custom1.value,
c2:custom2.value
}
};

saveConfig(cfg);
applyUI();
checkAPI();
settingsModal.style.display="none";
}

/* =========================
   读取UI
========================= */

function loadConfigToUI(){
let c=getConfig();

fontSize.value=c.ui?.fontSize||140;
color.value=c.ui?.color||"#ffffff";

weatherKey.value=c.weather?.key||"";
flightKey.value=c.flight?.key||"";

openSkyId.value=c.opensky?.id||"";
openSkySecret.value=c.opensky?.secret||"";

googleId.value=c.google?.id||"";
googleSecret.value=c.google?.secret||"";

custom1.value=c.custom?.c1||"";
custom2.value=c.custom?.c2||"";
}

/* =========================
   UI应用
========================= */

function applyUI(){
let c=getConfig();

clock.style.fontSize=(c.ui?.fontSize||140)+"px";
document.body.style.color=c.ui?.color||"#fff";
}

/* =========================
   API状态检测
========================= */

function checkAPI(){
let c=getConfig();

weather.innerText = c.weather?.key ? "Weather Ready" : "Weather NOT SET";
}

/* =========================
   天气（预留真实API）
========================= */

async function loadWeather(){

let c=getConfig();
if(!c.weather?.key){
weather.innerText="No Weather API";
return;
}

// 示例（迪拜）
try{
let r=await fetch(
`https://api.openweathermap.org/data/2.5/weather?q=Dubai&appid=${c.weather.key}&units=metric`
);

let d=await r.json();

weather.innerText=
`Dubai ${d.main.temp}°C`;

}catch{
weather.innerText="Weather Error";
}
}

/* =========================
   航班
========================= */

function saveFlight(){

let no=fNo.value;
if(!no.startsWith("EK")) no="EK"+no;

let f={
no,
from:fFrom.value,
to:fTo.value,
dep:fDep.value,
arr:fArr.value
};

localStorage.setItem("FLIGHT",JSON.stringify(f));
loadFlight();

flightModal.style.display="none";
}

function loadFlight(){

let f=JSON.parse(localStorage.getItem("FLIGHT"));
if(!f) return;

flightInfo.innerText=
`${f.no}
${f.from} → ${f.to}
${f.dep} - ${f.arr}`;

}

/* =========================
   初始化
========================= */

applyUI();
checkAPI();
loadWeather();
loadFlight();

</script>

</body>
</html>
