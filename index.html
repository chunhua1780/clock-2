<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>飞行时钟</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; height: 100vh; overflow: hidden; transition: all 1s; }
        .layout { width: 100%; height: 100%; position: relative; }
        .clock-text { font-weight: bold; position: absolute; transform: translate(-50%, -50%); }
        .flight-bar { position: absolute; top: 20px; width: 100%; text-align: center; color: #ffaa44; font-size: 20px; }
        .dual-container { display: flex; width: 100%; height: 100%; }
        .panel { flex: 1; position: relative; border-right: 1px solid #333; }
    </style>
</head>
<body>
    <div id="display"></div>

<script>
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    
    async function refresh() {
        try {
            const resp = await fetch(`https://api.github.com/gists/${GIST_ID}?t=${Date.now()}`);
            const data = await resp.json();
            const flight = JSON.parse(data.files['flight_data.json'].content);
            const layout = JSON.parse(data.files['clock_layout.json'].content);
            render(flight, layout);
        } catch(e) { console.log("等待同步..."); }
    }

    function render(f, l) {
        const box = document.getElementById('display');
        const isDual = f && (new Date(f.std) - new Date() < 24 * 3600000); // 24小时内任务开启双屏

        if(!isDual) {
            box.innerHTML = `
                <div class="layout">
                    <div class="clock-text" id="t1" style="left:${l.clock.left}; top:${l.clock.top}; font-size:20vw">00:00</div>
                </div>`;
        } else {
            box.innerHTML = `
                <div class="flight-bar">✈️ ${f.flightNo} | ${f.dep} ➔ ${f.arr}</div>
                <div class="dual-container">
                    <div class="panel"><div class="clock-text" style="left:50%; top:50%; font-size:12vw" id="t1">00:00</div></div>
                    <div class="panel"><div class="clock-text" style="left:50%; top:50%; font-size:12vw" id="t2">00:00</div></div>
                </div>`;
        }
        startClocks(isDual, f ? f.std : null);
    }

    function startClocks(dual, std) {
        if(window.timer) clearInterval(window.timer);
        window.timer = setInterval(() => {
            const now = new Date();
            if(document.getElementById('t1')) document.getElementById('t1').innerText = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', timeZone:'Asia/Dubai'});
            if(dual && document.getElementById('t2')) {
                // 模拟起飞机场时间（此处逻辑可根据AIRPORT_DB扩展）
                document.getElementById('t2').innerText = now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
            }
        }, 1000);
    }

    refresh();
    setInterval(refresh, 30000); // 30秒拉取一次云端
</script>
</body>
</html>
