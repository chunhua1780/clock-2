<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>时钟配置工坊 · 锁定版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0e1a;
            color: #fff;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 1.5rem;
            color: #ffaa44;
        }
        .lock-area {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .lock-btn {
            background: #2a6faa;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .unlock-btn {
            background: #ffaa44;
            color: #0a0e1a;
        }
        /* 模式切换 */
        .mode-bar {
            display: flex;
            gap: 10px;
            background: #11161f;
            border-radius: 60px;
            padding: 6px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 40px;
            font-weight: 600;
            background: #1a1f2e;
            color: #88aacc;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #ffaa44;
            color: #0a0e1a;
        }
        /* 画布 */
        .canvas {
            background: linear-gradient(135deg, #0a0a2a, #1a2a4a);
            border-radius: 48px;
            position: relative;
            margin-bottom: 24px;
            touch-action: none;
            aspect-ratio: 4 / 3;
            overflow: hidden;
        }
        .canvas.portrait {
            aspect-ratio: 3 / 4;
        }
        .layout {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .layout.hidden {
            display: none;
        }
        .draggable {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: grab;
            touch-action: none;
            background: transparent;
            white-space: nowrap;
            z-index: 10;
        }
        .draggable:active {
            cursor: grabbing;
        }
        .clock {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
        }
        .date {
            font-size: 16px;
            opacity: 0.8;
        }
        .weather {
            font-size: 20px;
        }
        /* 双屏/三屏布局辅助 */
        .dual-container, .triple-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .panel {
            flex: 1;
            position: relative;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .panel:last-child {
            border-right: none;
        }
        .triple-container {
            flex-direction: column;
        }
        .triple-top {
            height: 30%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }
        .triple-bottom {
            flex: 1;
            display: flex;
        }
        /* 控制面板 */
        .control-panel {
            background: #11161f;
            border-radius: 32px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: #ffaa44;
            margin-bottom: 12px;
        }
        .slider-group {
            margin-bottom: 12px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 4px;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #2a3344;
            border-radius: 4px;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffaa44;
            cursor: pointer;
        }
        input[type="color"] {
            width: 100%;
            height: 36px;
            border-radius: 20px;
            border: none;
            background: #1a1f2e;
            cursor: pointer;
        }
        .style-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px,1fr));
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
        }
        .style-card {
            background: #1a1f2e;
            border-radius: 20px;
            padding: 6px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .style-card.selected {
            border-color: #ffaa44;
        }
        button {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            border: none;
        }
        .btn-primary {
            background: #ffaa44;
            color: #0a0e1a;
        }
        .btn-secondary {
            background: #2a6faa;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #ffaa44;
            color: #0a0e1a;
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            animation: fadeOut 2s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .password-dialog {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .password-box {
            background: #1a1f2e;
            border-radius: 32px;
            padding: 24px;
            width: 280px;
            text-align: center;
        }
        .password-box input {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: none;
            margin: 12px 0;
            background: #0a0e1a;
            color: white;
        }
        .hidden {
            display: none;
        }
        .disabled {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎨 时钟配置工坊</h1>
        <div class="lock-area">
            <button id="lockBtn" class="lock-btn">🔒 锁定配置</button>
        </div>
    </div>

    <div class="mode-bar">
        <div class="mode-btn active" data-mode="single">单屏</div>
        <div class="mode-btn" data-mode="dual">双屏</div>
        <div class="mode-btn" data-mode="triple">三屏</div>
    </div>

    <!-- 画布区 -->
    <div id="canvas" class="canvas landscape">
        <!-- 单屏布局 -->
        <div id="singleLayout" class="layout">
            <div class="draggable" data-type="clock" style="left:50%; top:35%;">
                <div class="clock">12:34</div>
            </div>
            <div class="draggable" data-type="date" style="left:50%; top:75%;">
                <div class="date">Monday</div>
            </div>
            <div class="draggable" data-type="weather" style="left:85%; top:15%;">
                <div class="weather">☀️ 32°C</div>
            </div>
        </div>
        <!-- 双屏布局 -->
        <div id="dualLayout" class="layout hidden">
            <div class="dual-container">
                <div class="panel" id="dualLeft">
                    <div class="draggable" data-type="clock" style="left:50%; top:40%;"><div class="clock">12:34</div></div>
                    <div class="draggable" data-type="weather" style="left:80%; top:15%;"><div class="weather">☀️ 32°C</div></div>
                </div>
                <div class="panel" id="dualRight">
                    <div class="draggable" data-type="clock" style="left:50%; top:40%;"><div class="clock">12:34</div></div>
                    <div class="draggable" data-type="weather" style="left:80%; top:15%;"><div class="weather">☀️ 28°C</div></div>
                </div>
            </div>
            <div class="info-badge" style="position:absolute; top:10px; left:10px; right:10px; background:rgba(0,0,0,0.5); border-radius:20px; padding:5px; text-align:center; font-size:0.6rem;">✈️ 计划航班 · DXB → PVG</div>
        </div>
        <!-- 三屏布局 -->
        <div id="tripleLayout" class="layout hidden">
            <div class="triple-container">
                <div class="triple-top">✈️ 飞行中 · DXB → PVG</div>
                <div class="triple-bottom">
                    <div class="panel" id="tripleLeft">
                        <div class="draggable" data-type="clock" style="left:50%; top:40%;"><div class="clock">12:34</div></div>
                        <div class="draggable" data-type="weather" style="left:80%; top:15%;"><div class="weather">☀️ 32°C</div></div>
                    </div>
                    <div class="panel" id="tripleRight">
                        <div class="draggable" data-type="clock" style="left:50%; top:40%;"><div class="clock">12:34</div></div>
                        <div class="draggable" data-type="weather" style="left:80%; top:15%;"><div class="weather">🌤️ 28°C</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="section-title">🎯 选中元素调节</div>
        <div class="slider-group">
            <div class="slider-label">字体大小 <span id="fontSizeVal">48</span>px</div>
            <input type="range" id="fontSlider" min="12" max="120" step="2" value="48">
        </div>
        <div class="slider-group">
            <div class="slider-label">X 位置 (%) <span id="xVal">50</span>%</div>
            <input type="range" id="xSlider" min="0" max="100" step="1" value="50">
        </div>
        <div class="slider-group">
            <div class="slider-label">Y 位置 (%) <span id="yVal">50</span>%</div>
            <input type="range" id="ySlider" min="0" max="100" step="1" value="50">
        </div>
    </div>

    <div class="control-panel">
        <div class="section-title">🎴 翻页风格</div>
        <div class="style-grid" id="flipGrid"></div>
    </div>
    <div class="control-panel">
        <div class="section-title">📝 艺术字体</div>
        <div class="style-grid" id="fontGrid"></div>
    </div>
    <div class="control-panel">
        <div class="section-title">🎨 主题颜色</div>
        <div class="slider-group"><div class="slider-label">白天背景</div><input type="color" id="dayBg" value="#e8f0f5"></div>
        <div class="slider-group"><div class="slider-label">白天文字</div><input type="color" id="dayText" value="#1a2a3a"></div>
        <div class="slider-group"><div class="slider-label">夜晚背景</div><input type="color" id="nightBg" value="#0a0e1a"></div>
        <div class="slider-group"><div class="slider-label">夜晚文字</div><input type="color" id="nightText" value="#eef2f5"></div>
        <div class="slider-group"><div class="slider-label">强调色</div><input type="color" id="accentColor" value="#ffaa44"></div>
    </div>

    <button id="saveConfigBtn" class="btn-primary">💾 保存配置并锁定</button>
    <button id="unlockBtn" class="btn-secondary hidden">🔓 解锁编辑 (需密码)</button>
    <div id="statusMsg" style="font-size:0.7rem; text-align:center; margin-top:12px;">⚙️ 拖动/缩放元素 | 锁定后需密码修改</div>
</div>

<script>
    // ==================== 全局变量 ====================
    let currentMode = "single";
    let selectedElement = null;
    let isLocked = false;
    const LOCK_PASSWORD = "dubaiclock2025";   // 预设密码
    let dragData = null, pinchData = null;

    // DOM 元素
    const canvas = document.getElementById('canvas');
    const singleLayout = document.getElementById('singleLayout');
    const dualLayout = document.getElementById('dualLayout');
    const tripleLayout = document.getElementById('tripleLayout');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const fontSlider = document.getElementById('fontSlider');
    const fontSizeVal = document.getElementById('fontSizeVal');
    const xSlider = document.getElementById('xSlider');
    const xVal = document.getElementById('xVal');
    const ySlider = document.getElementById('ySlider');
    const yVal = document.getElementById('yVal');
    const lockBtn = document.getElementById('lockBtn');
    const unlockBtn = document.getElementById('unlockBtn');
    const saveConfigBtn = document.getElementById('saveConfigBtn');

    // 获取当前活动的所有可拖拽元素
    function getCurrentDraggables() {
        if (currentMode === "single") {
            return Array.from(document.querySelectorAll('#singleLayout .draggable'));
        } else if (currentMode === "dual") {
            return Array.from(document.querySelectorAll('#dualLayout .draggable'));
        } else {
            return Array.from(document.querySelectorAll('#tripleLayout .draggable'));
        }
    }

    // 刷新滑块显示
    function updateSlidersFromElement(el) {
        if (!el) return;
        let left = parseFloat(el.style.left);
        let top = parseFloat(el.style.top);
        if (!isNaN(left)) { xSlider.value = left; xVal.innerText = Math.round(left); }
        if (!isNaN(top)) { ySlider.value = top; yVal.innerText = Math.round(top); }
        let textElem = el.querySelector('.clock, .date, .weather');
        if (textElem) {
            let fontSize = parseInt(window.getComputedStyle(textElem).fontSize);
            if (!isNaN(fontSize)) { fontSlider.value = fontSize; fontSizeVal.innerText = fontSize; }
        }
        // 高亮
        getCurrentDraggables().forEach(d => d.style.border = 'none');
        el.style.border = '2px solid #ffaa44';
        el.style.borderRadius = '12px';
    }

    function applySliderToElement() {
        if (!selectedElement) return;
        let x = parseFloat(xSlider.value);
        let y = parseFloat(ySlider.value);
        let fontSize = parseInt(fontSlider.value);
        selectedElement.style.left = x + '%';
        selectedElement.style.top = y + '%';
        let textElem = selectedElement.querySelector('.clock, .date, .weather');
        if (textElem) textElem.style.fontSize = fontSize + 'px';
        xVal.innerText = Math.round(x);
        yVal.innerText = Math.round(y);
        fontSizeVal.innerText = fontSize;
    }

    xSlider.addEventListener('input', applySliderToElement);
    ySlider.addEventListener('input', applySliderToElement);
    fontSlider.addEventListener('input', applySliderToElement);

    // 触摸拖拽/缩放（内部元素）
    function initInternalTouch(el) {
        el.addEventListener('touchstart', onTouchStart, { passive: false });
        el.addEventListener('touchmove', onTouchMove, { passive: false });
        el.addEventListener('touchend', onTouchEnd);
    }

    let internalDrag = null, internalPinch = null;
    function onTouchStart(e) {
        if (isLocked) return;
        e.stopPropagation();
        let touches = e.touches;
        if (touches.length === 1) {
            selectedElement = e.currentTarget;
            updateSlidersFromElement(selectedElement);
            let rect = selectedElement.getBoundingClientRect();
            let canvasRect = canvas.getBoundingClientRect();
            let leftPct = parseFloat(selectedElement.style.left);
            let topPct = parseFloat(selectedElement.style.top);
            internalDrag = {
                startX: touches[0].clientX,
                startY: touches[0].clientY,
                leftPct: isNaN(leftPct) ? 50 : leftPct,
                topPct: isNaN(topPct) ? 50 : topPct,
                canvasWidth: canvasRect.width,
                canvasHeight: canvasRect.height
            };
        } else if (touches.length === 2) {
            let dx = touches[0].clientX - touches[1].clientX;
            let dy = touches[0].clientY - touches[1].clientY;
            let distance = Math.hypot(dx, dy);
            let target = e.currentTarget;
            let textElem = target.querySelector('.clock, .date, .weather');
            let curFont = textElem ? parseInt(window.getComputedStyle(textElem).fontSize) : 36;
            internalPinch = { startDist: distance, startFont: curFont, target: target };
        }
    }

    function onTouchMove(e) {
        if (isLocked) return;
        e.preventDefault();
        let touches = e.touches;
        if (internalDrag && touches.length === 1) {
            let dx = touches[0].clientX - internalDrag.startX;
            let dy = touches[0].clientY - internalDrag.startY;
            let newLeft = internalDrag.leftPct + (dx / internalDrag.canvasWidth) * 100;
            let newTop = internalDrag.topPct + (dy / internalDrag.canvasHeight) * 100;
            newLeft = Math.min(95, Math.max(5, newLeft));
            newTop = Math.min(95, Math.max(5, newTop));
            if (selectedElement) {
                selectedElement.style.left = newLeft + '%';
                selectedElement.style.top = newTop + '%';
                xSlider.value = newLeft; xVal.innerText = Math.round(newLeft);
                ySlider.value = newTop; yVal.innerText = Math.round(newTop);
            }
        } else if (internalPinch && touches.length === 2) {
            let dx = touches[0].clientX - touches[1].clientX;
            let dy = touches[0].clientY - touches[1].clientY;
            let newDist = Math.hypot(dx, dy);
            let scale = newDist / internalPinch.startDist;
            let newFont = internalPinch.startFont * scale;
            newFont = Math.min(120, Math.max(12, newFont));
            let txt = internalPinch.target.querySelector('.clock, .date, .weather');
            if (txt) {
                txt.style.fontSize = newFont + 'px';
                if (selectedElement === internalPinch.target) {
                    fontSlider.value = newFont;
                    fontSizeVal.innerText = newFont;
                }
            }
        }
    }

    function onTouchEnd(e) {
        internalDrag = null;
        internalPinch = null;
    }

    function bindAllTouch() {
        let draggables = getCurrentDraggables();
        draggables.forEach(el => {
            el.removeEventListener('touchstart', onTouchStart);
            el.removeEventListener('touchmove', onTouchMove);
            el.removeEventListener('touchend', onTouchEnd);
            initInternalTouch(el);
        });
    }

    // 切换模式
    function switchMode(mode) {
        currentMode = mode;
        singleLayout.classList.add('hidden');
        dualLayout.classList.add('hidden');
        tripleLayout.classList.add('hidden');
        if (mode === 'single') singleLayout.classList.remove('hidden');
        else if (mode === 'dual') dualLayout.classList.remove('hidden');
        else tripleLayout.classList.remove('hidden');
        modeBtns.forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        bindAllTouch();
        selectedElement = null;
    }
    modeBtns.forEach(btn => btn.addEventListener('click', () => switchMode(btn.dataset.mode)));

    // 风格数据
    const flipStyles = ["机械翻页","3D翻转","纸片翻","霓虹","毛玻璃","木纹","金属","赛博","复古","极简","黑胶","点阵","皮革","透明","积木","和纸","哥特","波普","水墨","蒸汽波"];
    const flipGrid = document.getElementById('flipGrid');
    flipStyles.forEach(s => {
        let div = document.createElement('div');
        div.className = 'style-card';
        div.innerHTML = `<div>🎴</div><div style="font-size:0.6rem;">${s}</div>`;
        div.onclick = () => {
            document.querySelectorAll('#flipGrid .style-card').forEach(c => c.classList.remove('selected'));
            div.classList.add('selected');
            document.querySelectorAll('.clock').forEach(el => {
                el.style.transform = 'rotateX(0deg)';
                setTimeout(() => el.style.transform = 'rotateX(180deg)', 50);
                setTimeout(() => el.style.transform = 'rotateX(0deg)', 400);
            });
        };
        flipGrid.appendChild(div);
    });

    const fonts = ["Inter","Montserrat","Playfair Display","Space Grotesk","Chakra Petch","Roboto Mono","Orbitron","Share Tech Mono","Electrolize","Titillium Web","Azeret Mono","Major Mono","Syne Mono","PT Mono","Red Hat Mono","DM Mono","Inconsolata","VT323","Press Start 2P","DotGothic16","Chivo Mono","Oswald","Anton","Bebas Neue","Fira Code","JetBrains Mono","Cormorant","Libre Baskerville","Merriweather","Lora","Work Sans","Poppins","Raleway","Nunito","Quicksand"];
    const fontGrid = document.getElementById('fontGrid');
    fonts.forEach(f => {
        let div = document.createElement('div');
        div.className = 'style-card';
        div.innerHTML = `<div style="font-family:'${f}',sans-serif;">12:34</div><div style="font-size:0.6rem;">${f}</div>`;
        div.onclick = () => {
            document.querySelectorAll('#fontGrid .style-card').forEach(c => c.classList.remove('selected'));
            div.classList.add('selected');
            document.querySelectorAll('.clock').forEach(el => el.style.fontFamily = `'${f}',sans-serif`);
        };
        fontGrid.appendChild(div);
    });

    // 保存配置（并锁定）
    function saveAndLock() {
        // 收集当前所有布局参数
        function getElemData(selector, type) {
            let el = document.querySelector(selector);
            if (!el) return null;
            let left = el.style.left;
            let top = el.style.top;
            let textEl = el.querySelector(`.${type}`);
            let fontSize = textEl ? window.getComputedStyle(textEl).fontSize : '48px';
            return { left, top, fontSize };
        }
        let config = {
            single: {
                clock: getElemData('#singleLayout .draggable[data-type="clock"]', 'clock'),
                date: getElemData('#singleLayout .draggable[data-type="date"]', 'date'),
                weather: getElemData('#singleLayout .draggable[data-type="weather"]', 'weather')
            },
            dual: {
                left: {
                    clock: getElemData('#dualLayout #dualLeft .draggable[data-type="clock"]', 'clock'),
                    weather: getElemData('#dualLayout #dualLeft .draggable[data-type="weather"]', 'weather')
                },
                right: {
                    clock: getElemData('#dualLayout #dualRight .draggable[data-type="clock"]', 'clock'),
                    weather: getElemData('#dualLayout #dualRight .draggable[data-type="weather"]', 'weather')
                }
            },
            triple: {
                left: {
                    clock: getElemData('#tripleLayout #tripleLeft .draggable[data-type="clock"]', 'clock'),
                    weather: getElemData('#tripleLayout #tripleLeft .draggable[data-type="weather"]', 'weather')
                },
                right: {
                    clock: getElemData('#tripleLayout #tripleRight .draggable[data-type="clock"]', 'clock'),
                    weather: getElemData('#tripleLayout #tripleRight .draggable[data-type="weather"]', 'weather')
                }
            },
            colors: {
                dayBg: document.getElementById('dayBg').value,
                dayText: document.getElementById('dayText').value,
                nightBg: document.getElementById('nightBg').value,
                nightText: document.getElementById('nightText').value,
                accentColor: document.getElementById('accentColor').value
            },
            fontFamily: window.getComputedStyle(document.querySelector('.clock')).fontFamily
        };
        localStorage.setItem('clock_layout_config', JSON.stringify(config));
        isLocked = true;
        lockBtn.classList.add('hidden');
        unlockBtn.classList.remove('hidden');
        document.querySelectorAll('.draggable').forEach(el => el.style.border = 'none');
        showToast("✅ 配置已锁定！需要修改请点击「解锁编辑」");
    }

    function unlockWithPassword() {
        let pwd = prompt("请输入解锁密码:");
        if (pwd === LOCK_PASSWORD) {
            isLocked = false;
            lockBtn.classList.remove('hidden');
            unlockBtn.classList.add('hidden');
            showToast("🔓 已解锁，可以继续编辑");
        } else {
            showToast("❌ 密码错误");
        }
    }

    function showToast(msg) {
        let t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(()=>t.remove(), 2000);
    }

    // 检查是否已有锁定的配置
    function loadLockedConfig() {
        let saved = localStorage.getItem('clock_layout_config');
        if (saved) {
            // 若有配置，直接应用（但保持可编辑状态，只是加载）
            // 为了用户体验，不自动锁定
        }
    }

    lockBtn.addEventListener('click', saveAndLock);
    unlockBtn.addEventListener('click', unlockWithPassword);
    saveConfigBtn.addEventListener('click', saveAndLock); // 同名功能

    // 初始化
    switchMode('single');
    bindAllTouch();
    loadLockedConfig();
</script>
</body>
</html>
