<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>迪拜飞行时钟 · 智能三模式</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background-color 0.5s ease, color 0.3s ease;
        }
        /* 主题变量会在JS中动态设置 */
        .fullscreen-clock, .flight-mode, .mode-layout {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .mode-container {
            width: 100%;
            height: 100%;
        }
        .hidden { display: none !important; }
        /* 航班信息卡片样式 */
        .flight-info-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 12px 20px;
            margin: 12px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dual-panel, .triple-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .dual-layout, .triple-layout {
            display: flex;
            height: 100%;
            width: 100%;
        }
        .triple-layout {
            flex-direction: column;
        }
        .triple-top {
            height: 30%;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .triple-bottom {
            flex: 1;
            display: flex;
        }
        .clock-element {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
            white-space: nowrap;
        }
        .time-display {
            font-weight: 700;
            font-family: monospace;
            background: linear-gradient(135deg, #fff, #88aaff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .date-display, .weather-display {
            opacity: 0.8;
        }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // ========== 默认配置（与工坊导出结构一致，您可替换为实际导出的JSON）==========
    const DEFAULT_CONFIG = {
        "single": {
            "clock": { "left": "50%", "top": "35%", "fontSize": "48px" },
            "date": { "left": "50%", "top": "75%", "fontSize": "16px" },
            "weather": { "left": "85%", "top": "15%", "fontSize": "20px" }
        },
        "dual": {
            "left": {
                "clock": { "left": "50%", "top": "40%", "fontSize": "48px" },
                "weather": { "left": "80%", "top": "15%", "fontSize": "20px" }
            },
            "right": {
                "clock": { "left": "50%", "top": "40%", "fontSize": "48px" },
                "weather": { "left": "80%", "top": "15%", "fontSize": "20px" }
            }
        },
        "triple": {
            "left": {
                "clock": { "left": "50%", "top": "40%", "fontSize": "48px" },
                "weather": { "left": "80%", "top": "15%", "fontSize": "20px" }
            },
            "right": {
                "clock": { "left": "50%", "top": "40%", "fontSize": "48px" },
                "weather": { "left": "80%", "top": "15%", "fontSize": "20px" }
            }
        },
        "colors": {
            "dayBg": "#e8f0f5",
            "dayText": "#1a2a3a",
            "nightBg": "#0a0e1a",
            "nightText": "#eef2f5",
            "accentColor": "#ffaa44"
        },
        "fontFamily": "'SF Pro Display', -apple-system, 'Helvetica Neue'"
    };

    // 尝试加载用户保存的配置
    let userConfig = null;
    try {
        const saved = localStorage.getItem('clock_layout_config');
        if (saved) userConfig = JSON.parse(saved);
    } catch(e) {}
    const CONFIG = userConfig || DEFAULT_CONFIG;

    // 根据迪拜时间自动选择主题（白天/夜晚）
    const DUBAI_TZ = "Asia/Dubai";
    function getCurrentTheme() {
        const now = new Date();
        const hour = parseInt(now.toLocaleTimeString('en-US', { timeZone: DUBAI_TZ, hour: '2-digit', hour12: false }));
        if (hour >= 6 && hour < 18) return 'day';
        else if (hour >= 18 && hour < 20) return 'night';
        else return 'darkNight';
    }
    function applyTheme() {
        const theme = getCurrentTheme();
        let bg, text;
        if (theme === 'day') {
            bg = CONFIG.colors.dayBg;
            text = CONFIG.colors.dayText;
        } else if (theme === 'night') {
            bg = CONFIG.colors.nightBg;
            text = CONFIG.colors.nightText;
        } else {
            bg = CONFIG.colors.nightBg; // 深夜晚用夜晚背景，文字稍暗
            text = CONFIG.colors.nightText;
        }
        document.body.style.backgroundColor = bg;
        document.body.style.color = text;
        // 应用强调色到时间渐变
        document.querySelectorAll('.time-display').forEach(el => {
            el.style.background = `linear-gradient(135deg, ${CONFIG.colors.accentColor}, ${text})`;
            el.style.webkitBackgroundClip = 'text';
            el.style.backgroundClip = 'text';
            el.style.color = 'transparent';
        });
    }

    // 模拟航班状态（实际应从您的航班数据库读取）
    let flightStatus = {
        hasFlight: true,      // 是否有未来72小时航班
        isFlying: false,      // 是否飞行中
        flightInfo: { origin: "DXB", dest: "PVG", depTime: "14:30", arrTime: "22:45" }
    };

    // 实时时间更新函数
    function updateTimes() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-GB', { timeZone: DUBAI_TZ, hour: '2-digit', minute: '2-digit', hour12: false });
        const dateStr = now.toLocaleDateString('en-US', { timeZone: DUBAI_TZ, weekday: 'long', month: 'long', day: 'numeric' });
        // 更新所有时钟元素
        document.querySelectorAll('.time-display').forEach(el => {
            if (el.classList.contains('clock-number')) el.innerText = timeStr;
        });
        document.querySelectorAll('.date-display').forEach(el => {
            el.innerText = dateStr;
        });
    }

    // 根据配置创建元素
    function createDraggableElement(parent, type, layoutConfig, mode) {
        let config;
        if (mode === 'single') {
            config = layoutConfig[type];
        } else if (mode === 'dual') {
            const side = parent.id.includes('left') ? 'left' : 'right';
            config = layoutConfig[side][type];
        } else {
            const side = parent.id.includes('left') ? 'left' : 'right';
            config = layoutConfig[side][type];
        }
        if (!config) return;
        const div = document.createElement('div');
        div.className = 'clock-element';
        div.style.left = config.left;
        div.style.top = config.top;
        div.style.transform = 'translate(-50%, -50%)';
        if (type === 'clock') {
            div.innerHTML = `<div class="time-display clock-number" style="font-size:${config.fontSize}; font-family:${CONFIG.fontFamily};">--:--</div>`;
        } else if (type === 'date') {
            div.innerHTML = `<div class="date-display" style="font-size:${config.fontSize};">--</div>`;
        } else {
            div.innerHTML = `<div class="weather-display" style="font-size:${config.fontSize};">☀️ 32°C</div>`;
        }
        parent.appendChild(div);
        return div;
    }

    // 渲染单屏模式
    function renderSingleMode() {
        const container = document.createElement('div');
        container.className = 'mode-container';
        container.id = 'singleMode';
        const layout = CONFIG.single;
        createDraggableElement(container, 'clock', layout, 'single');
        createDraggableElement(container, 'date', layout, 'single');
        createDraggableElement(container, 'weather', layout, 'single');
        return container;
    }

    // 渲染双屏模式（计划航班）
    function renderDualMode() {
        const container = document.createElement('div');
        container.className = 'mode-container';
        container.style.display = 'flex';
        container.style.flexDirection = 'column';
        // 顶部航班信息栏
        const infoBar = document.createElement('div');
        infoBar.className = 'flight-info-bar';
        infoBar.innerHTML = `✈️ 计划航班 · ${flightStatus.flightInfo.origin} → ${flightStatus.flightInfo.dest} · 起飞 ${flightStatus.flightInfo.depTime} (当地) / ${flightStatus.flightInfo.depTime} (迪拜)`;
        container.appendChild(infoBar);
        // 左右分屏
        const dualArea = document.createElement('div');
        dualArea.style.display = 'flex';
        dualArea.style.flex = '1';
        dualArea.style.position = 'relative';
        const leftPanel = document.createElement('div');
        leftPanel.id = 'dualLeftPanel';
        leftPanel.style.flex = '1';
        leftPanel.style.position = 'relative';
        const rightPanel = document.createElement('div');
        rightPanel.id = 'dualRightPanel';
        rightPanel.style.flex = '1';
        rightPanel.style.position = 'relative';
        dualArea.appendChild(leftPanel);
        dualArea.appendChild(rightPanel);
        container.appendChild(dualArea);
        // 添加时钟和天气
        createDraggableElement(leftPanel, 'clock', CONFIG.dual, 'dual');
        createDraggableElement(leftPanel, 'weather', CONFIG.dual, 'dual');
        createDraggableElement(rightPanel, 'clock', CONFIG.dual, 'dual');
        createDraggableElement(rightPanel, 'weather', CONFIG.dual, 'dual');
        // 为左侧右侧单独区分（天气内容可不同，这里简化）
        return container;
    }

    // 渲染三屏模式（飞行中）
    function renderTripleMode() {
        const container = document.createElement('div');
        container.className = 'mode-container';
        container.style.display = 'flex';
        container.style.flexDirection = 'column';
        // 上部航班动态
        const topBar = document.createElement('div');
        topBar.className = 'flight-info-bar';
        topBar.style.margin = '12px';
        topBar.innerHTML = `✈️ 飞行中 · ${flightStatus.flightInfo.origin} → ${flightStatus.flightInfo.dest} · 已飞 2h30m · 剩余 3h20m · 预计落地 ${flightStatus.flightInfo.arrTime} (当地) / ${flightStatus.flightInfo.arrTime} (迪拜)`;
        container.appendChild(topBar);
        // 下部左右分屏
        const bottomArea = document.createElement('div');
        bottomArea.style.display = 'flex';
        bottomArea.style.flex = '1';
        bottomArea.style.position = 'relative';
        const leftPanel = document.createElement('div');
        leftPanel.id = 'tripleLeftPanel';
        leftPanel.style.flex = '1';
        leftPanel.style.position = 'relative';
        const rightPanel = document.createElement('div');
        rightPanel.id = 'tripleRightPanel';
        rightPanel.style.flex = '1';
        rightPanel.style.position = 'relative';
        bottomArea.appendChild(leftPanel);
        bottomArea.appendChild(rightPanel);
        container.appendChild(bottomArea);
        // 添加时钟和天气
        createDraggableElement(leftPanel, 'clock', CONFIG.triple, 'triple');
        createDraggableElement(leftPanel, 'weather', CONFIG.triple, 'triple');
        createDraggableElement(rightPanel, 'clock', CONFIG.triple, 'triple');
        createDraggableElement(rightPanel, 'weather', CONFIG.triple, 'triple');
        return container;
    }

    // 根据状态切换模式
    let currentMode = null;
    function switchMode() {
        let mode;
        if (!flightStatus.hasFlight) mode = 'single';
        else if (!flightStatus.isFlying) mode = 'dual';
        else mode = 'triple';
        if (currentMode === mode) return;
        currentMode = mode;
        const app = document.getElementById('app');
        app.innerHTML = '';
        let newContent;
        if (mode === 'single') newContent = renderSingleMode();
        else if (mode === 'dual') newContent = renderDualMode();
        else newContent = renderTripleMode();
        app.appendChild(newContent);
        applyTheme();
        updateTimes();
        // 定时更新时间显示
        if (window.timeInterval) clearInterval(window.timeInterval);
        window.timeInterval = setInterval(() => {
            updateTimes();
            applyTheme(); // 每整点也会根据时间调整颜色
        }, 60000);
        updateTimes();
    }

    // 模拟航班状态检测（实际需连接您的航班数据库和实时状态）
    function detectFlightStatus() {
        // 这里应替换为真实逻辑，例如从 localStorage 读取航班DB、判断当前时间
        // 示例：假设未来有航班，未起飞
        flightStatus.hasFlight = true;
        flightStatus.isFlying = false;
        // 实际可根据您的 flightsDB 和当前时间设置
        switchMode();
    }

    // 监听 localStorage 变化（配置更新时刷新）
    window.addEventListener('storage', (e) => {
        if (e.key === 'clock_layout_config') {
            try {
                userConfig = JSON.parse(e.newValue);
                Object.assign(CONFIG, userConfig);
                switchMode();
            } catch(err) {}
        }
    });

    detectFlightStatus();
    // 每5分钟重新检测航班状态
    setInterval(detectFlightStatus, 300000);
</script>
</body>
</html>
