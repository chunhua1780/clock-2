<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor - 元素布局</title>
    <style>
        body { background: #0a0e1a; color: #fff; font-family: system-ui; margin: 0; padding: 10px; }
        .canvas { background: #111; border: 2px solid #333; border-radius: 30px; position: relative; aspect-ratio: 4/3; width: 100%; overflow: hidden; touch-action: none; }
        .draggable { position: absolute; transform: translate(-50%, -50%); padding: 10px; background: rgba(255,255,255,0.1); border-radius: 8px; cursor: move; }
        .clock-text { font-size: 40px; font-weight: bold; }
        .panel { background: #161b22; border-radius: 20px; padding: 20px; margin-top: 15px; }
        button { width: 100%; padding: 15px; background: #ffaa44; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div class="canvas" id="canvas">
        <div class="draggable" id="drag-clock" style="left:50%; top:40%"><div class="clock-text">12:34</div></div>
        <div class="draggable" id="drag-date" style="left:50%; top:65%">Monday, 1 Jan</div>
    </div>
    <div class="panel">
        <p style="color: #888; font-size: 12px; margin-bottom: 10px;">提示：在 iPad 上直接拖动文字调整位置</p>
        <button onclick="uploadLayout()">💾 同步布局到 index.html</button>
    </div>

    <script>
        const GIST_ID = localStorage.getItem('gist_id') || "6b51ae2b894903de0227eaec5e0ce842";
        const TOKEN = localStorage.getItem('gh_token');
        let activeEl = null;

        document.querySelectorAll('.draggable').forEach(el => {
            el.addEventListener('touchstart', e => {
                activeEl = el;
                el.dataset.offsetX = e.touches[0].clientX - el.offsetLeft;
                el.dataset.offsetY = e.touches[0].clientY - el.offsetTop;
            });
            el.addEventListener('touchmove', e => {
                if(!activeEl) return;
                let x = ((e.touches[0].clientX - activeEl.dataset.offsetX) / canvas.offsetWidth) * 100;
                let y = ((e.touches[0].clientY - activeEl.dataset.offsetY) / canvas.offsetHeight) * 100;
                activeEl.style.left = x.toFixed(1) + '%';
                activeEl.style.top = y.toFixed(1) + '%';
            });
            el.addEventListener('touchend', () => activeEl = null);
        });

        async function uploadLayout() {
            if(!TOKEN) return alert("请先在 control.html 页面输入 Token");
            const config = {
                clock: { left: document.getElementById('drag-clock').style.left, top: document.getElementById('drag-clock').style.top },
                date: { left: document.getElementById('drag-date').style.left, top: document.getElementById('drag-date').style.top }
            };
            const resp = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${TOKEN}` },
                body: JSON.stringify({ files: { 'clock_layout.json': { content: JSON.stringify(config) } } })
            });
            if(resp.ok) alert("布局同步成功！");
        }
    </script>
</body>
</html>
