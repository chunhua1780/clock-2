<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>布局工坊 · 实时预览版</title>
    <style>
        /* 保持原有的 Designer 样式，新增滑块实时效果 */
        .preview-box { border: 2px dashed #444; border-radius: 20px; overflow: hidden; background: #000; }
        /* 其他样式省略，参考之前版本... */
    </style>
</head>
<body>
    <button id="saveBtn" onclick="smartSave()">💾 保存并推送</button>

<script>
    // 关键优化：智能保存，不覆盖航班数据
    async function smartSave() {
        const btn = document.getElementById('saveBtn');
        btn.innerText = "⏳ 正在锁定云端数据...";
        
        try {
            // 1. 先读取当前 Gist 上的所有文件
            const currentGist = await fetch(`${GIST_URL}?t=${Date.now()}`).then(r => r.json());
            const flightContent = currentGist.files['flight_data.json'].content;

            // 2. 准备新的布局数据
            const newLayoutContent = JSON.stringify(getCurrentUIConfig(), null, 2);

            // 3. 同时推送，确保 flight_data 不变
            const resp = await fetch(GIST_URL, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${userToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    files: {
                        'clock_layout.json': { content: newLayoutContent },
                        'flight_data.json': { content: flightContent }
                    }
                })
            });

            if(resp.ok) { alert("✅ 推送成功！终端将在下次同步时自动更新。"); }
        } catch (e) { alert("❌ 保存失败，请检查网络或 Token"); }
        btn.innerText = "💾 保存并推送";
    }
</script>
</body>
</html>
