<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>航班控制台 · 同步版</title>
</head>
<body>
    <script>
    async function syncFlights() {
        const status = document.getElementById('syncStatus');
        status.innerText = "☁️ 正在合并云端布局...";

        try {
            // 1. 读取当前布局文件内容
            const currentGist = await fetch(`${GIST_API}?t=${Date.now()}`).then(r => r.json());
            const layoutContent = currentGist.files['clock_layout.json'].content;

            // 2. 准备航班数据
            const flightContent = JSON.stringify({ flightsDB, lastUpdated: new Date().toISOString() });

            // 3. 提交
            await fetch(GIST_API, {
                method: 'PATCH',
                headers: getAuthHeaders(),
                body: JSON.stringify({
                    files: {
                        'flight_data.json': { content: flightContent },
                        'clock_layout.json': { content: layoutContent } 
                    }
                })
            });
            status.innerText = "☁️ 同步成功";
        } catch (e) { status.innerText = "❌ 同步出错"; }
    }
</script>
</body>
</html>
