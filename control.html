<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>航班控制中心 · 双时间显示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e1a;
            color: #ffffff;
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            padding: 16px;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .container {
            max-width: 550px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ffd966;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sub {
            font-size: 0.7rem;
            color: #88aacc;
            margin-bottom: 20px;
        }
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .month-nav button {
            background: #1a1f2e;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
        }
        .current-month {
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffd966;
        }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }
        .weekday {
            font-size: 0.7rem;
            color: #88aacc;
            padding: 8px 0;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: #11161f;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 20px;
        }
        .cal-day {
            aspect-ratio: 1;
            background: #1a1f2e;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            border: 1px solid transparent;
        }
        .cal-day.today {
            border-color: #ffaa44;
        }
        .cal-day.has-flight {
            background: #2a3a2a;
        }
        .cal-day.selected {
            background: #ffaa44;
            color: #0a0e1a;
        }
        .cal-day .day-num {
            font-size: 1rem;
            font-weight: 500;
        }
        .cal-day .flight-dot {
            width: 6px;
            height: 6px;
            background: #66ffaa;
            border-radius: 6px;
            margin-top: 4px;
        }
        .cal-day.other-month {
            opacity: 0.3;
        }
        .sidebar {
            background: #11161f;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .selected-date {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffd966;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a3344;
        }
        .flight-input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .flight-input-area input {
            flex: 2;
            background: #1a1f2e;
            border: 1px solid #334455;
            padding: 14px 16px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            text-align: center;
        }
        .flight-input-area button {
            flex: 1;
            background: #ffaa44;
            color: #0a0e1a;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .flight-input-area button:active {
            transform: scale(0.96);
        }
        .smart-tips {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.7rem;
            color: #88aacc;
        }
        .smart-tips span {
            color: #ffd966;
        }
        .flight-list {
            max-height: 250px;
            overflow-y: auto;
        }
        .flight-item {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid #ffaa44;
        }
        .flight-num {
            font-weight: bold;
            color: #ffd966;
            font-size: 1rem;
            margin-bottom: 6px;
        }
        .flight-route {
            font-size: 0.75rem;
            color: #88aacc;
            margin-bottom: 6px;
        }
        .flight-time-local {
            font-size: 0.7rem;
            color: #aabbdd;
            margin-bottom: 4px;
        }
        .flight-time-dubai {
            font-size: 0.7rem;
            color: #66ffaa;
        }
        .delete-flight {
            background: #aa4444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        .empty-tip {
            text-align: center;
            color: #556688;
            padding: 20px;
            font-size: 0.8rem;
        }
        .sync-btn {
            width: 100%;
            background: #2a6faa;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #ffaa44;
            color: #0a0e1a;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .time-badge {
            display: inline-block;
            background: #2a3344;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.6rem;
            margin-left: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        ✈️ 航班日历
        <span style="font-size:0.6rem; background:#2a3344; padding:4px 10px; border-radius:20px;">EK自动识别</span>
    </h1>
    <div class="sub">输入数字自动添加EK前缀 · 自动查起降时间 · 显示当地+迪拜时间</div>
    
    <div class="month-nav">
        <button id="prevMonthBtn">◀</button>
        <span class="current-month" id="currentMonth">2024年1月</span>
        <button id="nextMonthBtn">▶</button>
    </div>
    
    <div class="weekdays">
        <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
        <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
    </div>
    
    <div class="calendar-grid" id="calendarGrid"></div>
    
    <div class="sidebar">
        <div class="selected-date" id="selectedDateDisplay">📅 点击日期选择</div>
        
        <div class="flight-input-area">
            <input type="text" id="flightInput" placeholder="输入航班号 如 303 或 EK303" autocomplete="off">
            <button id="searchAndAddBtn">🔍 搜索添加</button>
        </div>
        
        <div class="smart-tips">
            💡 <span>303</span> → EK303 &nbsp;&nbsp; <span>343</span> → EK0343<br>
            🕐 自动抓取起飞/落地时间 &nbsp;&nbsp; 📍 显示当地时间 + 迪拜时间
        </div>
        
        <div id="dayFlightsList">
            <div class="empty-tip">选择日期后显示当天航班</div>
        </div>
        
        <button class="sync-btn" id="syncToClockBtn">🔄 同步到主时钟</button>
    </div>
</div>

<script>
    // ============================================================
    // 配置
    // ============================================================
    const API_KEY = "b4bd321bbba1723162801cce3c455d7c";
    const DUBAI_TZ = "Asia/Dubai";
    
    let flightsDatabase = {};
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let selectedDate = null;

    // ============================================================
    // 辅助函数
    // ============================================================
    function formatLocalTime(dateStr) {
        if (!dateStr) return "时间未知";
        const date = new Date(dateStr);
        return date.toLocaleString('zh-CN', { hour12: false });
    }
    
    function formatDubaiTime(dateStr) {
        if (!dateStr) return "时间未知";
        const date = new Date(dateStr);
        return date.toLocaleString('zh-CN', { timeZone: DUBAI_TZ, hour12: false });
    }
    
    function showToast(msg, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }
    
    // ============================================================
    // 数据存储
    // ============================================================
    function loadData() {
        try {
            const saved = localStorage.getItem('flight_calendar_db');
            if (saved) flightsDatabase = JSON.parse(saved);
        } catch(e) {}
        renderCalendar();
    }
    
    function saveData() {
        localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDatabase));
        syncToMainClock();
        renderCalendar();
        renderDayFlights();
    }
    
    function getFlightsForDate(dateStr) {
        return flightsDatabase[dateStr] || [];
    }
    
    // ============================================================
    // 智能航班号解析（默认加EK）
    // ============================================================
    function smartParseFlightNumber(input) {
        let num = input.toString().trim().toUpperCase();
        
        // 已经是标准格式（2-3字母+数字）
        if (/^[A-Z]{2,3}\d{2,4}$/.test(num)) {
            return { flightNumber: num, airline: num.match(/[A-Z]+/)[0], number: num.match(/\d+/)[0] };
        }
        
        // 纯数字
        if (/^\d+$/.test(num)) {
            // 4位数字直接加EK
            if (num.length === 4) return { flightNumber: `EK${num}`, airline: "EK", number: num };
            // 3位数字加0前缀变4位
            if (num.length === 3) return { flightNumber: `EK0${num}`, airline: "EK", number: `0${num}` };
            // 2位数字加00前缀
            if (num.length === 2) return { flightNumber: `EK00${num}`, airline: "EK", number: `00${num}` };
            // 5+位数字直接加EK
            return { flightNumber: `EK${num}`, airline: "EK", number: num };
        }
        
        // 其他情况
        return { flightNumber: num, airline: num.match(/[A-Z]+/)?.[0] || "EK", number: num.match(/\d+/)?.[0] || "" };
    }
    
    // ============================================================
    // 搜索航班（Aviationstack API）
    // ============================================================
    async function searchFlightOnline(flightInput) {
        const parsed = smartParseFlightNumber(flightInput);
        const candidates = [
            parsed.flightNumber,
            `EK${parsed.number}`,
            `EK${parsed.number.padStart(4, '0')}`
        ];
        
        for (const fn of [...new Set(candidates)]) {
            try {
                showToast(`🔍 搜索 ${fn}...`, 1500);
                const url = `https://api.aviationstack.com/v1/flights?access_key=${API_KEY}&flight_iata=${fn}&limit=1`;
                const resp = await fetch(url);
                const data = await resp.json();
                
                if (data.data && data.data.length > 0) {
                    const flight = data.data[0];
                    return {
                        found: true,
                        flightNumber: flight.flight.iata,
                        airline: flight.airline?.name,
                        origin: flight.departure?.iata,
                        destination: flight.arrival?.iata,
                        departureScheduled: flight.departure?.scheduled ? new Date(flight.departure.scheduled) : null,
                        arrivalScheduled: flight.arrival?.scheduled ? new Date(flight.arrival.scheduled) : null,
                        status: flight.flight_status
                    };
                }
            } catch(e) {
                console.log(`搜索 ${fn} 失败:`, e);
            }
        }
        return { found: false };
    }
    
    // ============================================================
    // 添加航班到日期
    // ============================================================
    async function addFlightToDate(dateStr, flightNumber, origin, destination, departureTime, arrivalTime) {
        if (!flightsDatabase[dateStr]) flightsDatabase[dateStr] = [];
        
        const newFlight = {
            id: Date.now() + Math.random(),
            flightNumber: flightNumber,
            origin: origin || "???",
            destination: destination || "???",
            departureTime: departureTime || new Date(dateStr + "T12:00:00").toISOString(),
            arrivalTime: arrivalTime || null,
            addedAt: new Date().toISOString()
        };
        
        flightsDatabase[dateStr].push(newFlight);
        saveData();
        showToast(`✅ 已添加 ${flightNumber}`);
        return newFlight;
    }
    
    function deleteFlight(dateStr, flightId) {
        if (flightsDatabase[dateStr]) {
            flightsDatabase[dateStr] = flightsDatabase[dateStr].filter(f => f.id != flightId);
            if (flightsDatabase[dateStr].length === 0) delete flightsDatabase[dateStr];
            saveData();
            showToast("🗑️ 已删除");
        }
    }
    
    // ============================================================
    // 搜索并添加
    // ============================================================
    async function searchAndAddToSelectedDate() {
        const flightInput = document.getElementById('flightInput').value.trim();
        if (!flightInput) {
            showToast("请输入航班号");
            return;
        }
        if (!selectedDate) {
            showToast("请先点击选择日期");
            return;
        }
        
        // 显示搜索中
        const addBtn = document.getElementById('searchAndAddBtn');
        const originalText = addBtn.innerText;
        addBtn.innerText = "⏳ 搜索中...";
        addBtn.disabled = true;
        
        const result = await searchFlightOnline(flightInput);
        
        addBtn.innerText = originalText;
        addBtn.disabled = false;
        
        if (result.found && result.departureScheduled) {
            // 使用API返回的真实时间
            const departureTime = result.departureScheduled;
            const arrivalTime = result.arrivalScheduled || null;
            
            // 检查日期是否匹配
            const flightDate = departureTime.toISOString().split('T')[0];
            if (flightDate !== selectedDate) {
                showToast(`⚠️ 航班实际日期是 ${flightDate}，已自动调整`);
                selectedDate = flightDate;
                renderCalendar();
                document.getElementById('selectedDateDisplay').innerHTML = `📅 ${selectedDate}`;
            }
            
            await addFlightToDate(
                selectedDate,
                result.flightNumber,
                result.origin,
                result.destination,
                departureTime.toISOString(),
                arrivalTime ? arrivalTime.toISOString() : null
            );
            document.getElementById('flightInput').value = '';
        } else {
            // 搜索失败，手动填写
            const origin = prompt("未找到航班信息，请输入起飞机场三字码 (如 DXB):", "DXB");
            const dest = prompt("请输入目的地机场三字码 (如 PVG):", "PVG");
            if (origin && dest) {
                const parsed = smartParseFlightNumber(flightInput);
                await addFlightToDate(
                    selectedDate,
                    parsed.flightNumber,
                    origin.toUpperCase(),
                    dest.toUpperCase(),
                    new Date(selectedDate + "T12:00:00").toISOString(),
                    null
                );
                document.getElementById('flightInput').value = '';
            } else {
                showToast("已取消添加");
            }
        }
    }
    
    // ============================================================
    // 日历渲染
    // ============================================================
    function renderCalendar() {
        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startWeekday = firstDay.getDay();
        const daysInMonth = lastDay.getDate();
        const prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        document.getElementById('currentMonth').innerText = `${currentYear}年 ${monthNames[currentMonth]}`;
        
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        
        // 上月
        for (let i = startWeekday - 1; i >= 0; i--) {
            const dayNum = prevMonthLastDay - i;
            const date = new Date(currentYear, currentMonth - 1, dayNum);
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
            const hasFlight = flightsDatabase[dateStr] && flightsDatabase[dateStr].length > 0;
            const cell = createDayCell(dayNum, true, hasFlight, dateStr === todayStr, dateStr);
            grid.appendChild(cell);
        }
        
        // 当月
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const hasFlight = flightsDatabase[dateStr] && flightsDatabase[dateStr].length > 0;
            const isToday = (dateStr === todayStr);
            const cell = createDayCell(d, false, hasFlight, isToday, dateStr);
            grid.appendChild(cell);
        }
        
        // 下月
        const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;
        const remaining = totalCells - (startWeekday + daysInMonth);
        for (let i = 1; i <= remaining; i++) {
            const date = new Date(currentYear, currentMonth + 1, i);
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const hasFlight = flightsDatabase[dateStr] && flightsDatabase[dateStr].length > 0;
            const cell = createDayCell(i, true, hasFlight, false, dateStr);
            grid.appendChild(cell);
        }
    }
    
    function createDayCell(dayNum, isOtherMonth, hasFlight, isToday, dateStr) {
        const cell = document.createElement('div');
        cell.className = 'cal-day';
        if (isOtherMonth) cell.classList.add('other-month');
        if (isToday) cell.classList.add('today');
        if (hasFlight) cell.classList.add('has-flight');
        if (selectedDate === dateStr) cell.classList.add('selected');
        
        const dayNumSpan = document.createElement('div');
        dayNumSpan.className = 'day-num';
        dayNumSpan.innerText = dayNum;
        cell.appendChild(dayNumSpan);
        
        if (hasFlight) {
            const dot = document.createElement('div');
            dot.className = 'flight-dot';
            cell.appendChild(dot);
        }
        
        cell.onclick = () => {
            selectedDate = dateStr;
            renderCalendar();
            renderDayFlights();
            document.getElementById('selectedDateDisplay').innerHTML = `📅 ${selectedDate}`;
        };
        
        return cell;
    }
    
    // ============================================================
    // 渲染当天航班（显示当地+迪拜时间）
    // ============================================================
    function renderDayFlights() {
        const container = document.getElementById('dayFlightsList');
        if (!selectedDate) {
            container.innerHTML = '<div class="empty-tip">点击日历选择日期</div>';
            return;
        }
        
        const flights = getFlightsForDate(selectedDate);
        if (flights.length === 0) {
            container.innerHTML = '<div class="empty-tip">✈️ 当天无航班<br>在上方输入航班号添加</div>';
            return;
        }
        
        container.innerHTML = flights.map(flight => {
            const localTime = formatLocalTime(flight.departureTime);
            const dubaiTime = formatDubaiTime(flight.departureTime);
            const localArrival = flight.arrivalTime ? formatLocalTime(flight.arrivalTime) : null;
            const dubaiArrival = flight.arrivalTime ? formatDubaiTime(flight.arrivalTime) : null;
            
            return `
                <div class="flight-item">
                    <div class="flight-num">✈️ ${flight.flightNumber} <span class="time-badge">${flight.origin} → ${flight.destination}</span></div>
                    <div class="flight-time-local">🛫 起飞 当地时间: ${localTime}</div>
                    <div class="flight-time-dubai">🕐 起飞 迪拜时间: ${dubaiTime}</div>
                    ${localArrival ? `<div class="flight-time-local">🛬 落地 当地时间: ${localArrival}</div>` : ''}
                    ${dubaiArrival ? `<div class="flight-time-dubai">🕐 落地 迪拜时间: ${dubaiArrival}</div>` : ''}
                    <button class="delete-flight" onclick="deleteFlight('${selectedDate}', ${flight.id})">删除航班</button>
                </div>
            `;
        }).join('');
    }
    
    // ============================================================
    // 同步到主时钟
    // ============================================================
    function syncToMainClock() {
        let allFlights = [];
        for (const dateStr in flightsDatabase) {
            for (const flight of flightsDatabase[dateStr]) {
                allFlights.push({ ...flight, dateStr: dateStr });
            }
        }
        
        if (allFlights.length === 0) {
            showToast("没有航班可同步");
            return;
        }
        
        const now = new Date();
        const futureFlights = allFlights.filter(f => new Date(f.departureTime) > now);
        futureFlights.sort((a, b) => new Date(a.departureTime) - new Date(b.departureTime));
        
        let activeFlight = futureFlights.length > 0 ? futureFlights[0] : allFlights[0];
        
        if (activeFlight) {
            const syncData = {
                flightNumber: activeFlight.flightNumber,
                origin: activeFlight.origin,
                destination: activeFlight.destination,
                departureTime: activeFlight.departureTime,
                arrivalTime: activeFlight.arrivalTime || null,
                pickupTime: new Date(new Date(activeFlight.departureTime).getTime() - 135 * 60000).toISOString()
            };
            localStorage.setItem('last_flight', JSON.stringify(syncData));
            localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDatabase));
            showToast("✅ 已同步到主时钟");
        }
    }
    
    // ============================================================
    // 事件绑定
    // ============================================================
    document.getElementById('prevMonthBtn').onclick = () => {
        currentMonth--;
        if (currentMonth < 0) {
            currentMonth = 11;
            currentYear--;
        }
        renderCalendar();
    };
    
    document.getElementById('nextMonthBtn').onclick = () => {
        currentMonth++;
        if (currentMonth > 11) {
            currentMonth = 0;
            currentYear++;
        }
        renderCalendar();
    };
    
    document.getElementById('searchAndAddBtn').onclick = searchAndAddToSelectedDate;
    document.getElementById('syncToClockBtn').onclick = syncToMainClock;
    document.getElementById('flightInput').onkeypress = (e) => {
        if (e.key === 'Enter') searchAndAddToSelectedDate();
    };
    
    // 初始化
    loadData();
</script>
</body>
</html>
