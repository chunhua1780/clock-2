<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EK 控制面板</title>
    <style>
        body { font-family: system-ui; background: #f4f4f4; padding: 15px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .grid-style { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .style-btn { border: 1px solid #ddd; padding: 10px 5px; font-size: 10px; border-radius: 5px; background: #fff; }
        .style-btn.active { background: #007aff; color: white; border-color: #007aff; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-push { background: #34c759; color: white; padding: 15px; width: 100%; border-radius: 10px; border: none; font-size: 18px; font-weight: bold; margin-top: 10px; }
        #token-area { background: #fff3cd; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; }
    </style>
</head>
<body>

<div id="token-area">
    🔑 TOKEN: <span id="tk-status">未设置</span> 
    <button onclick="setToken()" style="float:right">设置</button>
</div>

<div class="card">
    <label><b>1. 风格选择 (20+ Style)</b></label>
    <div class="grid-style" id="style-picker">
        </div>
</div>

<div class="card">
    <label><b>2. 航班搜索</b></label>
    <input type="text" id="f_no" placeholder="输入 493 或 8493">
    <button onclick="searchFlight()" style="margin-top:5px; width:100%; padding:8px">搜索并自动填充</button>
    <div id="results" style="display:none; background:#e9ecef; padding:10px; border-radius:5px; margin-top:5px;"></div>
</div>

<div class="card">
    <label>起飞 IATA (自动大写)</label>
    <input type="text" id="f_dep" oninput="this.value=this.value.toUpperCase()">
    <label>到达 IATA</label>
    <input type="text" id="f_arr" oninput="this.value=this.value.toUpperCase()">
    <label>状态</label>
    <select id="f_status">
        <option value="scheduled">计划 (Scheduled)</option>
        <option value="airborne">起飞 (Airborne)</option>
        <option value="layover">驻留 (Layover)</option>
    </select>
    <label><input type="checkbox" id="is_layover"> 开启双时区 Layover 模式</label>
</div>

<button class="btn-push" onclick="pushToiPad()">🚀 同步到 iPad</button>

<script>
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    const AVI_KEY = "b4bd321bbba1723162801cce3c455d7c";
    let selectedStyle = 'github';

    // 初始化 20 个风格按钮
    const picker = document.getElementById('style-picker');
    for(let i=1; i<=20; i++) {
        const b = document.createElement('button');
        b.className = 'style-btn';
        b.innerText = '风格 ' + i;
        b.onclick = () => {
            document.querySelectorAll('.style-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            selectedStyle = 'style-' + i;
        };
        picker.appendChild(b);
    }

    function setToken() {
        const t = prompt("请输入你的 GitHub Token (6b51...):");
        if(t) { localStorage.setItem('my_tk', t); location.reload(); }
    }

    if(localStorage.getItem('my_tk')) document.getElementById('tk-status').innerText = "已就绪";

    async function searchFlight() {
        let no = document.getElementById('f_no').value.toUpperCase();
        if(!no) return;
        let query = isNaN(no) ? no : "EK" + no;
        const res = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${AVI_KEY}&flight_iata=${query}`);
        const json = await res.json();
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = "";
        resDiv.style.display = 'block';

        if(json.data && json.data.length > 0) {
            json.data.forEach(f => {
                const d = document.createElement('div');
                d.style.padding = '10px';
                d.style.borderBottom = '1px solid #ccc';
                d.innerHTML = `${f.departure.iata} ➔ ${f.arrival.iata} (点此填充)`;
                d.onclick = () => {
                    document.getElementById('f_dep').value = f.departure.iata;
                    document.getElementById('f_arr').value = f.arrival.iata;
                    resDiv.style.display = 'none';
                };
                resDiv.appendChild(d);
            });
        } else if(no.length > 3) {
            document.getElementById('f_no').value = no.slice(-3); // 自动截取后三位重试
            searchFlight();
        }
    }

    async function pushToiPad() {
        const token = localStorage.getItem('my_tk');
        if(!token) return setToken();

        const payload = {
            style: selectedStyle,
            flightNo: document.getElementById('f_no').value,
            dep: document.getElementById('f_dep').value,
            arr: document.getElementById('f_arr').value,
            status: document.getElementById('f_status').value,
            isLayover: document.getElementById('is_layover').checked,
            std: new Date().toISOString()
        };

        const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: "PATCH",
            headers: { "Authorization": `token ${token}` },
            body: JSON.stringify({ files: { "flight_data.json": { content: JSON.stringify(payload) } } })
        });
        if(res.ok) alert("同步成功！");
    }
</script>
</body>
</html>
