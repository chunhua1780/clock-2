<body>
<div class="container">
    <h1>
        ✈️ 航班日历
        <span style="font-size:0.6rem; background:#2a3344; padding:4px 10px; border-radius:20px;">点击日期添加航班</span>
    </h1>
    <div class="sub">输入数字自动识别航班号并联网搜索起降时间</div>
    
    <div class="month-nav">
        <button id="prevMonthBtn">◀</button>
        <span class="current-month" id="currentMonth">2024年1月</span>
        <button id="nextMonthBtn">▶</button>
    </div>
    
    <div class="weekdays">
        <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
        <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
    </div>
    
    <div class="calendar-grid" id="calendarGrid"></div>
    
    <div class="sidebar">
        <div class="selected-date" id="selectedDateDisplay">📅 点击日期选择</div>
        
        <div class="flight-input-area">
            <input type="text" id="flightInput" placeholder="输入航班号 如 303 或 EK303" autocomplete="off">
            <button id="searchAndAddBtn">🔍 搜索添加</button>
        </div>
        
        <div class="smart-tips">
            💡 智能识别：<span>303</span> → EK0303 &nbsp;&nbsp; <span>88798797</span> → 自动去8<br>
            <span>CA1835</span> → 直接使用 &nbsp;&nbsp; 自动联网查起降时间
        </div>
        
        <div id="dayFlightsList">
            <div class="empty-tip">选择日期后显示当天航班</div>
        </div>
        
        <button class="sync-btn" id="syncToClockBtn">🔄 同步到主时钟</button>
    </div>
</div>

<script>
    let flightsDatabase = {};
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let selectedDate = null;

    function loadData() {
        try {
            const saved = localStorage.getItem('flight_calendar_db');
            if (saved) flightsDatabase = JSON.parse(saved);
        } catch(e) {}
        renderCalendar();
    }

    function saveData() {
        localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDatabase));
        syncToMainClock();
        renderCalendar();
        renderDayFlights();
    }

    function getFlightsForDate(dateStr) {
        return flightsDatabase[dateStr] || [];
    }

    async function addFlightToDate(dateStr, flightNumber, origin, destination, departureTime) {
        if (!flightsDatabase[dateStr]) flightsDatabase[dateStr] = [];
        const newFlight = {
            id: Date.now() + Math.random(),
            flightNumber: flightNumber,
            origin: origin || "???",
            destination: destination || "???",
            departureTime: departureTime || new Date(dateStr + "T12:00:00").toISOString(),
            addedAt: new Date().toISOString()
        };
        flightsDatabase[dateStr].push(newFlight);
        saveData();
        showToast(`✅ 已添加 ${flightNumber}`);
        return newFlight;
    }

    function deleteFlight(dateStr, flightId) {
        if (flightsDatabase[dateStr]) {
            flightsDatabase[dateStr] = flightsDatabase[dateStr].filter(f => f.id != flightId);
            if (flightsDatabase[dateStr].length === 0) delete flightsDatabase[dateStr];
            saveData();
            showToast("🗑️ 已删除");
        }
    }

    function smartParseFlightNumber(input) {
        let num = input.toString().trim().toUpperCase();
        if (/^[A-Z]{2,3}\d{2,4}$/.test(num)) {
            return { flightNumber: num, airline: num.match(/[A-Z]+/)[0], number: num.match(/\d+/)[0] };
        }
        if (/^\d+$/.test(num)) {
            if (num.startsWith('8') && num.length > 4) {
                const shortNum = num.slice(1);
                return { flightNumber: `EK${shortNum}`, airline: "EK", number: shortNum };
            }
            if (num.length === 4) return { flightNumber: `EK${num}`, airline: "EK", number: num };
            if (num.length === 3) return { flightNumber: `EK0${num}`, airline: "EK", number: `0${num}` };
            if (num.length === 2) return { flightNumber: `EK00${num}`, airline: "EK", number: `00${num}` };
            return { flightNumber: `EK${num}`, airline: "EK", number: num };
        }
        return { flightNumber: num, airline: num.match(/[A-Z]+/)?.[0] || "EK", number: num.match(/\d+/)?.[0] || "" };
    }

    async function searchFlightOnline(flightInput) {
        const parsed = smartParseFlightNumber(flightInput);
        const candidates = [parsed.flightNumber, `EK${parsed.number}`, `EK${parsed.number.padStart(4,'0')}`];
        for (const fn of [...new Set(candidates)]) {
            try {
                const url = `https://api.aviationstack.com/v1/flights?access_key=b4bd321bbba1723162801cce3c455d7c&flight_iata=${fn}&limit=1`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.data && data.data.length > 0) {
                    const flight = data.data[0];
                    return {
                        found: true,
                        flightNumber: flight.flight.iata,
                        origin: flight.departure?.iata,
                        destination: flight.arrival?.iata,
                        departureScheduled: flight.departure?.scheduled ? new Date(flight.departure.scheduled) : null
                    };
                }
            } catch(e) {}
        }
        return { found: false };
    }

    async function searchAndAddToSelectedDate() {
        const flightInput = document.getElementById('flightInput').value.trim();
        if (!flightInput) { showToast("请输入航班号"); return; }
        if (!selectedDate) { showToast("请先点击选择日期"); return; }
        showToast("🔍 搜索中...", 3000);
        const result = await searchFlightOnline(flightInput);
        if (result.found && result.departureScheduled) {
            await addFlightToDate(selectedDate, result.flightNumber, result.origin, result.destination, result.departureScheduled.toISOString());
            document.getElementById('flightInput').value = '';
        } else {
            const origin = prompt("未找到航班信息，请输入起飞机场三字码 (如 DXB):", "DXB");
            const dest = prompt("请输入目的地机场三字码 (如 PVG):", "PVG");
            if (origin && dest) {
                const parsed = smartParseFlightNumber(flightInput);
                await addFlightToDate(selectedDate, parsed.flightNumber, origin.toUpperCase(), dest.toUpperCase(), new Date(selectedDate + "T12:00:00").toISOString());
                document.getElementById('flightInput').value = '';
            } else {
                showToast("已取消添加");
            }
        }
    }

    function renderCalendar() {
        const firstDay = new Date(currentYear, currentMonth, 1);
        const lastDay = new Date(currentYear, currentMonth + 1, 0);
        const startWeekday = firstDay.getDay();
        const daysInMonth = lastDay.getDate();
        const prevMonthLastDay = new Date(currentYear, currentMonth, 0).getDate();
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        document.getElementById('currentMonth').innerText = `${currentYear}年 ${monthNames[currentMonth]}`;
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        
        for (let i = startWeekday - 1; i >= 0; i--) {
            const dayNum = prevMonthLastDay - i;
            const date = new Date(currentYear, currentMonth - 1, dayNum);
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
            const hasFlight = flightsDatabase[dateStr] && flightsDatabase[dateStr].length > 0;
            const cell = createDayCell(dayNum, true, hasFlight, dateStr === todayStr, dateStr);
            grid.appendChild(cell);
        }
        
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const hasFlight = flightsDatabase[dateStr] && flightsDatabase[dateStr].length > 0;
            const isToday = (dateStr === todayStr);
            const cell = createDayCell(d, false, hasFlight, isToday, dateStr);
            grid.appendChild(cell);
        }
        
        const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;
        const remaining = totalCells - (startWeekday + daysInMonth);
        for (let i = 1; i <= remaining; i++) {
            const date = new Date(currentYear, currentMonth + 1, i);
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            const hasFlight = flightsDatabase[dateStr] && flightsDatabase[dateStr].length > 0;
            const cell = createDayCell(i, true, hasFlight, false, dateStr);
            grid.appendChild(cell);
        }
    }

    function createDayCell(dayNum, isOtherMonth, hasFlight, isToday, dateStr) {
        const cell = document.createElement('div');
        cell.className = 'cal-day';
        if (isOtherMonth) cell.classList.add('other-month');
        if (isToday) cell.classList.add('today');
        if (hasFlight) cell.classList.add('has-flight');
        if (selectedDate === dateStr) cell.classList.add('selected');
        const dayNumSpan = document.createElement('div');
        dayNumSpan.className = 'day-num';
        dayNumSpan.innerText = dayNum;
        cell.appendChild(dayNumSpan);
        if (hasFlight) {
            const dot = document.createElement('div');
            dot.className = 'flight-dot';
            cell.appendChild(dot);
        }
        cell.onclick = () => {
            selectedDate = dateStr;
            renderCalendar();
            renderDayFlights();
            document.getElementById('selectedDateDisplay').innerHTML = `📅 ${selectedDate}`;
        };
        return cell;
    }

    function renderDayFlights() {
        const container = document.getElementById('dayFlightsList');
        if (!selectedDate) {
            container.innerHTML = '<div class="empty-tip">点击日历选择日期</div>';
            return;
        }
        const flights = getFlightsForDate(selectedDate);
        if (flights.length === 0) {
            container.innerHTML = '<div class="empty-tip">✈️ 当天无航班<br>在上方输入航班号添加</div>';
            return;
        }
        container.innerHTML = flights.map(flight => {
            const depTime = new Date(flight.departureTime);
            const timeStr = depTime.toLocaleString();
            return `
                <div class="flight-item">
                    <div class="flight-info">
                        <div class="flight-num">✈️ ${flight.flightNumber}</div>
                        <div class="flight-route">🛫 ${flight.origin} → 🛬 ${flight.destination}</div>
                        <div class="flight-time">⏰ ${timeStr}</div>
                    </div>
                    <button class="delete-flight" onclick="deleteFlight('${selectedDate}', ${flight.id})">🗑️</button>
                </div>
            `;
        }).join('');
    }

    function syncToMainClock() {
        let allFlights = [];
        for (const dateStr in flightsDatabase) {
            for (const flight of flightsDatabase[dateStr]) {
                allFlights.push({ ...flight, dateStr: dateStr });
            }
        }
        if (allFlights.length === 0) { showToast("没有航班可同步"); return; }
        const now = new Date();
        const futureFlights = allFlights.filter(f => new Date(f.departureTime) > now);
        futureFlights.sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
        let activeFlight = futureFlights.length > 0 ? futureFlights[0] : allFlights[0];
        if (activeFlight) {
            const syncData = {
                flightNumber: activeFlight.flightNumber,
                origin: activeFlight.origin,
                destination: activeFlight.destination,
                departureTime: activeFlight.departureTime,
                pickupTime: new Date(new Date(activeFlight.departureTime).getTime() - 135*60000).toISOString()
            };
            localStorage.setItem('last_flight', JSON.stringify(syncData));
            localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDatabase));
            showToast("✅ 已同步到主时钟");
        }
    }

    function showToast(msg, duration = 2000) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
    }

    document.getElementById('prevMonthBtn').onclick = () => {
        currentMonth--;
        if (currentMonth < 0) { currentMonth = 11; currentYear--; }
        renderCalendar();
    };
    document.getElementById('nextMonthBtn').onclick = () => {
        currentMonth++;
        if (currentMonth > 11) { currentMonth = 0; currentYear++; }
        renderCalendar();
    };
    document.getElementById('searchAndAddBtn').onclick = searchAndAddToSelectedDate;
    document.getElementById('syncToClockBtn').onclick = syncToMainClock;
    document.getElementById('flightInput').onkeypress = (e) => { if (e.key === 'Enter') searchAndAddToSelectedDate(); };
    
    loadData();
</script>
</body>
</html>
