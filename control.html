<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>航班控制台 · 智能时间输入</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a;
            color: #fff;
            font-family: -apple-system, 'SF Pro Display', sans-serif;
            padding: 16px;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .container { max-width: 550px; margin: 0 auto; }
        h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; color: #ffd966; }
        .sub { font-size: 0.7rem; color: #88aacc; margin-bottom: 20px; }
        
        .month-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .month-nav button {
            background: #1a1f2e;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            color: white;
        }
        .current-month { font-size: 1.2rem; font-weight: 600; color: #ffd966; }
        
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 8px;
        }
        .weekday { font-size: 0.7rem; color: #88aacc; padding: 8px 0; }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            background: #11161f;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 20px;
        }
        .cal-day {
            aspect-ratio: 1;
            background: #1a1f2e;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            border: 1px solid transparent;
        }
        .cal-day.today { border-color: #ffaa44; }
        .cal-day.has-flight { background: #2a3a2a; }
        .cal-day.selected { background: #ffaa44; color: #0a0e1a; }
        .cal-day .day-num { font-size: 1rem; font-weight: 500; }
        .cal-day .flight-dot {
            width: 6px;
            height: 6px;
            background: #66ffaa;
            border-radius: 6px;
            margin-top: 4px;
        }
        .cal-day.other-month { opacity: 0.3; }
        
        .sidebar {
            background: #11161f;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .selected-date {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffd966;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2a3344;
        }
        
        .flight-input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .flight-input-area input {
            flex: 2;
            background: #1a1f2e;
            border: 1px solid #334455;
            padding: 14px 16px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            text-align: center;
        }
        .flight-input-area button {
            flex: 1;
            background: #ffaa44;
            color: #0a0e1a;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            padding: 14px 16px;
        }
        
        .time-input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .time-input-row input {
            flex: 1;
            background: #1a1f2e;
            border: 1px solid #334455;
            padding: 14px 16px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            text-align: center;
        }
        .time-input-row input::placeholder { color: #556688; font-size: 0.8rem; }
        
        .manual-add-btn {
            background: #2a6faa;
            width: 100%;
            margin-top: 0;
        }
        
        .preview-card {
            background: #1a2a3a;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ffaa44;
        }
        .preview-title { font-size: 0.7rem; color: #ffaa66; margin-bottom: 6px; }
        .preview-local { font-size: 0.8rem; margin-bottom: 4px; }
        .preview-dubai { font-size: 0.8rem; color: #66ffaa; }
        .hidden { display: none; }
        
        .smart-tips {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 0.7rem;
            color: #88aacc;
        }
        .smart-tips span { color: #ffd966; }
        
        .flight-list { max-height: 300px; overflow-y: auto; }
        .flight-item {
            background: #1a1f2e;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
            border-left: 3px solid #ffaa44;
        }
        .flight-num { font-weight: bold; color: #ffd966; font-size: 1rem; margin-bottom: 6px; }
        .flight-time-local { font-size: 0.7rem; color: #aabbdd; margin-bottom: 4px; }
        .flight-time-dubai { font-size: 0.7rem; color: #66ffaa; }
        .delete-flight {
            background: #aa4444;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        .empty-tip { text-align: center; color: #556688; padding: 20px; font-size: 0.8rem; }
        .sync-btn {
            width: 100%;
            background: #2a6faa;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #ffaa44;
            color: #0a0e1a;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 1000;
            animation: fadeOut 2s ease forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>✈️ 航班控制台</h1>
    <div class="sub">输入4位数时间自动识别 · 显示当地+迪拜时间</div>
    
    <div class="month-nav">
        <button id="prevMonthBtn">◀</button>
        <span class="current-month" id="currentMonth">2024年1月</span>
        <button id="nextMonthBtn">▶</button>
    </div>
    
    <div class="weekdays">
        <div class="weekday">日</div><div class="weekday">一</div><div class="weekday">二</div>
        <div class="weekday">三</div><div class="weekday">四</div><div class="weekday">五</div><div class="weekday">六</div>
    </div>
    
    <div class="calendar-grid" id="calendarGrid"></div>
    
    <div class="sidebar">
        <div class="selected-date" id="selectedDateDisplay">📅 点击日期选择</div>
        
        <!-- 手动输入区 -->
        <div class="flight-input-area">
            <input type="text" id="manualFlightNum" placeholder="航班号: 303" autocomplete="off">
        </div>
        <div class="time-input-row">
            <input type="text" id="manualOrigin" placeholder="起飞机场 (如 PVG)" maxlength="3" style="text-transform:uppercase">
            <input type="text" id="manualDest" placeholder="目的地 (如 DXB)" maxlength="3" style="text-transform:uppercase">
        </div>
        <div class="time-input-row">
            <input type="text" id="manualDate" placeholder="起飞日期 (2026-05-01)" autocomplete="off">
            <input type="text" id="manualTime" placeholder="起飞时间 (1415 = 14:15)" autocomplete="off">
        </div>
        
        <div id="previewCard" class="preview-card hidden">
            <div class="preview-title">📋 时间转换预览</div>
            <div class="preview-local" id="previewLocal">✈️ 当地时间: --:--</div>
            <div class="preview-dubai" id="previewDubai">🕐 迪拜时间: --:--</div>
        </div>
        
        <button id="manualAddBtn" class="manual-add-btn">📝 添加航班</button>
        
        <div class="smart-tips">
            💡 <span>303</span> → EK0303 &nbsp;&nbsp; <span>1415</span> → 14:15<br>
            🕐 时间默认为起飞机场当地时间，自动换算迪拜时间
        </div>
        
        <div id="dayFlightsList">
            <div class="empty-tip">选择日期后显示当天航班</div>
        </div>
        
        <button class="sync-btn" id="syncToClockBtn">🔄 同步到主时钟</button>
    </div>
</div>

<script>
    // 时区数据库
    const airportTimezone = {
        "DXB": "Asia/Dubai", "PVG": "Asia/Shanghai", "PEK": "Asia/Shanghai",
        "CAN": "Asia/Shanghai", "SZX": "Asia/Shanghai", "HKG": "Asia/Hong_Kong",
        "LHR": "Europe/London", "JFK": "America/New_York", "CDG": "Europe/Paris"
    };
    function getTz(code) { return airportTimezone[code] || "Asia/Shanghai"; }
    
    const DUBAI_TZ = "Asia/Dubai";
    let flightsDB = {};
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let selectedDate = null;
    
    // 辅助函数
    function formatTimeInTz(date, tz) {
        return new Date(date).toLocaleTimeString('zh-CN', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
    }
    
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // 解析4位数时间
    function parseTime4Digits(str) {
        let s = str.toString().trim();
        if (/^\d{3,4}$/.test(s)) {
            let hour, minute;
            if (s.length === 3) { hour = parseInt(s.charAt(0)); minute = parseInt(s.slice(1)); }
            else { hour = parseInt(s.slice(0,2)); minute = parseInt(s.slice(2,4)); }
            if (hour >= 0 && hour <= 23 && minute >= 0 && minute <= 59) {
                return { hour: hour.toString().padStart(2,'0'), minute: minute.toString().padStart(2,'0'), valid: true };
            }
        }
        return { valid: false };
    }
    
    // 智能航班号
    function smartFlightNum(input) {
        let num = input.toString().trim().toUpperCase();
        if (/^[A-Z]{2,3}\d{2,4}$/.test(num)) return num;
        if (/^\d+$/.test(num)) {
            if (num.length === 4) return `EK${num}`;
            if (num.length === 3) return `EK0${num}`;
            if (num.length === 2) return `EK00${num}`;
            return `EK${num}`;
        }
        return num;
    }
    
    // 预览更新
    function updatePreview() {
        let origin = document.getElementById('manualOrigin').value.trim().toUpperCase();
        let timeStr = document.getElementById('manualTime').value.trim();
        let dateStr = document.getElementById('manualDate').value.trim();
        let preview = document.getElementById('previewCard');
        
        if (!origin || !timeStr || !dateStr) { preview.classList.add('hidden'); return; }
        
        let parsed = parseTime4Digits(timeStr);
        if (!parsed.valid) { preview.classList.add('hidden'); return; }
        
        let tz = getTz(origin);
        let dateTime = new Date(`${dateStr}T${parsed.hour}:${parsed.minute}:00`);
        if (isNaN(dateTime.getTime())) { preview.classList.add('hidden'); return; }
        
        let localTime = formatTimeInTz(dateTime, tz);
        let dubaiTime = formatTimeInTz(dateTime, DUBAI_TZ);
        
        document.getElementById('previewLocal').innerHTML = `✈️ ${origin}当地时间: ${localTime}`;
        document.getElementById('previewDubai').innerHTML = `🕐 迪拜时间: ${dubaiTime}`;
        preview.classList.remove('hidden');
    }
    
    // 数据存储
    function saveData() {
        localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDB));
        renderCalendar();
        renderDayFlights();
        syncToClock();
    }
    
    function loadData() {
        try { let saved = localStorage.getItem('flight_calendar_db'); if (saved) flightsDB = JSON.parse(saved); } catch(e) {}
        renderCalendar();
        renderDayFlights();
    }
    
    function getFlights(date) { return flightsDB[date] || []; }
    
    function addFlight(date, flightNum, origin, dest, depTime) {
        if (!flightsDB[date]) flightsDB[date] = [];
        flightsDB[date].push({
            id: Date.now() + Math.random(),
            flightNumber: flightNum,
            origin: origin,
            destination: dest,
            departureTime: depTime
        });
        saveData();
        showToast(`✅ 已添加 ${flightNum}`);
    }
    
    function deleteFlight(date, id) {
        if (flightsDB[date]) {
            flightsDB[date] = flightsDB[date].filter(f => f.id != id);
            if (flightsDB[date].length === 0) delete flightsDB[date];
            saveData();
            showToast("🗑️ 已删除");
        }
    }
    
    // 手动添加
    function manualAdd() {
        let useDate = selectedDate;
        let manualDate = document.getElementById('manualDate').value.trim();
        if (manualDate && /^\d{4}-\d{2}-\d{2}$/.test(manualDate)) useDate = manualDate;
        if (!useDate) { showToast("请点击日历选择日期"); return; }
        
        let flightInput = document.getElementById('manualFlightNum').value.trim();
        let origin = document.getElementById('manualOrigin').value.trim().toUpperCase();
        let dest = document.getElementById('manualDest').value.trim().toUpperCase();
        let timeStr = document.getElementById('manualTime').value.trim();
        
        if (!flightInput || !origin || !dest || !timeStr) { showToast("请填写完整信息"); return; }
        
        let parsed = parseTime4Digits(timeStr);
        if (!parsed.valid) { showToast("时间格式错误，如 1415 = 14:15"); return; }
        
        let flightNum = smartFlightNum(flightInput);
        let depDateTime = new Date(`${useDate}T${parsed.hour}:${parsed.minute}:00`);
        if (isNaN(depDateTime.getTime())) { showToast("日期时间无效"); return; }
        
        let tz = getTz(origin);
        let localTime = formatTimeInTz(depDateTime, tz);
        let dubaiTime = formatTimeInTz(depDateTime, DUBAI_TZ);
        
        if (confirm(`确认添加航班 ${flightNum}\n\n🛫 ${origin} → ${dest}\n📅 ${useDate}\n✈️ 当地时间: ${localTime}\n🕐 迪拜时间: ${dubaiTime}`)) {
            addFlight(useDate, flightNum, origin, dest, depDateTime.toISOString());
            document.getElementById('manualFlightNum').value = '';
            document.getElementById('manualOrigin').value = '';
            document.getElementById('manualDest').value = '';
            document.getElementById('manualDate').value = '';
            document.getElementById('manualTime').value = '';
            document.getElementById('previewCard').classList.add('hidden');
        }
    }
    
    // 同步到主时钟
    function syncToClock() {
        let allFlights = [];
        for (let date in flightsDB) {
            for (let f of flightsDB[date]) allFlights.push(f);
        }
        if (allFlights.length === 0) { showToast("无航班可同步"); return; }
        
        let now = new Date();
        let future = allFlights.filter(f => new Date(f.departureTime) > now);
        future.sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
        let active = future.length > 0 ? future[0] : allFlights[0];
        
        if (active) {
            let syncData = {
                flightNumber: active.flightNumber,
                origin: active.origin,
                destination: active.destination,
                departureTime: active.departureTime,
                pickupTime: new Date(new Date(active.departureTime).getTime() - 135*60000).toISOString()
            };
            localStorage.setItem('last_flight', JSON.stringify(syncData));
            localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDB));
            showToast("✅ 已同步");
        }
    }
    
    // 日历渲染
    function renderCalendar() {
        let firstDay = new Date(currentYear, currentMonth, 1);
        let lastDay = new Date(currentYear, currentMonth + 1, 0);
        let startWeek = firstDay.getDay();
        let daysInMonth = lastDay.getDate();
        let prevLastDay = new Date(currentYear, currentMonth, 0).getDate();
        let grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        let monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        document.getElementById('currentMonth').innerText = `${currentYear}年 ${monthNames[currentMonth]}`;
        
        let today = new Date();
        let todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        
        for (let i = startWeek - 1; i >= 0; i--) {
            let day = prevLastDay - i;
            let date = new Date(currentYear, currentMonth - 1, day);
            let dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            let hasFlight = flightsDB[dateStr] && flightsDB[dateStr].length > 0;
            let cell = createDayCell(day, true, hasFlight, dateStr === todayStr, dateStr);
            grid.appendChild(cell);
        }
        
        for (let d = 1; d <= daysInMonth; d++) {
            let dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let hasFlight = flightsDB[dateStr] && flightsDB[dateStr].length > 0;
            let isToday = dateStr === todayStr;
            let cell = createDayCell(d, false, hasFlight, isToday, dateStr);
            grid.appendChild(cell);
        }
        
        let total = Math.ceil((startWeek + daysInMonth) / 7) * 7;
        let remaining = total - (startWeek + daysInMonth);
        for (let i = 1; i <= remaining; i++) {
            let date = new Date(currentYear, currentMonth + 1, i);
            let dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
            let hasFlight = flightsDB[dateStr] && flightsDB[dateStr].length > 0;
            let cell = createDayCell(i, true, hasFlight, false, dateStr);
            grid.appendChild(cell);
        }
    }
    
    function createDayCell(day, isOther, hasFlight, isToday, dateStr) {
        let cell = document.createElement('div');
        cell.className = 'cal-day';
        if (isOther) cell.classList.add('other-month');
        if (isToday) cell.classList.add('today');
        if (hasFlight) cell.classList.add('has-flight');
        if (selectedDate === dateStr) cell.classList.add('selected');
        
        let numSpan = document.createElement('div');
        numSpan.className = 'day-num';
        numSpan.innerText = day;
        cell.appendChild(numSpan);
        
        if (hasFlight) {
            let dot = document.createElement('div');
            dot.className = 'flight-dot';
            cell.appendChild(dot);
        }
        
        cell.onclick = () => {
            selectedDate = dateStr;
            renderCalendar();
            renderDayFlights();
            document.getElementById('selectedDateDisplay').innerHTML = `📅 ${selectedDate}`;
        };
        return cell;
    }
    
    function renderDayFlights() {
        let container = document.getElementById('dayFlightsList');
        if (!selectedDate) { container.innerHTML = '<div class="empty-tip">点击日历选择日期</div>'; return; }
        
        let flights = getFlights(selectedDate);
        if (flights.length === 0) { container.innerHTML = '<div class="empty-tip">✈️ 当天无航班</div>'; return; }
        
        flights.sort((a,b) => new Date(a.departureTime) - new Date(b.departureTime));
        
        container.innerHTML = flights.map(f => {
            let dep = new Date(f.departureTime);
            let localTime = formatTimeInTz(dep, getTz(f.origin));
            let dubaiTime = formatTimeInTz(dep, DUBAI_TZ);
            return `
                <div class="flight-item">
                    <div class="flight-num">✈️ ${f.flightNumber}  ${f.origin} → ${f.destination}</div>
                    <div class="flight-time-local">✈️ 起飞 ${localTime} (${f.origin}当地时间)</div>
                    <div class="flight-time-dubai">🕐 迪拜时间 ${dubaiTime}</div>
                    <button class="delete-flight" onclick="deleteFlight('${selectedDate}', ${f.id})">删除</button>
                </div>
            `;
        }).join('');
    }
    
    // 事件绑定
    document.getElementById('prevMonthBtn').onclick = () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } renderCalendar(); };
    document.getElementById('nextMonthBtn').onclick = () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } renderCalendar(); };
    document.getElementById('manualAddBtn').onclick = manualAdd;
    document.getElementById('syncToClockBtn').onclick = syncToClock;
    
    document.getElementById('manualOrigin').oninput = function() { this.value = this.value.toUpperCase(); updatePreview(); };
    document.getElementById('manualTime').oninput = updatePreview;
    document.getElementById('manualDate').oninput = updatePreview;
    
    document.getElementById('manualTime').onkeypress = (e) => { if (e.key === 'Enter') manualAdd(); };
    
    loadData();
</script>
</body>
</html>
