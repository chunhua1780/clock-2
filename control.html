<script>
    // 在之前的 smartSearch 函数中加入多段解析
    async function smartSearch() {
        let input = document.getElementById('f_no').value.trim();
        let flightNo = isNaN(input) ? input.toUpperCase() : "EK" + input;
        
        const res = await fetch(`https://api.aviationstack.com/v1/flights?access_key=${AVI_KEY}&flight_iata=${flightNo}`);
        const json = await res.json();
        
        if (json.data && json.data.length > 0) {
            // 弹出多航段供用户点击
            let listHtml = json.data.map(f => `
                <div class="flight-item" onclick="selectFlight('${f.departure.iata}', '${f.arrival.iata}', '${f.departure.scheduled}')">
                    ${f.departure.iata} (${f.departure.airport}) ➔ ${f.arrival.iata}
                </div>
            `).join('');
            document.getElementById('results-list').innerHTML = listHtml;
            document.getElementById('results-area').style.display = 'block';
        }
    }
</script>
