<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航班时钟 · 控制台</title>
    <style>
        /* 保持您最喜欢的舒适版 UI 风格 */
        body { background: #f0f2f5; font-family: system-ui; padding: 20px; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; }
        .btn-sync { background: #007aff; color: white; font-weight: bold; border: none; cursor: pointer; }
        .flight-item { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-top: 10px; display: flex; justify-content: space-between; }
        input[type="text"] { text-transform: uppercase; } /* 视觉强制大写 */
    </style>
</head>
<body>

    <div class="card">
        <h2>✈️ 安排航段</h2>
        <input type="date" id="fDate">
        <div style="display:flex; gap:10px;">
            <input type="text" id="fNo" placeholder="航班号 (795)">
            <input type="text" id="fDep" placeholder="起飞 (DSS)" maxlength="3">
            <input type="text" id="fArr" placeholder="到达 (DXB)" maxlength="3">
        </div>
        <input type="tel" id="fTime" placeholder="时间 (如 1820)" maxlength="4">
        <button class="btn-sync" onclick="saveAndSync()">确认并同步到云端</button>
    </div>

    <div class="card">
        <h3>📋 任务清单 (日历数据库)</h3>
        <div id="list"></div>
    </div>

    <div class="card" style="font-size: 10px; color: #999;">
        🔑 Token: <input type="password" id="tk" style="font-size: 10px; padding: 5px;">
    </div>

<script>
    const GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    let flightsDB = JSON.parse(localStorage.getItem('flight_calendar_db')) || {};

    function saveAndSync() {
        const date = document.getElementById('fDate').value;
        let no = document.getElementById('fNo').value.toUpperCase();
        const dep = document.getElementById('fDep').value.toUpperCase();
        const arr = document.getElementById('fArr').value.toUpperCase();
        const time = document.getElementById('fTime').value;
        const token = document.getElementById('tk').value;

        if (!date || !no || !dep || !arr || time.length < 4) return alert("请补全信息");
        if (!isNaN(no)) no = "EK" + no;
        const finalTime = `${date}T${time.slice(0,2)}:${time.slice(2,4)}:00`;

        if (!flightsDB[date]) flightsDB[date] = [];
        flightsDB[date].push({ id: Date.now(), flightNumber: no, origin: dep, destination: arr, departureTime: finalTime });
        
        localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDB));
        sync(token);
    }

    async function sync(token) {
        if (!token) return alert("请输入 Token");
        try {
            const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    files: {
                        'calendar_db.json': { content: JSON.stringify(flightsDB) }
                    }
                })
            });
            if (res.ok) { alert("🚀 已同步！"); render(); }
        } catch (e) { alert("同步失败"); }
    }

    function render() {
        const box = document.getElementById('list');
        box.innerHTML = "";
        for (let d in flightsDB) {
            flightsDB[d].forEach(f => {
                box.innerHTML += `<div class="flight-item"><b>${f.flightNumber}</b> ${f.origin}-${f.destination} (${f.departureTime.split('T')[1].substring(0,5)}) <button onclick="del('${d}', ${f.id})">删除</button></div>`;
            });
        }
    }

    window.del = (date, id) => {
        flightsDB[date] = flightsDB[date].filter(f => f.id !== id);
        localStorage.setItem('flight_calendar_db', JSON.stringify(flightsDB));
        render();
        alert("请点一次同步以更新云端");
    };

    render();
</script>
</body>
</html>
