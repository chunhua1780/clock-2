<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>航班控制台</title>
    <style>
        body { background: #f0f4f8; font-family: system-ui; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 10px; border: 1px solid #ddd; }
        button { width: 100%; padding: 12px; background: #2c5f8a; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .item { border-left: 5px solid #ffaa44; background: #f9f9f9; padding: 10px; margin-top: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="card">
        <h3>安排航段</h3>
        <input type="date" id="fDate">
        <input type="text" id="fNo" placeholder="航班号 (如 795)">
        <input type="text" id="fDep" placeholder="起点 (如 DSS)">
        <input type="text" id="fArr" placeholder="终点 (如 DXB)">
        <input type="text" id="fTime" placeholder="起飞时间 (如 1820)">
        <button onclick="saveAndSync()">保存并同步云端</button>
    </div>
    <div class="card" id="list"></div>
    <div class="card">
        Token: <input type="password" id="tk" placeholder="GitHub Token">
        <button onclick="localStorage.setItem('gh_token', document.getElementById('tk').value); location.reload();">锁定Token</button>
    </div>

<script>
    let GH_TOKEN = localStorage.getItem('gh_token');
    let GIST_ID = "6b51ae2b894903de0227eaec5e0ce842";
    let db = JSON.parse(localStorage.getItem('flight_db')) || {};

    function saveAndSync() {
        const d = document.getElementById('fDate').value;
        const no = document.getElementById('fNo').value;
        const iso = `${d}T${document.getElementById('fTime').value.slice(0,2)}:${document.getElementById('fTime').value.slice(2,4)}:00`;
        
        if(!db[d]) db[d] = [];
        db[d].push({ flightNo: 'EK'+no, dep: document.getElementById('fDep').value, arr: document.getElementById('fArr').value, std: iso });
        localStorage.setItem('flight_db', JSON.stringify(db));
        sync();
    }

    async function sync() {
        let all = []; Object.values(db).forEach(day => all = all.concat(day));
        let active = all[all.length - 1]; // 简单取最后一个
        await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            method: 'PATCH',
            headers: { 'Authorization': `token ${GH_TOKEN}` },
            body: JSON.stringify({ files: { 
                'calendar_db.json': { content: JSON.stringify(db) },
                'flight_data.json': { content: JSON.stringify(active) }
            } })
        });
        alert("同步成功"); location.reload();
    }
</script>
</body>
</html>
